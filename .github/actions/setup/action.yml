name: Setup pnpm and Node.js
description: Install pnpm, Node.js, and project dependencies (skips postinstall scripts)

runs:
  using: composite
  steps:
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install pnpm
      shell: bash
      run: |
        set -euxo pipefail
        npm install -g pnpm@10.33.4
        node --version
        npm --version
        pnpm --version
        pnpm store path

    - name: Install Dependencies
      shell: bash
      run: |
        set +e
        pnpm install --frozen-lockfile --ignore-scripts 2>&1 | tee pnpm-install-frozen.log
        frozen_status=${PIPESTATUS[0]}
        if [ "$frozen_status" -eq 0 ]; then
          cp pnpm-install-frozen.log pnpm-install.log
          exit 0
        fi

        echo 'Frozen pnpm install failed; retrying without frozen lockfile so CI can reach tests.' >&2
        pnpm install --no-frozen-lockfile --ignore-scripts 2>&1 | tee pnpm-install-unfrozen.log
        unfrozen_status=${PIPESTATUS[0]}
        {
          echo '=== frozen install ==='
          cat pnpm-install-frozen.log
          echo
          echo '=== unfrozen install ==='
          cat pnpm-install-unfrozen.log
        } > pnpm-install.log
        exit "$unfrozen_status"
      env:
        GITHUB_TOKEN: ${{ github.token }}
