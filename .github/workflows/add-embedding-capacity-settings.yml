name: Add Embedding Capacity Settings

on:
  pull_request:
    branches:
      - assistant/wiki-links-graph-integration
    paths:
      - .github/workflows/add-embedding-capacity-settings.yml

permissions:
  contents: write

jobs:
  implement:
    if: github.head_ref == 'assistant/wiki-organization-continuation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: assistant/wiki-organization-continuation
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - name: Install Linux Tauri build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Add configurable embedding context and physical batch size
        run: |
          python3 - <<'PY'
          from pathlib import Path

          rust_path = Path('Elephant/backend/tauri/src/local_llama_runtime.rs')
          rust = rust_path.read_text()
          rust = rust.replace(
              'const DEFAULT_EMBEDDING_BASE_URL: &str = "http://127.0.0.1:39282/v1";\n',
              'const DEFAULT_EMBEDDING_BASE_URL: &str = "http://127.0.0.1:39282/v1";\nconst DEFAULT_EMBEDDING_CONTEXT_WINDOW: u64 = 2048;\nconst DEFAULT_EMBEDDING_PHYSICAL_BATCH_SIZE: u64 = 1024;\n',
              1,
          )

          context_marker = '''fn local_port_from_base_url(base_url: &str) -> Option<u16> {'''
          helpers = '''fn embedding_context_window_from_payload(payload: &Value) -> u64 {
              payload_u64(
                  payload,
                  &[
                      "/embeddingContextWindow",
                      "/routes/embedding/contextWindow",
                      "/aiConfig/routes/embedding/contextWindow",
                      "/config/routes/embedding/contextWindow",
                      "/localRuntime/embeddingContextWindow",
                      "/aiConfig/localRuntime/embeddingContextWindow",
                      "/config/localRuntime/embeddingContextWindow",
                  ],
              )
              .filter(|value| *value >= 512)
              .unwrap_or(DEFAULT_EMBEDDING_CONTEXT_WINDOW)
              .clamp(512, 32_768)
          }

          fn embedding_physical_batch_size_from_payload(payload: &Value) -> u64 {
              let requested = payload_u64(
                  payload,
                  &[
                      "/embeddingPhysicalBatchSize",
                      "/embeddingUbatchSize",
                      "/routes/embedding/physicalBatchSize",
                      "/routes/embedding/ubatchSize",
                      "/aiConfig/routes/embedding/physicalBatchSize",
                      "/config/routes/embedding/physicalBatchSize",
                      "/localRuntime/embeddingPhysicalBatchSize",
                      "/localRuntime/embeddingUbatchSize",
                      "/aiConfig/localRuntime/embeddingPhysicalBatchSize",
                      "/config/localRuntime/embeddingPhysicalBatchSize",
                  ],
              )
              .filter(|value| *value >= 256)
              .unwrap_or(DEFAULT_EMBEDDING_PHYSICAL_BATCH_SIZE)
              .clamp(256, 8_192);
              requested.min(embedding_context_window_from_payload(payload))
          }

          '''
          if helpers.strip() not in rust:
              if context_marker not in rust:
                  raise SystemExit('local port marker not found')
              rust = rust.replace(context_marker, helpers + context_marker, 1)

          old_args = '''fn llama_server_args(
              model_path: &str,
              port: u16,
              context: &str,
              model_name: &str,
              embedding: bool,
          ) -> Vec<String> {'''
          new_args = '''fn llama_server_args(
              model_path: &str,
              port: u16,
              context: &str,
              model_name: &str,
              embedding: bool,
              embedding_physical_batch: Option<&str>,
          ) -> Vec<String> {'''
          if old_args not in rust:
              raise SystemExit('llama_server_args signature not found')
          rust = rust.replace(old_args, new_args, 1)
          rust = rust.replace(
              '''    if embedding {
                  args.push("--embedding".to_string());
              }
              args''',
              '''    if embedding {
                  args.push("--embedding".to_string());
                  args.push("--batch-size".to_string());
                  args.push(context.to_string());
                  args.push("--ubatch-size".to_string());
                  args.push(
                      embedding_physical_batch
                          .unwrap_or("1024")
                          .to_string(),
                  );
              }
              args''',
              1,
          )

          rust = rust.replace(
              '''    let context = if embedding {
                  "512".to_string()
              } else {
                  context_size_from_payload(payload)
              };''',
              '''    let embedding_physical_batch = embedding
                  .then(|| embedding_physical_batch_size_from_payload(payload).to_string());
              let context = if embedding {
                  embedding_context_window_from_payload(payload).to_string()
              } else {
                  context_size_from_payload(payload)
              };''',
              1,
          )
          rust = rust.replace(
              '''    let args = llama_server_args(&model_path_string, port, &context, model_name, embedding);''',
              '''    let args = llama_server_args(
                  &model_path_string,
                  port,
                  &context,
                  model_name,
                  embedding,
                  embedding_physical_batch.as_deref(),
              );''',
              1,
          )

          old_truncate = '''fn truncate_embedding_input(text: &str) -> String {
              const MAX_BYTES: usize = 900;
              if text.len() <= MAX_BYTES {
                  return text.to_string();
              }
              let mut end = MAX_BYTES;
              while end > 0 && !text.is_char_boundary(end) {
                  end -= 1;
              }
              text[..end].to_string()
          }'''
          new_truncate = '''fn truncate_embedding_input(text: &str, physical_batch_size: u64) -> String {
              let max_bytes = physical_batch_size
                  .saturating_sub(64)
                  .clamp(192, 8_128) as usize;
              if text.len() <= max_bytes {
                  return text.to_string();
              }
              let mut end = max_bytes;
              while end > 0 && !text.is_char_boundary(end) {
                  end -= 1;
              }
              text[..end].to_string()
          }

          fn embedding_capacity_error(message: &str) -> bool {
              let normalized = message.to_lowercase();
              normalized.contains("physical batch size")
                  || normalized.contains("input") && normalized.contains("too large to process")
                  || normalized.contains("prompt") && normalized.contains("too long")
          }'''
          if old_truncate not in rust:
              raise SystemExit('embedding truncation helper not found')
          rust = rust.replace(old_truncate, new_truncate, 1)

          old_request = '''    let input = truncate_embedding_input(text);
              let response = Client::builder()
                  .timeout(Duration::from_secs(120))
                  .build()
                  .map_err(|error| error.to_string())?
                  .post(format!("{}/embeddings", base_url))
                  .json(&json!({ "model": model_name, "input": input }))
                  .send()
                  .await
                  .map_err(|error| error.to_string())?;
              let status = response.status();
              let data = response.json::<Value>().await.unwrap_or_else(|_| json!({}));
              if !status.is_success() {
                  return Err(error_text(
                      &data,
                      format!("Local embedding server returned HTTP {status}."),
                  ));
              }
              data.pointer("/data/0/embedding")
                  .and_then(Value::as_array)
                  .ok_or_else(|| "Local embedding server returned no embedding vector.".to_string())?
                  .iter()
                  .map(|value| {
                      value
                          .as_f64()
                          .map(|number| number as f32)
                          .ok_or_else(|| "Local embedding vector contains a non-number.".to_string())
                  })
                  .collect()'''
          new_request = '''    let configured_batch = embedding_physical_batch_size_from_payload(payload);
              let mut attempts = vec![
                  configured_batch,
                  configured_batch.saturating_div(2).max(256),
                  512,
                  384,
                  256,
              ];
              attempts.sort_unstable_by(|left, right| right.cmp(left));
              attempts.dedup();
              let client = Client::builder()
                  .timeout(Duration::from_secs(120))
                  .build()
                  .map_err(|error| error.to_string())?;
              let mut last_error = String::new();
              for capacity in attempts {
                  let input = truncate_embedding_input(text, capacity);
                  let response = client
                      .post(format!("{}/embeddings", base_url))
                      .json(&json!({ "model": model_name, "input": input }))
                      .send()
                      .await
                      .map_err(|error| error.to_string())?;
                  let status = response.status();
                  let data = response.json::<Value>().await.unwrap_or_else(|_| json!({}));
                  if status.is_success() {
                      return data
                          .pointer("/data/0/embedding")
                          .and_then(Value::as_array)
                          .ok_or_else(|| {
                              "Local embedding server returned no embedding vector.".to_string()
                          })?
                          .iter()
                          .map(|value| {
                              value.as_f64().map(|number| number as f32).ok_or_else(|| {
                                  "Local embedding vector contains a non-number.".to_string()
                              })
                          })
                          .collect();
                  }
                  last_error = error_text(
                      &data,
                      format!("Local embedding server returned HTTP {status}."),
                  );
                  if !embedding_capacity_error(&last_error) {
                      return Err(last_error);
                  }
                  eprintln!(
                      "[tauri-rag] embedding input exceeded runtime capacity; retrying with byte_budget={} configured_ubatch={} error={}",
                      capacity.saturating_sub(64),
                      configured_batch,
                      last_error
                  );
              }
              Err(format!(
                  "Local embedding input still exceeds the active llama.cpp capacity after safe truncation. Restart Elephant to apply the configured embedding physical batch size (currently {}). Last error: {}",
                  configured_batch,
                  last_error
              ))'''
          if old_request not in rust:
              raise SystemExit('embedding request block not found')
          rust = rust.replace(old_request, new_request, 1)

          rust = rust.replace(
              'llama_server_args("/models/smol.gguf", 39281, "4096", "smol.gguf", false)',
              'llama_server_args("/models/smol.gguf", 39281, "4096", "smol.gguf", false, None)',
              1,
          )
          tests_marker = '''    #[test]
              fn bundled_runtime_does_not_add_global_shell_candidates()'''
          tests = '''    #[test]
              fn embedding_capacity_defaults_are_large_enough_for_multi_view_inputs() {
                  let payload = json!({});
                  assert_eq!(embedding_context_window_from_payload(&payload), 2048);
                  assert_eq!(embedding_physical_batch_size_from_payload(&payload), 1024);
              }

              #[test]
              fn embedding_capacity_reads_local_runtime_settings() {
                  let payload = json!({
                      "aiConfig": {
                          "localRuntime": {
                              "embeddingContextWindow": 4096,
                              "embeddingPhysicalBatchSize": 2048
                          }
                      }
                  });
                  assert_eq!(embedding_context_window_from_payload(&payload), 4096);
                  assert_eq!(embedding_physical_batch_size_from_payload(&payload), 2048);
              }

              #[test]
              fn embedding_server_args_include_logical_and_physical_batches() {
                  let args = llama_server_args(
                      "/models/embed.gguf",
                      39282,
                      "2048",
                      "embed.gguf",
                      true,
                      Some("1024"),
                  );
                  assert!(args.windows(2).any(|window| window == ["--batch-size", "2048"]));
                  assert!(args.windows(2).any(|window| window == ["--ubatch-size", "1024"]));
              }

              #[test]
              fn embedding_truncation_respects_the_active_physical_batch() {
                  let input = "x".repeat(2_000);
                  assert_eq!(truncate_embedding_input(&input, 512).len(), 448);
                  assert_eq!(truncate_embedding_input(&input, 1024).len(), 960);
              }

          '''
          if tests_marker not in rust:
              raise SystemExit('Rust tests marker not found')
          rust = rust.replace(tests_marker, tests + tests_marker, 1)
          rust_path.write_text(rust)

          panel_path = Path('Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue')
          panel = panel_path.read_text()
          ui_marker = '''            <label><span>Dimensions</span><input
                        v-model.number="form.routes.embedding.dimensions"
                        type="number"
                        min="0"
                      ></label>'''
          ui_addition = ui_marker + '''
                      <label v-if="form.routes.embedding.source === 'app-local'">
                        <span title="Maximum embedding context passed to the bundled llama.cpp server.">Embedding context window</span>
                        <input
                          v-model.number="form.localRuntime.embeddingContextWindow"
                          type="number"
                          min="512"
                          max="32768"
                          step="256"
                        >
                      </label>
                      <label v-if="form.routes.embedding.source === 'app-local'">
                        <span title="llama.cpp --ubatch-size. Increase this when the server reports that an embedding input is too large for the physical batch.">Physical batch size</span>
                        <input
                          v-model.number="form.localRuntime.embeddingPhysicalBatchSize"
                          type="number"
                          min="256"
                          max="8192"
                          step="256"
                        >
                      </label>
                      <div
                        v-if="form.routes.embedding.source === 'app-local'"
                        class="wide en-ai-setting-copy"
                      >
                        <span>Defaults: 2048 context · 1024 physical batch. Restart Elephant after changing these runtime values.</span>
                      </div>'''
          if ui_marker not in panel:
              raise SystemExit('Embedding dimensions UI marker not found')
          panel = panel.replace(ui_marker, ui_addition, 1)
          panel = panel.replace(
              '''const defaultForm = () => ({
                localAi: normalizeLocalAiConfig(),''',
              '''const defaultLocalRuntime = () => ({
                llamaServerMode: 'bundled',
                llamaServerPath: '',
                llamaBaseUrl: '',
                embeddingContextWindow: 2048,
                embeddingPhysicalBatchSize: 1024
              })
              const defaultForm = () => ({
                localAi: normalizeLocalAiConfig(),
                localRuntime: defaultLocalRuntime(),''',
              1,
          )
          panel = panel.replace(
              '''    localAi: normalizeLocalAiConfig(config.localAi),
                  providerRows: normalizeProviderRows(config),''',
              '''    localAi: normalizeLocalAiConfig(config.localAi),
                  localRuntime: { ...defaultLocalRuntime(), ...(config.localRuntime || {}) },
                  providerRows: normalizeProviderRows(config),''',
              1,
          )
          panel = panel.replace(
              '''  localAi: clonePlainObject(form.value.localAi),
                provider: form.value.routes.chat.source === 'app-local' ? 'tauri-rust' : form.value.routes.chat.source,''',
              '''  localAi: clonePlainObject(form.value.localAi),
                localRuntime: {
                  ...defaultLocalRuntime(),
                  ...clonePlainObject(form.value.localRuntime),
                  embeddingContextWindow: Math.max(512, Math.min(32768, Math.round(Number(form.value.localRuntime.embeddingContextWindow) || 2048))),
                  embeddingPhysicalBatchSize: Math.max(256, Math.min(8192, Math.round(Number(form.value.localRuntime.embeddingPhysicalBatchSize) || 1024)))
                },
                provider: form.value.routes.chat.source === 'app-local' ? 'tauri-rust' : form.value.routes.chat.source,''',
              1,
          )
          panel_path.write_text(panel)

          bridge_path = Path('Elephant/frontend/src/renderer/src/platform/tauriElephantNoteBridge.js')
          bridge = bridge_path.read_text()
          bridge = bridge.replace(
              "localRuntime: { llamaServerMode: 'bundled', llamaServerPath: '', llamaBaseUrl: '' },",
              "localRuntime: { llamaServerMode: 'bundled', llamaServerPath: '', llamaBaseUrl: '', embeddingContextWindow: 2048, embeddingPhysicalBatchSize: 1024 },",
              1,
          )
          bridge_path.write_text(bridge)

          legacy_path = Path('Elephant/frontend/src/renderer/src/prefComponents/general/index.vue')
          legacy = legacy_path.read_text()
          legacy_ui_marker = '''          <small>
                      Use the bundled mode for the normal app experience. Use path mode only if llama-server is already installed somewhere else.
                    </small>'''
          legacy_ui = '''          <div class="local-runtime-capacity-grid">
                      <label>
                        <span>Embedding context window</span>
                        <el-input-number
                          v-model="embeddingContextWindow"
                          :min="512"
                          :max="32768"
                          :step="256"
                          @change="saveLlamaRuntimeConfig"
                        />
                      </label>
                      <label>
                        <span>Physical batch size</span>
                        <el-input-number
                          v-model="embeddingPhysicalBatchSize"
                          :min="256"
                          :max="8192"
                          :step="256"
                          @change="saveLlamaRuntimeConfig"
                        />
                      </label>
                    </div>
                    <small>
                      Use the bundled mode for the normal app experience. Embedding defaults are 2048 context and 1024 physical batch. Restart Elephant after changing runtime capacity.
                    </small>'''
          if legacy_ui_marker not in legacy:
              raise SystemExit('Legacy runtime UI marker not found')
          legacy = legacy.replace(legacy_ui_marker, legacy_ui, 1)
          legacy = legacy.replace(
              "const llamaServerPath = ref('')\nconst llamaRuntimeSaving = ref(false)",
              "const llamaServerPath = ref('')\nconst embeddingContextWindow = ref(2048)\nconst embeddingPhysicalBatchSize = ref(1024)\nconst llamaRuntimeSaving = ref(false)",
              1,
          )
          legacy = legacy.replace(
              "localRuntime: { llamaServerMode: 'bundled', llamaServerPath: '', llamaBaseUrl: '' }",
              "localRuntime: { llamaServerMode: 'bundled', llamaServerPath: '', llamaBaseUrl: '', embeddingContextWindow: 2048, embeddingPhysicalBatchSize: 1024 }",
              1,
          )
          legacy = legacy.replace(
              '''  llamaServerPath.value = runtime.llamaServerPath || runtime.serverPath || runtime.path || ''
              }''',
              '''  llamaServerPath.value = runtime.llamaServerPath || runtime.serverPath || runtime.path || ''
                embeddingContextWindow.value = Math.max(512, Number(runtime.embeddingContextWindow) || 2048)
                embeddingPhysicalBatchSize.value = Math.max(256, Number(runtime.embeddingPhysicalBatchSize || runtime.embeddingUbatchSize) || 1024)
              }''',
              1,
          )
          legacy = legacy.replace(
              '''        llamaServerMode: llamaServerMode.value || 'bundled',
                    llamaServerPath: llamaServerPath.value.trim()''',
              '''        llamaServerMode: llamaServerMode.value || 'bundled',
                    llamaServerPath: llamaServerPath.value.trim(),
                    embeddingContextWindow: Math.max(512, Math.min(32768, Math.round(Number(embeddingContextWindow.value) || 2048))),
                    embeddingPhysicalBatchSize: Math.max(256, Math.min(8192, Math.round(Number(embeddingPhysicalBatchSize.value) || 1024)))''',
              1,
          )
          legacy += '''
          <style scoped>
          .local-runtime-capacity-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
          }
          .local-runtime-capacity-grid label {
            display: flex;
            flex-direction: column;
            gap: 6px;
          }
          </style>
          '''
          legacy_path.write_text(legacy)

          test_path = Path('tests/app/unit/wikiDiscoveryQualityRegression.spec.js')
          test = test_path.read_text()
          if 'configures the local embedding physical batch' not in test:
              insert = '''
              it('configures the local embedding physical batch above the old 512 default', () => {
                const runtime = fs.readFileSync('Elephant/backend/tauri/src/local_llama_runtime.rs', 'utf8')
                const aiSettings = fs.readFileSync('Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue', 'utf8')
                expect(runtime).toContain('DEFAULT_EMBEDDING_PHYSICAL_BATCH_SIZE: u64 = 1024')
                expect(runtime).toContain('--ubatch-size')
                expect(runtime).toContain('embedding_capacity_error')
                expect(aiSettings).toContain('Physical batch size')
                expect(aiSettings).toContain('embeddingPhysicalBatchSize: 1024')
              })
              '''
              test = test.replace('\n})\n', insert + '\n})\n', 1)
          test_path.write_text(test)
          PY
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml --all
      - name: Validate embedding capacity settings
        run: |
          cargo test --manifest-path Elephant/backend/tauri/Cargo.toml local_llama_runtime --lib
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            tests/app/unit/wikiDiscoveryQualityRegression.spec.js
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/eslint \
            Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue \
            Elephant/frontend/src/renderer/src/platform/tauriElephantNoteBridge.js \
            Elephant/frontend/src/renderer/src/prefComponents/general/index.vue
      - name: Commit embedding capacity settings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            Elephant/backend/tauri/src/local_llama_runtime.rs \
            Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue \
            Elephant/frontend/src/renderer/src/platform/tauriElephantNoteBridge.js \
            Elephant/frontend/src/renderer/src/prefComponents/general/index.vue \
            tests/app/unit/wikiDiscoveryQualityRegression.spec.js
          git commit --no-verify -m "fix: configure local embedding runtime capacity"
          git push origin HEAD:assistant/wiki-organization-continuation
