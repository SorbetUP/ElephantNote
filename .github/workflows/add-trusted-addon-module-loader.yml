name: Add trusted addon module loader

on:
  push:
    branches:
      - feature/physical-addon-packages
    paths:
      - .github/workflows/add-trusted-addon-module-loader.yml

permissions:
  contents: write

jobs:
  module-loader:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/physical-addon-packages
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Add confined module reader and blob graph loader
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          rust = Path('Elephant/backend/tauri/src/addon_modules.rs')
          rust.write_text(r'''use serde::Serialize;
use std::{fs, path::{Component, Path, PathBuf}};
use tauri::AppHandle;

use crate::{
  addon_runtime_access::read_enabled_addon,
  vault::config as vault_config,
  vault_layout,
};

type R<T> = Result<T, String>;
const MAX_MODULE_BYTES: u64 = 5 * 1024 * 1024;
const MAX_MODULE_DEPTH: usize = 64;

#[derive(Debug, Clone, Serialize)]
#[serde(rename_all = "camelCase")]
pub struct AddonModuleSource {
  path: String,
  source: String,
}

fn normalize_module_path(value: &str) -> R<String> {
  let value = value.trim().replace('\\', "/");
  if value.is_empty() || Path::new(&value).is_absolute() {
    return Err("A relative addon JavaScript module path is required".to_string());
  }
  let mut normalized = PathBuf::new();
  let mut depth = 0_usize;
  for component in Path::new(&value).components() {
    match component {
      Component::Normal(part) => {
        normalized.push(part);
        depth += 1;
        if depth > MAX_MODULE_DEPTH {
          return Err(format!("Addon module path exceeds {MAX_MODULE_DEPTH} components"));
        }
      }
      Component::CurDir => {}
      Component::ParentDir | Component::RootDir | Component::Prefix(_) => {
        return Err(format!("Addon module path traversal is not allowed: {value}"));
      }
    }
  }
  if normalized.extension().and_then(|value| value.to_str()) != Some("js") {
    return Err("Addon modules must use the .js extension".to_string());
  }
  Ok(normalized.to_string_lossy().replace('\\', "/"))
}

fn resolve_module(app: &AppHandle, addon_id: &str, module_path: &str) -> R<(String, PathBuf)> {
  read_enabled_addon(app, addon_id)?;
  let module_path = normalize_module_path(module_path)?;
  let vault = vault_config::get_active_vault(app)?;
  let package_dir = vault_layout::addons_dir(&vault.path).join("packages").join(addon_id);
  let canonical_package = fs::canonicalize(&package_dir)
    .map_err(|error| format!("Addon package directory is unavailable for {addon_id}: {error}"))?;
  let canonical_module = fs::canonicalize(package_dir.join(&module_path))
    .map_err(|error| format!("Addon module is unavailable for {addon_id}: {module_path}: {error}"))?;
  if !canonical_module.starts_with(&canonical_package) {
    return Err(format!("Addon module escapes its package directory: {module_path}"));
  }
  let metadata = fs::metadata(&canonical_module).map_err(|error| error.to_string())?;
  if !metadata.is_file() || metadata.len() > MAX_MODULE_BYTES {
    return Err("Addon module is not a readable file or exceeds 5 MiB".to_string());
  }
  Ok((module_path, canonical_module))
}

#[tauri::command]
pub fn tauri_addons_read_module(
  app: AppHandle,
  addon_id: String,
  path: String,
) -> R<AddonModuleSource> {
  let (path, module) = resolve_module(&app, &addon_id, &path)?;
  let source = fs::read_to_string(module).map_err(|error| error.to_string())?;
  Ok(AddonModuleSource { path, source })
}

#[cfg(test)]
mod tests {
  use super::*;

  #[test]
  fn module_paths_are_confined_javascript_files() {
    assert_eq!(normalize_module_path("main.js").unwrap(), "main.js");
    assert_eq!(normalize_module_path("runtime/provider.js").unwrap(), "runtime/provider.js");
    assert!(normalize_module_path("../main.js").is_err());
    assert!(normalize_module_path("runtime/provider.json").is_err());
    assert!(normalize_module_path("/tmp/main.js").is_err());
  }
}
''')

          lib = Path('Elephant/backend/tauri/src/lib_min.rs')
          text = lib.read_text()
          module_anchor = 'pub mod addon_runtime_access;\n'
          if 'pub mod addon_modules;' not in text:
              if module_anchor not in text:
                  raise SystemExit('addon runtime module anchor was not found')
              text = text.replace(module_anchor, module_anchor + 'pub mod addon_modules;\n')
          command_anchor = '      addons::tauri_addons_read_entry,\n'
          if 'addon_modules::tauri_addons_read_module' not in text:
              if command_anchor not in text:
                  raise SystemExit('addon read-entry handler anchor was not found')
              text = text.replace(command_anchor, command_anchor + '      addon_modules::tauri_addons_read_module,\n')
          lib.write_text(text)

          runtime = Path('Elephant/frontend/src/renderer/src/addons/trustedAddonRuntime.js')
          text = runtime.read_text()
          helper_anchor = "const safeString = (value, fallback = '') => (typeof value === 'string' ? value.trim() || fallback : fallback)\n"
          helpers = r'''
const TRUSTED_MODULE_MAX_DEPTH = 64
const TRUSTED_STATIC_IMPORT_PATTERN = /(^|[;\n])(\s*(?:import|export)\s+(?:[^'";]+?\s+from\s+)?)(['"])([^'"]+)\3/gm

const normalizeTrustedModulePath = (value) => {
  const parts = []
  for (const part of String(value || '').replaceAll('\\', '/').split('/')) {
    if (!part || part === '.') continue
    if (part === '..') {
      if (!parts.length) throw new Error(`Trusted addon module escapes its package: ${value}`)
      parts.pop()
      continue
    }
    parts.push(part)
    if (parts.length > TRUSTED_MODULE_MAX_DEPTH) throw new Error('Trusted addon module graph is too deep')
  }
  const normalized = parts.join('/')
  if (!normalized || !normalized.endsWith('.js')) throw new Error(`Trusted addon module must be JavaScript: ${value}`)
  return normalized
}

const resolveTrustedModuleSpecifier = (parentPath, specifier) => {
  if (!String(specifier || '').startsWith('.')) {
    throw new Error(`Trusted addon modules cannot import external dependency: ${specifier}`)
  }
  const parent = normalizeTrustedModulePath(parentPath).split('/')
  parent.pop()
  let resolved = normalizeTrustedModulePath([...parent, ...String(specifier).split('/')].join('/'))
  if (!resolved.split('/').at(-1).includes('.')) resolved += '.js'
  return normalizeTrustedModulePath(resolved)
}

const loadTrustedModuleGraph = async (record, target, moduleUrls) => {
  const addonId = safeString(record?.manifest?.id)
  const entryPath = normalizeTrustedModulePath(record?.manifest?.runtime?.entry || 'main.js')
  const loaded = new Map()
  const loading = new Set()

  const load = async (modulePath, depth = 0) => {
    const normalized = normalizeTrustedModulePath(modulePath)
    if (loaded.has(normalized)) return loaded.get(normalized)
    if (depth > TRUSTED_MODULE_MAX_DEPTH) throw new Error('Trusted addon module graph exceeds the depth limit')
    if (loading.has(normalized)) throw new Error(`Cyclic trusted addon module graph is not supported: ${normalized}`)
    loading.add(normalized)
    try {
      const payload = await invoke('tauri_addons_read_module', { addonId, path: normalized }, target)
      let source = safeString(payload?.source)
      if (!source) throw new Error(`Trusted addon module is empty: ${normalized}`)
      const dependencies = new Map()
      for (const match of source.matchAll(TRUSTED_STATIC_IMPORT_PATTERN)) {
        const specifier = match[4]
        if (dependencies.has(specifier)) continue
        const dependencyPath = resolveTrustedModuleSpecifier(normalized, specifier)
        dependencies.set(specifier, await load(dependencyPath, depth + 1))
      }
      source = source.replace(TRUSTED_STATIC_IMPORT_PATTERN, (full, boundary, statement, quote, specifier) => {
        const moduleUrl = dependencies.get(specifier)
        if (!moduleUrl) return full
        return `${boundary}${statement}${quote}${moduleUrl}${quote}`
      })
      const blob = new Blob([
        source,
        `\n//# sourceURL=elephant-addon://${addonId}/${normalized}`
      ], { type: 'text/javascript' })
      const moduleUrl = URL.createObjectURL(blob)
      moduleUrls.push(moduleUrl)
      loaded.set(normalized, moduleUrl)
      return moduleUrl
    } finally {
      loading.delete(normalized)
    }
  }

  return load(entryPath)
}
'''
          if 'const loadTrustedModuleGraph = async' not in text:
              if helper_anchor not in text:
                  raise SystemExit('trusted runtime helper anchor was not found')
              text = text.replace(helper_anchor, helper_anchor + helpers)

          constructor_anchor = '''    this.moduleUrl = ''
    this.disposables = []'''
          if 'this.moduleUrls = []' not in text:
              if constructor_anchor not in text:
                  raise SystemExit('trusted session constructor anchor was not found')
              text = text.replace(constructor_anchor, '''    this.moduleUrl = ''
    this.moduleUrls = []
    this.disposables = []''')

          start_old = '''    const entry = await invoke('tauri_addons_read_entry', { addonId: this.record.manifest.id }, this.target)
    const source = safeString(entry?.source)
    if (!source) throw new Error(`Trusted addon ${this.record.manifest.id} has an empty entry file`)

    const blob = new Blob([
      source,
      `\n//# sourceURL=elephant-addon://${this.record.manifest.id}/${this.record.manifest.runtime?.entry || 'main.js'}`
    ], { type: 'text/javascript' })
    this.moduleUrl = URL.createObjectURL(blob)
    this.module = await import(/* @vite-ignore */ this.moduleUrl)'''
          start_new = '''    this.moduleUrls = []
    this.moduleUrl = await loadTrustedModuleGraph(this.record, this.target, this.moduleUrls)
    this.module = await import(/* @vite-ignore */ this.moduleUrl)'''
          if start_old in text:
              text = text.replace(start_old, start_new)
          elif 'await loadTrustedModuleGraph(this.record' not in text:
              raise SystemExit('trusted session start block did not match expected source')

          stop_old = '''      if (this.moduleUrl) URL.revokeObjectURL(this.moduleUrl)
      this.moduleUrl = ''
      this.module = null'''
          stop_new = '''      for (const moduleUrl of this.moduleUrls.splice(0)) URL.revokeObjectURL(moduleUrl)
      this.moduleUrl = ''
      this.module = null'''
          if stop_old in text:
              text = text.replace(stop_old, stop_new)
          elif 'this.moduleUrls.splice(0)' not in text:
              raise SystemExit('trusted session cleanup block did not match expected source')
          runtime.write_text(text)

          test = Path('tests/app/unit/addons/trustedAddonModuleGraph.spec.js')
          test.write_text('''import fs from 'node:fs'\nimport path from 'node:path'\nimport { describe, expect, it } from 'vitest'\n\nconst root = process.cwd()\nconst read = (file) => fs.readFileSync(path.join(root, file), 'utf8')\n\ndescribe('trusted addon module graphs', () => {\n  it('reads only confined installed JavaScript modules', () => {\n    const rust = read('Elephant/backend/tauri/src/addon_modules.rs')\n    const lib = read('Elephant/backend/tauri/src/lib_min.rs')\n    expect(rust).toContain('Addon module escapes its package directory')\n    expect(rust).toContain('Addon modules must use the .js extension')\n    expect(rust).toContain('read_enabled_addon(app, addon_id)')\n    expect(lib).toContain('addon_modules::tauri_addons_read_module')\n  })\n\n  it('rewrites a confined static dependency graph to revocable blob URLs', () => {\n    const runtime = read('Elephant/frontend/src/renderer/src/addons/trustedAddonRuntime.js')\n    expect(runtime).toContain('loadTrustedModuleGraph')\n    expect(runtime).toContain('tauri_addons_read_module')\n    expect(runtime).toContain('Trusted addon modules cannot import external dependency')\n    expect(runtime).toContain('Cyclic trusted addon module graph is not supported')\n    expect(runtime).toContain('this.moduleUrls.splice(0)')\n    expect(runtime).not.toContain("const entry = await invoke('tauri_addons_read_entry'")\n  })\n\n  it('supports the Wiki package relative base-module import', () => {\n    const manifest = JSON.parse(read('addons/official/wiki/manifest.json'))\n    const entry = read(`addons/official/wiki/${manifest.runtime.entry}`)\n    expect(entry).toContain("from './main.js'")\n  })\n})\n''')

          validation = Path('.github/workflows/addon-platform-validation.yml')
          text = validation.read_text()
          anchor = '            tests/app/unit/addons/trustedOfficialActivation.spec.js \\\n'
          if 'trustedAddonModuleGraph.spec.js' not in text:
              if anchor not in text:
                  raise SystemExit('focused addon test anchor was not found')
              text = text.replace(anchor, anchor + '            tests/app/unit/addons/trustedAddonModuleGraph.spec.js \\\n')
          validation.write_text(text)
          PY

      - uses: ./.github/actions/setup

      - name: Validate trusted module runtime
        run: |
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            tests/app/unit/addons/trustedAddonModuleGraph.spec.js \
            tests/app/unit/addons/trustedOfficialActivation.spec.js \
            tests/app/unit/addons/wikiPackageOwnership.spec.js

      - name: Install Linux Tauri dependencies
        shell: bash
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Compile module reader in the reduced Rust core
        run: cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --lib

      - name: Commit validated loader and remove workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/add-trusted-addon-module-loader.yml
          git add \
            .github/workflows/addon-platform-validation.yml \
            Elephant/backend/tauri/src/addon_modules.rs \
            Elephant/backend/tauri/src/lib_min.rs \
            Elephant/frontend/src/renderer/src/addons/trustedAddonRuntime.js \
            tests/app/unit/addons/trustedAddonModuleGraph.spec.js
          git commit -m "feat(addons): load confined trusted module graphs"
          git pull --rebase origin feature/physical-addon-packages
          git push origin HEAD:feature/physical-addon-packages
