name: Addon Platform Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-addons:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check out physical addon catalogue
        uses: actions/checkout@v4
        with:
          ref: feature/physical-addon-catalog
          path: addon-catalog-source

      - uses: ./.github/actions/setup

      - name: Validate official addon catalogue
        shell: bash
        run: |
          set -o pipefail
          node build/scripts/validate-addon-catalog.mjs addon-catalog-source \
            2>&1 | tee addon-catalog-tests.txt

      - name: Execute official addon pipelines
        shell: bash
        run: |
          set -o pipefail
          : > addon-functional-tests.txt
          node build/scripts/test-official-addons.mjs addon-catalog-source \
            2>&1 | tee -a addon-functional-tests.txt
          node build/scripts/test-notion-importer.mjs addon-catalog-source \
            2>&1 | tee -a addon-functional-tests.txt
          node build/scripts/test-popular-note-addons.mjs addon-catalog-source \
            2>&1 | tee -a addon-functional-tests.txt
          node build/scripts/test-elephant-tasks-v2.mjs addon-catalog-source \
            2>&1 | tee -a addon-functional-tests.txt

      - name: Run focused addon and settings tests
        shell: bash
        run: |
          set -o pipefail
          NODE_PATH=Elephant/node_modules \
            Elephant/node_modules/.bin/vitest run \
            tests/app/unit/addons/externalAddonContracts.spec.js \
            tests/app/unit/addons/addonCatalogContracts.spec.js \
            tests/app/unit/addons/addonProfiles.spec.js \
            tests/app/unit/addons/runtimeSecurityContracts.spec.js \
            tests/app/unit/addons/declarativeViewsContracts.spec.js \
            tests/app/unit/addons/calendarAndIconRail.spec.js \
            tests/app/unit/addons/trustedAddonRuntime.spec.js \
            tests/app/unit/addons/settingsExtensionRuntime.spec.js \
            tests/app/unit/addons/builtinAddons.spec.js \
            tests/app/unit/addons/aiTabsAndRailBorder.spec.js \
            tests/app/unit/addons/physicalAddonIsolation.spec.js \
            tests/app/unit/specs/main/elephantnote/settingsRedesign.spec.js \
            2>&1 | tee addon-tests.txt

      - name: Package full app access reference addon
        shell: bash
        run: |
          set -o pipefail
          mkdir -p build/addons
          node build/scripts/package-addon.mjs \
            examples/addons/trusted-workspace-lab \
            build/addons/trusted-workspace-lab.enaddon \
            2>&1 | tee trusted-addon-package.txt
          unzip -t build/addons/trusted-workspace-lab.enaddon

      - name: Package every local physical JavaScript addon
        shell: bash
        run: |
          set -o pipefail
          : > physical-addon-packages.txt
          for source in addons/official/*
          do
            [ -d "$source" ] || continue
            slug="$(basename "$source")"
            case "$slug" in
              ai-ocr|code-execution) continue ;;
            esac
            node build/scripts/package-addon.mjs \
              "$source" \
              "build/addons/$slug.enaddon" \
              2>&1 | tee -a physical-addon-packages.txt
            unzip -t "build/addons/$slug.enaddon"
          done

      - name: Package every catalogue JavaScript addon
        shell: bash
        run: |
          set -o pipefail
          : > addon-package.txt
          for source in addon-catalog-source/addons/*
          do
            [ -d "$source" ] || continue
            slug="$(basename "$source")"
            case "$slug" in
              ai-ocr|code-execution) continue ;;
            esac
            node build/scripts/package-addon.mjs \
              "$source" \
              "build/addons/catalog-$slug.enaddon" \
              2>&1 | tee -a addon-package.txt
            unzip -t "build/addons/catalog-$slug.enaddon"
          done

      - name: Build Tauri web bundle and verify physical absence
        shell: bash
        run: |
          set -o pipefail
          pnpm tauri:web:build 2>&1 | tee addon-build.txt
          markers=(
            elephant-ai-settings
            elephant-ocr-addon-settings
            ElephantChatAddon
            ElephantSearchAddon
            ElephantWikiAddon
            ElephantGraphAddon
            ElephantOpenModelsAddon
            ElephantCodexAddon
            ElephantSyncAddon
            ElephantCalendarAddon
            ElephantSitesAddon
            ElephantCodeExecutionAddon
            ElephantGoogleKeepImportAddon
            ElephantRecentlyEditedAddon
          )
          for marker in "${markers[@]}"
          do
            if grep -R -n -F "$marker" build/out/renderer; then
              echo "Physical addon implementation leaked into the core renderer bundle: $marker" >&2
              exit 1
            fi
          done

      - name: Upload functional validation and installable packages
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: addon-platform-validation
          path: |
            addon-catalog-tests.txt
            addon-functional-tests.txt
            addon-tests.txt
            trusted-addon-package.txt
            physical-addon-packages.txt
            addon-package.txt
            addon-build.txt
            build/addons/*.enaddon
          if-no-files-found: ignore

  validate-addon-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: ./.github/actions/setup

      - name: Compile and test Rust addon security modules
        shell: bash
        run: |
          set -o pipefail
          : > addon-rust-tests.txt
          for test_filter in \
            addon_catalog::tests \
            addon_dependencies::tests \
            addon_registry_view::tests \
            addon_sidecars::tests \
            addon_runtime_access::tests \
            addon_note_access::tests \
            addon_http_access::tests
          do
            cargo test \
              --manifest-path Elephant/backend/tauri/Cargo.toml \
              --no-default-features \
              "$test_filter" \
              --lib \
              2>&1 | tee -a addon-rust-tests.txt
          done

      - name: Compile and package physical native addons
        shell: bash
        run: |
          set -o pipefail
          : > physical-addon-tests.txt
          : > physical-addon-build.txt
          for slug in ai-ocr code-execution
          do
            cargo test \
              --manifest-path "addons/official/$slug/native/Cargo.toml" \
              2>&1 | tee -a physical-addon-tests.txt
            node build/scripts/build-physical-addon.mjs "addons/official/$slug" \
              2>&1 | tee -a physical-addon-build.txt
          done
          find build/out/addons/releases -name '*.enaddon' -print -exec unzip -t {} \;

      - name: Upload Rust and physical package validation
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: addon-platform-rust-validation
          path: |
            addon-rust-tests.txt
            physical-addon-tests.txt
            physical-addon-build.txt
            build/out/addons/releases/**/*.enaddon
            build/out/addons/releases/**/*.json
          if-no-files-found: ignore
