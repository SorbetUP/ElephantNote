name: Addon Platform Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-addons:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate integrated official addon catalogue
        shell: bash
        run: |
          set -o pipefail
          node build/scripts/validate-addon-catalog.mjs addons \
            2>&1 | tee addon-catalog-tests.txt

      - name: Validate integrated addon packs
        shell: bash
        run: |
          set -o pipefail
          node build/scripts/validate-integrated-addon-packs.mjs \
            2>&1 | tee addon-pack-tests.txt

      - name: Package full app access reference addon
        shell: bash
        run: |
          set -o pipefail
          mkdir -p build/addons
          node build/scripts/package-addon.mjs \
            examples/addons/trusted-workspace-lab \
            build/addons/trusted-workspace-lab.enaddon \
            2>&1 | tee trusted-addon-package.txt
          unzip -t build/addons/trusted-workspace-lab.enaddon

      - name: Package every integrated physical addon
        shell: bash
        run: |
          set -o pipefail
          : > physical-addon-packages.txt
          for source in addons/official/*
          do
            [ -d "$source" ] || continue
            slug="$(basename "$source")"
            if [ -f "$source/addon.build.json" ]; then
              node build/scripts/build-physical-addon.mjs "$source" \
                2>&1 | tee -a physical-addon-packages.txt
            else
              node build/scripts/package-addon.mjs \
                "$source" \
                "build/addons/$slug.enaddon" \
                2>&1 | tee -a physical-addon-packages.txt
              unzip -t "build/addons/$slug.enaddon"
            fi
          done
          find build/out/addons/releases -name '*.enaddon' -print -exec unzip -t {} \; 2>/dev/null || true

      - name: Package Android and iOS Code execution variants
        shell: bash
        run: |
          set -o pipefail
          node --check addons/official/code-execution/main.mobile.js
          : > mobile-addon-packages.txt
          for platform in android-aarch64 android-x86_64 ios-aarch64 ios-x86_64
          do
            node build/scripts/build-mobile-addon-package.mjs \
              addons/official/code-execution \
              "$platform" \
              2>&1 | tee -a mobile-addon-packages.txt
          done
          find build/out/addons/releases/elephant.code-execution \
            \( -name '*-android-*.enaddon' -o -name '*-ios-*.enaddon' \) \
            -print | sort | while read -r archive
          do
            unzip -t "$archive"
          done

      - uses: ./.github/actions/setup

      - name: Run focused addon and settings tests
        shell: bash
        run: |
          set -o pipefail
          NODE_PATH=Elephant/node_modules \
            Elephant/node_modules/.bin/vitest run \
            tests/app/unit/addons/addonProfiles.spec.js \
            tests/app/unit/addons/coreFeatures.spec.js \
            tests/app/unit/addons/builtinAddons.spec.js \
            tests/app/unit/addons/aiTabsAndRailBorder.spec.js \
            tests/app/unit/addons/physicalAddonIsolation.spec.js \
            tests/app/unit/addons/nativeMobileCompatibility.spec.js \
            tests/app/unit/addons/trustedOfficialActivation.spec.js \
            tests/app/unit/specs/main/elephantnote/settingsRedesign.spec.js \
            2>&1 | tee addon-tests.txt

      - name: Build Tauri web bundle and verify physical absence
        shell: bash
        run: |
          set -o pipefail
          pnpm tauri:web:build 2>&1 | tee addon-build.txt
          markers=(
            elephant-ai-settings
            elephant-ocr-addon-settings
            ElephantChatAddon
            ElephantSearchAddon
            ElephantWikiAddon
            ElephantGraphAddon
            ElephantOpenModelsAddon
            ElephantCodexAddon
            ElephantSyncAddon
            ElephantCalendarAddon
            ElephantSitesAddon
            ElephantCodeExecutionAddon
            ElephantGoogleKeepImportAddon
            ElephantRecentlyEditedAddon
          )
          for marker in "${markers[@]}"
          do
            if grep -R -n -F "$marker" build/out/renderer; then
              echo "Physical addon implementation leaked into the core renderer bundle: $marker" >&2
              exit 1
            fi
          done

      - name: Upload functional validation and installable packages
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: addon-platform-validation
          path: |
            addon-catalog-tests.txt
            addon-pack-tests.txt
            addon-tests.txt
            trusted-addon-package.txt
            physical-addon-packages.txt
            mobile-addon-packages.txt
            addon-build.txt
            pnpm-install.log
            pnpm-install-frozen.log
            pnpm-install-unfrozen.log
            build/addons/*.enaddon
            build/out/addons/releases/**/*.enaddon
            build/out/addons/releases/**/*.json
          if-no-files-found: ignore

  validate-addon-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        timeout-minutes: 12
        shell: bash
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -euxo pipefail
          timeout 600 sudo apt-get -o Acquire::Retries=3 update
          timeout 600 sudo apt-get -o Acquire::Retries=3 install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Compile and test Rust addon security modules
        shell: bash
        run: |
          set -o pipefail
          : > addon-rust-tests.txt
          for test_filter in \
            addon_catalog::tests \
            addon_dependencies::tests \
            addon_registry_view::tests \
            addon_sidecars::tests \
            addon_runtime_access::tests \
            addon_assets::tests \
            addon_note_access::tests \
            addon_http_access::tests
          do
            cargo test \
              --manifest-path Elephant/backend/tauri/Cargo.toml \
              --no-default-features \
              "$test_filter" \
              --lib \
              2>&1 | tee -a addon-rust-tests.txt
          done

      - name: Compile and package physical native addons
        shell: bash
        run: |
          set -o pipefail
          : > physical-addon-tests.txt
          : > physical-addon-build.txt
          for source in addons/official/*
          do
            [ -f "$source/addon.build.json" ] || continue
            cargo test \
              --manifest-path "$source/native/Cargo.toml" \
              2>&1 | tee -a physical-addon-tests.txt
            node build/scripts/build-physical-addon.mjs "$source" \
              2>&1 | tee -a physical-addon-build.txt
          done
          find build/out/addons/releases -name '*.enaddon' -print -exec unzip -t {} \;

      - name: Upload Rust and physical package validation
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: addon-platform-rust-validation
          path: |
            addon-rust-tests.txt
            physical-addon-tests.txt
            physical-addon-build.txt
            build/out/addons/releases/**/*.enaddon
            build/out/addons/releases/**/*.json
          if-no-files-found: ignore

  refresh-lockfile:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'feature/physical-addon-packages'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Remove Calendar-only importer entries
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('pnpm-lock.yaml')
          lines = path.read_text().splitlines(keepends=True)
          output = []
          removed = []
          index = 0
          prefix = "      '@schedule-x/"

          while index < len(lines):
              line = lines[index]
              if line.startswith(prefix):
                  removed.append(line.strip().rstrip(':'))
                  index += 1
                  while index < len(lines):
                      candidate = lines[index]
                      if candidate.startswith('      ') and not candidate.startswith('        '):
                          break
                      index += 1
                  continue
              output.append(line)
              index += 1

          expected = {
              "'@schedule-x/calendar'",
              "'@schedule-x/current-time'",
              "'@schedule-x/drag-and-drop'",
              "'@schedule-x/event-recurrence'",
              "'@schedule-x/theme-default'",
              "'@schedule-x/vue'",
          }
          if removed and set(removed) != expected:
              raise SystemExit(f'Unexpected Schedule-X importer entries: {removed}')
          if removed:
              path.write_text(''.join(output))
              print(f'Removed Calendar-only root importer entries: {removed}')
          else:
              print('Calendar-only root importer entries already absent.')
          PY

      - name: Verify frozen lockfile
        shell: bash
        run: |
          set -euxo pipefail
          npm install -g pnpm@10.33.4
          pnpm install --frozen-lockfile --ignore-scripts

      - name: Commit verified lockfile cleanup
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -f .github/workflows/refresh-addon-lockfile.yml ]; then
            git rm .github/workflows/refresh-addon-lockfile.yml
          fi
          git add pnpm-lock.yaml
          if git diff --cached --quiet; then
            echo 'Lockfile is already verified and clean.'
            exit 0
          fi
          git commit -m "fix(ci): refresh lockfile after physical addon extraction"
          git push origin HEAD:${{ github.head_ref }}
