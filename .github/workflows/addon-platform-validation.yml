name: Addon Platform Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-addons:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: ./.github/actions/setup

      - name: Run focused addon and settings tests
        shell: bash
        run: |
          set -o pipefail
          NODE_PATH=Elephant/node_modules \
            Elephant/node_modules/.bin/vitest run \
            tests/app/unit/addons/externalAddonContracts.spec.js \
            tests/app/unit/addons/addonCatalogContracts.spec.js \
            tests/app/unit/specs/main/elephantnote/settingsRedesign.spec.js \
            2>&1 | tee addon-tests.txt

      - name: Compile and test Rust addon catalogue
        shell: bash
        run: |
          set -o pipefail
          cargo test \
            --manifest-path Elephant/backend/tauri/Cargo.toml \
            --no-default-features \
            addon_catalog::tests \
            --lib \
            2>&1 | tee addon-rust-tests.txt

      - name: Package installable external proof addon
        shell: bash
        run: |
          set -o pipefail
          node build/scripts/package-addon.mjs \
            examples/addons/platform-proof \
            build/addons/platform-proof.enaddon \
            2>&1 | tee addon-package.txt
          unzip -t build/addons/platform-proof.enaddon
          unzip -l build/addons/platform-proof.enaddon

      - name: Build Tauri web bundle
        shell: bash
        run: |
          set -o pipefail
          pnpm tauri:web:build 2>&1 | tee addon-build.txt

      - name: Upload addon validation and installable proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: addon-platform-validation
          path: |
            addon-tests.txt
            addon-rust-tests.txt
            addon-package.txt
            addon-build.txt
            build/addons/platform-proof.enaddon
          if-no-files-found: ignore
