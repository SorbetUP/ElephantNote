name: Align Wiki catalog metadata

on:
  push:
    branches:
      - feature/physical-addon-catalog
    paths:
      - .github/workflows/align-wiki-catalog.yml

permissions:
  contents: write

jobs:
  align:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/physical-addon-catalog
          fetch-depth: 0

      - name: Align Wiki metadata
        shell: bash
        run: |
          python3 - <<'PY'
          from datetime import datetime, timezone
          from pathlib import Path
          import json

          path = Path('catalog.json')
          catalog = json.loads(path.read_text())
          matches = [entry for entry in catalog.get('addons', []) if entry.get('id') == 'elephant.wiki']
          if len(matches) != 1:
              raise SystemExit(f'Expected exactly one Wiki entry, found {len(matches)}')
          entry = matches[0]
          entry['version'] = '1.3.0'
          entry['description'] = 'Owns Wiki proposals and pages, and composes with the optional Search provider.'
          entry['entryPath'] = 'addons/wiki/main.v2.js'
          manifest = json.loads(Path(entry['manifestPath']).read_text())
          if manifest.get('version') != entry['version'] or manifest.get('runtime', {}).get('entry') != 'main.v2.js':
              raise SystemExit('Wiki manifest and catalog metadata do not match')
          catalog['updatedAt'] = datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace('+00:00', 'Z')
          path.write_text(json.dumps(catalog, indent=2, ensure_ascii=False) + '\n')
          PY

      - name: Commit aligned catalog and remove workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/align-wiki-catalog.yml
          git add catalog.json
          git commit -m "chore(catalog): align package-owned Wiki 1.3.0"
          git push origin HEAD:feature/physical-addon-catalog
