name: Android ARM64 Release APK

on:
  push:
    branches:
      - 'assistant/**'
      - 'fix/**'
      - 'integration/**'
    paths:
      - '.github/workflows/android-apk.yml'
      - 'Elephant/backend/tauri/**'
      - 'Elephant/frontend/**'
      - 'build/android/**'
      - 'build/scripts/build_dev_apk.sh'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'vite.tauri.config.js'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '.github/workflows/android-apk.yml'
      - 'Elephant/backend/tauri/**'
      - 'Elephant/frontend/**'
      - 'build/android/**'
      - 'build/scripts/build_dev_apk.sh'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'vite.tauri.config.js'
  workflow_dispatch:

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  android-arm64-release:
    name: Build signed Android ARM64 release APK under 24 MiB
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    env:
      CARGO_TERM_COLOR: always
      ELEPHANTNOTE_SKIP_LLAMA_BUNDLE: '1'
      ANDROID_BUILD_PROFILE: release
      ANDROID_TARGET: aarch64
      ANDROID_APK_MAX_MIB: '24'
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Verify restored mobile shell and Android release contract
        shell: bash
        run: |
          set -euxo pipefail
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            tests/app/unit/specs/main/elephantnote/mobileAndroidRelease.spec.js

      - name: Verify responsive Settings contract
        shell: bash
        run: |
          set -euxo pipefail
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            tests/app/unit/specs/main/elephantnote/settingsRedesign.spec.js

      - name: Verify Sync invitation round trip
        shell: bash
        run: |
          set -euxo pipefail
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            tests/app/unit/specs/main/elephantnote/syncInviteRoundTrip.spec.js

      - name: Verify Sync UI and Iroh actions
        shell: bash
        run: |
          set -euxo pipefail
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            tests/app/unit/specs/main/elephantnote/syncSettingsPanel.spec.js

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Rust Android target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            Elephant/backend/tauri/target
          key: ${{ runner.os }}-cargo-android-release-${{ hashFiles('Elephant/backend/tauri/Cargo.lock', 'Elephant/backend/tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-android-release-
            ${{ runner.os }}-cargo-android-
            ${{ runner.os }}-cargo-

      - name: Install Tauri CLI when absent
        shell: bash
        run: |
          set -euxo pipefail
          if ! cargo tauri --version; then
            cargo install tauri-cli --version '^2' --locked
          fi
          cargo tauri --version

      - name: Build signed release APK
        shell: bash
        run: |
          set -euxo pipefail
          export ANDROID_HOME="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          export ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          export NDK_HOME="${ANDROID_NDK_LATEST_HOME:-${ANDROID_NDK_HOME:-}}"
          test -n "$NDK_HOME"
          pnpm tauri:android:build | tee android-release-build.log

      - name: Verify single signed APK and exact size
        shell: bash
        run: |
          set -euxo pipefail
          APK_ROOT=Elephant/backend/tauri/gen/android/app/build/outputs/apk
          APK="$(find "$APK_ROOT" -type f -name '*release-debug-signed.apk' -print)"
          test -n "$APK"
          test "$(printf '%s\n' "$APK" | wc -l)" -eq 1
          test -s "$APK"
          BYTES="$(stat -c '%s' "$APK")"
          test "$BYTES" -le $((24 * 1024 * 1024))
          printf 'APK=%s\nBYTES=%s\nMIB=%.2f\n' "$APK" "$BYTES" "$(awk -v b="$BYTES" 'BEGIN { print b / 1024 / 1024 }')"
          APKSIGNER="$(find "$ANDROID_SDK_ROOT/build-tools" -type f -name apksigner -print | sort | tail -n 1)"
          test -x "$APKSIGNER"
          "$APKSIGNER" verify --verbose "$APK"

      - name: Upload Android release APK and build log
        uses: actions/upload-artifact@v4
        with:
          name: elephantnote-android-arm64-release-apk
          path: |
            Elephant/backend/tauri/gen/android/app/build/outputs/apk/**/*release-debug-signed.apk
            android-release-build.log
          if-no-files-found: error
          retention-days: 14
