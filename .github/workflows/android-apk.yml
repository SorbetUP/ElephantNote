name: Android APK Build

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '.github/workflows/android-apk.yml'
      - 'Elephant/backend/tauri/**'
      - 'Elephant/frontend/**'
      - 'build/android/**'
      - 'build/scripts/build_dev_apk.sh'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'vite.tauri.config.js'
  workflow_dispatch:

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  android-debug-apk:
    name: Build real Android debug APK
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      CARGO_TERM_COLOR: always
      ELEPHANTNOTE_SKIP_LLAMA_BUNDLE: '1'
      NDK_HOME: ${{ env.ANDROID_NDK_LATEST_HOME }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Rust Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Elephant/backend/tauri/target
          key: ${{ runner.os }}-cargo-android-${{ hashFiles('Elephant/backend/tauri/Cargo.lock', 'Elephant/backend/tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-android-
            ${{ runner.os }}-cargo-

      - name: Install Tauri CLI
        shell: bash
        run: |
          set -euxo pipefail
          cargo install tauri-cli --version '^2' --locked
          cargo tauri --version

      - name: Run project postinstall
        shell: bash
        run: pnpm postinstall

      - name: Build Android APK
        shell: bash
        run: |
          set -euxo pipefail
          export ANDROID_HOME="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          export ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          export NDK_HOME="${ANDROID_NDK_LATEST_HOME:-${ANDROID_NDK_HOME:-}}"
          pnpm tauri:android:build

      - name: Verify generated APK
        shell: bash
        run: |
          set -euxo pipefail
          mapfile -t apks < <(find Elephant/backend/tauri/gen/android/app/build/outputs/apk -type f -name '*.apk' -print)
          test "${#apks[@]}" -gt 0
          printf '%s\n' "${apks[@]}"
          for apk in "${apks[@]}"; do
            test -s "$apk"
          done

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: elephantnote-android-debug-apk
          path: Elephant/backend/tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 14
