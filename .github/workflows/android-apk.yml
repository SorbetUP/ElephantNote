name: Android APK validation

on:
  push:
    branches:
      - 'assistant/**'
      - 'fix/**'
      - 'integration/**'
    paths:
      - '.github/workflows/android-apk.yml'
      - 'Elephant/backend/tauri/**'
      - 'Elephant/frontend/**'
      - 'build/android/**'
      - 'build/scripts/build_dev_apk.sh'
      - 'build/scripts/android_startup_smoke.sh'
      - 'tests/app/unit/specs/main/elephantnote/mobileAndroidRelease.spec.js'
      - 'tests/app/unit/specs/main/elephantnote/mobileCreationContracts.spec.js'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'vite.tauri.config.js'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '.github/workflows/android-apk.yml'
      - 'Elephant/backend/tauri/**'
      - 'Elephant/frontend/**'
      - 'build/android/**'
      - 'build/scripts/build_dev_apk.sh'
      - 'build/scripts/android_startup_smoke.sh'
      - 'tests/app/unit/specs/main/elephantnote/mobileAndroidRelease.spec.js'
      - 'tests/app/unit/specs/main/elephantnote/mobileCreationContracts.spec.js'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'vite.tauri.config.js'
  workflow_dispatch:

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  android-arm64-release:
    name: Build signed Android ARM64 release APK under 24 MiB
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    env:
      CARGO_TERM_COLOR: always
      ELEPHANTNOTE_SKIP_LLAMA_BUNDLE: '1'
      ANDROID_BUILD_PROFILE: release
      ANDROID_TARGET: aarch64
      ANDROID_APK_MAX_MIB: '24'
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Verify mobile shell, creation and Android release contracts
        shell: bash
        run: |
          set -euxo pipefail
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            tests/app/unit/specs/main/elephantnote/mobileAndroidRelease.spec.js \
            tests/app/unit/specs/main/elephantnote/mobileCreationContracts.spec.js

      - name: Capture responsive Settings contract
        id: settings_contract
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            tests/app/unit/specs/main/elephantnote/settingsRedesign.spec.js \
            --reporter=verbose 2>&1 | tee settings-contract.log

      - name: Upload Settings contract diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: settings-contract-diagnostics
          path: settings-contract.log
          if-no-files-found: error
          retention-days: 3

      - name: Fail when responsive Settings contract failed
        if: steps.settings_contract.outcome == 'failure'
        shell: bash
        run: exit 1

      - name: Verify Sync invitation round trip
        shell: bash
        run: |
          set -euxo pipefail
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            tests/app/unit/specs/main/elephantnote/syncInviteRoundTrip.spec.js

      - name: Verify Sync UI and Iroh actions
        shell: bash
        run: |
          set -euxo pipefail
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            tests/app/unit/specs/main/elephantnote/syncSettingsPanel.spec.js

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Rust Android target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            Elephant/backend/tauri/target
          key: ${{ runner.os }}-cargo-android-release-${{ hashFiles('Elephant/backend/tauri/Cargo.lock', 'Elephant/backend/tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-android-release-
            ${{ runner.os }}-cargo-android-
            ${{ runner.os }}-cargo-

      - name: Install Tauri CLI when absent
        shell: bash
        run: |
          set -euxo pipefail
          if ! cargo tauri --version; then
            cargo install tauri-cli --version '^2' --locked
          fi
          cargo tauri --version

      - name: Build signed release APK
        shell: bash
        run: |
          set -euxo pipefail
          export ANDROID_HOME="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          export ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          export NDK_HOME="${ANDROID_NDK_LATEST_HOME:-${ANDROID_NDK_HOME:-}}"
          test -n "$NDK_HOME"
          pnpm tauri:android:build | tee android-release-build.log

      - name: Verify single signed APK and exact size
        shell: bash
        run: |
          set -euxo pipefail
          APK_ROOT=Elephant/backend/tauri/gen/android/app/build/outputs/apk
          APK="$(find "$APK_ROOT" -type f -name '*release-debug-signed.apk' -print)"
          test -n "$APK"
          test "$(printf '%s\n' "$APK" | wc -l)" -eq 1
          test -s "$APK"
          BYTES="$(stat -c '%s' "$APK")"
          test "$BYTES" -le $((24 * 1024 * 1024))
          printf 'APK=%s\nBYTES=%s\nMIB=%.2f\n' "$APK" "$BYTES" "$(awk -v b="$BYTES" 'BEGIN { print b / 1024 / 1024 }')"
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          test -n "$SDK_ROOT"
          APKSIGNER="$(find "$SDK_ROOT/build-tools" -type f -name apksigner -print | sort | tail -n 1)"
          test -x "$APKSIGNER"
          "$APKSIGNER" verify --verbose "$APK"

      - name: Upload Android release APK and build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: elephantnote-android-arm64-release-apk
          path: |
            Elephant/backend/tauri/gen/android/app/build/outputs/apk/**/*release-debug-signed.apk
            android-release-build.log
          if-no-files-found: warn
          retention-days: 14

  android-startup-smoke:
    name: Install and launch APK without startup permissions
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    env:
      CARGO_TERM_COLOR: always
      ELEPHANTNOTE_SKIP_LLAMA_BUNDLE: '1'
      ANDROID_BUILD_PROFILE: debug
      ANDROID_TARGET: x86_64
      ANDROID_APK_MAX_MIB: '200'
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Rust Android x86_64 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-linux-android

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            Elephant/backend/tauri/target
          key: ${{ runner.os }}-cargo-android-startup-x86_64-${{ hashFiles('Elephant/backend/tauri/Cargo.lock', 'Elephant/backend/tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-android-startup-x86_64-
            ${{ runner.os }}-cargo-android-
            ${{ runner.os }}-cargo-

      - name: Install Tauri CLI when absent
        shell: bash
        run: |
          set -euxo pipefail
          if ! cargo tauri --version; then
            cargo install tauri-cli --version '^2' --locked
          fi
          cargo tauri --version

      - name: Build x86_64 debug APK for emulator
        shell: bash
        run: |
          set -euxo pipefail
          export ANDROID_HOME="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          export ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          export NDK_HOME="${ANDROID_NDK_LATEST_HOME:-${ANDROID_NDK_HOME:-}}"
          test -n "$NDK_HOME"
          pnpm tauri:android:build | tee android-startup-build.log

      - name: Enable KVM access
        shell: bash
        run: sudo chmod 666 /dev/kvm || true

      - name: Install and launch on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: bash build/scripts/android_startup_smoke.sh

      - name: Upload startup diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: elephantnote-android-startup-diagnostics
          path: |
            android-startup-build.log
            android-startup-logcat.txt
            Elephant/backend/tauri/gen/android/app/build/outputs/apk/**/*-debug.apk
          if-no-files-found: warn
          retention-days: 7
