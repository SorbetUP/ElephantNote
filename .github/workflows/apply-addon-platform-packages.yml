name: Apply platform-aware addon package migration

on:
  push:
    branches:
      - feature/physical-addon-packages
    paths:
      - .github/workflows/apply-addon-platform-packages.yml

permissions:
  contents: write

jobs:
  patch-test-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/physical-addon-packages
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Apply platform-aware package and mobile boundary changes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import json

          def replace_once(path, old, new):
              text = path.read_text()
              if old not in text:
                  raise SystemExit(f'missing replacement marker in {path}: {old[:100]!r}')
              path.write_text(text.replace(old, new, 1))

          catalog = Path('Elephant/backend/tauri/src/addon_catalog.rs')
          replace_once(catalog, 'collections::BTreeSet,', 'collections::{BTreeMap, BTreeSet},')
          replace_once(catalog, '''#[derive(Debug, Clone, Serialize, Deserialize)]
          #[serde(rename_all = "camelCase")]
          pub struct CatalogAddon {''', '''#[derive(Debug, Clone, Serialize, Deserialize)]
          #[serde(rename_all = "camelCase")]
          pub struct CatalogPackage {
            pub path: String,
            pub hash: String,
          }

          #[derive(Debug, Clone, Serialize, Deserialize)]
          #[serde(rename_all = "camelCase")]
          pub struct CatalogAddon {''')
          replace_once(catalog, '''  #[serde(default)]
            pub package_hash: String,
            #[serde(default)]
            pub readme_path: String,''', '''  #[serde(default)]
            pub package_hash: String,
            #[serde(default)]
            pub packages: BTreeMap<String, CatalogPackage>,
            #[serde(default)]
            pub readme_path: String,''')
          catalog_text = catalog.read_text()
          catalog_text = catalog_text.replace('''    package_hash: String::new(),
              readme_path: String::new(),''', '''    package_hash: String::new(),
              packages: BTreeMap::new(),
              readme_path: String::new(),''')
          catalog_text = catalog_text.replace('''      package_hash: String::new(),
                readme_path: "addons/test/README.md".to_string(),''', '''      package_hash: String::new(),
                packages: BTreeMap::new(),
                readme_path: "addons/test/README.md".to_string(),''')
          catalog_text = catalog_text.replace('''      package_hash: "a".repeat(64),
                readme_path: "addons/native/README.md".to_string(),''', '''      package_hash: "a".repeat(64),
                packages: BTreeMap::new(),
                readme_path: "addons/native/README.md".to_string(),''')
          catalog.write_text(catalog_text)

          replace_once(catalog, '''  let expected_prefix = format!("addons/{}/", item.slug);
            if !item.package_path.trim().is_empty() {
              let package_path = safe_catalog_path(&item.package_path)?;
              if !package_path.starts_with(&expected_prefix) || !package_path.ends_with(".enaddon") {
                return Err(format!("Catalogue package for {} must be an .enaddon file under {}", item.id, expected_prefix));
              }
              if item.package_hash.trim().is_empty() {
                return Err(format!("Catalogue package for {} requires a blake3 packageHash", item.id));
              }
            } else {
              let manifest_path = safe_catalog_path(&item.manifest_path)?;
              let entry_path = safe_catalog_path(&item.entry_path)?;
              if !manifest_path.starts_with(&expected_prefix) || !entry_path.starts_with(&expected_prefix) {
                return Err(format!("Catalogue files for {} must stay under {}", item.id, expected_prefix));
              }
            }
''', '''  let expected_prefix = format!("addons/{}/", item.slug);
            if !item.packages.is_empty() {
              if !item.package_path.trim().is_empty() || !item.package_hash.trim().is_empty() {
                return Err(format!("Catalogue addon {} cannot mix packages with legacy packagePath/packageHash", item.id));
              }
              for (platform, package) in &item.packages {
                if !valid_platform_key(platform) {
                  return Err(format!("Invalid addon package platform key for {}: {}", item.id, platform));
                }
                let package_path = safe_catalog_path(&package.path)?;
                if !package_path.starts_with(&expected_prefix) || !package_path.ends_with(".enaddon") {
                  return Err(format!("Catalogue package for {} on {} must be an .enaddon file under {}", item.id, platform, expected_prefix));
                }
                if package.hash.len() != 64 || !package.hash.bytes().all(|byte| byte.is_ascii_hexdigit()) {
                  return Err(format!("Catalogue package for {} on {} requires a 64-character blake3 hash", item.id, platform));
                }
              }
            } else if !item.package_path.trim().is_empty() {
              let package_path = safe_catalog_path(&item.package_path)?;
              if !package_path.starts_with(&expected_prefix) || !package_path.ends_with(".enaddon") {
                return Err(format!("Catalogue package for {} must be an .enaddon file under {}", item.id, expected_prefix));
              }
              if item.package_hash.trim().is_empty() {
                return Err(format!("Catalogue package for {} requires a blake3 packageHash", item.id));
              }
            } else {
              let manifest_path = safe_catalog_path(&item.manifest_path)?;
              let entry_path = safe_catalog_path(&item.entry_path)?;
              if !manifest_path.starts_with(&expected_prefix) || !entry_path.starts_with(&expected_prefix) {
                return Err(format!("Catalogue files for {} must stay under {}", item.id, expected_prefix));
              }
            }
''')
          replace_once(catalog, '''fn validate_catalog_item(item: &CatalogAddon) -> R<()> {''', '''fn valid_platform_key(value: &str) -> bool {
            let mut parts = value.split('-');
            let os = parts.next().unwrap_or_default();
            let arch = parts.next().unwrap_or_default();
            parts.next().is_none()
              && matches!(os, "macos" | "linux" | "windows" | "android" | "ios")
              && matches!(arch, "aarch64" | "x86_64" | "armv7" | "i686")
          }

          fn platform_key() -> String {
            let os = match std::env::consts::OS {
              "macos" => "macos",
              "windows" => "windows",
              "linux" => "linux",
              "android" => "android",
              "ios" => "ios",
              other => other,
            };
            let arch = match std::env::consts::ARCH {
              "aarch64" => "aarch64",
              "x86_64" => "x86_64",
              "arm" => "armv7",
              "x86" => "i686",
              other => other,
            };
            format!("{os}-{arch}")
          }

          fn validate_catalog_item(item: &CatalogAddon) -> R<()> {''')
          replace_once(catalog, '''fn download_prebuilt_package(item: &CatalogAddon) -> R<PathBuf> {
            let bytes = fetch_bytes(&item.package_path, MAX_PACKAGE_BYTES)?;
            let actual_hash = blake3::hash(&bytes).to_hex().to_string();
            if actual_hash != item.package_hash.trim().to_ascii_lowercase() {
              return Err(format!("Addon package hash mismatch for {}", item.id));
            }
''', '''fn download_prebuilt_package(item: &CatalogAddon, package_path: &str, package_hash: &str) -> R<PathBuf> {
            let bytes = fetch_bytes(package_path, MAX_PACKAGE_BYTES)?;
            let actual_hash = blake3::hash(&bytes).to_hex().to_string();
            if actual_hash != package_hash.trim().to_ascii_lowercase() {
              return Err(format!("Addon package hash mismatch for {}", item.id));
            }
''')
          replace_once(catalog, '''  if !item.package_path.trim().is_empty() {
              return download_prebuilt_package(item);
            }
            let manifest_bytes''', '''  let platform = platform_key();
            if let Some(package) = item.packages.get(&platform) {
              return download_prebuilt_package(item, &package.path, &package.hash);
            }
            if !item.packages.is_empty() {
              return Err(format!("Addon {} is not available for platform {}", item.id, platform));
            }
            if !item.package_path.trim().is_empty() {
              return download_prebuilt_package(item, &item.package_path, &item.package_hash);
            }
            let manifest_bytes''')
          replace_once(catalog, '''  #[test]
            fn rejects_non_elephant_official_marker() {''', '''  #[test]
            fn accepts_platform_specific_packages_and_rejects_missing_mobile_builds() {
              let mut item = source_item();
              item.packages.insert(
                "linux-x86_64".to_string(),
                CatalogPackage {
                  path: "addons/test/releases/test-linux-x86_64.enaddon".to_string(),
                  hash: "a".repeat(64),
                },
              );
              item.manifest_path.clear();
              item.entry_path.clear();
              assert!(validate_catalog_item(&item).is_ok());
              assert!(item.packages.get("android-aarch64").is_none());
            }

            #[test]
            fn rejects_non_elephant_official_marker() {''')

          sidecars = Path('Elephant/backend/tauri/src/addon_sidecars.rs')
          replace_once(sidecars, '''fn ensure_installed_and_enabled(registry: &Value, addon_id: &str) -> R<()> {''', '''fn process_sidecars_supported_on(os: &str) -> bool {
            !matches!(os, "android" | "ios")
          }

          fn ensure_process_sidecar_supported() -> R<()> {
            if process_sidecars_supported_on(std::env::consts::OS) {
              Ok(())
            } else {
              Err(format!(
                "Process addon sidecars are not supported on {}. This addon requires a package-owned Android or iOS host adapter.",
                std::env::consts::OS
              ))
            }
          }

          fn ensure_installed_and_enabled(registry: &Value, addon_id: &str) -> R<()> {''')
          replace_once(sidecars, '''  if !native_allowed {
              return Err(format!("Addon native permission was not granted: {addon_id}"));
            }

            let platform = platform_key();''', '''  if !native_allowed {
              return Err(format!("Addon native permission was not granted: {addon_id}"));
            }
            ensure_process_sidecar_supported()?;

            let platform = platform_key();''')
          replace_once(sidecars, '''  #[test]
            fn exposes_a_stable_platform_key() {''', '''  #[test]
            fn process_sidecars_are_explicitly_desktop_only() {
              assert!(process_sidecars_supported_on("linux"));
              assert!(process_sidecars_supported_on("macos"));
              assert!(process_sidecars_supported_on("windows"));
              assert!(!process_sidecars_supported_on("android"));
              assert!(!process_sidecars_supported_on("ios"));
            }

            #[test]
            fn exposes_a_stable_platform_key() {''')

          build = Path('build/scripts/build-physical-addon.mjs')
          replace_once(build, '''const platformKey = () => {''', '''const PROCESS_SIDECAR_PLATFORMS = new Set([
            'macos-aarch64',
            'macos-x86_64',
            'linux-aarch64',
            'linux-x86_64',
            'windows-aarch64',
            'windows-x86_64'
          ])

          const platformKey = () => {''')
          replace_once(build, '''const platform = platformKey()
          const sidecarRelativePath''', '''const platform = String(process.env.ELEPHANT_ADDON_PLATFORM || platformKey()).trim()
          if (buildConfig.runner !== 'process') fail('addon.build.json runner must be process')
          if (!PROCESS_SIDECAR_PLATFORMS.has(platform)) {
            fail(`process sidecars cannot be packaged for ${platform}; Android and iOS require package-owned mobile host adapters`)
          }
          if (!Array.isArray(buildConfig.supportedPlatforms) || !buildConfig.supportedPlatforms.includes(platform)) {
            fail(`addon.build.json does not support platform ${platform}`)
          }
          const sidecarRelativePath''')
          replace_once(build, '''const binaryFileName = process.platform === 'win32' ? `${binaryName}.exe` : binaryName''', '''const binaryFileName = platform.startsWith('windows-') ? `${binaryName}.exe` : binaryName''')

          desktop_platforms = [
              'macos-aarch64', 'macos-x86_64', 'linux-x86_64',
              'linux-aarch64', 'windows-x86_64', 'windows-aarch64'
          ]
          for slug in ['ai-ocr', 'code-execution', 'sites']:
              config_path = Path(f'addons/official/{slug}/addon.build.json')
              config = json.loads(config_path.read_text())
              config['runner'] = 'process'
              config['supportedPlatforms'] = desktop_platforms
              config_path.write_text(json.dumps(config, indent=2) + '\n')

              manifest_path = Path(f'addons/official/{slug}/manifest.json')
              manifest = json.loads(manifest_path.read_text())
              native = manifest.setdefault('native', {})
              native['runner'] = 'process'
              native['mobile'] = {
                  'android': {
                      'supported': False,
                      'reason': 'Process sidecars cannot run on Android; a package-owned Android host adapter is required.'
                  },
                  'ios': {
                      'supported': False,
                      'reason': 'Downloaded process sidecars cannot run on iOS; a package-owned iOS host adapter is required.'
                  }
              }
              manifest_path.write_text(json.dumps(manifest, indent=2) + '\n')

          validator = Path('build/scripts/validate-addon-catalog.mjs')
          replace_once(validator, '''  if (manifest.permissions?.native === true && !manifest.native?.protocol) {
              fail(`${entry.id} requests native access without declaring a native protocol`)
            }
''', '''  if (manifest.permissions?.native === true) {
              if (!manifest.native?.protocol) fail(`${entry.id} requests native access without declaring a native protocol`)
              if (manifest.native?.runner !== 'process') fail(`${entry.id} native package must declare its runner explicitly`)
              const sidecars = manifest.native?.sidecars
              if (!sidecars || typeof sidecars !== 'object' || Array.isArray(sidecars) || Object.keys(sidecars).length === 0) {
                fail(`${entry.id} process package must declare desktop sidecars`)
              }
              for (const platform of Object.keys(sidecars)) {
                if (/^(android|ios)-/.test(platform)) fail(`${entry.id} cannot advertise a process sidecar on ${platform}`)
              }
              for (const mobilePlatform of ['android', 'ios']) {
                const support = manifest.native?.mobile?.[mobilePlatform]
                if (support?.supported !== false || typeof support?.reason !== 'string' || !support.reason.trim()) {
                  fail(`${entry.id} must declare an explicit ${mobilePlatform} process-sidecar incompatibility reason`)
                }
              }
            }
''')

          mobile_test = Path('tests/app/unit/addons/nativeMobileCompatibility.spec.js')
          mobile_test.write_text('''import fs from 'node:fs'\nimport path from 'node:path'\nimport { describe, expect, it } from 'vitest'\n\nconst root = process.cwd()\nconst nativeSlugs = ['ai-ocr', 'code-execution', 'sites']\n\nconst manifestFor = (slug) => JSON.parse(fs.readFileSync(path.join(root, 'addons/official', slug, 'manifest.json'), 'utf8'))\n\ndescribe('native addon mobile compatibility', () => {\n  it('never advertises downloaded process sidecars as Android or iOS executables', () => {\n    for (const slug of nativeSlugs) {\n      const manifest = manifestFor(slug)\n      expect(manifest.native.runner).toBe('process')\n      expect(Object.keys(manifest.native.sidecars).some((key) => /^(android|ios)-/.test(key))).toBe(false)\n      expect(manifest.native.mobile.android.supported).toBe(false)\n      expect(manifest.native.mobile.android.reason).toMatch(/host adapter/i)\n      expect(manifest.native.mobile.ios.supported).toBe(false)\n      expect(manifest.native.mobile.ios.reason).toMatch(/host adapter/i)\n    }\n  })\n\n  it('keeps renderer-only addons platform-neutral', () => {\n    for (const slug of fs.readdirSync(path.join(root, 'addons/official'))) {\n      const manifest = manifestFor(slug)\n      if (manifest.permissions?.native === true) continue\n      expect(manifest.native).toBeUndefined()\n    }\n  })\n})\n''')

          workflow = Path('.github/workflows/addon-platform-validation.yml')
          workflow_text = workflow.read_text()
          marker = '            tests/app/unit/addons/physicalAddonIsolation.spec.js \\\n'
          if 'nativeMobileCompatibility.spec.js' not in workflow_text:
              if marker not in workflow_text:
                  raise SystemExit('addon workflow test insertion point missing')
              workflow_text = workflow_text.replace(marker, marker + '            tests/app/unit/addons/nativeMobileCompatibility.spec.js \\\n', 1)
          workflow.write_text(workflow_text)
          PY

      - name: Format Rust
        run: cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml

      - name: Validate catalog and focused contracts
        shell: bash
        run: |
          node build/scripts/validate-addon-catalog.mjs addons
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            tests/app/unit/addons/nativeMobileCompatibility.spec.js \
            tests/app/unit/addons/physicalAddonIsolation.spec.js \
            tests/app/unit/addons/trustedOfficialActivation.spec.js
          cargo test \
            --manifest-path Elephant/backend/tauri/Cargo.toml \
            --no-default-features \
            addon_catalog::tests \
            --lib
          cargo test \
            --manifest-path Elephant/backend/tauri/Cargo.toml \
            --no-default-features \
            addon_sidecars::tests \
            --lib

      - name: Commit verified migration
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-addon-platform-packages.yml
          git add \
            Elephant/backend/tauri/src/addon_catalog.rs \
            Elephant/backend/tauri/src/addon_sidecars.rs \
            build/scripts/build-physical-addon.mjs \
            build/scripts/validate-addon-catalog.mjs \
            addons/official/ai-ocr/addon.build.json \
            addons/official/ai-ocr/manifest.json \
            addons/official/code-execution/addon.build.json \
            addons/official/code-execution/manifest.json \
            addons/official/sites/addon.build.json \
            addons/official/sites/manifest.json \
            tests/app/unit/addons/nativeMobileCompatibility.spec.js \
            .github/workflows/addon-platform-validation.yml
          git commit -m "feat(addons): add platform packages and mobile runtime boundaries"
          git push origin HEAD:feature/physical-addon-packages
