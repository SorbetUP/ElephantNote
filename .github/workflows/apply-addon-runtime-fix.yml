name: Apply official addon trust fix

on:
  push:
    branches:
      - feature/physical-addon-packages

permissions:
  contents: write

jobs:
  patch-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/physical-addon-packages
          fetch-depth: 0

      - name: Patch trusted official activation policy
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          runtime_path = Path('Elephant/frontend/src/renderer/src/addons/trustedAddonRuntime.js')
          runtime = runtime_path.read_text()

          helper_marker = "const safeString = (value, fallback = '') => (typeof value === 'string' ? value.trim() || fallback : fallback)\n\nconst approvalKey"
          helper_replacement = """const safeString = (value, fallback = '') => (typeof value === 'string' ? value.trim() || fallback : fallback)

export const isOfficialTrustedRecord = (record = {}) => (
  record.source === 'official' ||
  record.official === true ||
  record.manifest?.source === 'official' ||
  record.manifest?.official === true
)

export const shouldEnforceCommunityTrust = (record = {}) => !isOfficialTrustedRecord(record)

const approvalKey"""
          if 'export const isOfficialTrustedRecord' not in runtime:
              if helper_marker not in runtime:
                  raise SystemExit('trusted addon helper insertion point was not found')
              runtime = runtime.replace(helper_marker, helper_replacement, 1)

          old_policy = """    async activate(context) {
      const communityEnabled = await getPreference(COMMUNITY_ADDONS_PREF_KEY)
      if (communityEnabled !== true) {
        throw new Error('Community addons are disabled. Turn them on in Settings → Addons first.')
      }
      if (await getTrustedSafeMode()) {
        throw new Error('Trusted addon safe mode is enabled. Disable safe mode before starting full app access addons.')
      }
      const approval = await getTrustedApproval(record)
      if (!approval.approved) {
        const error = new Error('Full app access approval is required for this exact addon package.')
        error.code = 'TRUST_REQUIRED'
        error.addonId = record.manifest.id
        error.packageHash = record.packageHash
        throw error
      }

      beginTrustedActivation(record)"""
          new_policy = """    async activate(context) {
      if (shouldEnforceCommunityTrust(record)) {
        const communityEnabled = await getPreference(COMMUNITY_ADDONS_PREF_KEY)
        if (communityEnabled !== true) {
          throw new Error('Community addons are disabled. Turn them on in Settings → Addons first.')
        }
        if (await getTrustedSafeMode()) {
          throw new Error('Trusted addon safe mode is enabled. Disable safe mode before starting full app access addons.')
        }
        const approval = await getTrustedApproval(record)
        if (!approval.approved) {
          const error = new Error('Full app access approval is required for this exact addon package.')
          error.code = 'TRUST_REQUIRED'
          error.addonId = record.manifest.id
          error.packageHash = record.packageHash
          throw error
        }
      }

      beginTrustedActivation(record)"""
          if old_policy in runtime:
              runtime = runtime.replace(old_policy, new_policy, 1)
          elif new_policy not in runtime:
              raise SystemExit('trusted addon activation policy block was not found')

          runtime_path.write_text(runtime)

          test_path = Path('tests/app/unit/addons/trustedOfficialActivation.spec.js')
          test_path.write_text("""import { describe, expect, it } from 'vitest'
import {
  isOfficialTrustedRecord,
  shouldEnforceCommunityTrust
} from '../../../../Elephant/frontend/src/renderer/src/addons/trustedAddonRuntime.js'

describe('trusted official addon activation policy', () => {
  it('recognizes every persisted official provenance representation', () => {
    expect(isOfficialTrustedRecord({ source: 'official' })).toBe(true)
    expect(isOfficialTrustedRecord({ official: true })).toBe(true)
    expect(isOfficialTrustedRecord({ manifest: { source: 'official' } })).toBe(true)
    expect(isOfficialTrustedRecord({ manifest: { official: true } })).toBe(true)
  })

  it('keeps hash approval, Community Addons consent and safe mode for third-party trusted packages only', () => {
    expect(shouldEnforceCommunityTrust({
      source: 'external',
      official: false,
      manifest: { source: 'external', official: false }
    })).toBe(true)

    expect(shouldEnforceCommunityTrust({
      source: 'external',
      manifest: { source: 'external', official: true }
    })).toBe(false)
  })
})
""")
          PY

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify focused addon tests
        run: pnpm exec vitest run tests/app/unit/addons/trustedOfficialActivation.spec.js tests/app/unit/addons/physicalAddonIsolation.spec.js

      - name: Commit verified fix and remove temporary workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-addon-runtime-fix.yml
          git add Elephant/frontend/src/renderer/src/addons/trustedAddonRuntime.js tests/app/unit/addons/trustedOfficialActivation.spec.js
          git commit -m "fix(addons): allow verified official trusted packages"
          git push origin HEAD:feature/physical-addon-packages
