name: Apply addon runtime regression fixes

on:
  push:
    branches:
      - agent/fix-addon-runtime-regressions
    paths:
      - .github/workflows/apply-addon-runtime-regressions-fix.yml

permissions:
  contents: write

env:
  ELEPHANT_SKIP_NATIVE_ADDON_BUILD: '1'

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-addon-runtime-regressions
          fetch-depth: 0

      - name: Apply source repairs
        run: python3 build/scripts/apply-addon-runtime-regression-fixes.py

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format Rust sources
        run: |
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml
          cargo fmt --manifest-path Elephant/crates/muya-core/Cargo.toml

      - name: Set up Node and dependencies
        uses: ./.github/actions/setup

      - name: Validate focused regressions
        run: |
          node --check build/scripts/sync-elephant-addons.mjs
          node --check build/scripts/build-physical-addon.mjs
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run tests/app/unit/addons/addonRuntimeRegressions.spec.js tests/app/unit/addons/trustedOfficialActivation.spec.js tests/app/unit/addons/addonNativeBuildContracts.spec.js tests/app/unit/addons/searchPackageOwnership.spec.js

      - name: Validate Rust editor repairs
        run: cargo test --manifest-path Elephant/crates/muya-core/Cargo.toml --lib

      - name: Commit repair and remove temporary automation
        shell: bash
        run: |
          set -euxo pipefail
          git rm .github/workflows/apply-addon-runtime-regressions-fix.yml build/scripts/apply-addon-runtime-regression-fixes.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Elephant build tests
          git commit -m 'fix(addons): repair trust services and large vaults'
          git push origin HEAD:agent/fix-addon-runtime-regressions
