name: Apply Android back-button navigation fix

on:
  push:
    branches:
      - build/android-back-fix-20260716
    paths:
      - '.github/workflows/apply-android-back-fix.yml'
  pull_request:
    paths:
      - '.github/workflows/apply-android-back-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-and-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/fedora-sidebar-entry-invariants-20260716
          fetch-depth: 0

      - name: Patch mobile back navigation
        shell: bash
        run: |
          set -euxo pipefail
          python3 <<'PY'
          from pathlib import Path

          app = Path('Elephant/frontend/app/components/shell/AppShell.vue')
          text = app.read_text()

          def once(old, new, label):
              global text
              if text.count(old) != 1:
                  raise SystemExit(f'{label}: expected one anchor, found {text.count(old)}')
              text = text.replace(old, new, 1)

          once(
              "import { Menu, Plus, Search, Settings } from '@lucide/vue'\n",
              "import { Menu, Plus, Search, Settings } from '@lucide/vue'\nimport { onBackButtonPress } from '@tauri-apps/api/app'\nimport { getCurrentWindow } from '@tauri-apps/api/window'\n",
              'Tauri app imports',
          )
          once(
              "let pendingSidebarWidth = null\n",
              "let pendingSidebarWidth = null\nlet mobileBackListener = null\n",
              'listener state',
          )
          once(
              "const closeMobileSidebar = () => {\n  if (isMobileShell.value) settleDrawer(false)\n}\n",
              """const closeMobileSidebar = () => {
  if (isMobileShell.value) settleDrawer(false)
}

const closeMobileWindow = () => getCurrentWindow().close().catch((error) => {
  console.warn('[mobile] unable to close after Android back press', error)
})

const handleMobileBackButton = () => {
  if (!isMobileShell.value) return
  if (searchStore.isOpen) {
    searchStore.close()
    return
  }
  if (isSettingsOpen.value) {
    isSettingsOpen.value = false
    return
  }
  if (drawerProgress.value > 0 || sidebarVisible.value) {
    closeMobileSidebar()
    return
  }
  if (store.openedNotePath) {
    store.closeNote()
    return
  }
  if (activeAddonViewId.value) {
    closeAddonView()
    return
  }
  if (store.activeWorkspaceView !== 'notes') {
    store.setWorkspaceView('notes')
    return
  }
  closeMobileWindow()
}
""",
              'mobile back handler',
          )
          once(
              "onMounted(() => {\n      updateMobileShell()\n",
              """onMounted(() => {
      updateMobileShell()
      if (isMobileShell.value) {
        onBackButtonPress(handleMobileBackButton)
          .then((listener) => {
            mobileBackListener = listener
          })
          .catch((error) => {
            console.warn('[mobile] Android back-button listener unavailable', error)
          })
      }
""",
              'listener registration',
          )
          once(
              "onBeforeUnmount(() => {\n      window.clearTimeout(drawerSettleTimer)\n",
              """onBeforeUnmount(() => {
      mobileBackListener?.unregister?.()
      mobileBackListener = null
      window.clearTimeout(drawerSettleTimer)
""",
              'listener cleanup',
          )
          app.write_text(text)

          test = Path('tests/app/unit/specs/main/elephantnote/androidBackNavigation.spec.js')
          test.write_text("""import fs from 'node:fs'
import path from 'node:path'
import { describe, expect, it } from 'vitest'

const root = process.cwd()
const shell = fs.readFileSync(path.join(root, 'Elephant/frontend/app/components/shell/AppShell.vue'), 'utf8')

describe('Android native back navigation', () => {
  it('routes Android back presses through the mobile shell before closing the window', () => {
    expect(shell).toContain("import { onBackButtonPress } from '@tauri-apps/api/app'")
    expect(shell).toContain("import { getCurrentWindow } from '@tauri-apps/api/window'")
    expect(shell).toContain('onBackButtonPress(handleMobileBackButton)')
    expect(shell).toContain('if (searchStore.isOpen)')
    expect(shell).toContain('if (isSettingsOpen.value)')
    expect(shell).toContain('if (drawerProgress.value > 0 || sidebarVisible.value)')
    expect(shell).toContain('if (store.openedNotePath)')
    expect(shell).toContain('store.closeNote()')
    expect(shell).toContain('getCurrentWindow().close()')
    expect(shell).toContain('mobileBackListener?.unregister?.()')
  })
})
""")
          PY

          git diff --check

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          corepack enable
          corepack prepare pnpm@10.33.4 --activate
          pnpm install --frozen-lockfile --ignore-scripts

      - name: Run focused mobile tests
        run: |
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            tests/app/unit/specs/main/elephantnote/androidBackNavigation.spec.js \
            tests/app/unit/specs/main/elephantnote/androidUsageRegressionSuite.spec.js

      - name: Commit validated fix
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            Elephant/frontend/app/components/shell/AppShell.vue \
            tests/app/unit/specs/main/elephantnote/androidBackNavigation.spec.js
          git commit -m 'fix(android): handle native back navigation'
          git push origin HEAD:fix/fedora-sidebar-entry-invariants-20260716
