name: Apply Automatic Wiki Proposals Once

on:
  push:
    branches:
      - feature/wiki-knowledge-continuation
  pull_request:
    branches:
      - feature/rust-knowledge-core
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-auto-wiki-proposals-once
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/wiki-knowledge-continuation
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

