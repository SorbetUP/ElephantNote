              'Elephant/backend/tauri/src/chat_runtime/codex_app_server.rs',
              'Elephant/backend/tauri/src/chat_runtime/codex_app_server/codex_runtime_installer.rs',
              'Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue',
          ]:
              write(path, from_branch(path))

          chat_path = 'Elephant/backend/tauri/src/chat_runtime.rs'
          chat = read(chat_path)
