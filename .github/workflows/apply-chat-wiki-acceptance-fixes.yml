name: Apply Chat Wiki Acceptance Fixes

on:
  pull_request:
    branches:
      - assistant/wiki-links-graph-integration
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'assistant/wiki-organization-continuation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: assistant/wiki-organization-continuation
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Apply acceptance fixes
        id: apply
        continue-on-error: true
        run: |
          set -o pipefail
          python3 .github/scripts/apply_chat_wiki_acceptance_fixes.py 2>&1 | tee acceptance-fix.log

      - name: Upload fixer diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-fix-log
          path: acceptance-fix.log

      - name: Stop after fixer failure
        if: steps.apply.outcome != 'success'
        run: exit 1

      - name: Format Rust
        run: cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml --all

      - name: Run knowledge-core tests
        run: cargo test --manifest-path Elephant/backend/knowledge-core/Cargo.toml

      - name: Verify frontend syntax contracts
        run: |
          grep -q "tauri_knowledge_chat_action_execute" Elephant/frontend/app/components/views/ChatView.vue
          ! grep -A2 "const execution" Elephant/frontend/app/components/views/ChatView.vue | grep -q "chat_action_approve"
          grep -q "Auto mode is executed atomically" Elephant/frontend/app/components/views/ChatView.vue

      - name: Commit validated source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-chat-wiki-acceptance-fixes.yml
          git rm .github/scripts/apply_chat_wiki_acceptance_fixes.py
          git add Elephant tests || true
          git commit -m "fix: repair real vault chat wiki and embedding flows"
          git push origin HEAD:assistant/wiki-organization-continuation
