name: Apply ChatGPT subscription card

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - develop

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.head_ref == 'feature/real-codex-subscription'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/real-codex-subscription
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.91'
          components: rustfmt

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential curl file libayatana-appindicator3-dev libgtk-3-dev \
            librsvg2-dev libssl-dev libwebkit2gtk-4.1-dev patchelf wget

      - name: Apply focused implementation
        shell: bash
        run: |
          python3 build/scripts/apply-chatgpt-subscription-card.py
          python3 <<'PY'
          from pathlib import Path
          path = Path('Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue')
          text = path.read_text()
          obsolete = "const formatReset = (timestamp) => new Date(Number(timestamp) * 1000).toLocaleString()\n"
          if text.count(obsolete) != 1:
              raise SystemExit(f'obsolete reset formatter count={text.count(obsolete)}')
          path.write_text(text.replace(obsolete, '', 1))
          PY

      - name: Format and validate frontend
        shell: bash
        env:
          NODE_PATH: Elephant/node_modules
        run: |
          set -o pipefail
          {
            set -x
            Elephant/node_modules/.bin/eslint \
              Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue \
              Elephant/frontend/app/components/settings/ChatgptSubscriptionCard.vue \
              Elephant/frontend/app/components/settings/codexRateLimits.js \
              tests/app/unit/codexRateLimits.spec.js \
              --fix
            Elephant/node_modules/.bin/eslint \
              Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue \
              Elephant/frontend/app/components/settings/ChatgptSubscriptionCard.vue \
              Elephant/frontend/app/components/settings/codexRateLimits.js \
              tests/app/unit/codexRateLimits.spec.js
            Elephant/node_modules/.bin/vitest run tests/app/unit/codexRateLimits.spec.js
            pnpm tauri:web:build
          } 2>&1 | tee chatgpt-card-frontend.log

      - name: Upload frontend diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chatgpt-card-frontend
          path: chatgpt-card-frontend.log
          if-no-files-found: ignore

      - name: Format and validate Rust
        shell: bash
        run: |
          set -euxo pipefail
          rustfmt --edition 2021 Elephant/backend/tauri/src/chat_runtime/codex_app_server.rs
          cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --all-targets --no-default-features
          cargo test --manifest-path Elephant/backend/tauri/Cargo.toml --lib --no-default-features chat_runtime::codex_app_server::tests

      - name: Commit validated implementation
        shell: bash
        run: |
          rm .github/workflows/apply-chatgpt-subscription-card.yml
          rm build/scripts/apply-chatgpt-subscription-card.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue \
            Elephant/frontend/app/components/settings/ChatgptSubscriptionCard.vue \
            Elephant/frontend/app/components/settings/codexRateLimits.js \
            tests/app/unit/codexRateLimits.spec.js \
            Elephant/backend/tauri/src/chat_runtime/codex_app_server.rs \
            .github/workflows/apply-chatgpt-subscription-card.yml \
            build/scripts/apply-chatgpt-subscription-card.py
          git commit -m "Implement integrated ChatGPT subscription usage card"
          git push origin HEAD:feature/real-codex-subscription
