name: Codex Bundle Refactor Validator

on:
  push:
    branches: [main]
    paths:
      - .github/codex-bundle-main-trigger

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/real-codex-subscription
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Apply reviewed refactor
        run: python3 .github/scripts/apply_codex_bundle_and_limits.py

      - name: Validate JavaScript and focused rate-limit tests
        run: |
          node --check build/scripts/ensure-tauri-codex-runtime.mjs
          node --check Elephant/frontend/app/components/settings/codexRateLimits.js
          pnpm exec eslint Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue Elephant/frontend/app/components/settings/codexRateLimits.js tests/app/unit/codexRateLimits.spec.js
          pnpm exec vitest run tests/app/unit/codexRateLimits.spec.js

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential curl file libayatana-appindicator3-dev libgtk-3-dev librsvg2-dev libssl-dev libwebkit2gtk-4.1-dev patchelf wget

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91
          components: rustfmt

      - name: Validate Rust runtime resolution
        run: |
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml
          cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --all-targets --no-default-features
          cargo test --manifest-path Elephant/backend/tauri/Cargo.toml --lib --no-default-features bundled_codex_candidates_prefer_packaged_resources
          cargo test --manifest-path Elephant/backend/tauri/Cargo.toml --lib --no-default-features chat_runtime::codex_app_server::tests

      - name: Push validated feature changes
        run: |
          rm -f .github/workflows/apply-codex-bundle-and-limits.yml
          rm -f .github/scripts/apply_codex_bundle_and_limits.py
          rm -f .github/codex-bundle-refactor-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Bundle Codex at build time and show real usage windows"
          git push origin HEAD:feature/real-codex-subscription

      - name: Remove temporary validator from main
        if: success()
        run: |
          git fetch origin main
          git checkout -B main origin/main
          git rm -f .github/workflows/apply-codex-bundle-main.yml .github/codex-bundle-main-trigger
          git commit -m "Remove temporary Codex bundle validator"
          git push origin main
