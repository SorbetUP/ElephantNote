name: Commit generated Tauri lockfile

on:
  push:
    branches:
      - build/consolidation-ci-fix-20260716
    paths:
      - '.github/workflows/apply-consolidation-ci-fix.yml'
  pull_request:
    paths:
      - '.github/workflows/apply-consolidation-ci-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-lockfile:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/tauri-lockfile-rust191-20260716
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Materialize official addons
        run: node build/scripts/sync-elephant-addons.mjs

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.91.0'

      - name: Generate exact lockfile
        shell: bash
        run: |
          set -euxo pipefail
          cargo generate-lockfile --manifest-path Elephant/backend/tauri/Cargo.toml
          git diff --check
          git diff -- Elephant/backend/tauri/Cargo.lock
          test "$(git diff --name-only)" = 'Elephant/backend/tauri/Cargo.lock'

      - name: Commit generated lockfile
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Elephant/backend/tauri/Cargo.lock
          git commit -m 'build: refresh Tauri lockfile with Rust 1.91'
          git push origin HEAD:fix/tauri-lockfile-rust191-20260716
