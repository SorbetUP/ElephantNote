name: Apply final agent fixes
on:
  push:
    branches: [assistant/wiki-links-graph-integration]
    paths: [.github/workflows/apply-final-agent-fixes.yml]
permissions: { contents: write }
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: assistant/wiki-links-graph-integration, fetch-depth: 0 }
      - name: Patch source
        run: |
          python3 <<'PY'
          from pathlib import Path
          def r(path, old, new):
            p=Path(path); s=p.read_text()
            if old not in s: raise SystemExit(f'missing anchor: {path}: {old[:80]}')
            p.write_text(s.replace(old,new,1))
          r('Elephant/backend/tauri/src/chat_runtime.rs', '''        let search_results = actions
            .iter()
            .filter_map(|entry| entry.pointer("/execution/result"))
            .filter(|value| value.is_array())
            .cloned()
            .collect::<Vec<_>>();
        if !search_results.is_empty() {
''', '''        let search_requested = actions.iter().any(|entry| entry.pointer("/proposal/action/action").and_then(Value::as_str) == Some("search_notes"));
        let search_results = actions
            .iter()
            .filter_map(|entry| entry.pointer("/execution/result"))
            .filter(|value| value.is_array())
            .cloned()
            .collect::<Vec<_>>();
        if search_requested {
''')
          r('Elephant/backend/tauri/src/chat_runtime.rs', '''            let tool_context =
                serde_json::to_string_pretty(&search_results).map_err(|error| error.to_string())?;
            let followup_prompt = format!(
                "{prompt}\n\nThe ElephantNote search tool returned the following real indexed-note results:\n{tool_context}\n\nAnswer the user's request using these results. Cite note titles naturally. Do not emit another elephantnote_actions block."
            );
''', '''            let tool_context = if search_results.is_empty() { "[]".to_string() } else { serde_json::to_string_pretty(&search_results).map_err(|error| error.to_string())? };
            let instruction = if search_results.is_empty() { "No matching indexed note was returned. Say that honestly without claiming ElephantNote has no note-search access." } else { "Answer from these real results and cite note titles naturally." };
            let followup_prompt = format!("{prompt}\n\nThe ElephantNote search tool returned these real indexed-note results:\n{tool_context}\n\n{instruction} Do not emit another elephantnote_actions block.");
''')
          r('Elephant/frontend/app/components/views/ChatView.vue', '''    await invokeProposal('tauri_knowledge_chat_action_approve', id)
    const execution = await invokeProposal('tauri_knowledge_chat_action_execute', id)
''', '''    const execution = await invokeProposal('tauri_knowledge_chat_action_execute', id)
''')
          p=Path('Elephant/frontend/app/components/views/AtomicGraphView.vue'); s=p.read_text()
          s=s.replace('  filterOrphans.value = false\n','  filterOrphans.value = true\n',1)
          s=s.replace('''        if (!active) {
          return { ...attrs, size: (attrs.size || 4) * nodeSizeScale.value }
        }
''','''        const cameraRatio = renderer?.getCamera().getState().ratio || 1
        const zoomBoost = Math.min(2.35, Math.max(1, Math.sqrt(cameraRatio)))
        if (!active) {
          return { ...attrs, size: (attrs.size || 4) * nodeSizeScale.value * zoomBoost }
        }
''',1)
          for a,b in [('nodeSizeScale.value * (1 + 0.45','nodeSizeScale.value * zoomBoost * (1 + 0.45'),('nodeSizeScale.value * (1 + 0.35','nodeSizeScale.value * zoomBoost * (1 + 0.35'),('nodeSizeScale.value * 1.12','nodeSizeScale.value * zoomBoost * 1.12'),('dim * 0.88','dim * 0.58'),('nodeSizeScale.value * (1 - 0.5 * dim)','nodeSizeScale.value * zoomBoost * (1 - 0.18 * dim)')]: s=s.replace(a,b,1)
          s=s.replace("  const hasEmbeddingEdges = graph.edges().some((edge) => graph.getEdgeAttribute(edge, 'edgeType') === 'wiki-semantic')\n  if (hasEmbeddingEdges) setTimeout(() => runForceSimulation(1200), 0)\n","  // Embedding positions are already applied locally; avoid an O(n²) mount simulation.\n",1)
          p.write_text(s)
          p=Path('tests/app/unit/chatAgentSurface.spec.js'); s=p.read_text().replace("    expect(source).toContain('tauri_knowledge_chat_action_approve')\n", "    expect(source).not.toContain(\"await invokeProposal('tauri_knowledge_chat_action_approve', id)\")\n")
          s=s.replace("    expect(source).toContain('const filterOrphans = ref(true)')\n", "    expect(source).toContain('const filterOrphans = ref(true)')\n    expect(source).toContain('filterOrphans.value = true')\n    expect(source).toContain('const zoomBoost = Math.min(2.35')\n")
          p.write_text(s)
          PY
      - name: Commit
        run: |
          git config user.name ElephantNote-CI
          git config user.email actions@users.noreply.github.com
          git rm .github/workflows/apply-final-agent-fixes.yml
          git add Elephant tests
          git commit -m 'Finalize agent search feedback and full graph rendering'
          git push origin HEAD:assistant/wiki-links-graph-integration
