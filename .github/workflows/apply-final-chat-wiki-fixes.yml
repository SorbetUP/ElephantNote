name: Apply Final Chat Wiki Fixes

on:
  pull_request:
    branches:
      - assistant/wiki-links-graph-integration
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'assistant/wiki-organization-continuation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: assistant/wiki-organization-continuation
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Apply refinements
        run: python3 .github/scripts/apply_final_chat_wiki_fixes.py

      - name: Format Rust
        run: cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml --all

      - name: Run knowledge-core tests
        run: cargo test --manifest-path Elephant/backend/knowledge-core/Cargo.toml

      - name: Verify refined contracts
        run: |
          grep -q "exact_count_literal" Elephant/backend/tauri/src/chat_runtime.rs
          grep -q "implicit_exact" Elephant/backend/tauri/src/knowledge_chat_actions.rs
          grep -q "related_title" Elephant/backend/tauri/src/knowledge_wiki_library.rs

      - name: Commit validated source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Elephant tests || true
          git commit -m "fix: refine exact counts and in-place wiki matching"
          git push origin HEAD:assistant/wiki-organization-continuation
