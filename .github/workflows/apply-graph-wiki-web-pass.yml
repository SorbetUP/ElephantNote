name: Apply Graph Wiki Web Pass

on:
  pull_request:
    branches:
      - assistant/wiki-links-graph-integration
    paths:
      - .github/workflows/apply-graph-wiki-web-pass.yml
      - .github/scripts/apply_graph_wiki_web_pass.py
      - .github/scripts/prepare_graph_wiki_web_pass.py

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'assistant/wiki-organization-continuation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: assistant/wiki-organization-continuation
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Prepare idempotent transformations
        run: python3 .github/scripts/prepare_graph_wiki_web_pass.py

      - name: Apply graph, Wiki and web-search changes
        run: python3 .github/scripts/apply_graph_wiki_web_pass.py

      - name: Clean obsolete graph variables
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          path = Path('Elephant/frontend/app/components/views/AtomicGraphView.vue')
          source = path.read_text()
          source = source.replace('  const { nodes, edges, edgeCounts, maxEdges } = data\n', '  const { nodes, edges, edgeCounts } = data\n')
          source = source.replace('    const clusterIdx = node.clusterIndex || 0\n', '')
          source = source.replace('    const connectivity = maxEdges ? Math.log1p(degree) / Math.log1p(maxEdges) : 0\n', '')
          source = re.sub(r'^\s*const t = nodes\.length > 1 \? i / \(nodes\.length - 1\) : 0\s*\n', '', source, flags=re.MULTILINE)
          path.write_text(source)
          PY

      - name: Format and verify required contracts
        run: |
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml --all
          grep -q "wikiColorById" Elephant/frontend/app/components/views/AtomicGraphView.vue
          grep -q "Selecting a note must not rewrite the camera ratio" Elephant/frontend/app/components/views/AtomicGraphView.vue
          ! grep -q "runForceSimulation(1200)" Elephant/frontend/app/components/views/AtomicGraphView.vue
          ! grep -q "en-graph-zoom-slider" Elephant/frontend/app/components/views/AtomicGraphView.vue
          grep -q "take(400)" Elephant/backend/tauri/src/knowledge_wiki_discovery.rs
          grep -q "Wikipedia-quality page" Elephant/backend/knowledge-core/src/wiki_core.rs
          grep -q "max_output_tokens: 24_576" Elephant/backend/knowledge-core/src/wiki_core.rs
          grep -q '"web_search": "live"' Elephant/backend/tauri/src/chat_runtime/codex_app_server.rs
          grep -q '"networkAccess": true' Elephant/backend/tauri/src/chat_runtime/codex_app_server.rs

      - name: Commit implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Elephant tests
          git status --short
          git commit --no-verify -m "feat: scale graph territories and write research-grade Wikis"
          git push origin HEAD:assistant/wiki-organization-continuation
