name: Apply Graph Wiki Web Pass

on:
  pull_request:
    branches:
      - assistant/wiki-links-graph-integration
    paths:
      - .github/workflows/apply-graph-wiki-web-pass.yml
      - .github/scripts/apply_graph_wiki_web_pass.py
      - .github/scripts/prepare_graph_wiki_web_pass.py

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'assistant/wiki-organization-continuation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: assistant/wiki-organization-continuation
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Prepare deterministic transformations
        run: python3 .github/scripts/prepare_graph_wiki_web_pass.py

      - name: Apply scale and research fixes
        id: apply_patch
        continue-on-error: true
        run: python3 .github/scripts/apply_graph_wiki_web_pass.py 2>&1 | tee /tmp/graph-wiki-web-pass.log

      - name: Upload patch diagnostics
        if: steps.apply_patch.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: graph-wiki-web-pass-log
          path: /tmp/graph-wiki-web-pass.log

      - name: Stop after patch failure
        if: steps.apply_patch.outcome == 'failure'
        run: exit 1

      - name: Remove obsolete graph scale variables
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('Elephant/frontend/app/components/views/AtomicGraphView.vue')
          source = path.read_text()
          source = source.replace('  const { nodes, edges, edgeCounts, maxEdges } = data\n', '  const { nodes, edges, edgeCounts } = data\n')
          source = source.replace('    const clusterIdx = node.clusterIndex || 0\n', '')
          source = source.replace('    const connectivity = maxEdges ? Math.log1p(degree) / Math.log1p(maxEdges) : 0\n', '')
          source = source.replace('    const t = nodes.length > 1 ? i / (nodes.length - 1) : 0\n', '')
          path.write_text(source)
          PY

      - name: Format Rust
        run: cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml --all

      - name: Validate Rust
        id: validate_rust
        continue-on-error: true
        run: |
          set -o pipefail
          {
            cargo test --manifest-path Elephant/backend/knowledge-core/Cargo.toml
            cargo test --manifest-path Elephant/backend/tauri/Cargo.toml --lib local_llama_runtime::tests --no-default-features
            cargo test --manifest-path Elephant/backend/tauri/Cargo.toml --lib chat_runtime::codex_app_server::tests --no-default-features
            cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --all-targets --no-default-features
          } 2>&1 | tee /tmp/graph-wiki-rust.log

      - name: Upload Rust diagnostics
        if: steps.validate_rust.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: graph-wiki-rust-log
          path: /tmp/graph-wiki-rust.log

      - name: Stop after Rust failure
        if: steps.validate_rust.outcome == 'failure'
        run: exit 1

      - name: Validate renderer regressions
        id: validate_renderer
        continue-on-error: true
        run: |
          set -o pipefail
          {
            pnpm exec vitest run tests/app/unit/graphWikiScaleRegression.spec.js tests/app/unit/chatAgentSurface.spec.js
            pnpm exec eslint Elephant/frontend/app/components/views/AtomicGraphView.vue Elephant/frontend/app/components/views/semanticGraphViewHelpers.js
            pnpm tauri:web:build
          } 2>&1 | tee /tmp/graph-wiki-renderer.log

      - name: Upload renderer diagnostics
        if: steps.validate_renderer.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: graph-wiki-renderer-log
          path: /tmp/graph-wiki-renderer.log

      - name: Stop after renderer failure
        if: steps.validate_renderer.outcome == 'failure'
        run: exit 1

      - name: Commit validated implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-graph-wiki-web-pass.yml
          git rm .github/scripts/apply_graph_wiki_web_pass.py
          git rm .github/scripts/prepare_graph_wiki_web_pass.py
          git add Elephant tests
          git commit -m "feat: scale graph territories and write research-grade Wikis"
          git push origin HEAD:assistant/wiki-organization-continuation
