name: Apply cross-platform Sites runtime

on:
  push:
    branches:
      - feature/physical-addon-packages
    paths:
      - .github/workflows/apply-sites-mobile-runtime.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/physical-addon-packages
          fetch-depth: 0

      - name: Run idempotent migration
        id: migrate
        shell: bash
        run: |
          set +e
          python3 build/scripts/migrate-sites-cross-platform.py 2>&1 | tee sites-migration.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit migration or diagnostic
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          status="${{ steps.migrate.outputs.status }}"
          if [ "$status" != "0" ]; then
            git reset --hard HEAD
            mkdir -p ci
            cp sites-migration.log ci/sites-migration.log
            git add ci/sites-migration.log
            git commit -m "chore(ci): record Sites migration failure"
            git push origin HEAD:feature/physical-addon-packages
            exit 1
          fi
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml
          git rm .github/workflows/apply-sites-mobile-runtime.yml
          git add -A
          git commit -m "feat(sites): add cross-platform scoped asset preview"
          git push origin HEAD:feature/physical-addon-packages
