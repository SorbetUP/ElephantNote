name: Apply Sync service repair

on:
  push:
    branches: [agent/fix-sync-service-install]
    paths:
      - '.github/workflows/apply-sync-service-repair.yml'
      - 'build/scripts/patch-sync-service-install.py'

permissions:
  contents: write

jobs:
  repair:
    if: github.ref == 'refs/heads/agent/fix-sync-service-install'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-sync-service-install
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.91.0'
          components: rustfmt

      - name: Apply the reviewed source transformation
        run: python3 build/scripts/patch-sync-service-install.py

      - name: Format and validate the Rust repair
        run: |
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml --all
          git diff --check
          cargo test --manifest-path Elephant/backend/tauri/Cargo.toml official_addon_catalog --lib

      - name: Commit the repair and remove one-shot tooling
        run: |
          rm build/scripts/patch-sync-service-install.py
          rm .github/workflows/apply-sync-service-repair.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Elephant/backend/tauri/src/official_addon_catalog.rs
          git add Elephant/backend/tauri/src/addon_services.rs
          git add -u build/scripts/patch-sync-service-install.py .github/workflows/apply-sync-service-repair.yml
          git commit -m 'fix(sync): require verified service packages'
          git push origin HEAD:agent/fix-sync-service-install
