name: Apply Wiki Continuation Head Patch

on:
  pull_request:
    branches:
      - feature/rust-knowledge-core
    paths-ignore:
      - '.github/diagnostics/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-wiki-continuation-head
  cancel-in-progress: true

jobs:
  apply:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'feature/wiki-knowledge-continuation'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/wiki-knowledge-continuation
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install Tauri build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Decode and run validated branch patch
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import zlib

          payload = Path('.github/scripts/apply_auto_wiki_patch.py.zb64').read_text().strip()
          script = zlib.decompress(base64.b64decode(payload))
          Path('/tmp/apply_auto_wiki_patch.py').write_bytes(script)
          PY
          python -m py_compile /tmp/apply_auto_wiki_patch.py
          python /tmp/apply_auto_wiki_patch.py

      - name: Format Rust
        run: |
          cargo fmt --manifest-path Elephant/backend/knowledge-core/Cargo.toml
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml

      - name: Run knowledge-core tests
        run: cargo test --manifest-path Elephant/backend/knowledge-core/Cargo.toml --all-targets -- --nocapture

      - name: Check Tauri integration
        run: cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --no-default-features --message-format short

      - name: Run focused Tauri tests
        run: cargo test --manifest-path Elephant/backend/tauri/Cargo.toml --no-default-features knowledge_wikis -- --nocapture

      - name: Commit implementation
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm -f .github/scripts/apply_auto_wiki_patch.py.zb64
          git add -A
          git commit -m 'feat(wiki): propose cited wikis automatically'
          git push origin HEAD:feature/wiki-knowledge-continuation
