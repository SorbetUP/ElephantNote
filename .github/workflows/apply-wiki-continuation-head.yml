name: Apply Wiki Continuation Head Patch

on:
  pull_request:
    branches:
      - feature/rust-knowledge-core
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-wiki-continuation-head
  cancel-in-progress: true

jobs:
  apply:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'feature/wiki-knowledge-continuation'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/wiki-knowledge-continuation
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Extract and run the branch patch
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/apply-auto-wiki-proposals-once.yml')
          lines = source.read_text().splitlines()
          start = None
          for index, line in enumerate(lines):
              if line.strip() == '- name: Apply implementation':
                  for candidate in range(index + 1, len(lines)):
                      if lines[candidate].strip() == 'run: |':
                          start = candidate + 1
                          break
                  break
          if start is None:
              raise SystemExit('Unable to locate the Python patch in the head workflow')

          captured = []
          for line in lines[start:]:
              if line.startswith('          '):
                  captured.append(line[10:])
                  continue
              if not line.strip():
                  captured.append('')
                  continue
              break
          script = '\n'.join(captured).rstrip() + '\n'
          Path('/tmp/apply_auto_wiki_patch.py').write_text(script)
          PY
          python /tmp/apply_auto_wiki_patch.py

      - name: Commit raw implementation for branch CI
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat(wiki): propose cited wikis automatically'
          git push origin HEAD:feature/wiki-knowledge-continuation
