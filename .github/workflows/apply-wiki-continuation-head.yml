name: Apply Wiki Continuation Head Patch

on:
  pull_request:
    branches:
      - feature/rust-knowledge-core
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: apply-wiki-continuation-head
  cancel-in-progress: true

jobs:
  apply:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'feature/wiki-knowledge-continuation'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/wiki-knowledge-continuation
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install Tauri build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Extract and run the branch patch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/apply-auto-wiki-proposals-once.yml')
          lines = source.read_text().splitlines()
          start = None
          for index, line in enumerate(lines):
              if line.strip() == '- name: Apply implementation':
                  for candidate in range(index + 1, len(lines)):
                      if lines[candidate].strip() == 'run: |':
                          start = candidate + 1
                          break
                  break
          if start is None:
              raise SystemExit('Unable to locate the Python patch in the head workflow')

          captured = []
          for line in lines[start:]:
              if line.startswith('          '):
                  captured.append(line[10:])
                  continue
              if not line.strip():
                  captured.append('')
                  continue
              break
          script = '\n'.join(captured).rstrip() + '\n'
          if 'from pathlib import Path' not in script:
              raise SystemExit('Extracted patch is not the expected Python script')
          Path('/tmp/apply_auto_wiki_patch.py').write_text(script)
          PY
          set +e
          python /tmp/apply_auto_wiki_patch.py > /tmp/wiki-patch.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            {
              echo '### Automatic Wiki patch failure'
              echo
              echo '```text'
              tail -n 100 /tmp/wiki-patch.log
              echo '```'
            } > /tmp/wiki-patch-comment.md
            gh pr comment 37 --repo "$GITHUB_REPOSITORY" --body-file /tmp/wiki-patch-comment.md
            cat /tmp/wiki-patch.log
            exit "$status"
          fi
          cat /tmp/wiki-patch.log

      - name: Format Rust
        run: |
          cargo fmt --manifest-path Elephant/backend/knowledge-core/Cargo.toml
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml

      - name: Run knowledge-core tests
        run: cargo test --manifest-path Elephant/backend/knowledge-core/Cargo.toml --all-targets -- --nocapture

      - name: Check Tauri integration
        run: cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --no-default-features --message-format short

      - name: Run focused Tauri tests
        run: cargo test --manifest-path Elephant/backend/tauri/Cargo.toml --no-default-features knowledge_wikis -- --nocapture

      - name: Commit implementation
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat(wiki): propose cited wikis automatically'
          git push origin HEAD:feature/wiki-knowledge-continuation
