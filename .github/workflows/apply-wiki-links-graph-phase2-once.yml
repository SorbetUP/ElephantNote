name: Apply Wiki links graph phase 2 once

on:
  pull_request:
    branches:
      - feature/wiki-knowledge-continuation
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.head_ref == 'assistant/wiki-links-graph-integration'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - name: Apply source patch
        run: |
          python3 .github/scripts/apply_wiki_links_graph_phase2.py
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml
      - name: Persist implementation before validation
        run: |
          git config user.name "ElephantNote Bot"
          git config user.email "actions@users.noreply.github.com"
          git add Elephant/frontend/app/components/views/semanticGraphViewHelpers.js \
            Elephant/backend/tauri/src/knowledge_wiki_library.rs \
            tests/app/unit/wikiGraphSurface.spec.js
          git commit -m "Implement Wiki links and graph integration"
          git push origin HEAD:${{ github.head_ref }}
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential pkg-config libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev
      - name: Validate focused changes
        run: |
          pnpm exec vitest run tests/app/unit/wikiGraphSurface.spec.js
          pnpm exec eslint Elephant/frontend/app/components/views/semanticGraphViewHelpers.js tests/app/unit/wikiGraphSurface.spec.js
          cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --no-default-features
          cargo test --manifest-path Elephant/backend/tauri/Cargo.toml --no-default-features knowledge_wiki_library -- --nocapture
          pnpm tauri:web:build
