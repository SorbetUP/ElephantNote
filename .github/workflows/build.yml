name: PR Build

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-on-pr-head:
    permissions:
      pull-requests: read
      actions: read
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
            platform: linux
          - name: windows
            os: windows-latest
            platform: windows
          - name: macos-x64
            os: macos-15-intel
            platform: macos
            arch: x64
          - name: macos-arm64
            os: macos-15
            platform: macos
            arch: arm64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Linux Build Dependencies
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            icnsutils graphicsmagick xz-utils rpm \
            libayatana-appindicator3-dev librsvg2-dev libwebkit2gtk-4.1-dev \
            libx11-dev libxkbfile-dev libsecret-1-dev libfontconfig-dev \
            libgtk-3-0 libgbm1 libnss3 libasound2t64 patchelf unzip

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install pinned Tauri CLI
        shell: bash
        run: |
          set -euxo pipefail
          if ! cargo tauri --version 2>/dev/null | grep -Fq '2.11.2'; then
            cargo install tauri-cli --version 2.11.2 --locked
          fi
          cargo tauri --version

      - uses: ./.github/actions/setup

      # Must be set before postinstall runs
      - name: Set C++20 for MacOS
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          echo "CXXFLAGS=-std=gnu++20 -stdlib=libc++" >> "$GITHUB_ENV"

      - name: Run postinstall
        shell: bash
        run: node build/scripts/postinstall.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_config_user_agent: 'pnpm'
          USE_ELECTRON_CLANG: ${{ matrix.platform == 'linux' && '0' || '' }}

      - name: Build Linux package
        if: matrix.platform == 'linux'
        shell: bash
        run: pnpm run build:linux

      - name: Build macOS package
        if: matrix.platform == 'macos'
        shell: bash
        run: pnpm run build:mac -- --${{ matrix.arch }}

      - name: Build Windows package
        if: matrix.platform == 'windows'
        shell: bash
        run: pnpm run build:win

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: elephant-${{ matrix.name }}
          retention-days: 30
          path: |
            dist/*.exe
            dist/*.zip
            dist/*.dmg
            dist/*.AppImage
            dist/*.snap
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
            Elephant/backend/tauri/target/release/bundle/**
          if-no-files-found: warn
