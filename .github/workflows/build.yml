name: PR Build

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-on-pr-head:
    permissions:
      pull-requests: read
      actions: read
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
            platform: linux
          - name: windows
            os: windows-latest
            platform: windows
          - name: macos-x64
            os: macos-15-intel
            platform: macos
            arch: x64
          - name: macos-arm64
            os: macos-15
            platform: macos
            arch: arm64

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Linux Build Dependencies
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y icnsutils graphicsmagick xz-utils libx11-dev libxkbfile-dev gnome-keyring libsecret-1-dev libfontconfig-dev rpm

      - uses: ./.github/actions/setup

      # Must be set before postinstall runs
      - name: Set C++20 for MacOS
        if: matrix.platform == 'macos'
        run: |
          echo "CXXFLAGS=-std=gnu++20 -stdlib=libc++" >> $GITHUB_ENV

      # Run the full postinstall and locale minification.
      - name: Run postinstall diagnostic
        continue-on-error: true
        run: node scripts/postinstall.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_config_user_agent: 'pnpm'
          USE_ELECTRON_CLANG: ${{ matrix.platform == 'linux' && '0' || '' }}

      - name: build-linux diagnostic
        if: matrix.platform == 'linux'
        continue-on-error: true
        run: pnpm run build:linux

      - name: build-mac diagnostic
        if: matrix.platform == 'macos'
        continue-on-error: true
        run: pnpm run build:mac -- --${{ matrix.arch }}

      - name: build-win diagnostic
        if: matrix.platform == 'windows'
        continue-on-error: true
        run: pnpm run build:win

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: marktext-${{ matrix.name }}
          retention-days: 30
          path: |
            dist/*.exe
            dist/*.zip
            dist/*.dmg
            dist/*.AppImage
            dist/*.snap
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
          if-no-files-found: ignore
