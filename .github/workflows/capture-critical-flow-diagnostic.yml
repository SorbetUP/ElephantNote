name: Capture critical flow diagnostic

on:
  push:
    branches:
      - develop_next-integration-repair
    paths:
      - .github/workflows/capture-critical-flow-diagnostic.yml

permissions:
  contents: write

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop_next-integration-repair
          fetch-depth: 0
      - name: Capture guard output
        shell: bash
        run: |
          set +e
          node build/scripts/verify-critical-flows.mjs > critical-flow-diagnostic.txt 2>&1
          status=$?
          printf '\nexit_status=%s\n' "$status" >> critical-flow-diagnostic.txt
          rm .github/workflows/capture-critical-flow-diagnostic.yml
      - name: Commit diagnostic and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Capture critical flow diagnostic'
          git push origin HEAD:develop_next-integration-repair
