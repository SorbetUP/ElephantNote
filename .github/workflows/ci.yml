name: CI

on:
  push:
    branches:
      - main
      - nsb/tauri
      - 'assistant/**'
    tags:
      - 'v*'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Generate parity backlog docs
        run: pnpm docs:parity

      - name: Verify generated parity backlog size
        shell: bash
        run: |
          lines=$(cat docs/parity/generated/*.md docs/parity/index.md | wc -l | tr -d ' ')
          echo "Generated parity documentation lines: $lines"
          test "$lines" -ge 10000

      - name: Critical ElephantNote flow guard
        run: node scripts/verify-critical-flows.mjs

      - name: Security guardrails
        run: pnpm security:guard

      - name: Tauri platform compatibility guard
        run: pnpm tauri:platform:check

      - name: Lint
        run: pnpm lint

      - name: ElephantNote contract tests
        run: pnpm exec vitest run test/unit/specs/main/elephantnote

      - name: Unit suite
        run: pnpm test:unit

      - name: Build Electron reference bundles
        run: pnpm run build

      - name: Build Tauri web bundle
        run: pnpm tauri:web:build

      - name: Validate licenses
        run: pnpm run validate-licenses

      - name: Upload coverage and generated docs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-artifacts
          path: |
            coverage/
            docs/parity/generated/
            docs/parity/index.md
          if-no-files-found: ignore
          retention-days: 14

  tauri-rust:
    name: Tauri Rust check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
      DEBIAN_FRONTEND: noninteractive
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri Linux dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            wget

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Rust formatting diagnostic
        continue-on-error: true
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml --all-targets --no-default-features

      - name: Cargo tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib --no-default-features
