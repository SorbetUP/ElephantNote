name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'nsb/**'
    tags:
      - 'v*'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Run postinstall
        run: node scripts/postinstall.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_config_user_agent: pnpm

      - name: Lint
        run: pnpm lint

      - name: ElephantNote contract tests
        run: pnpm exec vitest run test/unit/specs/elephantnote

      - name: Unit tests
        run: pnpm test -- --coverage

      - name: Build Electron/Vite bundles
        run: pnpm run build

      - name: Validate licenses
        run: pnpm run validate-licenses

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
          retention-days: 14

  package-smoke:
    name: Package smoke (${{ matrix.platform }})
    needs: quality
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
            command: pnpm run build:linux
          - platform: macos
            os: macos-15
            command: pnpm run build:mac -- --arm64
          - platform: windows
            os: windows-latest
            command: pnpm run build:win

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y icnsutils graphicsmagick xz-utils libx11-dev libxkbfile-dev gnome-keyring libsecret-1-dev libfontconfig-dev rpm

      - uses: ./.github/actions/setup

      - name: Set C++20 for macOS native rebuilds
        if: matrix.platform == 'macos'
        run: echo "CXXFLAGS=-std=gnu++20 -stdlib=libc++" >> $GITHUB_ENV

      - name: Run postinstall
        run: node scripts/postinstall.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_config_user_agent: pnpm
          USE_ELECTRON_CLANG: ${{ matrix.platform == 'linux' && '0' || '' }}

      - name: Package
        run: ${{ matrix.command }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.platform }}
          retention-days: 14
          path: |
            dist/*.exe
            dist/*.zip
            dist/*.dmg
            dist/*.AppImage
            dist/*.snap
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Publish release artifacts
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: gh release create "$TAG_NAME" release-artifacts/* --title "$TAG_NAME" --notes "Automated ElephantNote release for $TAG_NAME."
