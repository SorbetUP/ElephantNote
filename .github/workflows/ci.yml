name: CI

on:
  push:
    branches:
      - main
      - nsb/tauri
      - 'assistant/**'
    tags:
      - 'v*'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gnome-keyring \
            graphicsmagick \
            icnsutils \
            libfontconfig-dev \
            libsecret-1-dev \
            libx11-dev \
            libxkbfile-dev \
            rpm \
            xz-utils

      - uses: ./.github/actions/setup

      - name: Generate parity backlog docs
        run: pnpm docs:parity

      - name: Verify generated parity backlog size
        shell: bash
        run: |
          lines=$(cat docs/parity/generated/*.md docs/parity/index.md | wc -l | tr -d ' ')
          echo "Generated parity documentation lines: $lines"
          test "$lines" -ge 10000

      - name: Critical ElephantNote flow guard
        run: node scripts/verify-critical-flows.mjs

      - name: Security guardrails
        run: pnpm security:guard

      - name: Tauri platform compatibility guard
        run: pnpm tauri:platform:check

      - name: Lint
        shell: bash
        run: |
          set -o pipefail
          pnpm lint 2>&1 | tee eslint-output.txt

      - name: ElephantNote contract tests
        run: pnpm exec vitest run test/unit/specs/main/elephantnote

      - name: Unit suite
        run: pnpm test:unit

      - name: Run Electron postinstall before reference build
        run: node scripts/postinstall.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_config_user_agent: 'pnpm'
          USE_ELECTRON_CLANG: '0'

      - name: Build Electron reference bundles
        run: pnpm run build:unpack

      - name: Build Tauri web bundle
        run: pnpm tauri:web:build

      - name: Validate licenses
        run: pnpm run validate-licenses

      - name: Upload coverage and generated docs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-artifacts
          path: |
            coverage/
            docs/parity/generated/
            docs/parity/index.md
            security-guardrails-report.json
            eslint-output.txt
          if-no-files-found: ignore
          retention-days: 14

  tauri-macos-packaged-smoke:
    name: Tauri macOS packaged window smoke
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      CARGO_TERM_COLOR: always
      TAURI_MACOS_SMOKE_TIMEOUT_MS: 120000
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-tauri
            src-tauri/target
          key: ${{ runner.os }}-cargo-tauri-macos-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-tauri-macos-
            ${{ runner.os }}-cargo-

      - name: Install Tauri CLI
        shell: bash
        run: |
          set -euxo pipefail
          if ! cargo tauri --version >/dev/null 2>&1; then
            cargo install tauri-cli --version '^2' --locked
          fi
          cargo tauri --version

      - name: Cargo check macOS Apple Silicon target
        shell: bash
        run: cargo check --manifest-path src-tauri/Cargo.toml --target aarch64-apple-darwin --all-targets --no-default-features

      - name: Build packaged Tauri macOS app
        shell: bash
        run: |
          set -euxo pipefail
          pnpm tauri:llama:install
          pnpm tauri:web:build
          cd src-tauri
          cargo tauri build --bundles app

      - name: Launch packaged app and verify visible window
        run: pnpm tauri:mac:smoke

      - name: Upload macOS bundle diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-macos-packaged-smoke-diagnostics
          path: |
            src-tauri/target/release/bundle/macos/
          if-no-files-found: ignore
          retention-days: 7

  tauri-rust:
    name: Tauri Rust check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
      DEBIAN_FRONTEND: noninteractive
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri Linux dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            wget

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Rust formatting diagnostic
        continue-on-error: true
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml --all-targets --no-default-features

      - name: Cargo tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib --no-default-features
