name: Finalize Rust Muya migration

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write

concurrency:
  group: finalize-rust-muya-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  finalize:
    if: github.head_ref == 'feature/rust-muya-editor-core'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/rust-muya-editor-core
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Apply final source fixes
        shell: bash
        run: |
          set -euxo pipefail
          git fetch origin develop
          python3 - <<'PY'
          from pathlib import Path

          docs = Path('build/scripts/generate-parity-docs.mjs')
          source = docs.read_text()
          old_out = "const outDir = path.join(root, 'docs', 'parity', 'generated')"
          new_out = "const outDir = path.join(root, 'agent', 'docs', 'project', 'parity', 'generated')"
          old_index = "  path.join(root, 'docs', 'parity', 'index.md'),"
          new_index = "  path.join(root, 'agent', 'docs', 'project', 'parity', 'index.md'),"
          if old_out not in source or old_index not in source:
              raise SystemExit('parity documentation path markers were not found')
          docs.write_text(source.replace(old_out, new_out, 1).replace(old_index, new_index, 1))

          adapter = Path('Elephant/frontend/src/renderer/src/muya/realMuyaRustAdapter.js')
          source = adapter.read_text()
          old_regex = r"const SIMPLE_LIST_LINE = /^\s*(?:[-+*]\s+(?:\[[ xX]\]\s+)?|\d+[.)]\s+)\S/"
          new_regex = r"const SIMPLE_LIST_LINE = /^\s*(?:[-+*]\s+(?:\[[ xX]\]\s+)?|\d+\.\s+)\S/"
          if old_regex not in source:
              raise SystemExit('list fallback regex marker was not found')
          adapter.write_text(source.replace(old_regex, new_regex, 1))
          PY

          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml
          git checkout origin/develop -- .github/workflows/ci.yml

          git config user.name 'ElephantNote CI'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'fix: finalize Rust Muya migration after develop merge'
          git push origin HEAD:feature/rust-muya-editor-core
