name: CI

on:
  push:
    branches:
      - main
      - develop
      - nsb/tauri
      - 'assistant/**'
    tags:
      - 'v*'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gnome-keyring graphicsmagick icnsutils libfontconfig-dev libsecret-1-dev \
            libx11-dev libxkbfile-dev rpm xz-utils

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: ./.github/actions/setup

      - name: Install exact wasm-bindgen CLI
        shell: bash
        run: |
          VERSION=$(cargo metadata --manifest-path Elephant/crates/muya-wasm/Cargo.toml --format-version 1 \
            | python3 -c "import json,sys; data=json.load(sys.stdin); print(next(p['version'] for p in data['packages'] if p['name']=='wasm-bindgen'))")
          if ! wasm-bindgen --version 2>/dev/null | grep -q "${VERSION}$"; then
            cargo install wasm-bindgen-cli --version "$VERSION" --locked
          fi

      - name: Generate parity backlog docs
        run: pnpm docs:parity

      - name: Verify generated parity backlog size
        shell: bash
        run: |
          lines=$(cat docs/parity/generated/*.md docs/parity/index.md | wc -l | tr -d ' ')
          echo "Generated parity documentation lines: $lines"
          test "$lines" -ge 10000

      - name: Critical ElephantNote flow guard
        run: node build/scripts/verify-critical-flows.mjs

      - name: Security guardrails
        run: pnpm security:guard

      - name: Test trust policy
        run: pnpm test:trust:guard

      - name: Tauri platform compatibility guard
        run: pnpm tauri:platform:check

      - name: Lint
        shell: bash
        run: |
          set -o pipefail
          pnpm lint 2>&1 | tee eslint-output.txt

      - name: Run postinstall before reference build
        run: node build/scripts/postinstall.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_config_user_agent: 'pnpm'
          USE_ELECTRON_CLANG: '0'

      - name: Build Tauri web bundle reference
        shell: bash
        run: |
          set -o pipefail
          pnpm run build:unpack 2>&1 | tee build-output.txt

      - name: Build Tauri web bundle
        run: pnpm tauri:web:build

      - name: Validate licenses
        run: pnpm run validate-licenses

      - name: Upload build and generated docs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-artifacts
          path: |
            docs/parity/generated/
            docs/parity/index.md
            security-guardrails-report.json
            test-results/trust/**
            eslint-output.txt
            build-output.txt
          if-no-files-found: ignore
          retention-days: 14

  tauri-macos-packaged-smoke:
    name: Tauri macOS packaged window smoke
    runs-on: macos-latest
    timeout-minutes: 75
    env:
      CARGO_TERM_COLOR: always
      TAURI_MACOS_SMOKE_TIMEOUT_MS: 120000
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-tauri
            ~/.cargo/bin/wasm-bindgen
            ~/.cargo/bin/wasm-bindgen-test-runner
            Elephant/backend/tauri/target
          key: ${{ runner.os }}-cargo-tauri-macos-${{ hashFiles('Elephant/backend/tauri/Cargo.lock', 'Elephant/backend/tauri/Cargo.toml', 'Elephant/crates/muya-wasm/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-tauri-macos-

      - name: Install Tauri CLI
        shell: bash
        run: |
          if ! cargo tauri --version >/dev/null 2>&1; then
            cargo install tauri-cli --version '2.11.2' --locked
          fi

      - name: Install exact wasm-bindgen CLI
        shell: bash
        run: |
          VERSION=$(cargo metadata --manifest-path Elephant/crates/muya-wasm/Cargo.toml --format-version 1 \
            | python3 -c "import json,sys; data=json.load(sys.stdin); print(next(p['version'] for p in data['packages'] if p['name']=='wasm-bindgen'))")
          if ! wasm-bindgen --version 2>/dev/null | grep -q "${VERSION}$"; then
            cargo install wasm-bindgen-cli --version "$VERSION" --locked
          fi

      - name: Prepare embedded Tauri addon resources for macOS
        run: node build/scripts/prepare-tauri-addon-resources.mjs

      - name: Cargo check macOS Apple Silicon target
        run: cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --target aarch64-apple-darwin

      - name: Build packaged Tauri macOS app
        shell: bash
        run: |
          set -o pipefail
          cd Elephant/backend/tauri
          cargo tauri build --target aarch64-apple-darwin --bundles app \
            2>&1 | tee ../../../tauri-macos-build-output.txt

      - name: Launch packaged app and verify visible window
        run: pnpm tauri:mac:smoke

      - name: Upload macOS bundle diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-macos-window-smoke
          path: |
            tauri-macos-build-output.txt
            build/tauri-macos-smoke/**
            Elephant/backend/tauri/target/aarch64-apple-darwin/release/bundle/macos/**
          if-no-files-found: ignore
          retention-days: 14

  tauri-rust:
    name: Tauri Rust check
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Materialize official addons
        run: node build/scripts/sync-elephant-addons.mjs

      - name: Prepare embedded Tauri addon resources for Rust checks
        run: node build/scripts/prepare-tauri-addon-resources.mjs

      - name: Install Tauri Linux dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Elephant/backend/tauri/target
          key: ${{ runner.os }}-cargo-tauri-${{ hashFiles('Elephant/backend/tauri/Cargo.lock', 'Elephant/backend/tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-tauri-

      - name: Rust formatting
        run: cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml --all -- --check

      - name: Cargo check
        shell: bash
        run: |
          set -o pipefail
          cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --all-targets --no-default-features \
            2>&1 | tee cargo-check-output.txt

      - name: Cargo tests
        shell: bash
        run: |
          set -o pipefail
          cargo test --manifest-path Elephant/backend/tauri/Cargo.toml --lib --no-default-features \
            2>&1 | tee cargo-tests-output.txt

      - name: Upload Rust diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-rust-diagnostics
          path: |
            cargo-check-output.txt
            cargo-tests-output.txt
          if-no-files-found: ignore
          retention-days: 14
