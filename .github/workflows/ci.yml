name: Merge develop into Rust Muya

on:
  push:
    branches:
      - feature/rust-muya-editor-core
    paths:
      - '.github/workflows/ci.yml'

permissions:
  contents: write

concurrency:
  group: merge-develop-rust-muya
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/rust-muya-editor-core
          fetch-depth: 0

      - name: Merge develop and preserve the Rust-owned Muya core
        shell: bash
        run: |
          set -euxo pipefail
          git fetch origin develop
          git config user.name 'ElephantNote CI'
          git config user.email 'actions@users.noreply.github.com'

          merge_base=$(git merge-base HEAD origin/develop)
          git merge --no-commit --no-ff -X ours origin/develop

          while IFS= read -r file; do
            case "$file" in
              .github/workflows/ci.yml|Elephant/backend/tauri/src/lib_min.rs)
                ;;
              *)
                git checkout origin/develop -- "$file"
                ;;
            esac
          done < <(git diff --name-only "$merge_base" origin/develop)

          python3 - <<'PY'
          from pathlib import Path

          path = Path('Elephant/backend/tauri/src/lib_min.rs')
          source = path.read_text()

          if 'pub mod code_execution;' not in source:
              source = source.replace(
                  'pub mod chat_runtime;\n',
                  'pub mod chat_runtime;\npub mod code_execution;\n',
                  1,
              )

          marker = '            tauri_extra_commands::shell_exec,\n'
          commands = (
              '            code_execution::tauri_programs_list,\n'
              '            code_execution::tauri_programs_set,\n'
              '            code_execution::tauri_programs_run,\n'
          )
          if 'code_execution::tauri_programs_list,' not in source:
              if marker not in source:
                  raise SystemExit('shell command registration marker not found')
              source = source.replace(marker, commands + marker, 1)

          path.write_text(source)
          PY

          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml
          git checkout origin/develop -- .github/workflows/ci.yml

          git add -A
          git commit -m 'Merge develop into Rust-owned Muya branch'
          git push origin HEAD:feature/rust-muya-editor-core
