name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'assistant/**'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      HUSKY: '0'
      NODE_ENV: test
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libsecret-1-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libx11-dev \
            libxkbfile-dev \
            patchelf \
            rpm \
            wget \
            xz-utils

      - uses: ./.github/actions/setup

      - name: Generate parity backlog docs
        run: pnpm docs:parity

      - name: Verify generated parity backlog size
        shell: bash
        run: |
          lines=$(cat docs/parity/generated/*.md docs/parity/index.md | wc -l | tr -d ' ')
          echo "Generated parity documentation lines: $lines"
          test "$lines" -ge 10000

      - name: Critical ElephantNote flow guard
        shell: bash
        run: |
          set -o pipefail
          node build/scripts/verify-critical-flows.mjs 2>&1 | tee critical-flow-guard.log

      - name: Upload critical flow diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: critical-flow-guard-${{ github.run_id }}
          path: critical-flow-guard.log
          if-no-files-found: error

      - name: Security guardrails
        run: pnpm security:guard

      - name: Tauri platform compatibility guard
        run: pnpm tauri:platform:check

      - name: Lint
        run: pnpm lint

      - name: Rust formatting
        shell: bash
        run: |
          set -o pipefail
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml -- --check 2>&1 | tee rustfmt-check.log

      - name: Upload rustfmt diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rustfmt-check-${{ github.run_id }}
          path: rustfmt-check.log
          if-no-files-found: error

      - name: Rust check
        run: cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --all-targets --no-default-features

      - name: Rust tests
        run: cargo test --manifest-path Elephant/backend/tauri/Cargo.toml --lib --no-default-features

      - name: Build renderer
        run: pnpm tauri:web:build

      - name: Unit tests
        run: pnpm test:unit

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      HUSKY: '0'
      NODE_ENV: test
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: E2E tests
        run: pnpm test:e2e
