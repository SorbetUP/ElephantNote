name: CI

on:
  push:
    branches:
      - main
      - nsb/tauri
      - 'assistant/**'
    tags:
      - 'v*'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Generate parity backlog docs
        run: pnpm docs:parity

      - name: Verify generated parity backlog size
        shell: bash
        run: |
          lines=$(cat docs/parity/generated/*.md docs/parity/index.md | wc -l | tr -d ' ')
          echo "Generated parity documentation lines: $lines"
          test "$lines" -ge 10000

      - name: Critical ElephantNote flow guard
        run: node scripts/verify-critical-flows.mjs

      - name: Tauri platform compatibility guard
        run: pnpm tauri:platform:check

      - name: Lint diagnostic
        continue-on-error: true
        run: pnpm lint

      - name: ElephantNote contract tests
        run: pnpm exec vitest run test/unit/specs/main/elephantnote

      - name: Legacy unit suite diagnostic
        continue-on-error: true
        run: pnpm test:unit -- --coverage

      - name: Build Electron reference bundles diagnostic
        continue-on-error: true
        run: pnpm run build

      - name: Build Tauri web bundle diagnostic
        continue-on-error: true
        run: pnpm tauri:web:build

      - name: Validate licenses
        run: pnpm run validate-licenses

      - name: Upload coverage and generated docs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-artifacts
          path: |
            coverage/
            docs/parity/generated/
            docs/parity/index.md
          if-no-files-found: ignore
          retention-days: 14

  tauri-rust:
    name: Tauri Rust check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
      DEBIAN_FRONTEND: noninteractive
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri Linux dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            wget

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Rust formatting diagnostic
        continue-on-error: true
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml --all-targets --no-default-features

      - name: Cargo tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib --no-default-features

  package-smoke:
    name: Package smoke (${{ matrix.platform }})
    needs: [quality, tauri-rust]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
            command: pnpm run build:linux
          - platform: macos
            os: macos-15
            command: pnpm run build:mac -- --arm64
          - platform: windows
            os: windows-latest
            command: pnpm run build:win

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y icnsutils graphicsmagick xz-utils libx11-dev libxkbfile-dev gnome-keyring libsecret-1-dev libfontconfig-dev rpm

      - uses: ./.github/actions/setup

      - name: Set C++20 for macOS native rebuilds
        if: matrix.platform == 'macos'
        run: echo "CXXFLAGS=-std=gnu++20 -stdlib=libc++" >> $GITHUB_ENV

      - name: Run postinstall
        run: node scripts/postinstall.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_config_user_agent: pnpm
          USE_ELECTRON_CLANG: ${{ matrix.platform == 'linux' && '0' || '' }}

      - name: Package
        run: ${{ matrix.command }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.platform }}
          retention-days: 14
          path: |
            dist/*.exe
            dist/*.zip
            dist/*.dmg
            dist/*.AppImage
            dist/*.snap
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Publish release artifacts
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: gh release create "$TAG_NAME" release-artifacts/* --title "$TAG_NAME" --notes "Automated ElephantNote release for $TAG_NAME."
