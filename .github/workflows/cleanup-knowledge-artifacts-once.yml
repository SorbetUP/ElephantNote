name: Cleanup Knowledge Artifacts Once

on:
  push:
    branches:
      - feature/rust-knowledge-core
  pull_request:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cleanup-knowledge-artifacts-once
  cancel-in-progress: true

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/rust-knowledge-core
          fetch-depth: 0
      - name: Remove generated Cargo build artifacts
        shell: bash
        run: |
          git rm -r --ignore-unmatch Elephant/backend/knowledge-core/target
          git rm --ignore-unmatch Elephant/backend/knowledge-core/Cargo.lock
          cat > Elephant/backend/knowledge-core/.gitignore <<'EOF'
          /target/
          Cargo.lock
          EOF
          rm -f .github/workflows/cleanup-knowledge-artifacts-once.yml
      - name: Commit clean repository state
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'chore(knowledge): remove generated Cargo artifacts'
          git push origin HEAD:feature/rust-knowledge-core
