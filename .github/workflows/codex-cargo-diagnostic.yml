name: Apply final Codex Rust fixes

on:
  pull_request:
    branches:
      - develop

permissions:
  contents: write

jobs:
  fix-and-validate:
    if: github.head_ref == 'feature/real-codex-subscription'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/real-codex-subscription
          fetch-depth: 0

      - name: Apply precise Rust fixes
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          path = Path('Elephant/backend/tauri/src/chat_runtime/codex_app_server.rs')
          text = path.read_text()
          old_map = 'HashMap::<u64, oneshot::Sender<R<Value>>>>::new()'
          new_map = 'HashMap::<u64, oneshot::Sender<R<Value>>>::new()'
          old_result = '.await\n        .ok()??;'
          new_result = '.await\n        .ok()?\n        .ok()?;'
          if text.count(old_map) != 1:
              raise SystemExit(f'HashMap pattern count={text.count(old_map)}')
          if text.count(old_result) != 1:
              raise SystemExit(f'nested Result pattern count={text.count(old_result)}')
          text = text.replace(old_map, new_map, 1)
          text = text.replace(old_result, new_result, 1)
          path.write_text(text)
          PY

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential curl file libayatana-appindicator3-dev libgtk-3-dev librsvg2-dev libssl-dev libwebkit2gtk-4.1-dev patchelf wget

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91
          components: rustfmt

      - name: Validate Rust
        shell: bash
        run: |
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml -- Elephant/backend/tauri/src/chat_runtime/codex_app_server.rs
          cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --all-targets --no-default-features
          cargo test --manifest-path Elephant/backend/tauri/Cargo.toml --lib --no-default-features chat_runtime::codex_app_server::tests

      - name: Remove temporary workflow and commit
        shell: bash
        run: |
          rm .github/workflows/codex-cargo-diagnostic.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Elephant/backend/tauri/src/chat_runtime/codex_app_server.rs .github/workflows/codex-cargo-diagnostic.yml
          git commit -m "Fix and validate Codex app-server Rust integration"
          git push origin HEAD:feature/real-codex-subscription
