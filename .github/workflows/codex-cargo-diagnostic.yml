name: Codex cargo diagnostic

on:
  pull_request:
    branches:
      - develop

permissions:
  contents: read

jobs:
  cargo-check:
    if: github.head_ref == 'feature/real-codex-subscription'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential curl file libayatana-appindicator3-dev libgtk-3-dev librsvg2-dev libssl-dev libwebkit2gtk-4.1-dev patchelf wget
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91
      - name: Capture cargo check
        shell: bash
        run: |
          set -o pipefail
          cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --all-targets --no-default-features 2>&1 | tee cargo-check.log
      - name: Upload cargo diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codex-cargo-check
          path: cargo-check.log
          if-no-files-found: error
