name: Codex Quality Refactor

on:
  push:
    branches: [main]
    paths:
      - .github/codex-quality-main-trigger

permissions:
  contents: write

jobs:
  refactor-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/real-codex-subscription
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Extract and apply the reviewed refactor
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/lint.yml').read_text()
          marker = "          python3 <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY\n", start)
          block = workflow[start:end]
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in block.splitlines())
          Path('/tmp/refactor_codex_runtime.py').write_text(script + '\n')
          PY
          python3 /tmp/refactor_codex_runtime.py

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential curl file libayatana-appindicator3-dev libgtk-3-dev librsvg2-dev libssl-dev libwebkit2gtk-4.1-dev patchelf wget

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91
          components: rustfmt

      - name: Validate Rust and Vue changes
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml
          cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --all-targets --no-default-features
          cargo test --manifest-path Elephant/backend/tauri/Cargo.toml --lib --no-default-features chat_runtime::codex_app_server::tests
          pnpm exec eslint Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue

      - name: Push only the validated functional changes
        shell: bash
        run: |
          set -euo pipefail
          git checkout origin/develop -- .github/workflows/lint.yml
          rm -f .github/codex-quality-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Refactor Codex runtime lifecycle and diagnostics"
          git push origin HEAD:feature/real-codex-subscription

      - name: Remove temporary main-branch validator
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout -B main origin/main
          git rm -f .github/workflows/codex-quality-refactor.yml .github/codex-quality-main-trigger
          git commit -m "Remove temporary Codex quality validator"
          git push origin main
