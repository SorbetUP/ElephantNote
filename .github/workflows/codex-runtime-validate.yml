name: Codex Runtime Validate

on:
  push:
    branches: [main]
    paths:
      - .github/codex-runtime-validate-trigger

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/real-codex-subscription
          fetch-depth: 0

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential curl file libayatana-appindicator3-dev libgtk-3-dev librsvg2-dev libssl-dev libwebkit2gtk-4.1-dev patchelf wget

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91
          components: rustfmt

      - name: Format and validate focused Codex runtime
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml
          cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --all-targets --no-default-features
          cargo test --manifest-path Elephant/backend/tauri/Cargo.toml --lib --no-default-features chat_runtime::codex_app_server::tests

      - name: Push formatting if needed
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Elephant/backend/tauri/src/chat_runtime/codex_app_server.rs
          if git diff --cached --quiet; then
            echo "No formatting changes"
          else
            git commit -m "Format Codex app-server runtime"
            git push origin HEAD:feature/real-codex-subscription
          fi
