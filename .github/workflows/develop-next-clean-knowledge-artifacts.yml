name: Finalize develop_next migration workflows

on:
  pull_request:
    branches:
      - feature/physical-addon-packages
    paths:
      - .github/workflows/develop-next-clean-knowledge-artifacts.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: develop-next-finalize-migration-workflows
  cancel-in-progress: true

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop_next
          fetch-depth: 0

      - name: Remove consumed migration and diagnostic helpers
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm --ignore-unmatch \
            .github/workflows/develop-next-clean-knowledge-artifacts.yml \
            .github/workflows/develop-next-diagnose-current-integrations.yml \
            .github/workflows/develop-next-diagnose-knowledge-addon.yml \
            .github/workflows/develop-next-diagnose-latest.yml \
            .github/workflows/develop-next-fix-final-unit-contracts.yml \
            .github/workflows/develop-next-integrate-knowledge-addon-v2.yml \
            .github/workflows/develop-next-integrate-knowledge-addon.yml \
            .github/workflows/develop-next-integrate-mobile-ui-v2.yml \
            .github/workflows/develop-next-integrate-mobile-ui.yml \
            .github/workflows/develop-next-neutralize-rust-editor-bridge.yml \
            .github/workflows/develop-next-patch-trusted-editor-api-v2.yml \
            .github/workflows/develop-next-patch-trusted-editor-api.yml \
            .github/workflows/develop-next-repair-knowledge-format.yml \
            .github/workflows/develop-next-wire-knowledge-consumers.yml
          git commit -m "ci: remove consumed develop_next migration helpers"
          git fetch origin develop_next
          git merge --no-edit origin/develop_next
          git push origin HEAD:develop_next
