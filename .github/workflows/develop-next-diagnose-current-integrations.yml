name: Diagnose current develop_next integrations

on:
  pull_request:
    branches:
      - feature/physical-addon-packages
    paths:
      - .github/workflows/develop-next-diagnose-current-integrations.yml
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Exact Knowledge V2 compiler errors
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          gh run view 29350915943 --log-failed \
            | grep -E 'error\[E[0-9]+\]|error: could not compile|cannot find|no method named|mismatched types|unresolved import|the trait bound' \
            | tail -n 120

      - name: Trusted editor missing test paths
        shell: bash
        run: |
          test ! -e tests/app/unit/addons/editorFeatureAddons.spec.js
          test ! -e tests/app/unit/specs/main/elephantnote/editorAndAddonRegression.spec.js
          echo 'Trusted workflow references two absent legacy test files; V2 must use the existing Rust runtime contract test.'
