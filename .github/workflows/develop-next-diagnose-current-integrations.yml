name: Diagnose current develop_next integrations

on:
  pull_request:
    branches:
      - feature/physical-addon-packages
    paths:
      - .github/workflows/develop-next-diagnose-current-integrations.yml
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Knowledge V2 compiler or test failure
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          gh run view 29350915943 --log-failed \
            | grep -E -C 12 'error\[|error:|mismatched types|cannot find|no method named|FAILED|panicked at|test result:|Process completed' \
            | tail -n 500

      - name: Trusted editor failed-suite summary
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          gh run view 29350515884 --log-failed \
            | sed -n '/Failed Suites/,$p' \
            | head -n 160
