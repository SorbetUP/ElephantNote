name: Diagnose final develop_next failures

on:
  pull_request:
    branches:
      - feature/physical-addon-packages
    paths:
      - .github/workflows/develop-next-diagnose-latest.yml
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Neutral bridge failure
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh run view 29359837657 --log-failed \
            | grep -E -C 16 'Could not resolve|Cannot find|Error:|error:|failed|FAIL|Process completed' \
            | tail -n 220

      - name: Mobile foundations v2 failure
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh run view 29359837744 --log-failed \
            | grep -E -C 16 'error\[E[0-9]+\]|error:|FAIL|AssertionError|expected|received|Cannot find|not found|Process completed' \
            | tail -n 260

      - name: Unit test failure
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh run view 29359837441 --log-failed \
            | grep -E -C 14 'FAIL|AssertionError|expected|received|Cannot find|not found|Process completed' \
            | tail -n 300

      - name: E2E failure
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh run view 29359837312 --log-failed \
            | grep -E -C 14 'FAIL|Error:|error:|Timeout|expected|received|Process completed' \
            | tail -n 240
