name: Diagnose latest develop_next failures

on:
  pull_request:
    branches:
      - feature/physical-addon-packages
    paths:
      - .github/workflows/develop-next-diagnose-latest.yml
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Mobile validation exact errors
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh run view 29356999068 --log-failed \
            | grep -E -C 14 'error\[E[0-9]+\]|error:|FAILED|panicked at|test result:|AssertionError|expected|received|Process completed' \
            | tail -n 360

      - name: Unit test exact errors
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh run view 29356997153 --log-failed \
            | grep -E -C 12 'FAIL|Error:|AssertionError|expected|received|Cannot find|not found|Process completed' \
            | tail -n 360
