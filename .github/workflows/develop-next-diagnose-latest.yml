name: Diagnose latest develop_next failures

on:
  pull_request:
    branches:
      - feature/physical-addon-packages
    paths:
      - .github/workflows/develop-next-diagnose-latest.yml
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  mobile-shell:
    runs-on: ubuntu-latest
    steps:
      - name: Mobile shell exact failure
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh run view 29359041311 --log-failed \
            | grep -E -C 18 'FAIL|Error:|AssertionError|expected|received|Cannot find|not found|Process completed|build failed' \
            | tail -n 300

  neutral-bridge:
    runs-on: ubuntu-latest
    steps:
      - name: Neutral bridge exact failure
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh run view 29359040755 --log-failed \
            | grep -E -C 18 'FAIL|Error:|AssertionError|expected|received|Cannot find|not found|Process completed|build failed' \
            | tail -n 300
