name: Diagnose latest develop_next failures

on:
  pull_request:
    branches:
      - feature/physical-addon-packages
    paths:
      - .github/workflows/develop-next-diagnose-latest.yml
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Mobile foundation failure
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh run view 29352409899 --log-failed \
            | grep -E -C 20 'ERR_PNPM|ERROR|Error:|error:|failed|Failure|Process completed|Cannot|not found|ENOENT|lockfile|workspace' \
            | tail -n 500

      - name: Knowledge addon v2 failure
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh run view 29352409342 --log-failed \
            | grep -E -C 20 'FAIL|Error:|error:|failed|Process completed|addon-catalog|Cannot|not found|expected|received' \
            | tail -n 500

      - name: Main test failure
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh run view 29352409914 --log-failed \
            | grep -E -C 15 'FAIL|Error:|error:|failed|Process completed|expected|received|Cannot|not found' \
            | tail -n 350
