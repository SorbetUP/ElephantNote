name: Dispatch develop_next Rust integration

on:
  pull_request:
    branches:
      - feature/physical-addon-packages
    paths:
      - .github/workflows/develop-next-dispatch-rust-integration.yml
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch directed Rust editor integration
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh workflow run develop-next-integrate-rust-editor.yml --ref develop_next
