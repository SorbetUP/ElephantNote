name: Finalize develop_next Rust editor import

on:
  pull_request:
    branches:
      - feature/physical-addon-packages
    paths:
      - .github/workflows/develop-next-finalize-rust-import.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop_next
          fetch-depth: 0

      - name: Remove generated artifacts and temporary integration workflows
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git rm -r --ignore-unmatch \
            Elephant/crates/muya-core/target \
            Elephant/crates/muya-wasm/target

          git rm --ignore-unmatch \
            .github/workflows/develop-next-dispatch-repair.yml \
            .github/workflows/develop-next-fix-rust-integration.yml \
            .github/workflows/develop-next-inspect-rust-integration.yml \
            .github/workflows/develop-next-integrate-rust-editor.yml \
            .github/workflows/develop-next-integrate-rust-editor-v2.yml \
            .github/workflows/develop-next-rust-failure-diagnostic.yml \
            .github/workflows/develop-next-finalize-rust-import.yml

          python3 - <<'PY'
          from pathlib import Path
          path = Path('.gitignore')
          text = path.read_text()
          line = 'Elephant/crates/**/target/'
          if line not in text.splitlines():
              text = text.rstrip() + '\n' + line + '\n'
          path.write_text(text)
          PY

          git add .gitignore
          git commit -m "chore(editor): remove Rust import build artifacts"
          git push origin HEAD:develop_next
