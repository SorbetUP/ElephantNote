name: Fix final Rust editor unit contracts

on:
  pull_request:
    branches:
      - feature/physical-addon-packages
    paths:
      - .github/workflows/develop-next-fix-final-unit-contracts.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: develop-next-final-unit-contracts
  cancel-in-progress: true

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop_next
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: ./.github/actions/setup

      - name: Update production-Rust contracts and logical copy serialization
        shell: bash
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          from pathlib import Path

          parity = Path('tests/app/unit/interfaceParityGenerated.spec.js')
          text = parity.read_text()
          text = text.replace(
              "it('runtime mode contract keeps Tauri in shadow by default', () => {\n    expect(readMuyaRuntimeMode({ __MARKTEXT_RUNTIME__: 'tauri' })).toBe('shadow')\n    expect(readMuyaRuntimeMode({ __MARKTEXT_RUNTIME__: 'electron' })).toBe('shadow')\n  })",
              "it('runtime mode contract keeps the Rust editor active by default', () => {\n    expect(readMuyaRuntimeMode({ __MARKTEXT_RUNTIME__: 'tauri' })).toBe('rust')\n    expect(readMuyaRuntimeMode({ __MARKTEXT_RUNTIME__: 'electron' })).toBe('rust')\n  })"
          )
          parity.write_text(text)

          global_bridge = Path('tests/app/unit/muyaGlobalRuntimeBridge.spec.js')
          text = global_bridge.read_text()
          text = text.replace("describe('global Muya runtime bridge'", "describe('global Rust editor compatibility bridge'")
          text = text.replace("it('installs the Muya runtime bridge during bootstrap globals'", "it('installs the Rust runtime bridge during bootstrap globals'")
          text = text.replace("expect(target.__ELEPHANT_MUYA_RUNTIME__.mode()).toBe('disabled')", "expect(target.__ELEPHANT_MUYA_RUNTIME__.mode()).toBe('rust')")
          global_bridge.write_text(text)

          client = Path('tests/elephant/unit/elephantnoteClient.spec.js')
          text = client.read_text()
          text = text.replace(
              "await expect(elephantnoteClient.notes.create('Inbox')).resolves.toEqual({ path: 'Note.md' })",
              "await expect(elephantnoteClient.notes.create('Inbox')).resolves.toEqual({ note: { path: 'Note.md' }, entries: [] })"
          )
          client.write_text(text)

          copy_cut = Path('Elephant/frontend/src/muya/lib/rust/inputController/copyCut.js')
          text = copy_cut.read_text()
          old = '''const clipboardSelection = (controller, selection) => {
            const domSelection = controller.getSelection()
            if (!domSelection?.rangeCount) return null
            const range = domSelection.getRangeAt(0)
            if (range.collapsed) return null
            const fragment = range.cloneContents()
            const ownerDocument = controller.renderer.root.ownerDocument
            const container = ownerDocument.createElement('div')
            container.appendChild(fragment)
            const html = container.innerHTML
            const plain = normalizedText(container.textContent)
            return {
              selection,
              markdown: normalizedText(htmlToMarkdown(ownerDocument, html) || plain),
              html,
              plain
            }
          }
          '''
          new = '''const wrapLogicalInlineMarkdown = (value, type) => {
            if (!value) return value
            switch (type) {
              case 'strong':
                return `**${value}**`
              case 'em':
                return `*${value}*`
              case 'del':
                return `~~${value}~~`
              case 'inline_code': {
                const delimiter = value.includes('`') ? '``' : '`'
                return `${delimiter}${value}${delimiter}`
              }
              default:
                return value
            }
          }

          const logicalMarkdownSelection = (controller, selection) => {
            const anchor = selection?.anchor
            const focus = selection?.focus
            if (!anchor || !focus || anchor.node !== focus.node) return ''
            const logical = controller.renderer?.logical
            const node = logical?.node?.(anchor.node)
            if (!node || node.kind?.layer !== 'text') return ''
            const start = Math.min(Number(anchor.offset) || 0, Number(focus.offset) || 0)
            const end = Math.max(Number(anchor.offset) || 0, Number(focus.offset) || 0)
            if (start === end) return ''
            let markdown = String(node.value || '').slice(start, end)
            let parent = logical.node(node.parent)
            while (parent && parent.kind?.layer === 'inline') {
              markdown = wrapLogicalInlineMarkdown(markdown, parent.kind?.value?.type)
              parent = logical.node(parent.parent)
            }
            return markdown
          }

          const clipboardSelection = (controller, selection) => {
            const domSelection = controller.getSelection()
            if (!domSelection?.rangeCount) return null
            const range = domSelection.getRangeAt(0)
            if (range.collapsed) return null
            const fragment = range.cloneContents()
            const ownerDocument = controller.renderer.root.ownerDocument
            const container = ownerDocument.createElement('div')
            container.appendChild(fragment)
            const html = container.innerHTML
            const plain = normalizedText(container.textContent)
            const logicalMarkdown = logicalMarkdownSelection(controller, selection)
            return {
              selection,
              markdown: normalizedText(logicalMarkdown || htmlToMarkdown(ownerDocument, html) || plain),
              html,
              plain
            }
          }
          '''
          if old not in text:
              raise SystemExit('Copy/cut clipboard selection block changed unexpectedly')
          copy_cut.write_text(text.replace(old, new, 1))
          PY

      - name: Install exact wasm-bindgen CLI
        shell: bash
        run: |
          VERSION=$(cargo metadata --manifest-path Elephant/crates/muya-wasm/Cargo.toml --format-version 1 \
            | python3 -c "import json,sys; data=json.load(sys.stdin); print(next(p['version'] for p in data['packages'] if p['name']=='wasm-bindgen'))")
          if ! wasm-bindgen --version 2>/dev/null | grep -q "${VERSION}$"; then
            cargo install wasm-bindgen-cli --version "$VERSION" --locked
          fi
          pnpm muya:wasm:build

      - name: Validate corrected contracts
        shell: bash
        run: |
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            --config vite.tauri.config.mjs \
            --root . \
            --environment jsdom \
            tests/app/unit/interfaceParityGenerated.spec.js \
            tests/app/unit/muyaGlobalRuntimeBridge.spec.js \
            tests/elephant/unit/elephantnoteClient.spec.js \
            tests/app/unit/specs/muya/rustCopyCutController.spec.js

      - name: Commit corrected contracts
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            Elephant/frontend/src/muya/lib/rust/inputController/copyCut.js \
            tests/app/unit/interfaceParityGenerated.spec.js \
            tests/app/unit/muyaGlobalRuntimeBridge.spec.js \
            tests/elephant/unit/elephantnoteClient.spec.js
          git commit -m "fix(editor): align tests and copy serialization with Rust production runtime"
          git fetch origin develop_next
          git merge --no-edit origin/develop_next
          git push origin HEAD:develop_next
