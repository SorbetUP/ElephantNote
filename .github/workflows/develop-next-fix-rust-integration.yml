name: Repair develop_next Rust integration workflow

on:
  pull_request:
    branches:
      - feature/physical-addon-packages
    paths:
      - .github/workflows/develop-next-fix-rust-integration.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop_next
          fetch-depth: 0

      - name: Make integration formatting deterministic and idempotent
        shell: bash
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/develop-next-integrate-rust-editor.yml')
          text = path.read_text()
          old = '          cargo fmt --manifest-path Elephant/crates/muya-core/Cargo.toml --check\n'
          new = '          cargo fmt --manifest-path Elephant/crates/muya-core/Cargo.toml\n'
          if old not in text:
              raise SystemExit('Expected cargo fmt --check command was not found')
          text = text.replace(old, new, 1)

          merge = '          git merge -s ours --no-commit --no-ff "$SOURCE"\n'
          guard = '''          if git merge-base --is-ancestor "$SOURCE" HEAD; then
            echo "Rust editor source is already integrated into develop_next."
            exit 0
          fi

'''
          if guard not in text:
              text = text.replace(merge, guard + merge, 1)
          path.write_text(text)
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/develop-next-integrate-rust-editor.yml
          git commit -m "ci(develop_next): format imported Rust editor before validation"
          git push origin HEAD:develop_next
