name: Integrate mobile foundations into develop_next v2

on:
  pull_request:
    branches:
      - feature/physical-addon-packages
    paths:
      - .github/workflows/develop-next-integrate-mobile-foundations-v2.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: develop-next-mobile-foundations-v2
  cancel-in-progress: true

jobs:
  integrate:
    runs-on: ubuntu-latest
    timeout-minutes: 100
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop_next
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Reuse directed mobile import
        shell: bash
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          from pathlib import Path
          workflow = Path('.github/workflows/develop-next-integrate-mobile-foundations.yml').read_text()
          start = workflow.index('      - name: Import only the mobile-owned foundations')
          run = workflow.index('        run: |\n', start) + len('        run: |\n')
          end = workflow.index('\n      - name: Update the package lock without importing legacy mobile dependencies', run)
          lines = workflow[run:end].splitlines()
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines) + '\n'
          Path('/tmp/mobile-foundations-import.sh').write_text(script)
          PY
          bash /tmp/mobile-foundations-import.sh

          git reset
          git add \
            Elephant/backend/tauri-plugin-elephant-android-vault \
            Elephant/backend/tauri/src/android_vault_commands.rs \
            Elephant/backend/tauri/Cargo.toml \
            Elephant/backend/tauri/src/lib_min.rs \
            Elephant/backend/tauri/capabilities/default.json \
            Elephant/backend/tauri/tauri.android.conf.json \
            Elephant/frontend/src/renderer/src/main.js \
            Elephant/frontend/src/renderer/src/mobile-native-ux.css \
            Elephant/frontend/src/renderer/src/platform/mobileEditorRuntime.js \
            Elephant/frontend/src/renderer/src/platform/mobileInteractionRuntime.js \
            Elephant/frontend/src/renderer/src/platform/mobileVaultBridge.js \
            Elephant/frontend/src/renderer/src/platform/tauriFileUtilsPathGuards.js \
            tests/app/unit/specs/main/elephantnote/developNextMobileBoundary.spec.js

      - name: Update dependency locks
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@10.33.4 --activate
          pnpm install --lockfile-only
          cargo update --manifest-path Elephant/backend/tauri/Cargo.toml
          git add pnpm-lock.yaml Elephant/backend/tauri/Cargo.lock

      - uses: ./.github/actions/setup

      - name: Install Tauri Linux system libraries
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Validate Android native and addon boundaries
        shell: bash
        run: |
          set -euxo pipefail
          cargo test --manifest-path Elephant/backend/tauri-plugin-elephant-android-vault/Cargo.toml
          cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --all-targets
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            tests/app/unit/specs/main/elephantnote/developNextMobileBoundary.spec.js \
            tests/app/unit/specs/main/elephantnote/developNextMobileExperience.spec.js \
            tests/app/unit/elephantnote/domainClients.spec.js \
            tests/elephant/unit/noteEditorHostImageLinks.spec.js

      - name: Install exact wasm-bindgen CLI
        shell: bash
        run: |
          VERSION=$(cargo metadata --manifest-path Elephant/crates/muya-wasm/Cargo.toml --format-version 1 \
            | python3 -c "import json,sys; data=json.load(sys.stdin); print(next(p['version'] for p in data['packages'] if p['name']=='wasm-bindgen'))")
          if ! wasm-bindgen --version 2>/dev/null | grep -q "${VERSION}$"; then
            cargo install wasm-bindgen-cli --version "$VERSION" --locked
          fi

      - name: Build mobile-compatible Rust editor application
        run: pnpm tauri:web:build

      - name: Commit directed mobile foundations
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "feat(mobile): integrate Android vault and native UX foundations"
          git reset --hard HEAD
          git fetch origin develop_next
          git merge --no-edit origin/develop_next
          git push origin HEAD:develop_next
