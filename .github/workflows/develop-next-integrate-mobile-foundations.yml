name: Integrate mobile foundations into develop_next

on:
  pull_request:
    branches:
      - feature/physical-addon-packages
    paths:
      - .github/workflows/develop-next-integrate-mobile-foundations.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: develop-next-mobile-foundations
  cancel-in-progress: true

jobs:
  integrate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop_next
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Import only the mobile-owned foundations
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin fix/android-foundations-rework
          SOURCE=origin/fix/android-foundations-rework
          git merge -s ours --no-commit --no-ff "$SOURCE"

          git restore --source="$SOURCE" --staged --worktree -- \
            Elephant/backend/tauri-plugin-elephant-android-vault \
            Elephant/backend/tauri/src/android_vault_commands.rs \
            Elephant/backend/tauri/tauri.android.conf.json \
            Elephant/frontend/src/renderer/src/mobile-native-ux.css \
            Elephant/frontend/src/renderer/src/platform/mobileEditorRuntime.js \
            Elephant/frontend/src/renderer/src/platform/mobileInteractionRuntime.js \
            Elephant/frontend/src/renderer/src/platform/mobileVaultBridge.js \
            Elephant/frontend/src/renderer/src/platform/tauriFileUtilsPathGuards.js \
            tests/app/unit/specs/main/elephantnote/androidFollowupRegression.spec.js \
            tests/app/unit/specs/main/elephantnote/androidFoundationsRegression.spec.js \
            tests/app/unit/specs/main/elephantnote/androidPrivateVaultPath.spec.js \
            tests/app/unit/specs/main/elephantnote/mobileAndroidRelease.spec.js \
            tests/app/unit/specs/main/elephantnote/mobileInteractionRegression.spec.js \
            tests/elephant/unit/noteEditorHostImageLinks.spec.js

          python3 - <<'PY'
          from pathlib import Path
          import json

          cargo = Path('Elephant/backend/tauri/Cargo.toml')
          text = cargo.read_text()
          dependency = 'tauri-plugin-elephant-android-vault = { path = "../tauri-plugin-elephant-android-vault" }'
          if dependency not in text:
              anchor = 'tauri-plugin-dialog = "2"\n'
              if anchor not in text:
                  raise SystemExit('Tauri dialog dependency anchor is missing')
              text = text.replace(anchor, anchor + dependency + '\n', 1)
          cargo.write_text(text)

          lib = Path('Elephant/backend/tauri/src/lib_min.rs')
          text = lib.read_text()
          if 'mod android_vault_commands;' not in text:
              text = text.replace('mod debug_commands;\n', 'mod debug_commands;\nmod android_vault_commands;\n', 1)
          plugin_anchor = '    .plugin(tauri_plugin_notification::init());'
          plugin_value = '    .plugin(tauri_plugin_notification::init())\n    .plugin(tauri_plugin_elephant_android_vault::init());'
          if 'tauri_plugin_elephant_android_vault::init()' not in text:
              if plugin_anchor not in text:
                  raise SystemExit('Tauri notification plugin anchor is missing')
              text = text.replace(plugin_anchor, plugin_value, 1)
          command_anchor = '      tauri_platform_info,\n'
          commands = '''      tauri_platform_info,
            android_vault_commands::tauri_android_vault_pick,
            android_vault_commands::tauri_android_vault_restore,
            android_vault_commands::tauri_android_vault_sync,
            android_vault_commands::tauri_android_vault_clear,
            android_vault_commands::tauri_android_share_text,
          '''
          if 'android_vault_commands::tauri_android_vault_pick' not in text:
              if command_anchor not in text:
                  raise SystemExit('Tauri platform command anchor is missing')
              text = text.replace(command_anchor, commands, 1)
          lib.write_text(text)

          capabilities = Path('Elephant/backend/tauri/capabilities/default.json')
          value = json.loads(capabilities.read_text())
          permissions = value['permissions']
          scope = next(item for item in permissions if isinstance(item, dict) and item.get('identifier') == 'fs:scope')
          paths = [item['path'] for item in scope['allow']]
          required = [
              '$APPDATA/**/*',
              '$APPLOCALDATA/**/*',
              '$APPCONFIG/**/*',
              '/data/user/0/com.elephantnote.app/**/*',
              '/data/data/com.elephantnote.app/**/*'
          ]
          existing = set(paths)
          scope['allow'] = [{'path': path} for path in required if path not in existing] + scope['allow']
          capabilities.write_text(json.dumps(value, indent=2, ensure_ascii=False) + '\n')

          main = Path('Elephant/frontend/src/renderer/src/main.js')
          text = main.read_text()
          imports = """import './mobile-native-ux.css'
          import './platform/mobileVaultBridge'
          import './platform/mobileEditorRuntime'
          import './platform/mobileInteractionRuntime'
          """
          if "import './platform/mobileVaultBridge'" not in text:
              anchor = "import './platform/bootstrapGlobals'\n"
              if anchor not in text:
                  raise SystemExit('Renderer bootstrap import anchor is missing')
              text = text.replace(anchor, anchor + imports, 1)
          main.write_text(text)

          mobile_editor = Path('Elephant/frontend/src/renderer/src/platform/mobileEditorRuntime.js')
          text = mobile_editor.read_text()
          old = """  const title = target.document.querySelector('.en-note-title-input')?.value?.trim() || 'Note'
            const body = target.document.querySelector('.en-main.has-editor-open .ag-editor')?.innerText?.trim() || ''
            const text = body || title
          """
          new = """  const title = target.document.querySelector('.en-note-title-input')?.value?.trim() || 'Note'
            const runtime = target.__ELEPHANT_ADDON_HOST__?.get?.('editor.runtime')
            const body = String(runtime?.getMarkdown?.() || '').trim()
            const text = body || title
          """
          if old not in text:
              raise SystemExit('Mobile share implementation changed unexpectedly')
          text = text.replace(old, new, 1)
          if '.ag-editor' in text or 'muya' in text.lower():
              raise SystemExit('Mobile editor still depends on the former editor runtime')
          mobile_editor.write_text(text)

          interaction = Path('Elephant/frontend/src/renderer/src/platform/mobileInteractionRuntime.js')
          text = interaction.read_text()
          text = text.replace('''      } else {
                const settingsClose''', '''      } else {
                const settingsClose''')
          text = text.replace('''        }
              }
            } catch''', '''        }
              }
            } catch''')
          interaction.write_text(text)

          contract = Path('tests/app/unit/specs/main/elephantnote/developNextMobileBoundary.spec.js')
          contract.write_text("""import fs from 'node:fs'
          import path from 'node:path'
          import { describe, expect, it } from 'vitest'

          const root = process.cwd()
          const read = (file) => fs.readFileSync(path.join(root, file), 'utf8')

          describe('develop_next mobile boundary', () => {
            it('owns Android document-tree access without restoring optional product backends', () => {
              const cargo = read('Elephant/backend/tauri/Cargo.toml')
              const lib = read('Elephant/backend/tauri/src/lib_min.rs')
              expect(cargo).toContain('tauri-plugin-elephant-android-vault')
              expect(cargo).not.toContain('iroh =')
              expect(cargo).not.toContain('iroh-mdns-address-lookup')
              expect(lib).toContain('android_vault_commands::tauri_android_vault_pick')
              expect(lib).not.toContain('IrohSyncState')
              for (const absent of ['knowledge.rs', 'knowledge_wikis.rs', 'ocr.rs', 'local_llama_runtime.rs']) {
                expect(fs.existsSync(path.join(root, 'Elephant/backend/tauri/src', absent))).toBe(false)
              }
            })

            it('uses the Rust editor resource for mobile note sharing', () => {
              const runtime = read('Elephant/frontend/src/renderer/src/platform/mobileEditorRuntime.js')
              expect(runtime).toContain("get?.('editor.runtime')")
              expect(runtime).not.toContain('.ag-editor')
              expect(runtime.toLowerCase()).not.toContain('muya')
            })
          })
          """)
          PY

          cargo fmt --manifest-path Elephant/backend/tauri-plugin-elephant-android-vault/Cargo.toml
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml
          git add -A

      - name: Update the package lock without importing legacy mobile dependencies
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@10.33.4 --activate
          pnpm install --lockfile-only

      - uses: ./.github/actions/setup

      - name: Validate Android Vault, mobile runtime and addon boundary
        shell: bash
        run: |
          set -euxo pipefail
          cargo test --manifest-path Elephant/backend/tauri-plugin-elephant-android-vault/Cargo.toml
          cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --all-targets
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            tests/app/unit/specs/main/elephantnote/developNextMobileBoundary.spec.js \
            tests/app/unit/specs/main/elephantnote/androidFollowupRegression.spec.js \
            tests/app/unit/specs/main/elephantnote/androidFoundationsRegression.spec.js \
            tests/app/unit/specs/main/elephantnote/androidPrivateVaultPath.spec.js \
            tests/app/unit/specs/main/elephantnote/mobileAndroidRelease.spec.js \
            tests/app/unit/specs/main/elephantnote/mobileInteractionRegression.spec.js \
            tests/elephant/unit/noteEditorHostImageLinks.spec.js

      - name: Install exact wasm-bindgen CLI
        shell: bash
        run: |
          VERSION=$(cargo metadata --manifest-path Elephant/crates/muya-wasm/Cargo.toml --format-version 1 \
            | python3 -c "import json,sys; data=json.load(sys.stdin); print(next(p['version'] for p in data['packages'] if p['name']=='wasm-bindgen'))")
          if ! wasm-bindgen --version 2>/dev/null | grep -q "${VERSION}$"; then
            cargo install wasm-bindgen-cli --version "$VERSION" --locked
          fi

      - name: Build standard renderer with mobile foundations and Rust editor
        run: pnpm tauri:web:build

      - name: Commit directed mobile integration
        shell: bash
        run: |
          set -euxo pipefail
          git add -A
          git commit -m "feat(mobile): integrate Android foundations into develop_next"
          git fetch origin develop_next
          git merge --no-edit origin/develop_next
          git push origin HEAD:develop_next
