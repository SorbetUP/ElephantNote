name: Integrate addon-aware mobile shell v2

on:
  pull_request:
    branches:
      - feature/physical-addon-packages
    paths:
      - .github/workflows/develop-next-integrate-mobile-ui-v2.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: develop-next-mobile-ui-v2
  cancel-in-progress: true

jobs:
  integrate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop_next
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: ./.github/actions/setup

      - name: Reuse validated addon-aware shell patch
        shell: bash
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          from pathlib import Path
          workflow = Path('.github/workflows/develop-next-integrate-mobile-ui.yml').read_text()
          start = workflow.index('      - name: Add touch-first shell without replacing addon zones')
          run = workflow.index('        run: |\n', start) + len('        run: |\n')
          end = workflow.index('\n      - name: Validate mobile shell contracts', run)
          lines = workflow[run:end].splitlines()
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines) + '\n'
          Path('/tmp/mobile-shell-patch.sh').write_text(script)
          PY
          bash /tmp/mobile-shell-patch.sh

      - name: Validate mobile shell contracts
        shell: bash
        run: |
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            tests/app/unit/specs/main/elephantnote/developNextMobileExperience.spec.js \
            tests/app/unit/elephantnote/domainClients.spec.js

      - name: Install exact wasm-bindgen CLI
        shell: bash
        run: |
          VERSION=$(cargo metadata --manifest-path Elephant/crates/muya-wasm/Cargo.toml --format-version 1 \
            | python3 -c "import json,sys; data=json.load(sys.stdin); print(next(p['version'] for p in data['packages'] if p['name']=='wasm-bindgen'))")
          if ! wasm-bindgen --version 2>/dev/null | grep -q "${VERSION}$"; then
            cargo install wasm-bindgen-cli --version "$VERSION" --locked
          fi

      - name: Build addon-aware mobile shell
        run: pnpm tauri:web:build

      - name: Commit mobile shell integration
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            Elephant/frontend/app/components/shell/AppShell.vue \
            Elephant/frontend/app/components/shell/EmptyVaultPicker.vue \
            tests/app/unit/specs/main/elephantnote/developNextMobileExperience.spec.js
          git commit -m "feat(mobile): integrate addon-aware touch shell"
          git fetch origin develop_next
          git merge --no-edit origin/develop_next
          git push origin HEAD:develop_next
