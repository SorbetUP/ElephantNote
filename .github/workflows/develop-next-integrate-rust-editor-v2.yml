name: Integrate Rust editor into develop_next v2

on:
  pull_request:
    branches:
      - feature/physical-addon-packages
    paths:
      - .github/workflows/develop-next-integrate-rust-editor-v2.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: develop-next-rust-editor-v2
  cancel-in-progress: true

jobs:
  integrate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout develop_next
        uses: actions/checkout@v4
        with:
          ref: develop_next
          fetch-depth: 0

      - name: Setup Rust and WASM target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Reuse the validated directed import step
        shell: bash
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/develop-next-integrate-rust-editor.yml').read_text()
          start = workflow.index('      - name: Import Rust editor history and selected implementation')
          run = workflow.index('        run: |\n', start) + len('        run: |\n')
          end = workflow.index('\n      - name: Install JavaScript dependencies', run)
          lines = workflow[run:end].splitlines()
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines) + '\n'
          Path('/tmp/import-rust-editor.sh').write_text(script)
          PY
          bash /tmp/import-rust-editor.sh

      - name: Preserve rejected front matter as literal Markdown blocks
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('Elephant/crates/muya-core/src/parser/mod.rs')
          text = path.read_text()

          setup = '''pub fn parse_markdown(markdown: &str) -> Document {
            let lines = source_lines(markdown);
            let mut document = Document::new();
          '''
          replacement = '''pub fn parse_markdown(markdown: &str) -> Document {
            let lines = source_lines(markdown);
            let rejected_front_matter = rejected_front_matter_style(&lines);
            let mut document = Document::new();
          '''
          if setup not in text:
              raise SystemExit('parse_markdown setup changed unexpectedly')
          text = text.replace(setup, replacement, 1)

          setext_start = text.index('    if let Some(level) = lines\n', text.index('  while index < lines.len()'))
          setext_end = text.index('\n\n    if table::looks_like_row', setext_start)
          new_setext = '''    if let Some(level) = lines
            .get(index + 1)
            .and_then(|underline| heading::parse_setext_underline(&underline.text))
          {
            let underline = &lines[index + 1];
            let reserved_front_matter_delimiter = rejected_front_matter
              .is_some_and(|style| front_matter::is_closing(&underline.text, style));
            if !reserved_front_matter_delimiter {
              append_text_block(
                &mut document,
                BlockKind::Heading { level },
                line.text.trim(),
                SourceRange::new(line.start, underline.end),
              );
              index += 2;
              continue;
            }
          }'''
          text = text[:setext_start] + new_setext + text[setext_end:]

          helper_anchor = 'fn try_parse_front_matter(document: &mut Document, lines: &[SourceLine]) -> Option<usize> {'
          helper = '''fn rejected_front_matter_style(lines: &[SourceLine]) -> Option<FrontMatterStyle> {
            let style = front_matter::parse_opening(&lines.first()?.text)?;
            let closing_index = lines
              .iter()
              .enumerate()
              .skip(1)
              .find_map(|(index, line)| front_matter::is_closing(&line.text, style).then_some(index));
            match closing_index {
              None => Some(style),
              Some(index)
                if index == 1
                  || lines
                    .get(index + 1)
                    .is_some_and(|line| !line.text.is_empty()) =>
              {
                Some(style)
              }
              Some(_) => None,
            }
          }

          '''
          if helper_anchor not in text:
              raise SystemExit('Front matter helper anchor changed unexpectedly')
          text = text.replace(helper_anchor, helper + helper_anchor, 1)
          path.write_text(text)
          PY

      - name: Remove direct HTML mutation from clipboard conversion
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('Elephant/frontend/src/muya/lib/rust/inputController/clipboardBlocks.js')
          text = path.read_text()
          old = '''  const template = ownerDocument.createElement('template')
            template.innerHTML = html
            return renderBlocks(template.content)
          '''
          new = '''  const range = ownerDocument.createRange()
            const fragment = range.createContextualFragment(html)
            return renderBlocks(fragment)
          '''
          if old not in text:
              raise SystemExit('clipboard HTML conversion block changed unexpectedly')
          path.write_text(text.replace(old, new, 1))
          PY

      - name: Install JavaScript dependencies
        uses: ./.github/actions/setup

      - name: Install exact wasm-bindgen CLI
        shell: bash
        run: |
          set -euxo pipefail
          VERSION=$(cargo metadata --manifest-path Elephant/crates/muya-wasm/Cargo.toml --format-version 1 \
            | python3 -c "import json,sys; data=json.load(sys.stdin); print(next(p['version'] for p in data['packages'] if p['name']=='wasm-bindgen'))")
          if ! wasm-bindgen --version 2>/dev/null | grep -q "${VERSION}$"; then
            cargo install wasm-bindgen-cli --version "$VERSION" --locked
          fi

      - name: Format imported Rust source
        run: cargo fmt --manifest-path Elephant/crates/muya-core/Cargo.toml

      - name: Test Rust editor core
        run: cargo test --manifest-path Elephant/crates/muya-core/Cargo.toml

      - name: Check WASM adapter
        run: cargo check --manifest-path Elephant/crates/muya-wasm/Cargo.toml --target wasm32-unknown-unknown

      - name: Build production WASM package
        run: pnpm muya:wasm:build

      - name: Test renderer bridge and no-fallback ownership
        shell: bash
        run: |
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            --config vite.tauri.config.mjs \
            --root . \
            --environment jsdom \
            tests/app/unit/specs/muya/rustProductionOwnership.spec.js \
            tests/app/unit/specs/muya/rustBridge.spec.js \
            tests/app/unit/specs/muya/rustRuntime.spec.js \
            tests/app/unit/specs/muya/rustVueRuntime.spec.js \
            tests/app/unit/specs/muya/rustNoFallbackOwnership.spec.js

      - name: Build standard Tauri renderer with Rust editor
        run: pnpm tauri:web:build

      - name: Commit directed integration
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(editor): integrate Rust editor into develop_next"
          git pull --rebase origin develop_next
          git push origin HEAD:develop_next
