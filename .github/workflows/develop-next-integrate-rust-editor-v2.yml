name: Integrate Rust editor into develop_next v2

on:
  pull_request:
    branches:
      - feature/physical-addon-packages
    paths:
      - .github/workflows/develop-next-integrate-rust-editor-v2.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: develop-next-rust-editor-v2
  cancel-in-progress: false

jobs:
  integrate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout develop_next
        uses: actions/checkout@v4
        with:
          ref: develop_next
          fetch-depth: 0

      - name: Setup Rust and WASM target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Reuse the validated directed import step
        shell: bash
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/develop-next-integrate-rust-editor.yml').read_text()
          start = workflow.index('      - name: Import Rust editor history and selected implementation')
          run = workflow.index('        run: |\n', start) + len('        run: |\n')
          end = workflow.index('\n      - name: Install JavaScript dependencies', run)
          lines = workflow[run:end].splitlines()
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines) + '\n'
          Path('/tmp/import-rust-editor.sh').write_text(script)
          PY
          bash /tmp/import-rust-editor.sh

      - name: Install JavaScript dependencies
        uses: ./.github/actions/setup

      - name: Install exact wasm-bindgen CLI
        shell: bash
        run: |
          set -euxo pipefail
          VERSION=$(cargo metadata --manifest-path Elephant/crates/muya-wasm/Cargo.toml --format-version 1 \
            | python3 -c "import json,sys; data=json.load(sys.stdin); print(next(p['version'] for p in data['packages'] if p['name']=='wasm-bindgen'))")
          if ! wasm-bindgen --version 2>/dev/null | grep -q "${VERSION}$"; then
            cargo install wasm-bindgen-cli --version "$VERSION" --locked
          fi

      - name: Format imported Rust source
        run: cargo fmt --manifest-path Elephant/crates/muya-core/Cargo.toml

      - name: Test Rust editor core
        run: cargo test --manifest-path Elephant/crates/muya-core/Cargo.toml

      - name: Check WASM adapter
        run: cargo check --manifest-path Elephant/crates/muya-wasm/Cargo.toml --target wasm32-unknown-unknown

      - name: Build production WASM package
        run: pnpm muya:wasm:build

      - name: Test renderer bridge and no-fallback ownership
        shell: bash
        run: |
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            tests/app/unit/specs/muya/rustProductionOwnership.spec.js \
            tests/app/unit/specs/muya/rustBridge.spec.js \
            tests/app/unit/specs/muya/rustRuntime.spec.js \
            tests/app/unit/specs/muya/rustVueRuntime.spec.js \
            tests/app/unit/specs/muya/rustNoFallbackOwnership.spec.js

      - name: Build standard Tauri renderer with Rust editor
        run: pnpm tauri:web:build

      - name: Commit directed integration
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(editor): integrate Rust editor into develop_next"
          git pull --rebase origin develop_next
          git push origin HEAD:develop_next
