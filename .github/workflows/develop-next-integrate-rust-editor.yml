name: Integrate Rust editor into develop_next

on:
  push:
    branches:
      - develop_next
    paths:
      - .github/workflows/develop-next-integrate-rust-editor.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: develop-next-integrate-rust-editor
  cancel-in-progress: false

jobs:
  integrate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout develop_next
        uses: actions/checkout@v4
        with:
          ref: develop_next
          fetch-depth: 0

      - name: Setup Rust and WASM target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Import Rust editor history and selected implementation
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin refactor/muya-rust-file-by-file
          SOURCE=origin/refactor/muya-rust-file-by-file

          # Keep the source branch as a real second parent while resolving the tree
          # explicitly in favour of the physical-addon architecture.
          git merge -s ours --no-commit --no-ff "$SOURCE"

          restore_path() {
            git restore --source="$SOURCE" --staged --worktree -- "$@"
          }

          restore_path \
            Elephant/crates/muya-core \
            Elephant/crates/muya-wasm \
            Elephant/frontend/src/muya/lib/rust \
            Elephant/frontend/src/muya/lib/config/options.js \
            Elephant/frontend/src/muya/lib/contentState/paragraphQuote.js \
            Elephant/frontend/src/muya/lib/core/lifecycle.js \
            Elephant/frontend/src/muya/lib/core/markdown.js \
            Elephant/frontend/src/muya/lib/core/setup.js \
            Elephant/frontend/src/renderer/src/components/editorWithTabs/editorImageAction.js \
            Elephant/frontend/src/renderer/src/components/editorWithTabs/index.vue \
            Elephant/frontend/src/renderer/src/components/editorWithTabs/runtimeEditor.vue \
            Elephant/frontend/src/renderer/src/components/editorWithTabs/runtimeEditorCommands.js \
            Elephant/frontend/src/renderer/src/components/editorWithTabs/runtimeEditorImages.js \
            Elephant/frontend/src/renderer/src/components/editorWithTabs/runtimeEditorState.js \
            Elephant/frontend/src/renderer/src/components/editorWithTabs/runtimeImageToolbar.vue \
            Elephant/frontend/src/renderer/src/components/editorWithTabs/runtimeImageToolbarState.js \
            Elephant/frontend/src/renderer/src/components/editorWithTabs/runtimeTableDialog.vue \
            Elephant/frontend/src/renderer/src/muya/RustMuyaRuntimeEditor.vue \
            Elephant/frontend/src/renderer/src/muya/globalRuntimeBridge.js \
            Elephant/frontend/src/renderer/src/muya/index.js \
            Elephant/frontend/src/renderer/src/muya/runtimeFlags.js \
            build/scripts/build-muya-wasm.mjs \
            docs/muya-rust-migration.md \
            .github/workflows/muya-js-modularity.yml \
            .github/workflows/muya-rust-parity.yml \
            .github/workflows/muya-wasm.yml

          mapfile -t RUST_TESTS < <(
            git ls-tree -r --name-only "$SOURCE" tests/app/unit/specs/muya \
              | grep -E '/rust[^/]*\.(spec\.js|js)$' \
              | sort
          )
          if (( ${#RUST_TESTS[@]} == 0 )); then
            echo "No Rust editor tests found on source branch" >&2
            exit 1
          fi
          restore_path "${RUST_TESTS[@]}"

          python3 - <<'PY'
          from pathlib import Path
          import json

          root = Path('.')

          package_path = root / 'package.json'
          package = json.loads(package_path.read_text())
          scripts = package.setdefault('scripts', {})
          scripts['muya:wasm:build'] = 'node build/scripts/build-muya-wasm.mjs'
          scripts['tauri:web:dev'] = 'pnpm muya:wasm:build && NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vite --config vite.tauri.config.mjs --host 127.0.0.1 --port 1420 --strictPort'
          scripts['tauri:web:build'] = 'pnpm muya:wasm:build && NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vite build --config vite.tauri.config.mjs && node build/scripts/report-renderer-bundle.mjs'
          scripts.pop('tauri:web:dev:rust-editor', None)
          scripts.pop('tauri:web:build:rust-editor', None)
          package_path.write_text(json.dumps(package, indent=2, ensure_ascii=False) + '\n')

          vite_path = root / 'vite.tauri.config.mjs'
          vite = vite_path.read_text()
          marker = "const excalidrawAssetFolders = ['excalidraw-assets', 'excalidraw-assets-dev']\n"
          addition = """const muyaWasmGenerated = resolve(\n  __dirname,\n  'Elephant/frontend/src/muya/lib/rust/generated/muya_wasm.js'\n)\nif (!existsSync(muyaWasmGenerated)) {\n  throw new Error('Muya Rust WASM bundle is missing. Run `pnpm muya:wasm:build`.')\n}\n"""
          if 'const muyaWasmGenerated' not in vite:
              if marker not in vite:
                  raise SystemExit('Unable to locate Vite asset marker')
              vite = vite.replace(marker, marker + addition)
          if '__ELEPHANT_MUYA_WASM_BUNDLED__' not in vite:
              vite = vite.replace(
                  "    'process.env.NODE_ENV': JSON.stringify(process.env.NODE_ENV || 'development'),\n",
                  "    'process.env.NODE_ENV': JSON.stringify(process.env.NODE_ENV || 'development'),\n    __ELEPHANT_MUYA_WASM_BUNDLED__: JSON.stringify(true),\n"
              )
          if "'muya-rust-wasm-bundle':" not in vite:
              vite = vite.replace(
                  '      ...npmPackageAliases,\n',
                  "      ...npmPackageAliases,\n      'muya-rust-wasm-bundle': muyaWasmGenerated,\n"
              )
          vite_path.write_text(vite)

          flags = root / 'Elephant/frontend/src/renderer/src/muya/runtimeFlags.js'
          flags.write_text("""export const MUYA_RUNTIME_FLAGS = Object.freeze({\n  rust: 'rust'\n})\n\nexport const defaultMuyaRuntimeMode = () => MUYA_RUNTIME_FLAGS.rust\n\nexport const readMuyaRuntimeMode = () => MUYA_RUNTIME_FLAGS.rust\n\nexport const isMuyaRuntimeEnabled = () => true\nexport const isMuyaRuntimeActive = () => true\nexport const isMuyaRustRuntime = () => true\n""")

          runtime = root / 'Elephant/frontend/src/renderer/src/components/editorWithTabs/runtimeEditor.vue'
          runtime.write_text("""<template>\n  <RustMuyaRuntimeEditor\n    v-if=\"!sourceCode\"\n    :model-value=\"toEditorMarkdown(markdown)\"\n    :factory=\"rustRuntimeFactory\"\n    :on-file-drop=\"imageHandlers.dropped\"\n    :on-uri-drop=\"imageHandlers.uriDropped\"\n    :on-image-click=\"imageToolbar.open\"\n    mode=\"rust\"\n    class=\"rust-editor-runtime\"\n    @ready=\"handleRustRuntimeReady\"\n    @update:model-value=\"handleRustMarkdownChange\"\n  />\n  <RuntimeTableDialog\n    v-model=\"tableDialogVisible\"\n    @confirm=\"handleCreateTable\"\n  />\n  <RuntimeImageToolbar\n    :image=\"imageToolbar.state.active\"\n    @apply=\"imageToolbar.apply\"\n    @choose-file=\"imageToolbar.chooseFile\"\n    @delete=\"imageToolbar.remove\"\n    @close=\"imageToolbar.close\"\n  />\n</template>\n\n<script setup>\nimport { computed, onBeforeUnmount, onMounted, ref } from 'vue'\nimport { storeToRefs } from 'pinia'\n\nimport bus from '@/bus'\nimport { useEditorStore } from '@/store/editor'\nimport { usePreferencesStore } from '@/store/preferences'\nimport { useProjectStore } from '@/store/project'\nimport { debouncedSendBufferedState } from '@/store/bufferedState'\nimport { RustMuyaRuntimeEditor } from '@/muya'\nimport RuntimeImageToolbar from './runtimeImageToolbar.vue'\nimport RuntimeTableDialog from './runtimeTableDialog.vue'\nimport { rustBusCommand } from './runtimeEditorCommands'\nimport { createRuntimeImageHandlers } from './runtimeEditorImages'\nimport { useRuntimeImageToolbar } from './runtimeImageToolbarState'\nimport { applyRustEditorMarkdown } from './runtimeEditorState'\n\nconst props = defineProps({\n  markdown: { type: String, required: true },\n  cursor: { type: Object, required: true },\n  sourceCode: { type: Boolean, required: true },\n  textDirection: { type: String, required: true },\n  platform: { type: String, required: true },\n  toEditorMarkdown: { type: Function, default: (markdown) => markdown },\n  fromEditorMarkdown: { type: Function, default: (markdown) => markdown },\n  rustRuntimeFactory: { type: Function, default: null }\n})\n\nconst editorStore = useEditorStore()\nconst preferencesStore = usePreferencesStore()\nconst projectStore = useProjectStore()\nconst { currentFile } = storeToRefs(editorStore)\nconst { projectTree } = storeToRefs(projectStore)\nconst sourceCode = computed(() => props.sourceCode)\nconst rustRuntime = ref(null)\nconst tableDialogVisible = ref(false)\n\nconst handleRustRuntimeReady = (runtime) => { rustRuntime.value = runtime }\n\nconst dispatchRustBusCommand = (event, payload) => {\n  if (props.sourceCode || !rustRuntime.value) return Promise.resolve(false)\n  const command = rustBusCommand(event, payload)\n  if (!command) return Promise.resolve(false)\n  const result = rustRuntime.value.bridge.dispatch(command)\n  result.catch((error) => console.error(`[Elephant Rust Editor] Failed to handle ${event}.`, error))\n  return result\n}\n\nconst imageHandlers = createRuntimeImageHandlers({\n  currentFile,\n  projectTree,\n  preferencesStore,\n  sourceCode,\n  editorStore,\n  dispatch: dispatchRustBusCommand\n})\nconst imageToolbar = useRuntimeImageToolbar(imageHandlers)\n\nconst handleParagraphCommand = (type) => {\n  if (type === 'table' && !props.sourceCode) {\n    tableDialogVisible.value = true\n    return\n  }\n  return dispatchRustBusCommand('paragraph', type)\n}\n\nconst handleCreateTable = (table) => dispatchRustBusCommand('createTable', table)\nconst busHandlers = Object.freeze({\n  undo: () => dispatchRustBusCommand('undo'),\n  redo: () => dispatchRustBusCommand('redo'),\n  format: (type) => dispatchRustBusCommand('format', type),\n  paragraph: handleParagraphCommand,\n  duplicate: () => dispatchRustBusCommand('duplicate'),\n  deleteParagraph: () => dispatchRustBusCommand('deleteParagraph'),\n  insertParagraph: () => dispatchRustBusCommand('insertParagraph'),\n  createParagraph: () => dispatchRustBusCommand('createParagraph'),\n  'insert-horizontal-rule': () => dispatchRustBusCommand('insert-horizontal-rule'),\n  'insert-image': imageHandlers.insert,\n  'image-uploaded': imageHandlers.uploaded\n})\n\nconst handleRustMarkdownChange = (editorMarkdown) => {\n  applyRustEditorMarkdown({\n    editorStore,\n    file: currentFile.value,\n    editorMarkdown,\n    fromEditorMarkdown: props.fromEditorMarkdown,\n    persist: debouncedSendBufferedState\n  })\n}\n\nonMounted(() => {\n  for (const [event, handler] of Object.entries(busHandlers)) bus.on(event, handler)\n})\n\nonBeforeUnmount(() => {\n  for (const [event, handler] of Object.entries(busHandlers)) bus.off(event, handler)\n  rustRuntime.value = null\n  tableDialogVisible.value = false\n  imageToolbar.close()\n})\n</script>\n\n<style scoped>\n.rust-editor-runtime {\n  height: 100%;\n  min-height: 0;\n  overflow: auto;\n  padding: 24px var(--en-note-editor-gutter-right, 24px) 80px\n    var(--en-note-editor-gutter-left, 32px);\n  background: var(--editorBgColor);\n}\n</style>\n""")

          gitignore = root / '.gitignore'
          ignored = 'Elephant/frontend/src/muya/lib/rust/generated/\n'
          current = gitignore.read_text() if gitignore.exists() else ''
          if ignored.strip() not in current:
              gitignore.write_text(current.rstrip() + '\n' + ignored)

          ownership = root / 'tests/app/unit/specs/muya/rustProductionOwnership.spec.js'
          ownership.parent.mkdir(parents=True, exist_ok=True)
          ownership.write_text("""import fs from 'node:fs'\nimport path from 'node:path'\nimport { describe, expect, it } from 'vitest'\n\nconst root = process.cwd()\nconst read = (file) => fs.readFileSync(path.join(root, file), 'utf8')\n\ndescribe('Rust editor production ownership', () => {\n  it('uses the Rust runtime at the real editor-with-tabs boundary', () => {\n    const tabs = read('Elephant/frontend/src/renderer/src/components/editorWithTabs/index.vue')\n    const runtime = read('Elephant/frontend/src/renderer/src/components/editorWithTabs/runtimeEditor.vue')\n    expect(tabs).toContain("import RuntimeEditor from './runtimeEditor.vue'")\n    expect(tabs).not.toContain("import Editor from './editor.vue'")\n    expect(runtime).toContain("import { RustMuyaRuntimeEditor } from '@/muya'")\n    expect(runtime).not.toContain("import Editor from './editor.vue'")\n    expect(runtime).not.toContain('<editor')\n  })\n\n  it('bundles the real WASM engine in standard builds without a disabled fallback', () => {\n    const vite = read('vite.tauri.config.mjs')\n    const packageJson = JSON.parse(read('package.json'))\n    expect(vite).toContain("'muya-rust-wasm-bundle': muyaWasmGenerated")\n    expect(vite).not.toContain('muyaWasmDisabled')\n    expect(packageJson.scripts['tauri:web:build']).toContain('pnpm muya:wasm:build')\n    expect(packageJson.scripts['tauri:web:dev']).toContain('pnpm muya:wasm:build')\n  })\n})\n""")
          PY

          git add -A

      - name: Install JavaScript dependencies
        uses: ./.github/actions/setup

      - name: Install exact wasm-bindgen CLI
        shell: bash
        run: |
          set -euxo pipefail
          VERSION=$(cargo metadata --manifest-path Elephant/crates/muya-wasm/Cargo.toml --format-version 1 \
            | python3 -c "import json,sys; data=json.load(sys.stdin); print(next(p['version'] for p in data['packages'] if p['name']=='wasm-bindgen'))")
          if ! wasm-bindgen --version 2>/dev/null | grep -q "${VERSION}$"; then
            cargo install wasm-bindgen-cli --version "$VERSION" --locked
          fi

      - name: Validate Rust editor core and production cutover
        shell: bash
        run: |
          set -euxo pipefail
          cargo fmt --manifest-path Elephant/crates/muya-core/Cargo.toml --check
          cargo test --manifest-path Elephant/crates/muya-core/Cargo.toml
          cargo check --manifest-path Elephant/crates/muya-wasm/Cargo.toml --target wasm32-unknown-unknown
          pnpm muya:wasm:build
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            tests/app/unit/specs/muya/rustProductionOwnership.spec.js \
            tests/app/unit/specs/muya/rustBridge.spec.js \
            tests/app/unit/specs/muya/rustRuntime.spec.js \
            tests/app/unit/specs/muya/rustVueRuntime.spec.js \
            tests/app/unit/specs/muya/rustNoFallbackOwnership.spec.js
          pnpm tauri:web:build

      - name: Commit and push directed integration
        shell: bash
        run: |
          set -euxo pipefail
          git add -A
          git commit -m "feat(editor): integrate Rust editor into develop_next"
          git push origin HEAD:develop_next
