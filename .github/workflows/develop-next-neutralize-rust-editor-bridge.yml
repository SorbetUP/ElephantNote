name: Neutralize Rust editor bridge namespace

on:
  pull_request:
    branches:
      - feature/physical-addon-packages
    paths:
      - .github/workflows/develop-next-neutralize-rust-editor-bridge.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: develop-next-neutralize-rust-editor-bridge
  cancel-in-progress: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop_next
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: ./.github/actions/setup

      - name: Move production Rust adapters out of the Muya package namespace
        shell: bash
        run: |
          set -euxo pipefail
          if grep -RIl --include='*.js' --include='*.mjs' --include='*.ts' --include='*.vue' \
            'muya/lib/rust' Elephant/frontend/app Elephant/frontend/src/renderer/src | grep -q .; then
            rm -rf Elephant/frontend/src/renderer/src/editor-rust
            cp -R Elephant/frontend/src/muya/lib/rust Elephant/frontend/src/renderer/src/editor-rust
          fi
          python3 - <<'PY'
          from pathlib import Path
          import os
          import re

          root = Path('Elephant/frontend/src/renderer/src/editor-rust')
          if not root.exists():
              raise SystemExit('Neutral Rust editor adapter directory is missing')

          for path in root.rglob('*.js'):
              text = path.read_text()
              text = text.replace('MuyaRust', 'ElephantRust')
              text = text.replace('Muya Rust', 'Elephant Rust')
              text = text.replace('createBundledMuyaRustEngine', 'createBundledElephantRustEngine')
              path.write_text(text)

          production_roots = [
              Path('Elephant/frontend/app'),
              Path('Elephant/frontend/src/renderer/src')
          ]
          pattern = re.compile(r"(?P<prefix>from\s+['\"]|import\s+['\"])muya/lib/rust/(?P<module>[^'\"]+)(?P<quote>['\"])")
          for production_root in production_roots:
              for path in production_root.rglob('*'):
                  if path.suffix not in {'.js', '.mjs', '.ts', '.vue'} or root in path.parents:
                      continue
                  text = path.read_text()
                  def replace(match):
                      target = root / match.group('module')
                      relative = os.path.relpath(target, path.parent).replace(os.sep, '/')
                      if not relative.startswith('.'):
                          relative = './' + relative
                      return f"{match.group('prefix')}{relative}{match.group('quote')}"
                  next_text = pattern.sub(replace, text)
                  if next_text != text:
                      path.write_text(next_text)

          remaining = []
          for production_root in production_roots:
              for path in production_root.rglob('*'):
                  if path.suffix not in {'.js', '.mjs', '.ts', '.vue'} or root in path.parents:
                      continue
                  text = path.read_text()
                  if 'muya/lib/rust' in text or 'frontend/src/muya' in text:
                      remaining.append(str(path))
          if remaining:
              raise SystemExit(f'Legacy Muya production imports remain: {remaining}')

          contract = Path('tests/app/unit/specs/muya/rustEditorNeutralNamespace.spec.js')
          contract.write_text("""import fs from 'node:fs'
          import path from 'node:path'
          import { describe, expect, it } from 'vitest'

          const root = process.cwd()
          const read = (file) => fs.readFileSync(path.join(root, file), 'utf8')

          describe('neutral Rust editor namespace', () => {
            it('keeps production adapters outside the legacy Muya source tree', () => {
              const runtime = read('Elephant/frontend/src/renderer/src/editor-rust/runtime.js')
              const bridge = read('Elephant/frontend/src/renderer/src/editor-rust/bridge.js')
              const wasmFactory = read('Elephant/frontend/src/renderer/src/editor-rust/wasmFactory.js')
              const component = read('Elephant/frontend/src/renderer/src/muya/RustMuyaRuntimeEditor.vue')
              expect(runtime).toContain('ElephantRustBridge')
              expect(runtime).not.toContain('MuyaRustBridge')
              expect(bridge).toContain('Elephant Rust')
              expect(wasmFactory).toContain('muya-rust-wasm-bundle')
              expect(wasmFactory).not.toContain('editorState-rust-wasm-bundle')
              expect(component).toContain('../editor-rust/protocol')
              expect(component).toContain('../editor-rust/runtime')
              expect(component).not.toContain('muya/lib/rust')
            })
          })
          """)
          PY

      - name: Validate the neutral bridge
        shell: bash
        run: |
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            tests/app/unit/specs/muya/rustEditorNeutralNamespace.spec.js \
            tests/app/unit/specs/muya/rustRuntimeBridge.spec.js \
            tests/app/unit/specs/muya/rustRuntimeDomRenderer.spec.js

      - name: Install exact wasm-bindgen CLI
        shell: bash
        run: |
          VERSION=$(cargo metadata --manifest-path Elephant/crates/muya-wasm/Cargo.toml --format-version 1 \
            | python3 -c "import json,sys; data=json.load(sys.stdin); print(next(p['version'] for p in data['packages'] if p['name']=='wasm-bindgen'))")
          if ! wasm-bindgen --version 2>/dev/null | grep -q "${VERSION}$"; then
            cargo install wasm-bindgen-cli --version "$VERSION" --locked
          fi

      - name: Build production renderer without the Muya package bridge
        run: pnpm tauri:web:build

      - name: Commit neutral editor bridge
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            Elephant/frontend/src/renderer/src/editor-rust \
            Elephant/frontend/app \
            Elephant/frontend/src/renderer/src \
            tests/app/unit/specs/muya/rustEditorNeutralNamespace.spec.js
          if git diff --cached --quiet; then
            echo 'Neutral Rust editor bridge is already integrated.'
            exit 0
          fi
          git commit -m "refactor(editor): move Rust bridge out of Muya namespace"
          git fetch origin develop_next
          git merge --no-edit origin/develop_next
          git push origin HEAD:develop_next
