name: Finalize trusted Rust editor API v2

on:
  pull_request:
    branches:
      - feature/physical-addon-packages
    paths:
      - .github/workflows/develop-next-patch-trusted-editor-api-v2.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: develop-next-trusted-editor-api-v2
  cancel-in-progress: true

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop_next
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Remove the Muya trusted API fallback
        shell: bash
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('Elephant/frontend/src/renderer/src/addons/trustedAddonRuntime.js')
          text = path.read_text()
          start = text.index('    editor: Object.freeze({')
          register = text.index('      registerExtension: context.addEditorExtension,', start)
          replacement = """    editor: Object.freeze({
            get active() {
              return host?.get('editor.runtime') || host?.get('editor') || null
            },
            watch(listener, options) {
              if (!host) throw new Error('Addon host registry is unavailable')
              return track(host.watch('editor.runtime', listener, options))
            },
          """
          text = text[:start] + replacement + text[register:]
          if "host?.get('muya')" in text or "marktext?.muya" in text:
              raise SystemExit('Trusted API still exposes the Muya production runtime')
          path.write_text(text)
          PY

      - name: Validate the existing Rust editor addon contract
        shell: bash
        run: |
          set -euxo pipefail
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            --config vite.tauri.config.mjs \
            --root . \
            --environment jsdom \
            tests/app/unit/addons/rustEditorAddonRuntime.spec.js
          pnpm tauri:web:build

      - name: Commit trusted API cutover
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Elephant/frontend/src/renderer/src/addons/trustedAddonRuntime.js
          git commit -m "feat(addons): finalize Rust editor API cutover"
          git fetch origin develop_next
          git merge --no-edit origin/develop_next
          git push origin HEAD:develop_next
