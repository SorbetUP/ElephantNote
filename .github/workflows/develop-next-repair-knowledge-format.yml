name: Repair Knowledge addon formatting gate

on:
  pull_request:
    branches:
      - feature/physical-addon-packages
    paths:
      - .github/workflows/develop-next-repair-knowledge-format.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop_next
          fetch-depth: 0

      - name: Apply deterministic formatting before Knowledge tests
        shell: bash
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/develop-next-integrate-knowledge-addon.yml')
          text = path.read_text()
          old = '          cargo fmt --manifest-path addons/official/knowledge/native/Cargo.toml --check\n'
          new = '          cargo fmt --manifest-path addons/official/knowledge/native/Cargo.toml\n'
          if old not in text:
              raise SystemExit('Knowledge service formatting check was not found')
          path.write_text(text.replace(old, new, 1))
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/develop-next-repair-knowledge-format.yml
          git rm --ignore-unmatch .github/workflows/develop-next-diagnose-knowledge-addon.yml
          git add .github/workflows/develop-next-integrate-knowledge-addon.yml
          git commit -m "ci(develop_next): format Knowledge service before tests"
          git push origin HEAD:develop_next
