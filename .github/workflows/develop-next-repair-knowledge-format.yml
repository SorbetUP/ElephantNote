name: Repair Knowledge addon formatting gate

on:
  pull_request:
    branches:
      - feature/physical-addon-packages
    paths:
      - .github/workflows/develop-next-repair-knowledge-format.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop_next
          fetch-depth: 0

      - name: Apply deterministic formatting before Knowledge tests
        shell: bash
        run: |
          set -euxo pipefail
          WORKFLOW=.github/workflows/develop-next-integrate-knowledge-addon.yml
          grep -F 'cargo fmt --manifest-path addons/official/knowledge/native/Cargo.toml --check' "$WORKFLOW"
          sed -i 's|cargo fmt --manifest-path addons/official/knowledge/native/Cargo.toml --check|cargo fmt --manifest-path addons/official/knowledge/native/Cargo.toml|' "$WORKFLOW"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$WORKFLOW"
          git commit -m "ci(develop_next): format Knowledge service before tests"
          git push origin HEAD:develop_next
