name: Diagnose develop_next Rust integration

on:
  pull_request:
    branches:
      - feature/physical-addon-packages
    paths:
      - .github/workflows/develop-next-rust-failure-diagnostic.yml
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Print failed renderer modules and ownership assertion
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          gh run view 29347565073 --log-failed \
            | grep -E -C 12 'clipboardBlocks|Cannot find|Failed to resolve|Error:|SyntaxError|ReferenceError|expected.*not|Test Files|FAIL ' \
            | tail -n 450
