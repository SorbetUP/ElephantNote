name: Diagnose develop_next Rust integration

on:
  pull_request:
    branches:
      - feature/physical-addon-packages
    paths:
      - .github/workflows/develop-next-rust-failure-diagnostic.yml
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Print exact renderer failure tail
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: gh run view 29347565073 --log-failed | tail -n 120
