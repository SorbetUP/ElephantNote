name: Diagnose develop_next Rust integration

on:
  pull_request:
    branches:
      - feature/physical-addon-packages
    paths:
      - .github/workflows/develop-next-rust-failure-diagnostic.yml
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Print failed Rust test assertions
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          gh run view 29346892454 --log-failed \
            | grep -E -C 6 'FAILED|failures:|panicked at|assertion `left == right` failed|test result:|left:|right:' \
            | tail -n 500
