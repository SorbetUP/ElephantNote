name: Diagnose develop_next Rust integration

on:
  pull_request:
    branches:
      - feature/physical-addon-packages
    paths:
      - .github/workflows/develop-next-rust-failure-diagnostic.yml
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Print patch application failure
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          gh run view 29347315252 --log-failed \
            | grep -E -C 8 'unexpectedly|Traceback|SystemExit|Process completed|Preserve rejected' \
            | tail -n 250
