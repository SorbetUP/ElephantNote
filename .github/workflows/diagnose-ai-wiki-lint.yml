name: Diagnose AI Wiki lint

on:
  pull_request:
    branches:
      - feature/wiki-knowledge-continuation
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  lint:
    if: github.head_ref == 'assistant/run-ai-wiki-patch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run focused lint and capture errors
        shell: bash
        run: |
          set +e
          pnpm exec eslint Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue > /tmp/ai-wiki-lint.log 2>&1
          status=$?
          set -e
          cat /tmp/ai-wiki-lint.log
          if [ "$status" -ne 0 ]; then
            cp /tmp/ai-wiki-lint.log .github/ai-wiki-lint-error.txt
            git config user.name "ElephantNote Bot"
            git config user.email "actions@users.noreply.github.com"
            git add .github/ai-wiki-lint-error.txt
            git commit -m "Record AI Wiki lint failure"
            git push origin HEAD:${{ github.head_ref }}
            exit "$status"
          fi
