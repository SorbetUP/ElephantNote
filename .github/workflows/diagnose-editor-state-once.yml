name: Diagnose editor state once

on:
  pull_request:
    branches:
      - feature/wiki-knowledge-continuation
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.head_ref == 'assistant/diagnose-editor-state'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Locate editor load/save implementation
        shell: bash
        run: |
          set -euo pipefail
          {
            echo '=== matching implementations ==='
            rg -n "observed active markdown|write:start|reason.?[:=].?['\"]vue-watch|before unmount|handleFileChange|schedule.*notePath|slash-menu.*mounted" Elephant/frontend || true
            echo
            echo '=== likely editor files ==='
            find Elephant/frontend -type f \( -name '*.vue' -o -name '*.js' -o -name '*.ts' \) | grep -Ei 'editor|marktext|muya|note' | sort | head -300
          } > .github/editor-state-diagnostics.txt
          cat .github/editor-state-diagnostics.txt
      - name: Persist diagnostics
        shell: bash
        run: |
          git config user.name "ElephantNote Bot"
          git config user.email "actions@users.noreply.github.com"
          git add .github/editor-state-diagnostics.txt
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Record editor state diagnostics"
          git push origin HEAD:${{ github.head_ref }}
