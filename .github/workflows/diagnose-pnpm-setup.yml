name: Diagnose pnpm setup

on:
  push:
    branches:
      - feature/physical-addon-packages
    paths:
      - .github/workflows/diagnose-pnpm-setup.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/physical-addon-packages
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Diagnose package manager and install
        id: diagnose
        shell: bash
        run: |
          set +e
          {
            echo '=== versions ==='
            node --version
            npm --version
            echo '=== registry version ==='
            npm view pnpm@10.33.4 version
            registry_status=$?
            echo "REGISTRY_EXIT=$registry_status"
            echo '=== global install ==='
            npm install -g pnpm@10.33.4
            global_status=$?
            echo "GLOBAL_INSTALL_EXIT=$global_status"
            echo '=== pnpm version ==='
            pnpm --version
            version_status=$?
            echo "PNPM_VERSION_EXIT=$version_status"
            echo '=== dependency install ==='
            pnpm install --no-frozen-lockfile --ignore-scripts
            install_status=$?
            echo "INSTALL_EXIT=$install_status"
            if [ "$registry_status" -ne 0 ] || [ "$global_status" -ne 0 ] || [ "$version_status" -ne 0 ] || [ "$install_status" -ne 0 ]; then
              echo 'DIAGNOSTIC_RESULT=failure'
              echo 'failed=true' >> "$GITHUB_OUTPUT"
            else
              echo 'DIAGNOSTIC_RESULT=success'
              echo 'failed=false' >> "$GITHUB_OUTPUT"
            fi
          } 2>&1 | tee pnpm-diagnostic.log
          exit 0

      - name: Persist diagnostic in branch
        shell: bash
        run: |
          mkdir -p ci
          cp pnpm-diagnostic.log ci/pnpm-diagnostic.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci/pnpm-diagnostic.log
          if ! git diff --cached --quiet; then
            git commit -m "chore(ci): record pnpm setup diagnostic"
            git push origin HEAD:feature/physical-addon-packages
          fi

      - name: Upload diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-setup-diagnostic
          path: pnpm-diagnostic.log
          if-no-files-found: error

      - name: Fail after persisting diagnostic
        if: steps.diagnose.outputs.failed == 'true'
        run: exit 1
