name: Diagnose Wiki Continuation Head

on:
  pull_request:
    branches:
      - feature/rust-knowledge-core
    paths:
      - '.github/wiki-diagnostic-trigger'
  workflow_dispatch:

permissions:
  actions: read
  pull-requests: write

jobs:
  diagnose:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'feature/wiki-knowledge-continuation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/wiki-knowledge-continuation
      - name: Post compact failed patch output
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run view 29060905070 --repo "$GITHUB_REPOSITORY" --log-failed > /tmp/automatic-wiki-patch.log
          python - <<'PY'
          from pathlib import Path
          lines = Path('/tmp/automatic-wiki-patch.log').read_text(errors='replace').splitlines()
          selected = []
          for index, line in enumerate(lines):
              lowered = line.lower()
              if any(token in lowered for token in ('traceback', 'systemexit', 'changed unexpectedly', 'marker missing', 'error:', 'failed')):
                  selected.extend(lines[max(0, index - 4):min(len(lines), index + 8)])
          compact = []
          seen = set()
          for line in selected:
              if line not in seen:
                  seen.add(line)
                  compact.append(line)
          output = '\n'.join(compact[-80:]) or '\n'.join(lines[-80:])
          Path('/tmp/automatic-wiki-patch-compact.log').write_text(output)
          PY
          {
            echo '### Automatic Wiki patch failure (compact)'
            echo
            echo '```text'
            cat /tmp/automatic-wiki-patch-compact.log
            echo '```'
          } > /tmp/comment.md
          gh pr comment 37 --repo "$GITHUB_REPOSITORY" --body-file /tmp/comment.md
