name: Diagnose Wiki Source Assignment

on:
  pull_request:
    branches:
      - assistant/wiki-links-graph-integration
    paths:
      - .github/workflows/diagnose-wiki-source-assignment.yml

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'assistant/wiki-organization-continuation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: assistant/wiki-organization-continuation
      - uses: ./.github/actions/setup

      - name: Apply the refinement script from its publication workflow
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import textwrap
          workflow = Path('.github/workflows/refine-wiki-source-assignment.yml').read_text()
          script = workflow.split("python3 - <<'PY'\n", 1)[1].split('\n          PY', 1)[0]
          exec(compile(textwrap.dedent(script), 'refine-wiki-source-assignment', 'exec'))
          PY
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml --all

      - name: Capture Rust validation
        continue-on-error: true
        run: |
          set -o pipefail
          cargo test --manifest-path Elephant/backend/tauri/Cargo.toml knowledge_wiki_discovery --lib 2>&1 | tee rust-validation.log

      - name: Capture renderer validation
        continue-on-error: true
        run: |
          set -o pipefail
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            tests/app/unit/wikiDiscoveryQualityRegression.spec.js 2>&1 | tee renderer-validation.log

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wiki-source-assignment-diagnostics
          path: |
            rust-validation.log
            renderer-validation.log
          if-no-files-found: warn
