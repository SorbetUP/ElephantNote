name: Capture Wiki Topic Model V2 Diagnostics

on:
  pull_request:
    branches:
      - assistant/wiki-links-graph-integration
    paths:
      - .github/workflows/diagnose-wiki-topic-model-v2-artifact.yml

jobs:
  diagnose:
    if: github.head_ref == 'assistant/wiki-organization-continuation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: assistant/wiki-organization-continuation
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - name: Apply topic-model patch
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import textwrap
          workflow = Path('.github/workflows/refine-wiki-topic-model-v2.yml').read_text()
          script = workflow.split("python3 - <<'PY'\n", 1)[1].split('\n          PY', 1)[0]
          exec(compile(textwrap.dedent(script), 'refine-wiki-topic-model-v2', 'exec'))
          PY
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml --all
      - name: Capture validation logs
        run: |
          set +e
          cargo test --manifest-path Elephant/backend/tauri/Cargo.toml knowledge_wiki_discovery --lib > rust.log 2>&1
          echo $? > rust.status
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run tests/app/unit/wikiDiscoveryQualityRegression.spec.js > vitest.log 2>&1
          echo $? > vitest.status
          pnpm --dir Elephant exec eslint frontend/app/components/views/WikiView.vue > eslint.log 2>&1
          echo $? > eslint.status
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: wiki-topic-model-v2-diagnostics
          path: |
            rust.log
            rust.status
            vitest.log
            vitest.status
            eslint.log
            eslint.status
