name: Diagnose Wiki Topic Model V2

on:
  pull_request:
    branches:
      - assistant/wiki-links-graph-integration
    paths:
      - .github/workflows/diagnose-wiki-topic-model-v2.yml

jobs:
  diagnose:
    if: github.head_ref == 'assistant/wiki-organization-continuation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: assistant/wiki-organization-continuation
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - name: Apply topic-model patch
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import textwrap
          workflow = Path('.github/workflows/refine-wiki-topic-model-v2.yml').read_text()
          script = workflow.split("python3 - <<'PY'\n", 1)[1].split('\n          PY', 1)[0]
          exec(compile(textwrap.dedent(script), 'refine-wiki-topic-model-v2', 'exec'))
          PY
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml --all
      - name: Run concise diagnostics
        run: |
          set +e
          cargo test --manifest-path Elephant/backend/tauri/Cargo.toml knowledge_wiki_discovery --lib > /tmp/rust.log 2>&1
          rust_status=$?
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run tests/app/unit/wikiDiscoveryQualityRegression.spec.js > /tmp/vitest.log 2>&1
          vitest_status=$?
          pnpm --dir Elephant exec eslint frontend/app/components/views/WikiView.vue > /tmp/eslint.log 2>&1
          eslint_status=$?
          echo "=== rust status: ${rust_status} ==="
          tail -n 160 /tmp/rust.log
          echo "=== vitest status: ${vitest_status} ==="
          tail -n 120 /tmp/vitest.log
          echo "=== eslint status: ${eslint_status} ==="
          tail -n 120 /tmp/eslint.log
          test "$rust_status" -eq 0 -a "$vitest_status" -eq 0 -a "$eslint_status" -eq 0
