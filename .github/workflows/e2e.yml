name: E2E Test

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxkbfile-dev libsecret-1-dev libfontconfig-dev \
            xvfb libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libgtk-3-0 libgbm1 libasound2t64

      - uses: ./.github/actions/setup

      # Run the full postinstall and locale minification.
      - name: Run postinstall
        run: node build/scripts/postinstall.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_config_user_agent: 'pnpm'
          USE_ELECTRON_CLANG: '0'

      - name: Build app diagnostic
        id: build-app
        continue-on-error: true
        run: pnpm build

      - name: Run E2E Tests
        if: steps.build-app.outcome == 'success'
        run: xvfb-run --auto-servernum pnpm test:e2e

      - name: Skip E2E after build diagnostic failure
        if: steps.build-app.outcome != 'success'
        run: echo "Skipping E2E because the web build is currently diagnostic during the Tauri migration."
