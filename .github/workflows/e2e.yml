name: E2E Test

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxkbfile-dev libsecret-1-dev libfontconfig-dev \
            xvfb libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libgtk-3-0 libgbm1 libasound2t64

      - uses: ./.github/actions/setup

      - name: Run postinstall
        run: node build/scripts/postinstall.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_config_user_agent: 'pnpm'
          USE_ELECTRON_CLANG: '0'

      - name: Build Tauri renderer
        run: pnpm build

      - name: Install Playwright Chromium
        run: NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/playwright install chromium

      - name: Run E2E Tests
        run: xvfb-run --auto-servernum pnpm test:e2e

      - name: Upload Playwright diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics-${{ github.run_id }}
          path: |
            playwright-report
            test-results
          if-no-files-found: warn
          retention-days: 14
