name: E2E Test

on:
  push:
    branches:
      - develop
      - 'agent/**'
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: Linux three-layer packaged application proof
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      CARGO_TERM_COLOR: always
      FORCE_COLOR: '1'
      ELEPHANT_E2E_EXHAUSTIVE_EVIDENCE: '1'
      ELEPHANT_E2E_REQUIRE_NATIVE_PACKAGES: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install pinned Tauri CLI
        shell: bash
        run: |
          set -euxo pipefail
          if ! cargo tauri --version 2>/dev/null | grep -Fq '2.11.2'; then
            cargo install tauri-cli --version 2.11.2 --locked
          fi
          cargo tauri --version

      - name: Install system dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxkbfile-dev libsecret-1-dev libfontconfig-dev \
            xvfb libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libgtk-3-0 libgbm1 libasound2t64 unzip \
            libayatana-appindicator3-dev librsvg2-dev libwebkit2gtk-4.1-dev \
            patchelf

      - uses: ./.github/actions/setup

      - name: Reject fake or inflated tests
        shell: bash
        run: |
          set -euxo pipefail
          pnpm test:trust:guard 2>&1 | tee test-trust.txt

      - name: Validate three proof layers and addon matrix wiring
        shell: bash
        run: |
          set -euxo pipefail
          node build/scripts/run-observable.mjs --label proof-layer-wiring -- \
            pnpm test:feature-matrix 2>&1 | tee proof-layer-wiring.txt

      - name: Install exact wasm-bindgen CLI
        shell: bash
        run: |
          set -euxo pipefail
          VERSION=$(cargo metadata --manifest-path Elephant/crates/muya-wasm/Cargo.toml --format-version 1 \
            | python3 -c "import json,sys; data=json.load(sys.stdin); print(next(p['version'] for p in data['packages'] if p['name']=='wasm-bindgen'))")
          if ! wasm-bindgen --version 2>/dev/null | grep -q "${VERSION}$"; then
            cargo install wasm-bindgen-cli --version "$VERSION" --locked
          fi
          wasm-bindgen --version

      - name: Run postinstall with complete output
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_config_user_agent: pnpm
          USE_ELECTRON_CLANG: '0'
        run: |
          set -euxo pipefail
          node build/scripts/run-observable.mjs --label postinstall -- \
            node build/scripts/postinstall.js

      - name: Build every Linux native official addon package
        shell: bash
        run: |
          set -euxo pipefail
          : > official-addon-native-build.txt
          built=0
          for source in addons/official/*
          do
            [ -f "$source/addon.build.json" ] || continue
            supported="$(node -e 'const fs=require("fs"); const file=process.argv[1]; const data=JSON.parse(fs.readFileSync(file,"utf8")); process.stdout.write(String((data.supportedPlatforms||[]).includes("linux-x86_64")))' "$source/addon.build.json")"
            [ "$supported" = true ] || continue
            slug="$(basename "$source")"
            node build/scripts/run-observable.mjs --label "official-addon-native-$slug" -- \
              node build/scripts/build-physical-addon.mjs "$source" \
              2>&1 | tee -a official-addon-native-build.txt
            built=$((built + 1))
          done
          echo "Built $built Linux native official addon package(s)." | tee -a official-addon-native-build.txt
          test "$built" -gt 0
          find build/out/addons/releases -maxdepth 3 -type f -print -exec ls -lh {} \; | tee -a official-addon-native-build.txt

      - name: Build exact packaged Tauri application
        shell: bash
        run: |
          set -euxo pipefail
          node build/scripts/run-observable.mjs --label tauri-linux-build -- \
            pnpm build:linux 2>&1 | tee tauri-linux-build.txt
          test -x Elephant/backend/tauri/target/release/Elephant
          sha256sum Elephant/backend/tauri/target/release/Elephant | tee packaged-executable.sha256

      - name: Run backend production contract layer
        shell: bash
        run: |
          set -euxo pipefail
          xvfb-run --auto-servernum env \
            ELEPHANT_ACCEPTANCE_SKIP_BUILD=1 \
            ELEPHANT_ACCEPTANCE_APP_PATH="$PWD/Elephant/backend/tauri/target/release/Elephant" \
            pnpm test:backend:raw 2>&1 | tee backend-contract.txt

      - name: Prove the Markdown suite turns red under deliberate mutations
        shell: bash
        run: |
          set -euxo pipefail
          xvfb-run --auto-servernum env \
            ELEPHANT_ACCEPTANCE_SKIP_BUILD=1 \
            ELEPHANT_ACCEPTANCE_APP_PATH="$PWD/Elephant/backend/tauri/target/release/Elephant" \
            node build/scripts/verify-markdown-trust-sensitivity.mjs \
            2>&1 | tee markdown-trust-sensitivity.txt
          grep -F '[markdown-trust-sensitivity] PASS: all deliberate mutations made the real suite red' \
            markdown-trust-sensitivity.txt

      - name: Run frontend behavior layer through visible controls
        shell: bash
        run: |
          set -euxo pipefail
          xvfb-run --auto-servernum env \
            ELEPHANT_ACCEPTANCE_SKIP_BUILD=1 \
            ELEPHANT_ACCEPTANCE_APP_PATH="$PWD/Elephant/backend/tauri/target/release/Elephant" \
            pnpm test:frontend:raw 2>&1 | tee frontend-behavior.txt

      - name: Run exact packaged user journey layer
        shell: bash
        run: |
          set -euxo pipefail
          xvfb-run --auto-servernum env \
            ELEPHANT_ACCEPTANCE_SKIP_BUILD=1 \
            ELEPHANT_ACCEPTANCE_APP_PATH="$PWD/Elephant/backend/tauri/target/release/Elephant" \
            pnpm test:user:packaged:raw 2>&1 | tee packaged-user-journey.txt

      - name: Verify three-layer runtime evidence
        shell: bash
        run: |
          set -euxo pipefail
          node - <<'NODE'
          const fs = require('fs')
          const manifest = JSON.parse(fs.readFileSync('tests/trust/test-layers.json', 'utf8'))
          for (const category of manifest.categories) {
            if (!fs.existsSync(category.artifact)) throw new Error(`${category.id} did not produce ${category.artifact}`)
            const evidence = JSON.parse(fs.readFileSync(category.artifact, 'utf8'))
            if (evidence.status !== 'PROVEN') throw new Error(`${category.id} is not proven: ${JSON.stringify(evidence)}`)
            const scenarios = Array.isArray(evidence.scenarios) ? evidence.scenarios : []
            const missing = category.requiredScenarios.filter((id) => !scenarios.some((scenario) => scenario.id === id && scenario.ok === true))
            if (missing.length) throw new Error(`${category.id} is missing passing scenarios: ${JSON.stringify(missing)}`)
            const failed = scenarios.filter((scenario) => scenario.ok !== true)
            if (failed.length) throw new Error(`${category.id} contains failing scenarios: ${JSON.stringify(failed)}`)
            if ((category.id === 'frontend-behavior' || category.id === 'packaged-user-journey')) {
              const forbidden = new Set(category.forbiddenProofCommands || [])
              const violations = (evidence.commandPolicy?.actionCommands || []).filter((entry) => forbidden.has(entry.command))
              if (violations.length) throw new Error(`${category.id} bypassed the frontend with internal commands: ${JSON.stringify(violations)}`)
            }
            if (category.requiresPackagedExecutable === true && evidence.packagedApp !== true) {
              throw new Error(`${category.id} did not run the packaged executable`)
            }
          }
          console.log('[three-layer-proof] PROVEN backend + frontend + packaged user journey')
          NODE

      - name: Run exhaustive official addon suite through the external app API
        shell: bash
        run: |
          set -euxo pipefail
          xvfb-run --auto-servernum env \
            ELEPHANT_ACCEPTANCE_SKIP_BUILD=1 \
            ELEPHANT_ACCEPTANCE_APP_PATH="$PWD/Elephant/backend/tauri/target/release/Elephant" \
            pnpm test:automation:raw 2>&1 | tee automation-tests.txt

      - name: Verify exhaustive automation evidence and renderer logs
        shell: bash
        run: |
          set -euxo pipefail
          test -s test-results/acceptance/latest.json
          node - <<'NODE'
          const fs = require('fs')
          const payload = JSON.parse(fs.readFileSync('test-results/acceptance/latest.json', 'utf8'))
          if (!payload?.result) throw new Error(`Automation suite did not report a result: ${JSON.stringify(payload)}`)
          const logs = Array.isArray(payload.result.logs) ? payload.result.logs : []
          const unexpected = logs.filter((entry) => String(entry.level || '').toLowerCase() === 'error')
          if (unexpected.length) throw new Error(`Automation logs contain ${unexpected.length} unexpected application error(s): ${JSON.stringify(unexpected.slice(0, 10))}`)
          NODE

      - name: Collect explicit official addon evidence
        if: always()
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p official-addon-evidence
          while IFS= read -r evidence
          do
            cp "$evidence" "official-addon-evidence/$(basename "$evidence")"
          done < <(find test-results -type f -name '*native-package-evidence.json' -print 2>/dev/null || true)
          find official-addon-evidence -maxdepth 1 -type f -print -exec cat {} \; || true

      - name: Upload complete Linux automation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-three-layer-app-proof-and-addon-diagnostics
          path: |
            test-trust.txt
            proof-layer-wiring.txt
            backend-contract.txt
            markdown-trust-sensitivity.txt
            frontend-behavior.txt
            packaged-user-journey.txt
            official-addon-native-build.txt
            tauri-linux-build.txt
            packaged-executable.sha256
            automation-tests.txt
            test-results/trust/**
            test-results/trusted/backend-contract/**
            test-results/trusted/frontend-behavior/**
            test-results/trusted/packaged-user-journey/**
            test-results/trusted/markdown-editor/**
            test-results/observability/**
            test-results/acceptance/**
            official-addon-evidence/**
            build/out/addons/releases/**
          if-no-files-found: warn
          retention-days: 30
