name: Expose addon service API

on:
  workflow_dispatch:
  push:
    branches:
      - feature/physical-addon-packages
    paths:
      - .github/workflows/expose-addon-service-api.yml

permissions:
  contents: write

jobs:
  expose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/physical-addon-packages
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Add trusted service methods and contract test
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          runtime = Path('Elephant/frontend/src/renderer/src/addons/trustedAddonRuntime.js')
          text = runtime.read_text()
          old = '''    native: Object.freeze({
      status: () => invoke('tauri_addons_sidecar_status', { addonId: manifest.id }, target),
      call(method, params = {}, options = {}) {
        const timeoutMs = Number.isFinite(options?.timeoutMs) ? Math.max(1, Math.trunc(options.timeoutMs)) : undefined
        return invoke('tauri_addons_sidecar_call', {
          addonId: manifest.id,
          method: safeString(method),
          params,
          timeoutMs
        }, target)
      }
    }),'''
          new = '''    native: Object.freeze({
      status: () => invoke('tauri_addons_sidecar_status', { addonId: manifest.id }, target),
      call(method, params = {}, options = {}) {
        const timeoutMs = Number.isFinite(options?.timeoutMs) ? Math.max(1, Math.trunc(options.timeoutMs)) : undefined
        return invoke('tauri_addons_sidecar_call', {
          addonId: manifest.id,
          method: safeString(method),
          params,
          timeoutMs
        }, target)
      },
      service: Object.freeze({
        status: () => invoke('tauri_addons_service_status', { addonId: manifest.id }, target),
        start: () => invoke('tauri_addons_service_start', { addonId: manifest.id }, target),
        call(method, params = {}, options = {}) {
          const timeoutMs = Number.isFinite(options?.timeoutMs) ? Math.max(1, Math.trunc(options.timeoutMs)) : undefined
          return invoke('tauri_addons_service_call', {
            addonId: manifest.id,
            method: safeString(method),
            params,
            timeoutMs
          }, target)
        },
        stop: () => invoke('tauri_addons_service_stop', { addonId: manifest.id }, target)
      })
    }),'''
          if old not in text:
              if 'tauri_addons_service_status' not in text:
                  raise SystemExit('Trusted native API block did not match expected source')
          else:
              runtime.write_text(text.replace(old, new))

          test = Path('tests/app/unit/addons/addonNativeServiceContracts.spec.js')
          test.write_text('''import fs from 'node:fs'\nimport path from 'node:path'\nimport { describe, expect, it } from 'vitest'\n\nconst root = process.cwd()\nconst read = (file) => fs.readFileSync(path.join(root, file), 'utf8')\n\ndescribe('persistent native addon services', () => {\n  it('exposes status, start, call and stop to trusted packages', () => {\n    const runtime = read('Elephant/frontend/src/renderer/src/addons/trustedAddonRuntime.js')\n    for (const command of ['tauri_addons_service_status', 'tauri_addons_service_start', 'tauri_addons_service_call', 'tauri_addons_service_stop']) {\n      expect(runtime).toContain(command)\n    }\n    expect(runtime).toContain('service: Object.freeze')\n  })\n\n  it('keeps the native host generic and package-owned', () => {\n    const rust = read('Elephant/backend/tauri/src/addon_services.rs')\n    expect(rust).toContain('elephant-addon-service-v1')\n    expect(rust).toContain('ELEPHANT_ADDON_PACKAGE_DIR')\n    expect(rust).toContain('ELEPHANT_ADDON_DATA_DIR')\n    expect(rust).toContain('ELEPHANT_VAULT_DIR')\n    expect(rust).toContain('kill_on_drop(true)')\n    expect(rust).not.toContain('iroh::')\n  })\n})\n''')
          PY

      - uses: ./.github/actions/setup

      - name: Validate trusted service API
        run: |
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            tests/app/unit/addons/addonNativeServiceContracts.spec.js \
            tests/app/unit/addons/trustedOfficialActivation.spec.js

      - name: Commit verified API and remove workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/expose-addon-service-api.yml
          git add \
            Elephant/frontend/src/renderer/src/addons/trustedAddonRuntime.js \
            tests/app/unit/addons/addonNativeServiceContracts.spec.js
          git commit -m "feat(addons): expose persistent native service API"
          git push origin HEAD:feature/physical-addon-packages
