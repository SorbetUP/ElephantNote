name: Extract addon sources to Elephant-Addons

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/extract-addon-sources.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: extract-elephant-addon-sources
  cancel-in-progress: false

jobs:
  extract:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.head.ref == 'automation/run-addon-extraction' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop_next-integration-repair
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.91.0'

      - name: Install Tauri Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev libsecret-1-dev libssl-dev patchelf

      - name: Extract and validate physical addon sources
        shell: bash
        run: |
          set -o pipefail
          sed -i 's/pnpm install --frozen-lockfile --ignore-scripts/pnpm install --frozen-lockfile --ignore-scripts || pnpm install --no-frozen-lockfile --ignore-scripts/' build/scripts/extract-addon-sources.sh
          python <<'PY'
          from pathlib import Path

          extraction = Path('build/scripts/extract-addon-sources.sh')
          source = extraction.read_text()
          source = source.replace(
              'node build/scripts/validate-addon-catalog.mjs 2>&1 | tee addon-catalog-validation.txt',
              'node build/scripts/validate-addon-catalog.mjs addons 2>&1 | tee addon-catalog-validation.txt'
          )
          extraction.write_text(source)

          validator = Path('build/scripts/validate-addon-catalog.mjs')
          source = validator.read_text()
          source = source.replace(
              "if (!['addon-catalog', 'integrated'].includes(catalog.branch)) fail('branch marker must be addon-catalog or integrated')",
              "if (!['addon-catalog', 'integrated', 'main'].includes(catalog.branch)) fail('branch marker must be addon-catalog, integrated or main')"
          )
          validator.write_text(source)
          PY
          bash build/scripts/extract-addon-sources.sh 2>&1 | tee addon-extraction-full.log

      - name: Upload extraction diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: addon-source-extraction-diagnostics
          path: |
            addon-extraction-full.log
            addon-catalog-validation.txt
            addon-extraction-tests.txt
            addon-catalog-rust-tests.txt
          if-no-files-found: warn
          retention-days: 14
