name: Extract addon sources to Elephant-Addons

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/extract-addon-sources.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: extract-elephant-addon-sources
  cancel-in-progress: false

jobs:
  extract:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.head.ref == 'automation/run-addon-extraction' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop_next-integration-repair
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.91.0'

      - name: Extract and validate physical addon sources
        shell: bash
        run: |
          set -o pipefail
          sed -i 's/pnpm install --frozen-lockfile --ignore-scripts/pnpm install --frozen-lockfile --ignore-scripts || pnpm install --no-frozen-lockfile --ignore-scripts/' build/scripts/extract-addon-sources.sh
          bash build/scripts/extract-addon-sources.sh 2>&1 | tee addon-extraction-full.log

      - name: Upload extraction diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: addon-source-extraction-diagnostics
          path: |
            addon-extraction-full.log
            addon-catalog-validation.txt
            addon-extraction-tests.txt
            addon-catalog-rust-tests.txt
          if-no-files-found: warn
          retention-days: 14
