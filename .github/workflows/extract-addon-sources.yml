name: Extract addon sources to Elephant-Addons

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/extract-addon-sources.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: extract-elephant-addon-sources
  cancel-in-progress: false

jobs:
  extract:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.head.ref == 'develop_next-integration-repair' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop_next-integration-repair
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.91.0'

      - name: Replace tracked addon sources with a pinned external materialization
        shell: bash
        run: |
          set -euxo pipefail
          python <<'PY'
          import json
          from pathlib import Path

          root = Path('.')
          addons_commit = '8458c1cc9ed074148697e6edc5ffc0f05bbf05ab'

          sync_script = root / 'build/scripts/sync-elephant-addons.mjs'
          sync_script.write_text(f'''import fs from 'node:fs'\nimport path from 'node:path'\nimport {{ execFileSync }} from 'node:child_process'\nimport {{ fileURLToPath }} from 'node:url'\n\nconst root = path.resolve(path.dirname(fileURLToPath(import.meta.url)), '../..')\nconst repository = 'https://github.com/SorbetUP/Elephant-Addons.git'\nconst pinnedRef = process.env.ELEPHANT_ADDONS_REF || '{addons_commit}'\nconst cacheRoot = path.join(root, '.cache', 'elephant-addons')\n\nconst runGit = (args, cwd = root) => execFileSync('git', args, {{ cwd, stdio: 'inherit' }})\nconst currentHead = () => {{\n  try {{\n    return execFileSync('git', ['rev-parse', 'HEAD'], {{ cwd: cacheRoot, encoding: 'utf8', stdio: ['ignore', 'pipe', 'ignore'] }}).trim()\n  }} catch {{\n    return ''\n  }}\n}}\n\nif (currentHead() !== pinnedRef) {{\n  fs.rmSync(cacheRoot, {{ recursive: true, force: true }})\n  fs.mkdirSync(path.dirname(cacheRoot), {{ recursive: true }})\n  runGit(['clone', '--filter=blob:none', '--no-checkout', repository, cacheRoot])\n  runGit(['fetch', '--depth', '1', 'origin', pinnedRef], cacheRoot)\n  runGit(['checkout', '--detach', 'FETCH_HEAD'], cacheRoot)\n  if (currentHead() !== pinnedRef) throw new Error(`Elephant-Addons checkout mismatch: expected ${{pinnedRef}}`)\n}}\n\nfor (const required of ['catalog.json', 'official', 'packs/base.enaddonpack', 'packs/develop-parity.enaddonpack']) {{\n  if (!fs.existsSync(path.join(cacheRoot, required))) throw new Error(`Elephant-Addons is missing ${{required}}`)\n}}\n\nconst ensureLink = (linkName, target) => {{\n  const linkPath = path.join(root, linkName)\n  fs.rmSync(linkPath, {{ recursive: true, force: true }})\n  const type = process.platform === 'win32' ? 'junction' : 'dir'\n  fs.symlinkSync(target, linkPath, type)\n}}\n\nensureLink('addons', cacheRoot)\nensureLink('packs', path.join(cacheRoot, 'packs'))\nconsole.log(`[addons] materialized Elephant-Addons ${{pinnedRef}}`)\n''')

          ignore = Path('.gitignore').read_text()
          block = '''\n# Materialized from SorbetUP/Elephant-Addons; never commit these paths here.\n/.cache/elephant-addons/\n/addons\n/packs\n'''
          if '/.cache/elephant-addons/' not in ignore:
            Path('.gitignore').write_text(ignore.rstrip() + '\n' + block)

          package_path = Path('package.json')
          package = json.loads(package_path.read_text())
          scripts = package['scripts']
          scripts['addons:sync'] = 'node build/scripts/sync-elephant-addons.mjs'
          scripts['postinstall'] = 'pnpm addons:sync && node build/scripts/postinstall.js'
          for name in [
            'addon:build', 'addon:build:ocr', 'addon:build:open-models', 'addon:build:codex',
            'tauri:web:dev', 'tauri:web:build', 'test', 'test:unit', 'coverage', 'coverage:unit'
          ]:
            value = scripts[name]
            if not value.startswith('pnpm addons:sync && '):
              scripts[name] = 'pnpm addons:sync && ' + value
          package_path.write_text(json.dumps(package, ensure_ascii=False, indent=2) + '\n')

          setup_path = Path('.github/actions/setup/action.yml')
          setup = setup_path.read_text()
          marker = '''      env:\n        GITHUB_TOKEN: ${{ github.token }}\n'''
          addition = marker + '''\n    - name: Materialize official addons\n      shell: bash\n      run: node build/scripts/sync-elephant-addons.mjs\n'''
          if 'name: Materialize official addons' not in setup:
            if marker not in setup:
              raise SystemExit('Unable to locate setup action insertion point')
            setup_path.write_text(setup.replace(marker, addition, 1))

          cargo_path = Path('Elephant/backend/tauri/Cargo.toml')
          cargo = cargo_path.read_text()
          old_dep = 'elephantnote-knowledge-core = { path = "../../../addons/official/knowledge/native/knowledge-core" }'
          new_dep = f'elephantnote-knowledge-core = {{ git = "https://github.com/SorbetUP/Elephant-Addons", rev = "{addons_commit}", package = "elephantnote-knowledge-core" }}'
          if old_dep not in cargo:
            raise SystemExit('Unable to locate mobile Knowledge path dependency')
          cargo_path.write_text(cargo.replace(old_dep, new_dep, 1))

          catalog_path = Path('Elephant/backend/tauri/src/official_addon_catalog.rs')
          catalog = catalog_path.read_text()
          catalog = catalog.replace(
            'const INTEGRATED_CATALOG: &str = include_str!("../../../../addons/catalog.json");\n// The repair branch is intentionally used while PR #84 validates installation on\n// Android and desktop. Change this to develop_next when the branch is merged.\nconst OFFICIAL_ROOT: &str = "https://raw.githubusercontent.com/SorbetUP/ElephantNote/develop_next-integration-repair/addons/";\n',
            'const OFFICIAL_ROOT: &str = "https://raw.githubusercontent.com/SorbetUP/Elephant-Addons/main/";\nconst OFFICIAL_CATALOG_PATH: &str = "catalog.json";\nconst MAX_CATALOG_BYTES: u64 = 1024 * 1024;\n'
          )
          old_catalog_fn = '''fn catalog() -> R<Vec<CatalogAddon>> {\n  let parsed: IntegratedCatalog = serde_json::from_str(INTEGRATED_CATALOG)\n    .map_err(|error| format!("Invalid integrated official addon catalogue: {error}"))?;\n  for item in &parsed.addons {\n    if !item.official || !item.id.starts_with("elephant.") {\n      return Err(format!("Integrated catalogue contains a non-official addon: {}", item.id));\n    }\n    safe_official_path(&item.manifest_path)?;\n    safe_official_path(&item.entry_path)?;\n  }\n  Ok(parsed.addons)\n}\n'''
          new_catalog_fn = '''fn parse_catalog(bytes: &[u8]) -> R<Vec<CatalogAddon>> {\n  let parsed: IntegratedCatalog = serde_json::from_slice(bytes)\n    .map_err(|error| format!("Invalid official addon catalogue: {error}"))?;\n  for item in &parsed.addons {\n    if !item.official || !item.id.starts_with("elephant.") {\n      return Err(format!("Official catalogue contains a non-official addon: {}", item.id));\n    }\n    safe_official_path(&item.manifest_path)?;\n    safe_official_path(&item.entry_path)?;\n  }\n  Ok(parsed.addons)\n}\n\nfn fetch_catalog_bytes() -> R<Vec<u8>> {\n  let root = Url::parse(OFFICIAL_ROOT).map_err(|error| error.to_string())?;\n  let url = root.join(OFFICIAL_CATALOG_PATH).map_err(|error| error.to_string())?;\n  if url.scheme() != "https"\n    || url.host_str() != Some("raw.githubusercontent.com")\n    || url.path() != "/SorbetUP/Elephant-Addons/main/catalog.json"\n  {\n    return Err("Official addon catalogue URL escaped the dedicated repository.".to_string());\n  }\n  let client = reqwest::blocking::Client::builder()\n    .timeout(Duration::from_secs(90))\n    .redirect(reqwest::redirect::Policy::none())\n    .build()\n    .map_err(|error| error.to_string())?;\n  let mut response = client\n    .get(url)\n    .send()\n    .map_err(|error| format!("Failed to reach the official addon catalogue: {error}"))?;\n  if !response.status().is_success() {\n    return Err(format!("Official addon catalogue returned HTTP {}", response.status()));\n  }\n  let mut bytes = Vec::new();\n  response\n    .by_ref()\n    .take(MAX_CATALOG_BYTES + 1)\n    .read_to_end(&mut bytes)\n    .map_err(|error| error.to_string())?;\n  if bytes.len() as u64 > MAX_CATALOG_BYTES {\n    return Err("Official addon catalogue exceeds the allowed size.".to_string());\n  }\n  Ok(bytes)\n}\n\nfn catalog() -> R<Vec<CatalogAddon>> {\n  let local = PathBuf::from(env!("CARGO_MANIFEST_DIR")).join("../../../addons/catalog.json");\n  let bytes = if local.is_file() {\n    fs::read(local).map_err(|error| error.to_string())?\n  } else {\n    fetch_catalog_bytes()?\n  };\n  parse_catalog(&bytes)\n}\n'''
          if old_catalog_fn not in catalog:
            raise SystemExit('Unable to locate embedded official catalogue parser')
          catalog = catalog.replace(old_catalog_fn, new_catalog_fn, 1)
          catalog = catalog.replace(
            '|| !url.path().starts_with("/SorbetUP/ElephantNote/develop_next-integration-repair/addons/official/")',
            '|| !url.path().starts_with("/SorbetUP/Elephant-Addons/main/official/")'
          )
          catalog = catalog.replace(
            'return Err("Official addon URL escaped the trusted repository branch.".to_string());',
            'return Err("Official addon URL escaped the dedicated addon repository.".to_string());'
          )
          catalog_path.write_text(catalog)

          ownership = Path('docs/repository/addon-source-ownership.md')
          ownership.write_text(f'''# Addon source ownership\n\nThe Elephant application repository no longer tracks physical addon implementations or protected addon packs.\n\nCanonical source: `https://github.com/SorbetUP/Elephant-Addons`\n\nPinned integration revision: `{addons_commit}`\n\n`build/scripts/sync-elephant-addons.mjs` materializes the pinned repository into the ignored `.cache/elephant-addons` directory and exposes ignored `addons` / `packs` compatibility links for existing build and validation tooling. Runtime package downloads and the official catalogue use the dedicated repository directly.\n\nElephant retains only the generic addon host, installer, permission broker, scoped APIs, service/sidecar host and UI extension points.\n''')
          PY

          git rm -r addons packs
          node build/scripts/sync-elephant-addons.mjs

      - name: Install JavaScript dependencies without rerunning postinstall
        shell: bash
        run: |
          set -o pipefail
          corepack enable
          corepack prepare pnpm@10.33.4 --activate
          pnpm install --frozen-lockfile --ignore-scripts

      - name: Refresh the Tauri lockfile for the pinned addon dependency
        shell: bash
        run: cargo generate-lockfile --manifest-path Elephant/backend/tauri/Cargo.toml

      - name: Validate external catalogue, protected packs and focused ownership contracts
        shell: bash
        run: |
          set -o pipefail
          node build/scripts/sync-elephant-addons.mjs
          node build/scripts/validate-addon-catalog.mjs 2>&1 | tee addon-catalog-validation.txt
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            tests/app/unit/addons/addonsCatalogueUi.spec.js \
            tests/app/unit/addons/officialAddonCatalogBridge.spec.js \
            tests/app/unit/addons/packageResourceContracts.spec.js \
            tests/app/unit/addons/knowledgePhysicalAddon.spec.js \
            tests/app/unit/addons/wikiPackageOwnership.spec.js \
            tests/app/unit/addons/searchPackageOwnership.spec.js \
            2>&1 | tee addon-extraction-tests.txt
          cargo test \
            --manifest-path Elephant/backend/tauri/Cargo.toml \
            official_addon_catalog::tests \
            2>&1 | tee addon-catalog-rust-tests.txt
          test -L addons
          test -L packs
          git check-ignore -q addons
          git check-ignore -q packs
          test -z "$(git ls-files addons packs)"
          ! grep -R --line-number \
            'raw.githubusercontent.com/SorbetUP/ElephantNote/.*/addons' \
            Elephant build tests .github package.json \
            --exclude-dir=node_modules \
            --exclude-dir=target
          git diff --check

      - name: Commit the extraction only after validation
        shell: bash
        run: |
          set -euxo pipefail
          rm .github/workflows/extract-addon-sources.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'refactor(addons): move physical sources and packs to Elephant-Addons'
          git push origin HEAD:develop_next-integration-repair

      - name: Upload extraction diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: addon-source-extraction-diagnostics
          path: |
            addon-catalog-validation.txt
            addon-extraction-tests.txt
            addon-catalog-rust-tests.txt
          if-no-files-found: warn
          retention-days: 14
