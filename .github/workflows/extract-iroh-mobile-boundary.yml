name: Extract Iroh mobile boundary

on:
  push:
    branches:
      - feature/physical-addon-packages
    paths:
      - .github/workflows/extract-iroh-mobile-boundary.yml

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/physical-addon-packages
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply mobile Sync boundary
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          cargo = Path('Elephant/backend/tauri/Cargo.toml')
          text = cargo.read_text()
          text = text.replace('iroh = "1.0.2"\niroh-mdns-address-lookup = "0.4.0"\n', '')
          target = '[target.\'cfg(not(any(target_os = "android", target_os = "ios")))\'.dependencies]\n'
          if target not in text:
              raise SystemExit('Desktop-only dependency section was not found')
          if 'iroh = "1.0.2"' not in text:
              text = text.replace(target, target + 'iroh = "1.0.2"\niroh-mdns-address-lookup = "0.4.0"\n')
          cargo.write_text(text)

          vault_mod = Path('Elephant/backend/tauri/src/vault/mod.rs')
          text = vault_mod.read_text()
          text = text.replace('pub mod sync;\n', '#[cfg(not(mobile))]\npub mod sync;\n')
          vault_mod.write_text(text)

          lib = Path('Elephant/backend/tauri/src/lib_min.rs')
          text = lib.read_text()
          text = text.replace('pub mod sync;\n', '#[cfg(not(mobile))]\npub mod sync;\n')
          text = text.replace('#[cfg(test)]\nmod sync_contract_tests;', '#[cfg(all(test, not(mobile)))]\nmod sync_contract_tests;')
          text = text.replace(
              '      app.manage(sync::IrohSyncState::new());\n',
              '      #[cfg(not(mobile))]\n      app.manage(sync::IrohSyncState::new());\n'
          )
          lib.write_text(text)

          commands = Path('Elephant/backend/tauri/src/sync_commands.rs')
          original = commands.read_text()
          marker = 'mod desktop {'
          if marker not in original:
              indented = ''.join(('  ' + line if line.strip() else line) for line in original.splitlines(keepends=True))
              mobile = r'''
#[cfg(mobile)]
mod mobile {
  use serde_json::{json, Value};

  type R<T> = Result<T, String>;

  fn unsupported() -> String {
    "Iroh Sync is not bundled in Elephant mobile. Install a mobile-compatible Sync addon adapter to enable synchronization.".to_string()
  }

  #[tauri::command(rename = "tauri_sync_create_invite")]
  pub async fn iroh_sync_create_invite(_payload: Option<Value>) -> R<Value> {
    Err(unsupported())
  }

  #[tauri::command(rename = "tauri_sync_accept_invite")]
  pub async fn iroh_sync_accept_invite(_invite: Value) -> R<Value> {
    Err(unsupported())
  }

  #[tauri::command(rename = "tauri_sync_status")]
  pub async fn iroh_sync_status() -> R<Value> {
    Ok(json!({
      "state": "unavailable",
      "running": false,
      "started": false,
      "supported": false,
      "mobile": true,
      "backend": "addon-required",
      "error": unsupported()
    }))
  }

  #[tauri::command(rename = "tauri_sync_shutdown")]
  pub async fn iroh_sync_shutdown() -> R<Value> {
    Ok(json!({ "running": false, "started": false, "supported": false, "mobile": true }))
  }

  #[tauri::command(rename = "tauri_sync_enqueue")]
  pub async fn iroh_sync_enqueue(_operation: String, _payload: Option<Value>) -> R<Value> {
    Err(unsupported())
  }

  #[tauri::command(rename = "tauri_sync_run")]
  pub async fn iroh_sync_run(_payload_by_operation: Option<Value>) -> R<Value> {
    Err(unsupported())
  }

  #[tauri::command(rename = "tauri_sync_conflict_settings_get")]
  pub async fn iroh_sync_conflict_settings_get() -> R<Value> {
    Err(unsupported())
  }

  #[tauri::command(rename = "tauri_sync_conflict_settings_set")]
  pub async fn iroh_sync_conflict_settings_set(_conflict_retention_days: u32) -> R<Value> {
    Err(unsupported())
  }

  #[tauri::command(rename = "tauri_sync_conflict_restore")]
  pub async fn iroh_sync_conflict_restore(_relative_path: String) -> R<Value> {
    Err(unsupported())
  }

  #[tauri::command(rename = "tauri_sync_conflict_delete")]
  pub async fn iroh_sync_conflict_delete(_relative_path: String) -> R<Value> {
    Err(unsupported())
  }
}

#[cfg(mobile)]
pub use mobile::*;
'''
              commands.write_text(
                  '#[cfg(not(mobile))]\nmod desktop {\n' + indented + '}\n\n#[cfg(not(mobile))]\npub use desktop::*;\n' + mobile
              )

          test = Path('tests/app/unit/addons/nativeMobileCompatibility.spec.js')
          text = test.read_text()
          if 'does not resolve Iroh inside Android or iOS application builds' not in text:
              addition = r'''

  it('does not resolve Iroh inside Android or iOS application builds', () => {
    const cargo = fs.readFileSync(path.join(root, 'Elephant/backend/tauri/Cargo.toml'), 'utf8')
    const lib = fs.readFileSync(path.join(root, 'Elephant/backend/tauri/src/lib_min.rs'), 'utf8')
    const vault = fs.readFileSync(path.join(root, 'Elephant/backend/tauri/src/vault/mod.rs'), 'utf8')
    const commands = fs.readFileSync(path.join(root, 'Elephant/backend/tauri/src/sync_commands.rs'), 'utf8')

    const desktopSection = cargo.split('[target.\'cfg(not(any(target_os = "android", target_os = "ios")))\'.dependencies]')[1] || ''
    const sharedSection = cargo.split('[target.\'cfg(not(any(target_os = "android", target_os = "ios")))\'.dependencies]')[0]
    expect(sharedSection).not.toMatch(/^iroh\s*=/m)
    expect(sharedSection).not.toMatch(/^iroh-mdns-address-lookup\s*=/m)
    expect(desktopSection).toMatch(/^iroh\s*=/m)
    expect(desktopSection).toMatch(/^iroh-mdns-address-lookup\s*=/m)
    expect(lib).toContain('#[cfg(not(mobile))]\npub mod sync;')
    expect(lib).toContain('#[cfg(not(mobile))]\n      app.manage(sync::IrohSyncState::new());')
    expect(vault).toContain('#[cfg(not(mobile))]\npub mod sync;')
    expect(commands).toContain('#[cfg(mobile)]\nmod mobile')
    expect(commands).toContain('addon-required')
  })
'''
              closing = text.rfind('\n})')
              if closing < 0:
                  raise SystemExit('Could not locate native mobile test suite closing brace')
              text = text[:closing] + addition + text[closing:]
              test.write_text(text)
          PY

      - name: Install dependencies
        uses: ./.github/actions/setup

      - name: Validate JavaScript contracts
        run: |
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            tests/app/unit/addons/nativeMobileCompatibility.spec.js \
            tests/app/unit/addons/physicalAddonIsolation.spec.js

      - name: Validate Rust desktop build
        run: cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --lib

      - name: Verify mobile dependency trees exclude Iroh
        shell: bash
        run: |
          set -euo pipefail
          for target in aarch64-linux-android aarch64-apple-ios
          do
            cargo tree --manifest-path Elephant/backend/tauri/Cargo.toml --target "$target" -e normal > "cargo-tree-$target.txt"
            if grep -E '(^|[[:space:]├└│─])iroh(-mdns-address-lookup)? v' "cargo-tree-$target.txt"; then
              echo "Iroh leaked into $target dependency tree" >&2
              exit 1
            fi
          done

      - name: Commit migration and remove temporary workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/extract-iroh-mobile-boundary.yml
          git add \
            Elephant/backend/tauri/Cargo.toml \
            Elephant/backend/tauri/src/lib_min.rs \
            Elephant/backend/tauri/src/sync_commands.rs \
            Elephant/backend/tauri/src/vault/mod.rs \
            tests/app/unit/addons/nativeMobileCompatibility.spec.js
          git commit -m "refactor(sync): remove Iroh from Android and iOS core builds"
          git push origin HEAD:feature/physical-addon-packages
