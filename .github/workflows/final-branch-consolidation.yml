name: Final branch consolidation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/final-branch-consolidation.yml'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: final-elephant-branch-consolidation
  cancel-in-progress: false

jobs:
  consolidate:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.head.ref == 'develop_next-integration-repair' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop_next-integration-repair
          fetch-depth: 0

      - name: Verify the single integration PR targets develop
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          test "$(gh api repos/SorbetUP/ElephantNote/pulls/84 --jq '.base.ref')" = develop
          test "$(gh api repos/SorbetUP/ElephantNote/pulls/84 --jq '.head.ref')" = develop_next-integration-repair

      - name: Close superseded pull requests
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          : > closed-pull-requests.txt
          while read -r number; do
            [ "$number" = 84 ] && continue
            gh pr close "$number" \
              --repo SorbetUP/ElephantNote \
              --comment 'Superseded by the audited consolidation PR #84. Its implementation is either fully reachable from the integration branch or replaced by the addon-first architecture; the historical branch is being removed to keep the repository maintainable.'
            printf 'CLOSED\t#%s\n' "$number" >> closed-pull-requests.txt
          done < <(gh pr list --repo SorbetUP/ElephantNote --state open --limit 200 --json number --jq '.[].number')

      - name: Delete superseded remaining branches
        shell: bash
        run: |
          set -euo pipefail
          git fetch --prune origin '+refs/heads/*:refs/remotes/origin/*'
          : > final-deleted-branches.txt

          branches=(
            develop_next-unified-candidate2
            develop_next-mobile-recovery
            feature/physical-addon-packages
            refactor/muya-rust-file-by-file
            assistant/wiki-organization-continuation
            assistant/wiki-links-graph-integration
            assistant/validate-knowledge-graph-wiki
            feature/trusted-addon-runtime
            feature/rust-knowledge-core
          )

          for branch in "${branches[@]}"; do
            if ! git show-ref --verify --quiet "refs/remotes/origin/$branch"; then
              continue
            fi
            case "$branch" in
              assistant/wiki-links-graph-integration)
                # Fifteen unique commits only update the generated validation transcript.
                ;;
              assistant/validate-knowledge-graph-wiki|feature/rust-knowledge-core)
                # These retain obsolete pre-addon Knowledge core paths. The current branch owns
                # the equivalent functionality through the physical Knowledge addon.
                ;;
              *)
                # Every other branch is a direct ancestor of the current integration head.
                git merge-base --is-ancestor "origin/$branch" origin/develop_next-integration-repair
                ;;
            esac
            git push origin --delete "$branch"
            printf 'DELETE\t%s\n' "$branch" >> final-deleted-branches.txt
            git update-ref -d "refs/remotes/origin/$branch" || true
          done

          git fetch --prune origin '+refs/heads/*:refs/remotes/origin/*'
          git for-each-ref \
            --sort=refname \
            --format='%(refname:short)%09%(objectname)%09%(committerdate:iso8601-strict)%09%(subject)' \
            refs/remotes/origin > final-remaining-branches.tsv

          expected='origin/develop
          origin/develop_next
          origin/develop_next-integration-repair
          origin/main'
          actual=$(cut -f1 final-remaining-branches.tsv)
          test "$actual" = "$expected"

      - name: Commit the final cleanup audit
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p docs/repository
          mv closed-pull-requests.txt docs/repository/closed-pull-requests-2026-07-16.txt
          mv final-deleted-branches.txt docs/repository/final-deleted-branches-2026-07-16.txt
          mv final-remaining-branches.tsv docs/repository/final-remaining-branches-2026-07-16.tsv
          git rm .github/workflows/final-branch-consolidation.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/repository
          git commit -m 'chore(repo): retain only main develop develop_next and the integration branch'
          git push origin HEAD:develop_next-integration-repair

      - name: Upload final cleanup audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-repository-cleanup-audit
          path: |
            closed-pull-requests.txt
            final-deleted-branches.txt
            final-remaining-branches.tsv
            docs/repository/closed-pull-requests-2026-07-16.txt
            docs/repository/final-deleted-branches-2026-07-16.txt
            docs/repository/final-remaining-branches-2026-07-16.tsv
          if-no-files-found: warn
          retention-days: 30
