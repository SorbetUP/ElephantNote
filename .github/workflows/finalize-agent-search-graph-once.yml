name: Finalize agent search and graph rendering once

on:
  push:
    branches:
      - assistant/wiki-links-graph-integration
    paths:
      - .github/workflows/finalize-agent-search-graph-once.yml

permissions:
  contents: write

jobs:
  patch-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: assistant/wiki-links-graph-integration
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Apply final fixes
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              p = Path(path)
              text = p.read_text()
              if old not in text:
                  raise SystemExit(f"missing patch anchor in {path}: {old[:140]!r}")
              p.write_text(text.replace(old, new, 1))

          replace_once(
              'Elephant/backend/tauri/src/chat_runtime.rs',
              '''        let search_results = actions
            .iter()
            .filter_map(|entry| entry.pointer("/execution/result"))
            .filter(|value| value.is_array())
            .cloned()
            .collect::<Vec<_>>();
        if !search_results.is_empty() {
''',
              '''        let search_requested = actions.iter().any(|entry| {
            entry
                .pointer("/proposal/action/action")
                .and_then(Value::as_str)
                == Some("search_notes")
        });
        let search_results = actions
            .iter()
            .filter_map(|entry| entry.pointer("/execution/result"))
            .filter(|value| value.is_array())
            .cloned()
            .collect::<Vec<_>>();
        if search_requested {
'''
          )
          replace_once(
              'Elephant/backend/tauri/src/chat_runtime.rs',
              '''            let tool_context =
                serde_json::to_string_pretty(&search_results).map_err(|error| error.to_string())?;
            let followup_prompt = format!(
                "{prompt}\n\nThe ElephantNote search tool returned the following real indexed-note results:\n{tool_context}\n\nAnswer the user's request using these results. Cite note titles naturally. Do not emit another elephantnote_actions block."
            );
''',
              '''            let tool_context = if search_results.is_empty() {
                "[]".to_string()
            } else {
                serde_json::to_string_pretty(&search_results)
                    .map_err(|error| error.to_string())?
            };
            let instruction = if search_results.is_empty() {
                "No matching indexed note was returned. Say that honestly without claiming ElephantNote has no note-search access."
            } else {
                "Answer the user's request from these real results and cite note titles naturally."
            };
            let followup_prompt = format!(
                "{prompt}\n\nThe ElephantNote search tool returned these real indexed-note results:\n{tool_context}\n\n{instruction} Do not emit another elephantnote_actions block."
            );
'''
          )

          replace_once(
              'Elephant/frontend/app/components/views/ChatView.vue',
              '''    await invokeProposal('tauri_knowledge_chat_action_approve', id)
    const execution = await invokeProposal('tauri_knowledge_chat_action_execute', id)
''',
              '''    const execution = await invokeProposal('tauri_knowledge_chat_action_execute', id)
'''
          )

          graph = Path('Elephant/frontend/app/components/views/AtomicGraphView.vue')
          text = graph.read_text()
          text = text.replace('  filterOrphans.value = false\n', '  filterOrphans.value = true\n', 1)
          text = text.replace(
              '''        if (!active) {
          return { ...attrs, size: (attrs.size || 4) * nodeSizeScale.value }
        }
''',
              '''        const cameraRatio = renderer?.getCamera().getState().ratio || 1
        const zoomBoost = Math.min(2.35, Math.max(1, Math.sqrt(cameraRatio)))
        if (!active) {
          return { ...attrs, size: (attrs.size || 4) * nodeSizeScale.value * zoomBoost }
        }
''', 1)
          text = text.replace(
              'nodeSizeScale.value * (1 + 0.45 * selectAnimRef)',
              'nodeSizeScale.value * zoomBoost * (1 + 0.45 * selectAnimRef)', 1)
          text = text.replace(
              'nodeSizeScale.value * (1 + 0.35 * hoverAnimRef)',
              'nodeSizeScale.value * zoomBoost * (1 + 0.35 * hoverAnimRef)', 1)
          text = text.replace(
              'nodeSizeScale.value * 1.12',
              'nodeSizeScale.value * zoomBoost * 1.12', 1)
          text = text.replace(
              'dimHex(attrs.color, bgDimRgb, dim * 0.88)',
              'dimHex(attrs.color, bgDimRgb, dim * 0.58)', 1)
          text = text.replace(
              'nodeSizeScale.value * (1 - 0.5 * dim)',
              'nodeSizeScale.value * zoomBoost * (1 - 0.18 * dim)', 1)
          text = text.replace(
              '''  const hasEmbeddingEdges = graph.edges().some((edge) => graph.getEdgeAttribute(edge, 'edgeType') === 'wiki-semantic')
  if (hasEmbeddingEdges) setTimeout(() => runForceSimulation(1200), 0)
''',
              '''  // Wiki-source embeddings are already applied by the deterministic local territory layout.
  // Avoid an O(n²) whole-vault simulation during mount.
''', 1)
          graph.write_text(text)

          test = Path('tests/app/unit/chatAgentSurface.spec.js')
          test_text = test.read_text()
          test_text = test_text.replace(
              "    expect(source).toContain('tauri_knowledge_chat_action_approve')\n",
              "    expect(source).not.toContain(\"await invokeProposal('tauri_knowledge_chat_action_approve', id)\")\n"
          )
          test_text = test_text.replace(
              "    expect(source).toContain('const filterOrphans = ref(true)')\n",
              "    expect(source).toContain('const filterOrphans = ref(true)')\n    expect(source).toContain('filterOrphans.value = true')\n    expect(source).toContain('const zoomBoost = Math.min(2.35')\n"
          )
          test.write_text(test_text)
          PY

      - name: Format Rust
        run: cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml

      - name: Run focused frontend tests
        run: pnpm exec vitest run tests/app/unit/chatAgentSurface.spec.js tests/app/unit/wikiGraphSurface.spec.js tests/app/unit/internalNoteLinks.spec.js

      - name: Lint touched frontend files
        run: pnpm exec eslint Elephant/frontend/app/components/views/ChatView.vue Elephant/frontend/app/components/views/AtomicGraphView.vue Elephant/frontend/app/components/views/semanticGraphViewHelpers.js tests/app/unit/chatAgentSurface.spec.js tests/app/unit/wikiGraphSurface.spec.js

      - name: Check Tauri backend
        run: cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --no-default-features --message-format short

      - name: Build frontend
        run: pnpm tauri:web:build

      - name: Commit source and remove workflow
        shell: bash
        run: |
          git config user.name "ElephantNote CI"
          git config user.email "actions@users.noreply.github.com"
          git rm .github/workflows/finalize-agent-search-graph-once.yml
          git add Elephant tests
          git commit -m "Finalize agent search feedback and full graph rendering"
          git push origin HEAD:assistant/wiki-links-graph-integration
