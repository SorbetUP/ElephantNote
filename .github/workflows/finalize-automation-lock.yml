name: Finalize Playwright-free lockfile

on:
  pull_request:
    types: [synchronize]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: finalize-playwright-free-lockfile
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/addon-runtime-stabilization
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Capture the exact Rust ownership workflow
        shell: bash
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          import json
          import pathlib
          import urllib.request
          request = urllib.request.Request(
              'https://api.github.com/repos/SorbetUP/ElephantNote/actions/workflows/311691094',
              headers={'Accept': 'application/vnd.github+json', 'User-Agent': 'Elephant-CI'}
          )
          with urllib.request.urlopen(request) as response:
              metadata = json.load(response)
          path = pathlib.Path(metadata['path'])
          pathlib.Path('rust-editor-ownership-workflow.json').write_text(json.dumps(metadata, indent=2))
          pathlib.Path('rust-editor-ownership-workflow.yml').write_text(path.read_text())
          print(f'RUST_OWNERSHIP_WORKFLOW_PATH={path}')
          PY

      - name: Regenerate the exact lockfile
        shell: bash
        run: |
          set -euxo pipefail
          corepack enable
          corepack prepare pnpm@10.33.4 --activate
          pnpm install --lockfile-only --ignore-scripts
          if grep -nE '^ {6}playwright:' pnpm-lock.yaml; then
            echo 'Root Playwright dependency is still present in the lockfile.' >&2
            exit 1
          fi

      - name: Upload ownership definition and resolved lockfile
        uses: actions/upload-artifact@v4
        with:
          name: automation-finalization-evidence
          path: |
            pnpm-lock.yaml
            rust-editor-ownership-workflow.json
            rust-editor-ownership-workflow.yml
          if-no-files-found: error

      - name: Commit only the resolved lockfile
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add pnpm-lock.yaml
          git diff --cached --check
          if git diff --cached --quiet; then
            echo 'Lockfile already matches package.json.'
            exit 0
          fi
          git commit -m 'chore(automation): finalize Playwright-free dependencies'
          git push origin HEAD:agent/addon-runtime-stabilization
