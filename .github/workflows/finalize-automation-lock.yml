name: Locate legacy Muya imports

on:
  pull_request:
    types: [synchronize]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: locate-legacy-muya-imports
  cancel-in-progress: true

jobs:
  locate:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Locate every import rejected by Rust Editor Ownership
        shell: bash
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re

          roots = [
              Path('Elephant/frontend/app'),
              Path('Elephant/frontend/src/renderer/src'),
              Path('addons/official'),
          ]
          extensions = {'.js', '.mjs', '.ts', '.vue'}
          module_pattern = re.compile(
              r"(?:from\s+|import\s*\(|import\s+)[\"'](?P<module>[^\"']+)[\"']"
          )
          violations = []
          for root in roots:
              for path in root.rglob('*'):
                  if path.suffix not in extensions:
                      continue
                  if path.name.endswith(('.spec.js', '.test.js')):
                      continue
                  relative = path.as_posix()
                  text = path.read_text(errors='ignore')
                  for match in module_pattern.finditer(text):
                      module = match.group('module')
                      if module == 'muya' or module.startswith('muya/'):
                          violations.append(f'{relative}: legacy package import {module!r}')
                      if 'frontend/src/muya' in module:
                          violations.append(f'{relative}: direct legacy source import {module!r}')
          Path('muya-import-violations.txt').write_text(
              '\n'.join(sorted(set(violations))) + ('\n' if violations else '')
          )
          print(Path('muya-import-violations.txt').read_text() or 'No violations.')
          PY

      - name: Upload exact violations
        uses: actions/upload-artifact@v4
        with:
          name: legacy-muya-import-violations
          path: muya-import-violations.txt
          if-no-files-found: error
