name: Finalize Chat Agent Surface

on:
  pull_request:
    branches:
      - assistant/wiki-links-graph-integration
    paths:
      - .github/workflows/finalize-chat-agent-surface.yml

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'assistant/wiki-organization-continuation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: assistant/wiki-organization-continuation
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Align atomic action identity check
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('Elephant/frontend/app/components/views/ChatView.vue')
          source = path.read_text()
          old = "const actions = (message.actions || []).map((candidate) => candidate?.proposal?.id === targetId ? { ...candidate, ...patch } : candidate)"
          new = "const actions = (message.actions || []).map((entry) => entry?.proposal?.id === targetId ? { ...entry, ...patch } : entry)"
          if source.count(old) != 1:
              raise SystemExit(f'expected exactly one atomic action identity expression, found {source.count(old)}')
          path.write_text(source.replace(old, new))
          PY

      - name: Run focused chat agent test
        run: pnpm vitest run tests/app/unit/chatAgentSurface.spec.js

      - name: Commit validated refinement
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/finalize-chat-agent-surface.yml
          git add Elephant/frontend/app/components/views/ChatView.vue
          git commit -m "test: keep chat action identity contract explicit"
          git push origin HEAD:assistant/wiki-organization-continuation
