name: Finalize ChatGPT subscription card

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - develop

permissions:
  contents: write

jobs:
  finalize-and-validate:
    if: github.head_ref == 'feature/real-codex-subscription'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/real-codex-subscription
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Remove connected status message
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          path = Path('Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue')
          text = path.read_text()
          old = "? 'Authenticated through Codex app-server.'"
          new = "? ''"
          if text.count(old) != 1:
              raise SystemExit(f'connected message pattern count={text.count(old)}')
          path.write_text(text.replace(old, new, 1))
          PY

      - name: Validate focused frontend changes
        shell: bash
        env:
          NODE_PATH: Elephant/node_modules
        run: |
          set -euxo pipefail
          test -f Elephant/frontend/app/components/settings/chatgpt-logo.svg
          ! grep -R "Authenticated through Codex app-server" \
            Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue \
            Elephant/frontend/app/components/settings/ChatgptSubscriptionCard.vue
          Elephant/node_modules/.bin/eslint \
            Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue \
            Elephant/frontend/app/components/settings/ChatgptSubscriptionCard.vue \
            --fix
          Elephant/node_modules/.bin/eslint \
            Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue \
            Elephant/frontend/app/components/settings/ChatgptSubscriptionCard.vue
          pnpm tauri:web:build

      - name: Commit validated cleanup
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/finalize-chatgpt-card.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue \
            Elephant/frontend/app/components/settings/ChatgptSubscriptionCard.vue \
            Elephant/frontend/app/components/settings/chatgpt-logo.svg \
            .github/workflows/finalize-chatgpt-card.yml
          git commit -m "Polish ChatGPT logo and reset actions"
          git push origin HEAD:feature/real-codex-subscription
