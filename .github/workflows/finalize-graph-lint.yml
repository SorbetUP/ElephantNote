name: Finalize Graph Lint

on:
  pull_request:
    branches:
      - assistant/wiki-links-graph-integration
    paths:
      - .github/workflows/finalize-graph-lint.yml

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'assistant/wiki-organization-continuation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: assistant/wiki-organization-continuation
          fetch-depth: 0

      - name: Remove obsolete local theme alias
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('Elephant/frontend/app/components/views/AtomicGraphView.vue')
          source = path.read_text()
          old = '''function buildGraph (data) {
  const graph = new Graph()
  const t = theme.value
  const { nodes, edges, edgeCounts, maxEdges = 1 } = data
'''
          new = '''function buildGraph (data) {
  const graph = new Graph()
  const { nodes, edges, edgeCounts, maxEdges = 1 } = data
'''
          if source.count(old) != 1:
              raise SystemExit(f'expected one buildGraph theme alias, found {source.count(old)}')
          path.write_text(source.replace(old, new, 1))
          PY

      - name: Verify graph source contracts
        run: |
          grep -q 'maxEdges = 1' Elephant/frontend/app/components/views/AtomicGraphView.vue
          grep -q 'clusterIndex: node.clusterIndex || 0' Elephant/frontend/app/components/views/AtomicGraphView.vue
          ! grep -A3 'function buildGraph' Elephant/frontend/app/components/views/AtomicGraphView.vue | grep -q 'const t = theme.value'

      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Elephant/frontend/app/components/views/AtomicGraphView.vue
          git commit --no-verify -m "fix: remove obsolete graph theme alias"
          git push origin HEAD:assistant/wiki-organization-continuation
