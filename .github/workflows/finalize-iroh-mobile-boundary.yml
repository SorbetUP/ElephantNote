name: Finalize Iroh mobile boundary

on:
  push:
    branches:
      - feature/physical-addon-packages
    paths:
      - .github/workflows/finalize-iroh-mobile-boundary.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/physical-addon-packages
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Finish source boundary and tests
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          lib = Path('Elephant/backend/tauri/src/lib_min.rs')
          text = lib.read_text()
          text = text.replace('pub mod sync;\n', '#[cfg(not(mobile))]\npub mod sync;\n')
          text = text.replace('#[cfg(test)]\nmod sync_contract_tests;', '#[cfg(all(test, not(mobile)))]\nmod sync_contract_tests;')
          text = text.replace(
              '      app.manage(sync::IrohSyncState::new());\n',
              '      #[cfg(not(mobile))]\n      app.manage(sync::IrohSyncState::new());\n'
          )
          lib.write_text(text)

          test = Path('tests/app/unit/addons/nativeMobileCompatibility.spec.js')
          text = test.read_text()
          if 'does not resolve Iroh inside Android or iOS application builds' not in text:
              addition = r'''

  it('does not resolve Iroh inside Android or iOS application builds', () => {
    const cargo = fs.readFileSync(path.join(root, 'Elephant/backend/tauri/Cargo.toml'), 'utf8')
    const lib = fs.readFileSync(path.join(root, 'Elephant/backend/tauri/src/lib_min.rs'), 'utf8')
    const vault = fs.readFileSync(path.join(root, 'Elephant/backend/tauri/src/vault/mod.rs'), 'utf8')
    const commands = fs.readFileSync(path.join(root, 'Elephant/backend/tauri/src/sync_commands.rs'), 'utf8')

    const sectionMarker = '[target.\'cfg(not(any(target_os = "android", target_os = "ios")))\'.dependencies]'
    const [sharedSection, desktopSection = ''] = cargo.split(sectionMarker)
    expect(sharedSection).not.toMatch(/^iroh\s*=/m)
    expect(sharedSection).not.toMatch(/^iroh-mdns-address-lookup\s*=/m)
    expect(desktopSection).toMatch(/^iroh\s*=/m)
    expect(desktopSection).toMatch(/^iroh-mdns-address-lookup\s*=/m)
    expect(lib).toContain('#[cfg(not(mobile))]\npub mod sync;')
    expect(lib).toContain('#[cfg(not(mobile))]\n      app.manage(sync::IrohSyncState::new());')
    expect(vault).toContain('#[cfg(not(mobile))]\npub mod sync;')
    expect(commands).toContain('#[cfg(mobile)]\nmod mobile')
    expect(commands).toContain('addon-required')
  })
'''
              closing = text.rfind('\n})')
              if closing < 0:
                  raise SystemExit('Could not locate native mobile test suite closing brace')
              test.write_text(text[:closing] + addition + text[closing:])
          PY

      - uses: ./.github/actions/setup

      - name: Run focused compatibility tests
        run: |
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            tests/app/unit/addons/nativeMobileCompatibility.spec.js \
            tests/app/unit/addons/physicalAddonIsolation.spec.js

      - name: Compile desktop Rust shell
        run: cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --lib

      - name: Confirm Android and iOS dependency trees exclude Iroh
        shell: bash
        run: |
          set -euo pipefail
          for target in aarch64-linux-android aarch64-apple-ios
          do
            cargo tree --manifest-path Elephant/backend/tauri/Cargo.toml --target "$target" -e normal > "cargo-tree-$target.txt"
            if grep -E 'iroh(-mdns-address-lookup)? v' "cargo-tree-$target.txt"; then
              echo "Iroh leaked into $target dependency tree" >&2
              exit 1
            fi
          done

      - name: Commit validated boundary
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f \
            .github/workflows/extract-iroh-mobile-boundary.yml \
            .github/workflows/finalize-iroh-mobile-boundary.yml
          git add \
            Elephant/backend/tauri/src/lib_min.rs \
            tests/app/unit/addons/nativeMobileCompatibility.spec.js
          git commit -m "refactor(sync): remove Iroh from Android and iOS core builds"
          git push origin HEAD:feature/physical-addon-packages
