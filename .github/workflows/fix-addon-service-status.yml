name: Fix addon service status

on:
  push:
    branches:
      - feature/physical-addon-packages
    paths:
      - .github/workflows/fix-addon-service-status.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/physical-addon-packages
          fetch-depth: 0

      - name: Patch Tauri async command result
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('Elephant/backend/tauri/src/addon_services.rs')
          text = path.read_text()
          start = text.index('#[tauri::command]\npub async fn tauri_addons_service_status(')
          end = text.index('\n#[tauri::command]\npub async fn tauri_addons_service_start(', start)
          replacement = r'''#[tauri::command]
pub async fn tauri_addons_service_status(
  app: AppHandle,
  state: State<'_, AddonServiceState>,
  addon_id: String,
) -> R<AddonServiceStatus> {
  let mut services = state.services.lock().await;
  if let Some(process) = services.get_mut(&addon_id) {
    if process.is_running() {
      return Ok(AddonServiceStatus {
        running: true,
        addon_id,
        platform: process.platform.clone(),
        relative_path: process.relative_path.clone(),
        protocol: SERVICE_PROTOCOL,
        error: None,
      });
    }
    services.remove(&addon_id);
  }
  Ok(match resolve_service(&app, &addon_id) {
    Ok(resolved) => AddonServiceStatus {
      running: false,
      addon_id,
      platform: resolved.platform,
      relative_path: resolved.relative_path,
      protocol: SERVICE_PROTOCOL,
      error: None,
    },
    Err(error) => AddonServiceStatus {
      running: false,
      addon_id,
      platform: platform_key(),
      relative_path: String::new(),
      protocol: SERVICE_PROTOCOL,
      error: Some(error),
    },
  })
}
'''
          path.write_text(text[:start] + replacement + text[end:])
          PY

      - name: Install Linux Tauri dependencies
        shell: bash
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Compile service host and Iroh contracts
        shell: bash
        run: |
          cargo test --manifest-path Elephant/backend/tauri/Cargo.toml --lib addon_services::tests
          cargo test --manifest-path Elephant/backend/tauri/Cargo.toml --lib sync_contract_tests

      - name: Commit validated fix and remove workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/fix-addon-service-status.yml
          git add Elephant/backend/tauri/src/addon_services.rs
          git commit -m "fix(addons): return Result from async service status"
          git push origin HEAD:feature/physical-addon-packages
