                    score: -raw_score,
                    start_offset: row.get::<_, i64>(6)? as usize,
                    end_offset: row.get::<_, i64>(7)? as usize,
                })
            })
            .map_err(|error| error.to_string())?;
        rows.collect::<Result<Vec<_>, _>>()
            .map_err(|error| error.to_string())
    }
'''
