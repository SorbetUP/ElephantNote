      - name: Format Rust
        run: |
          cargo fmt --manifest-path Elephant/backend/knowledge-core/Cargo.toml
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml

      - name: Test knowledge core
        run: cargo test --manifest-path Elephant/backend/knowledge-core/Cargo.toml --all-targets -- --nocapture

      - name: Check Tauri backend
        run: cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --no-default-features --message-format short

      - name: Test graph and agent regressions
        run: pnpm exec vitest run tests/app/unit/wikiGraphSurface.spec.js tests/app/unit/wikiAgentRuntime.spec.js tests/app/unit/internalNoteLinks.spec.js

      - name: Lint touched frontend files
        run: pnpm exec eslint Elephant/frontend/app/components/views/ChatView.vue Elephant/frontend/app/components/views/AtomicGraphView.vue Elephant/frontend/app/components/views/semanticGraphViewHelpers.js Elephant/frontend/app/services/elephantnoteClient/domainClients.js tests/app/unit/wikiGraphSurface.spec.js tests/app/unit/wikiAgentRuntime.spec.js

      - name: Build Tauri web frontend
        run: pnpm tauri:web:build

      - name: Commit validated source and remove one-shot workflow
        shell: bash
        run: |
          git config user.name "ElephantNote CI"
          git config user.email "actions@users.noreply.github.com"
          git rm .github/workflows/fix-agent-search-approval-embeddings-once.yml
