name: Fix Android regression harness crash scoping

on:
  push:
    branches:
      - develop_next-integration-repair
    paths:
      - .github/workflows/fix-android-regression-harness.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop_next-integration-repair
          fetch-depth: 0
      - name: Scope crash detection and make scenarios fail independently
        shell: python {0}
        run: |
          from pathlib import Path
          import re

          script = Path('build/scripts/android_usage_regression_suite.sh')
          text = script.read_text()

          crash_guard = r'''assert_no_renderer_regression() {
            adb logcat -d -v threadtime > "$LOG_FILE"
            local app_pid
            app_pid="$(adb shell pidof "$PACKAGE_ID" | tr -d '\r' | awk '{print $1}' || true)"

            if grep -Fq "Process: $PACKAGE_ID" "$LOG_FILE" || grep -Eq "Fatal signal.*${PACKAGE_ID//./\\.}" "$LOG_FILE"; then
              echo "A fatal Elephant Android crash was detected during app usage testing." >&2
              grep -E "Process: ${PACKAGE_ID//./\\.}|Fatal signal.*${PACKAGE_ID//./\\.}" "$LOG_FILE" >&2 || true
              return 1
            fi
            if [ -n "$app_pid" ] && awk -v pid="$app_pid" '$3 == pid && /FATAL EXCEPTION|SIGABRT|SIGSEGV/ { found=1 } END { exit found ? 0 : 1 }' "$LOG_FILE"; then
              echo "A fatal Elephant process error was detected during app usage testing." >&2
              awk -v pid="$app_pid" '$3 == pid && /FATAL EXCEPTION|AndroidRuntime|SIGABRT|SIGSEGV/ { print }' "$LOG_FILE" >&2 || true
              return 1
            fi
            if grep -Eq 'Tauri/Console:.*(Uncaught|ReferenceError|TypeError|SyntaxError)|Unhandled promise rejection|Command tauri_vault_read_binary not found|search\.initVault is not a function' "$LOG_FILE"; then
              echo "A renderer regression was detected during app usage testing." >&2
              grep -E 'Tauri/Console:.*(Uncaught|ReferenceError|TypeError|SyntaxError)|Unhandled promise rejection|Command tauri_vault_read_binary not found|search\.initVault is not a function' "$LOG_FILE" >&2 || true
              return 1
            fi
          }
          '''.replace('          ', '')
          text, count = re.subn(
              r'assert_no_renderer_regression\(\) \{.*?\n\}\n\nwait_for_workspace\(\)',
              crash_guard + '\nwait_for_workspace()',
              text,
              count=1,
              flags=re.S,
          )
          if count != 1:
              raise SystemExit(f'Expected one crash guard, replaced {count}')

          old_runner = '''  set +e
            "$function_name" > >(tee "$scenario_log") 2>&1
            local status=$?
            set -e

            local duration=$((SECONDS - CURRENT_STARTED_AT))
            if [ "$status" -eq 0 ]; then
              assert_process_alive && assert_no_renderer_regression
              status=$?
            fi
          '''.replace('          ', '')
          new_runner = '''  set +e
            (
              set -euo pipefail
              "$function_name"
            ) > >(tee "$scenario_log") 2>&1
            local status=$?
            set -e

            local duration=$((SECONDS - CURRENT_STARTED_AT))
            if [ "$status" -eq 0 ]; then
              if assert_process_alive && assert_no_renderer_regression; then
                status=0
              else
                status=$?
              fi
            fi
          '''.replace('          ', '')
          if old_runner not in text:
              raise SystemExit('Expected run_scenario execution block was not found')
          text = text.replace(old_runner, new_runner)
          text = text.replace(
              'assert_screens_differ android-layout-before.png android-layout-after.png 0.45 library_layout_toggle',
              'assert_screens_differ android-layout-before.png android-layout-after.png 0.10 library_layout_toggle',
          )
          script.write_text(text)

          test = Path('tests/app/unit/specs/main/elephantnote/androidUsageRegressionSuite.spec.js')
          source = test.read_text()
          anchor = "    expect(suite).toContain('android-usage-${id}.log')\n"
          checks = (
              "    expect(suite).toContain('set -euo pipefail')\n"
              "    expect(suite).toContain('if assert_process_alive && assert_no_renderer_regression; then')\n"
              "    expect(suite).toContain('awk -v pid=\"$app_pid\"')\n"
              "    expect(suite).not.toContain(\"grep -Eq 'FATAL EXCEPTION|Process: com\\\\.elephantnote\\\\.app\")\n"
          )
          if checks not in source:
              source = source.replace(anchor, anchor + checks)
          test.write_text(source)

          Path('.github/workflows/fix-android-regression-harness.yml').unlink()
      - name: Commit patch and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix Android regression crash scoping and scenario isolation'
          git push origin HEAD:develop_next-integration-repair
