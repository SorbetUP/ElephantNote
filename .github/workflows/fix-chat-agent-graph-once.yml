name: Fix chat agent and graph once

on:
  push:
    branches:
      - assistant/wiki-links-graph-integration
    paths:
      - .github/workflows/fix-chat-agent-graph-once.yml

permissions:
  contents: write

jobs:
  patch-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: assistant/wiki-links-graph-integration
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply source fixes
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              p = Path(path)
              text = p.read_text()
              if old not in text:
                  raise SystemExit(f"missing patch anchor in {path}: {old[:120]!r}")
              p.write_text(text.replace(old, new, 1))

          # Preserve per-request AI route, stream id and auto-approval options.
          replace_once(
              'Elephant/frontend/app/services/elephantnoteClient/domainClients.js',
              """const normalizeRagChatPayload = (payload, limit = 6) => {
  if (payload && typeof payload === 'object') {
    return {
      message: String(payload.message || '').trim(),
      limit: Number.isFinite(Number(payload.limit)) ? Number(payload.limit) : limit,
      messages: Array.isArray(payload.messages) ? payload.messages : []
    }
  }
  return {
    message: String(payload || '').trim(),
    limit,
    messages: []
  }
}
""",
              """const normalizeRagChatPayload = (payload, limit = 6) => {
  if (payload && typeof payload === 'object') {
    return {
      ...payload,
      message: String(payload.message || '').trim(),
      limit: Number.isFinite(Number(payload.limit)) ? Number(payload.limit) : limit,
      messages: Array.isArray(payload.messages) ? payload.messages : []
    }
  }
  return {
    message: String(payload || '').trim(),
    limit,
    messages: []
  }
}
"""
          )

          # All graph nodes remain visible by default; the Wiki territory is a focus, not a destructive filter.
          replace_once(
              'Elephant/frontend/app/components/views/AtomicGraphView.vue',
              "const filterOrphans = ref(false)",
              "const filterOrphans = ref(true)"
          )

          # Real Codex delta streaming over a scoped Tauri event channel.
          p = Path('Elephant/backend/tauri/src/chat_runtime/codex_app_server.rs')
          text = p.read_text()
          old = """pub async fn chat_with_effort(
    app: &AppHandle,
    model: &str,
    prompt: &str,
    reasoning_effort: Option<&str>,
) -> R<CodexChatResult> {
    let started = Instant::now();
"""
          new = """pub async fn chat_with_effort(
    app: &AppHandle,
    model: &str,
    prompt: &str,
    reasoning_effort: Option<&str>,
) -> R<CodexChatResult> {
    chat_with_effort_streaming(app, model, prompt, reasoning_effort, None).await
}

