  if (payload.type === 'reset') {
    chatStore.updateMessage(message.id, { content: '', streamPhase: 'Résultats trouvés, rédaction…' })
  } else if (payload.type === 'delta') {
    chatStore.updateMessage(message.id, { content: `${message.content || ''}${payload.delta || ''}`, streamPhase: 'Rédaction…' })
