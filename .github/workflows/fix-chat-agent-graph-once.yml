name: Fix chat agent and graph once

on:
  push:
    branches:
      - assistant/wiki-links-graph-integration
    paths:
      - .github/fix-chat-agent-graph-trigger.txt
  pull_request:
    branches:
      - feature/wiki-knowledge-continuation
    paths:
      - .github/fix-chat-agent-graph-trigger.txt

permissions:
  contents: write

jobs:
  patch-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: assistant/wiki-links-graph-integration
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: pnpm install --frozen-lockfile
      - name: Apply source fixes
        run: |
          python3 .github/scripts/fix_chat_agent_graph.py
          python3 .github/scripts/fix_chat_agent_graph_lint.py
      - run: cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml
      - name: Auto-fix focused frontend files
        run: NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/eslint --fix Elephant/frontend/app/components/views/ChatView.vue Elephant/frontend/app/components/views/AtomicGraphView.vue Elephant/frontend/app/services/elephantnoteClient/domainClients.js || true
      - name: Capture focused lint result
        id: focused_lint
        continue-on-error: true
        run: NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/eslint --format json Elephant/frontend/app/components/views/ChatView.vue Elephant/frontend/app/components/views/AtomicGraphView.vue Elephant/frontend/app/services/elephantnoteClient/domainClients.js > focused-chat-lint.json
      - uses: actions/upload-artifact@v4
        with:
          name: focused-chat-lint
          path: focused-chat-lint.json
      - name: Fail on focused lint errors
        if: steps.focused_lint.outcome == 'failure'
        run: exit 1
      - name: Capture Tauri backend check
        id: tauri_check
        continue-on-error: true
        run: cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --no-default-features --message-format short > focused-tauri-check.txt 2>&1
      - uses: actions/upload-artifact@v4
        with:
          name: focused-tauri-check
          path: focused-tauri-check.txt
      - name: Fail on Tauri check errors
        if: steps.tauri_check.outcome == 'failure'
        run: exit 1
      - name: Build Tauri web frontend
        run: pnpm tauri:web:build
      - name: Commit validated fixes and remove temporary files
        run: |
          git config user.name "ElephantNote automation"
          git config user.email "actions@users.noreply.github.com"
          git rm .github/workflows/fix-chat-agent-graph-once.yml .github/scripts/fix_chat_agent_graph.py .github/scripts/fix_chat_agent_graph_lint.py .github/fix-chat-agent-graph-trigger.txt
          git add Elephant/frontend/app/services/elephantnoteClient/domainClients.js \
                  Elephant/frontend/app/components/views/AtomicGraphView.vue \
                  Elephant/frontend/app/components/views/ChatView.vue \
                  Elephant/backend/tauri/src/chat_runtime.rs \
                  Elephant/backend/tauri/src/chat_runtime/codex_app_server.rs
          git commit -m "Fix chat actions, search, streaming and graph visibility"
          git push origin HEAD:assistant/wiki-links-graph-integration
