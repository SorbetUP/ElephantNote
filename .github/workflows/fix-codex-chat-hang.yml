name: Fix Codex chat MCP startup hang

on:
  pull_request:
    branches:
      - develop

permissions:
  contents: write

jobs:
  fix-and-validate:
    if: github.head_ref == 'feature/real-codex-subscription'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/real-codex-subscription
          fetch-depth: 0

      - name: Patch isolated Codex chat runtime
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          path = Path('Elephant/backend/tauri/src/chat_runtime/codex_app_server.rs')
          text = path.read_text()

          old_channel = 'let (events, _) = broadcast::channel(256);'
          new_channel = 'let (events, _) = broadcast::channel(2048);'

          old_subscription = '''    let thread = client
        .request(
            "thread/start",'''
          new_subscription = '''    // Subscribe before thread/start so no auto-subscription event can race past us.
    let mut events = client.subscribe();
    let thread = client
        .request(
            "thread/start",'''

          old_thread_payload = '''              "approvalPolicy": "never",
              "sandbox": READ_ONLY_SANDBOX,
              "serviceName": "elephantnote"'''
          new_thread_payload = '''              "approvalPolicy": "never",
              "sandbox": READ_ONLY_SANDBOX,
              "serviceName": "elephantnote",
              "ephemeral": true,
              "config": {
                "mcp_servers": {}
              }'''

          old_second_subscription = '''
    let mut events = client.subscribe();
    let turn = client'''
          new_second_subscription = '''
    let turn = client'''

          old_event_receive = '''        let event = timeout(TURN_TIMEOUT, events.recv())
            .await
            .map_err(|_| "Codex generation timed out.".to_string())?
            .map_err(|error| format!("Codex event stream closed: {error}"))?;'''
          new_event_receive = '''        let event = match timeout(TURN_TIMEOUT, events.recv()).await {
            Err(_) => {
                let _ = client
                    .request("turn/interrupt", json!({ "threadId": thread_id, "turnId": turn_id }))
                    .await;
                return Err("Codex generation timed out before turn/completed.".to_string());
            }
            Ok(Ok(event)) => event,
            Ok(Err(broadcast::error::RecvError::Lagged(skipped))) => {
                log("event", format!("lagged skipped={skipped}; continuing"));
                continue;
            }
            Ok(Err(broadcast::error::RecvError::Closed)) => {
                return Err("Codex event stream closed before turn/completed.".to_string());
            }
        };'''

          replacements = [
              (old_channel, new_channel, 'broadcast channel'),
              (old_subscription, new_subscription, 'early subscription'),
              (old_thread_payload, new_thread_payload, 'isolated thread payload'),
              (old_second_subscription, new_second_subscription, 'duplicate subscription removal'),
              (old_event_receive, new_event_receive, 'event receive handling'),
          ]
          for old, new, label in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected 1 occurrence, found {count}')
              text = text.replace(old, new, 1)

          path.write_text(text)
          PY

      - name: Add focused contract tests
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          path = Path('Elephant/backend/tauri/src/chat_runtime/codex_app_server.rs')
          text = path.read_text()
          marker = '''    #[test]
    fn reads_delta_text() {'''
          insertion = '''    #[test]
    fn elephantnote_chat_disables_inherited_mcp_servers() {
        let params = json!({
          "ephemeral": true,
          "config": { "mcp_servers": {} }
        });
        assert_eq!(params.pointer("/config/mcp_servers"), Some(&json!({})));
        assert_eq!(params.get("ephemeral").and_then(Value::as_bool), Some(true));
    }

    #[test]
    fn reads_delta_text() {'''
          if text.count(marker) != 1:
              raise SystemExit(f'test marker count={text.count(marker)}')
          text = text.replace(marker, insertion, 1)
          path.write_text(text)
          PY

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential curl file libayatana-appindicator3-dev libgtk-3-dev librsvg2-dev libssl-dev libwebkit2gtk-4.1-dev patchelf wget

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91
          components: rustfmt

      - name: Validate Rust
        shell: bash
        run: |
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml -- Elephant/backend/tauri/src/chat_runtime/codex_app_server.rs
          cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --all-targets --no-default-features
          cargo test --manifest-path Elephant/backend/tauri/Cargo.toml --lib --no-default-features chat_runtime::codex_app_server::tests

      - name: Remove temporary workflow and commit
        shell: bash
        run: |
          rm .github/workflows/fix-codex-chat-hang.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Elephant/backend/tauri/src/chat_runtime/codex_app_server.rs .github/workflows/fix-codex-chat-hang.yml
          git commit -m "Isolate Codex chat from inherited MCP servers"
          git push origin HEAD:feature/real-codex-subscription
