name: Fix Codex Web Search Config

on:
  push:
    branches:
      - assistant/wiki-organization-continuation

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: assistant/wiki-organization-continuation
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - name: Patch settings and Codex payload
        run: |
          python3 - <<'PY'
          from pathlib import Path

          panel_path = Path('Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue')
          panel = panel_path.read_text()
          hint_markup = '''            <small v-if="form.routes.embedding.source === 'app-local'">
              {{ localEmbeddingModelHint }}
            </small>
'''
          if panel.count(hint_markup) != 1:
              raise SystemExit('embedding availability hint markup not found exactly once')
          panel = panel.replace(hint_markup, '')
          hint_computed = '''const localEmbeddingModelHint = computed(() => {
  const count = localEmbeddingModels.value.length
  if (!count) return 'Download an embedding model from Models, then refresh this list.'
  return `${count} downloaded embedding model${count === 1 ? '' : 's'} available.`
})
'''
          if panel.count(hint_computed) != 1:
              raise SystemExit('embedding availability computed hint not found exactly once')
          panel = panel.replace(hint_computed, '')
          panel_path.write_text(panel)

          codex_path = Path('Elephant/backend/tauri/src/chat_runtime/codex_app_server.rs')
          codex = codex_path.read_text()
          invalid_config = '''      "config": {
        "web_search": "live",
        "tools": {
          "web_search": {
            "context_size": "high",
            "allowed_domains": null,
            "location": null
          }
        }
      },
'''
          compatible_config = '''      "config": {
        "web_search": "live"
      },
'''
          if codex.count(invalid_config) != 1:
              raise SystemExit('legacy Codex web search config not found exactly once')
          codex = codex.replace(invalid_config, compatible_config)
          old_assertion = '''        assert_eq!(
            thread
                .pointer("/config/tools/web_search/context_size")
                .and_then(Value::as_str),
            Some("high")
        );
'''
          new_assertion = '''        assert!(thread.pointer("/config/tools").is_none());
'''
          if codex.count(old_assertion) != 1:
              raise SystemExit('legacy Codex web search test assertion not found exactly once')
          codex = codex.replace(old_assertion, new_assertion)
          codex_path.write_text(codex)

          picker_test_path = Path('tests/app/unit/aiEmbeddingModelPicker.spec.js')
          picker_test = picker_test_path.read_text()
          anchor = "    expect(source).toContain('Select a downloaded embedding model')\n"
          replacement = anchor + "    expect(source).not.toContain('localEmbeddingModelHint')\n"
          if picker_test.count(anchor) != 1:
              raise SystemExit('embedding picker test anchor not found exactly once')
          picker_test_path.write_text(picker_test.replace(anchor, replacement))
          PY
      - name: Validate focused changes
        run: |
          cargo fmt --check --manifest-path Elephant/backend/tauri/Cargo.toml
          cargo test --manifest-path Elephant/backend/tauri/Cargo.toml codex_chat_enables_live_web_search_without_filesystem_writes --lib
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/eslint \
            Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue \
            tests/app/unit/aiEmbeddingModelPicker.spec.js
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            tests/app/unit/aiEmbeddingModelPicker.spec.js
      - name: Commit fix and remove temporary workflow
        run: |
          git rm .github/workflows/fix-codex-web-search-config.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue \
            Elephant/backend/tauri/src/chat_runtime/codex_app_server.rs \
            tests/app/unit/aiEmbeddingModelPicker.spec.js
          git commit --no-verify -m "fix: remove embedding count hint and restore Codex chat"
          git push origin HEAD:assistant/wiki-organization-continuation
