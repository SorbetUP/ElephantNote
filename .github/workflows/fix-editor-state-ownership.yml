name: Fix editor state ownership

on:
  pull_request:
    branches:
      - feature/wiki-knowledge-continuation
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  implement:
    if: github.head_ref == 'assistant/editor-state-ownership'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Apply editor repair
        shell: bash
        run: |
          if grep -q 'elephantnote:editor-user-change' Elephant/frontend/src/renderer/src/components/editorWithTabs/editor.vue \
            && grep -q 'stale scheduled write skipped' Elephant/frontend/app/components/editor/NoteEditorHost.vue; then
            echo 'Editor ownership repair already applied.'
            exit 0
          fi
          git fetch origin feature/wiki-knowledge-continuation
          git show origin/feature/wiki-knowledge-continuation:.github/scripts/fix_editor_state_ownership.py > /tmp/fix_editor.py
          python3 /tmp/fix_editor.py
      - name: Persist candidate repair
        shell: bash
        run: |
          git config user.name "ElephantNote Bot"
          git config user.email "actions@users.noreply.github.com"
          git add Elephant/frontend/app/components/editor/NoteEditorHost.vue \
            Elephant/frontend/src/renderer/src/components/editorWithTabs/editor.vue
          if ! git diff --cached --quiet; then
            git commit -m "Prevent editor hydration and tab state from triggering stale saves"
            git push origin HEAD:${{ github.head_ref }}
          fi
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate editor repair
        shell: bash
        run: |
          set +e
          Elephant/node_modules/.bin/eslint Elephant/frontend/app/components/editor/NoteEditorHost.vue Elephant/frontend/src/renderer/src/components/editorWithTabs/editor.vue > /tmp/editor-eslint.log 2>&1
          lint_status=$?
          pnpm tauri:web:build > /tmp/editor-build.log 2>&1
          build_status=$?
          set -e
          cat /tmp/editor-eslint.log /tmp/editor-build.log
          if [ "$lint_status" -ne 0 ] || [ "$build_status" -ne 0 ]; then
            {
              echo "lint=$lint_status build=$build_status"
              echo '=== eslint ==='; cat /tmp/editor-eslint.log
              echo '=== build ==='; cat /tmp/editor-build.log
            } > .github/editor-state-ownership-validation-error.txt
            git config user.name "ElephantNote Bot"
            git config user.email "actions@users.noreply.github.com"
            git add .github/editor-state-ownership-validation-error.txt
            git commit -m "Record editor ownership validation failure"
            git push origin HEAD:${{ github.head_ref }}
            exit 1
          fi
      - name: Clear diagnostics
        shell: bash
        run: |
          if [ -f .github/editor-state-ownership-validation-error.txt ]; then
            git config user.name "ElephantNote Bot"
            git config user.email "actions@users.noreply.github.com"
            git rm .github/editor-state-ownership-validation-error.txt
            git commit -m "Clear editor ownership validation diagnostics"
            git push origin HEAD:${{ github.head_ref }}
          fi
