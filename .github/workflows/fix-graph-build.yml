name: Fix Graph Build Regression

on:
  pull_request:
    branches:
      - assistant/wiki-links-graph-integration
    paths:
      - .github/workflows/fix-graph-build.yml

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'assistant/wiki-organization-continuation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: assistant/wiki-organization-continuation
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Restore bounded graph scale variables
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('Elephant/frontend/app/components/views/AtomicGraphView.vue')
          source = path.read_text()
          old = '  const { nodes, edges, edgeCounts } = data\n'
          new = '  const { nodes, edges, edgeCounts, maxEdges = 1 } = data\n'
          if source.count(old) != 1:
              raise SystemExit(f'expected one graph data destructure, found {source.count(old)}')
          source = source.replace(old, new, 1)
          old = '      clusterIndex: clusterIdx,\n'
          new = '      clusterIndex: node.clusterIndex || 0,\n'
          if source.count(old) != 1:
              raise SystemExit(f'expected one cluster index assignment, found {source.count(old)}')
          source = source.replace(old, new, 1)
          path.write_text(source)
          PY

      - name: Validate renderer
        run: |
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/eslint Elephant/frontend/app/components/views/AtomicGraphView.vue Elephant/frontend/app/components/views/semanticGraphViewHelpers.js
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run tests/app/unit/graphWikiScaleRegression.spec.js tests/app/unit/chatAgentSurface.spec.js
          pnpm tauri:web:build

      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Elephant/frontend/app/components/views/AtomicGraphView.vue
          git commit --no-verify -m "fix: keep graph scale variables defined after palette refactor"
          git push origin HEAD:assistant/wiki-organization-continuation
