name: Fix Local Embedding Model Picker

on:
  pull_request:
    branches:
      - assistant/wiki-links-graph-integration
    paths:
      - .github/workflows/fix-local-embedding-model-picker.yml

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'assistant/wiki-organization-continuation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: assistant/wiki-organization-continuation
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - name: Replace free-text local embedding model with downloaded model picker
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue')
          source = path.read_text()

          old_model = '''          <label><span>Model</span><input
            v-model.trim="form.routes.embedding.model"
            type="text"
            placeholder="Embedding model id"
          ></label>'''
          new_model = '''          <label>
            <span>Model</span>
            <div
              v-if="form.routes.embedding.source === 'app-local'"
              class="en-local-model-picker"
            >
              <select
                v-model="form.routes.embedding.model"
                :disabled="localModelsLoading"
              >
                <option value="">
                  {{ localEmbeddingModelPlaceholder }}
                </option>
                <option
                  v-for="model in localEmbeddingModels"
                  :key="resolveModelId(model)"
                  :value="resolveModelId(model)"
                >
                  {{ resolveModelName(model) }}
                </option>
              </select>
              <button
                class="secondary compact"
                type="button"
                :disabled="localModelsLoading"
                title="Refresh downloaded models"
                aria-label="Refresh downloaded models"
                @click="loadLocalModels"
              >
                <RotateCw
                  aria-hidden="true"
                  :class="{ spinning: localModelsLoading }"
                />
              </button>
            </div>
            <input
              v-else
              v-model.trim="form.routes.embedding.model"
              type="text"
              placeholder="Embedding model id"
            >
            <small v-if="form.routes.embedding.source === 'app-local'">
              {{ localEmbeddingModelHint }}
            </small>
          </label>'''
          if old_model not in source:
              raise SystemExit('embedding model input block not found')
          source = source.replace(old_model, new_model, 1)

          source = source.replace(
              "import { resolveModelId, resolveModelName } from '../views/modelsViewHelpers'",
              "import { getModelCapabilities, resolveModelId, resolveModelName } from '../views/modelsViewHelpers'",
              1,
          )
          source = source.replace(
              "const localModels = ref([])\n",
              "const localModels = ref([])\nconst localModelsLoading = ref(false)\nconst assignedEmbeddingModelId = ref('')\n",
              1,
          )

          marker = "const selectedCodexModel = computed(() => codexModels.value.find((model) => (model.model || model.id) === form.value.routes.chat.model) || null)\n"
          helpers = '''const selectedCodexModel = computed(() => codexModels.value.find((model) => (model.model || model.id) === form.value.routes.chat.model) || null)
const modelSupportsEmbedding = (model = {}) => getModelCapabilities(model)
  .some((capability) => String(capability).toLowerCase() === 'embedding')
const localEmbeddingModels = computed(() => {
  const current = String(form.value.routes.embedding.model || '').trim()
  const assigned = String(assignedEmbeddingModelId.value || '').trim()
  return localModels.value
    .filter((model) => {
      const id = resolveModelId(model)
      return Boolean(id) && (modelSupportsEmbedding(model) || id === current || id === assigned)
    })
    .sort((left, right) => resolveModelName(left).localeCompare(resolveModelName(right)))
})
const localEmbeddingModelPlaceholder = computed(() => {
  if (localModelsLoading.value) return 'Loading downloaded models…'
  return localEmbeddingModels.value.length
    ? 'Select a downloaded embedding model'
    : 'No downloaded embedding model'
})
const localEmbeddingModelHint = computed(() => {
  const count = localEmbeddingModels.value.length
  if (!count) return 'Download an embedding model from Models, then refresh this list.'
  return `${count} downloaded embedding model${count === 1 ? '' : 's'} available.`
})
'''
          if marker not in source:
              raise SystemExit('selectedCodexModel marker not found')
          source = source.replace(marker, helpers, 1)

          old_loader = '''const loadLocalModels = async() => {
  if (!form.value.localAi.enabled) {
    localModels.value = []
    return
  }
  try {
    const result = await elephantnoteClient.models.list?.()
    localModels.value = Array.isArray(result?.models) ? result.models : []
  } catch (error) {
    log.warn('[ai-settings] local-models:failed', error)
  }
}'''
          new_loader = '''const loadLocalModels = async() => {
  if (!form.value.localAi.enabled) {
    localModels.value = []
    assignedEmbeddingModelId.value = ''
    return
  }
  localModelsLoading.value = true
  try {
    const [result, selection] = await Promise.all([
      elephantnoteClient.models.listLocal?.() || elephantnoteClient.models.list?.(),
      elephantnoteClient.models.getSelection?.().catch(() => null)
    ])
    localModels.value = Array.isArray(result?.models) ? result.models.filter(Boolean) : []
    assignedEmbeddingModelId.value = String(selection?.embedding || '').trim()
    if (form.value.routes.embedding.source === 'app-local' && !form.value.routes.embedding.model) {
      const preferred = assignedEmbeddingModelId.value || resolveModelId(
        localModels.value.find(modelSupportsEmbedding)
      )
      if (preferred) form.value.routes.embedding.model = preferred
    }
  } catch (error) {
    log.warn('[ai-settings] local-models:failed', error)
  } finally {
    localModelsLoading.value = false
  }
}'''
          if old_loader not in source:
              raise SystemExit('loadLocalModels block not found')
          source = source.replace(old_loader, new_loader, 1)

          old_watch = '''watch(() => props.initialPage, (page) => {
  if (aiPages.some((item) => item.id === page)) activePage.value = page
})'''
          new_watch = '''watch(() => props.initialPage, (page) => {
  if (aiPages.some((item) => item.id === page)) activePage.value = page
})
watch(activePage, (page) => {
  if (page === 'embedding') void loadLocalModels()
})'''
          if old_watch not in source:
              raise SystemExit('initialPage watch block not found')
          source = source.replace(old_watch, new_watch, 1)

          style_marker = '<style scoped>\n'
          style = '''<style scoped>
.en-local-model-picker {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 8px;
  align-items: center;
}

.en-local-model-picker button {
  min-width: 38px;
  padding-inline: 10px;
}

.en-local-model-picker button svg {
  width: 16px;
  height: 16px;
}

'''
          if style_marker not in source:
              raise SystemExit('style marker not found')
          source = source.replace(style_marker, style, 1)
          path.write_text(source)

          test_path = Path('tests/app/unit/aiEmbeddingModelPicker.spec.js')
          test_path.write_text('''import fs from 'node:fs'\nimport path from 'node:path'\nimport { describe, expect, test } from 'vitest'\n\nconst source = fs.readFileSync(path.join(process.cwd(), 'Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue'), 'utf8')\n\ndescribe('local embedding model picker', () => {\n  test('lists downloaded embedding-capable models instead of requiring a raw id', () => {\n    expect(source).toContain("v-if=\\\"form.routes.embedding.source === 'app-local'\\\"")\n    expect(source).toContain('v-for=\\\"model in localEmbeddingModels\\\"')\n    expect(source).toContain('elephantnoteClient.models.listLocal?.()')\n    expect(source).toContain('elephantnoteClient.models.getSelection?.()')\n    expect(source).toContain('getModelCapabilities')\n    expect(source).toContain('Select a downloaded embedding model')\n  })\n\n  test('keeps manual model ids for external providers', () => {\n    expect(source).toMatch(/v-else[\\s\\S]*v-model\\.trim=\\\"form\\.routes\\.embedding\\.model\\\"/)\n  })\n})\n''')
          PY
      - name: Validate model picker
        run: |
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/eslint \
            Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue \
            tests/app/unit/aiEmbeddingModelPicker.spec.js
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            tests/app/unit/aiEmbeddingModelPicker.spec.js
      - name: Commit model picker
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue \
            tests/app/unit/aiEmbeddingModelPicker.spec.js
          git commit --no-verify -m "fix: list downloaded embedding models in AI settings"
          git push origin HEAD:assistant/wiki-organization-continuation
