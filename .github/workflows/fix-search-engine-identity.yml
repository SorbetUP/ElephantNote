name: Stabilize local search engine identity

on:
  push:
    branches:
      - develop_next-integration-repair
    paths:
      - .github/workflows/fix-search-engine-identity.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop_next-integration-repair
          fetch-depth: 0
      - name: Centralize the package-owned lexical engine id
        shell: python {0}
        run: |
          from pathlib import Path

          source = Path('addons/official/ai-search/main.js')
          text = source.read_text()
          text = text.replace(
              'const INDEX_VERSION = 2\n',
              "const INDEX_VERSION = 2\nconst LOCAL_ENGINE = Object.freeze({ engine: 'package-owned-bm25' })\n"
          )
          text = text.replace(
              "engine: this.knowledgeProvider() ? 'knowledge-provider' : 'package-owned-bm25',",
              "engine: this.knowledgeProvider() ? 'knowledge-provider' : LOCAL_ENGINE.engine,"
          )
          source.write_text(text)
          Path('.github/workflows/fix-search-engine-identity.yml').unlink()
      - name: Commit patch and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Stabilize package-owned search engine identity'
          git push origin HEAD:develop_next-integration-repair
