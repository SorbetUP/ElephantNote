name: Format Chunking Embed Fix Once

on:
  push:
    branches:
      - feature/rust-knowledge-core
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: format-chunking-embed-fix-once
  cancel-in-progress: true

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/rust-knowledge-core
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Format knowledge core Rust
        run: cargo fmt --manifest-path Elephant/backend/knowledge-core/Cargo.toml
      - name: Remove formatter workflow and commit
        shell: bash
        run: |
          rm -f .github/workflows/format-chunking-embed-fix-once.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Elephant/backend/knowledge-core/src .github/workflows/format-chunking-embed-fix-once.yml
          if git diff --cached --quiet; then
            echo 'No formatting changes required.'
            exit 0
          fi
          git commit -m 'style(knowledge): format chunking embed fix'
          git push origin HEAD:feature/rust-knowledge-core
