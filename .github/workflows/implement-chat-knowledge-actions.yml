name: Implement Chat knowledge actions

on:
  pull_request:
    branches:
      - feature/wiki-knowledge-continuation
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  implement:
    if: github.head_ref == 'assistant/chat-knowledge-actions'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - name: Apply Chat action implementation
        shell: bash
        run: |
          set +e
          git fetch origin feature/wiki-knowledge-continuation
          git reset --hard origin/feature/wiki-knowledge-continuation
          git show origin/feature/wiki-knowledge-continuation:.github/scripts/implement_chat_knowledge_actions.py > /tmp/agent.py
          python3 - <<'PY'
          from pathlib import Path
          p = Path('/tmp/agent.py')
          text = p.read_text()
          old = '''        let Ok(vault) = crate::vault::config::get_active_vault(app) else {
              String::new()
          };
          let store = KnowledgeStore::open(Path::new(&vault.path)).ok();'''
          new = '''        let store = crate::vault::config::get_active_vault(app)
              .ok()
              .and_then(|vault| KnowledgeStore::open(Path::new(&vault.path)).ok());'''
          if old not in text:
              raise SystemExit('Could not repair full-note context helper')
          p.write_text(text.replace(old, new, 1))
          PY
          python3 /tmp/agent.py > /tmp/agent-apply.log 2>&1
          status=$?
          set -e
          cat /tmp/agent-apply.log
          if [ "$status" -ne 0 ]; then
            cp /tmp/agent-apply.log .github/chat-knowledge-actions-error.txt
            git config user.name "ElephantNote Bot"
            git config user.email "actions@users.noreply.github.com"
            git add .github/chat-knowledge-actions-error.txt
            git commit -m "Record Chat knowledge action patch failure"
            git push --force-with-lease origin HEAD:${{ github.head_ref }}
            exit "$status"
          fi
          cargo fmt --manifest-path Elephant/backend/knowledge-core/Cargo.toml
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml
      - name: Persist candidate implementation
        shell: bash
        run: |
          git config user.name "ElephantNote Bot"
          git config user.email "actions@users.noreply.github.com"
          rm -f .github/chat-knowledge-actions-error.txt
          git add Elephant/backend/knowledge-core/src/actions.rs \
            Elephant/backend/knowledge-core/src/chat_actions.rs \
            Elephant/backend/tauri/src/chat_runtime.rs \
            Elephant/backend/tauri/src/knowledge_chat_actions.rs \
            Elephant/backend/tauri/src/knowledge_wiki_library.rs \
            Elephant/backend/tauri/src/lib_min.rs \
            Elephant/frontend/app/components/views/ChatView.vue \
            Elephant/frontend/src/renderer/src/platform/knowledgeRuntimeClient.js \
            Elephant/frontend/src/renderer/src/platform/installKnowledgeRuntimeBridge.js
          git commit -m "Connect Chat to approved note and Wiki actions"
          git push --force-with-lease origin HEAD:${{ github.head_ref }}
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential pkg-config libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev
      - name: Validate Chat actions
        shell: bash
        run: |
          set +e
          cargo test --manifest-path Elephant/backend/knowledge-core/Cargo.toml --all-targets -- --nocapture > /tmp/actions-core.log 2>&1
          core_status=$?
          cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --no-default-features > /tmp/actions-tauri.log 2>&1
          tauri_status=$?
          Elephant/node_modules/.bin/eslint Elephant/frontend/app/components/views/ChatView.vue Elephant/frontend/src/renderer/src/platform/knowledgeRuntimeClient.js Elephant/frontend/src/renderer/src/platform/installKnowledgeRuntimeBridge.js > /tmp/actions-eslint.log 2>&1
          lint_status=$?
          pnpm tauri:web:build > /tmp/actions-build.log 2>&1
          build_status=$?
          set -e
          if [ "$core_status" -ne 0 ] || [ "$tauri_status" -ne 0 ] || [ "$lint_status" -ne 0 ] || [ "$build_status" -ne 0 ]; then
            {
              echo "core=$core_status tauri=$tauri_status lint=$lint_status build=$build_status"
              echo '=== core ==='; cat /tmp/actions-core.log
              echo '=== tauri ==='; cat /tmp/actions-tauri.log
              echo '=== eslint ==='; cat /tmp/actions-eslint.log
              echo '=== build ==='; cat /tmp/actions-build.log
            } > .github/chat-knowledge-actions-validation-error.txt
            git config user.name "ElephantNote Bot"
            git config user.email "actions@users.noreply.github.com"
            git add .github/chat-knowledge-actions-validation-error.txt
            git commit -m "Record Chat knowledge action validation failure"
            git push origin HEAD:${{ github.head_ref }}
            exit 1
          fi
          cat /tmp/actions-core.log /tmp/actions-tauri.log /tmp/actions-eslint.log /tmp/actions-build.log
