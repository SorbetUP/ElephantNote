name: Implement Wiki experience final 2

on:
  pull_request:
    branches:
      - feature/wiki-knowledge-continuation
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  implement:
    if: github.head_ref == 'assistant/wiki-experience-final2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - name: Apply implementation
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin feature/wiki-knowledge-continuation
          git reset --hard origin/feature/wiki-knowledge-continuation
          git show origin/feature/wiki-knowledge-continuation:.github/scripts/implement_wiki_experience_phase1.py > /tmp/impl.py
          python3 - <<'PY'
          from pathlib import Path
          p = Path('/tmp/impl.py')
          text = p.read_text()
          settings_old = '''replace_once(
              settings,
              '        <div class="en-ai-card-body en-ai-grid">\n          <label>\n            <span>Provider</span>\n',
              '        <div class="en-ai-card-body en-ai-grid en-ai-chat-route-grid">\n          <label>\n            <span>Provider</span>\n'
          )'''
          settings_new = '''regex_once(
              settings,
              r'(<template v-else-if="activePage === \'chat\'">.*?<div class="en-ai-card-body )en-ai-grid(">)',
              r'\\1en-ai-grid en-ai-chat-route-grid\\2',
              flags=re.S
          )'''
          if settings_old not in text:
              raise SystemExit('Could not patch the Chat settings grid replacement')
          text = text.replace(settings_old, settings_new, 1)
          start = text.index("wiki_graph = 'Elephant/backend/knowledge-core/src/wiki_graph_projection.rs'\nreplace_once(\n")
          marker = "# The exact legacy parser is easier to extend"
          end = text.index(marker, start)
          text = text[:start] + "wiki_graph = 'Elephant/backend/knowledge-core/src/wiki_graph_projection.rs'\n" + text[end:]
          old = '''replace_once(
              wiki_view,
              '    await loadLibrary()\\n  } catch (error) {\\n    setEntryError(entry.id, normalizeError(error))',
              '    await loadLibrary()\\n    await refreshKnowledgeViews(\\'wiki-generated\\')\\n  } catch (error) {\\n    setEntryError(entry.id, normalizeError(error))'
          )'''
          new = '''replace_once(
              wiki_view,
              "    selectedSuggestionId.value = ''\\n    await loadLibrary()\\n  } catch (error) {\\n    setEntryError(entry.id, normalizeError(error))",
              "    selectedSuggestionId.value = ''\\n    await loadLibrary()\\n    await refreshKnowledgeViews('wiki-generated')\\n  } catch (error) {\\n    setEntryError(entry.id, normalizeError(error))"
          )'''
          if old not in text:
              raise SystemExit('Could not patch the generate-specific WikiView replacement')
          p.write_text(text.replace(old, new, 1))
          PY
          python3 /tmp/impl.py
          git show origin/feature/wiki-knowledge-continuation:.github/scripts/fix_phase1_tests.py > /tmp/fix_phase1_tests.py
          python3 /tmp/fix_phase1_tests.py
          cargo fmt --manifest-path Elephant/backend/knowledge-core/Cargo.toml
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml
          git status --short
          git diff --stat
      - name: Commit implementation
        shell: bash
        run: |
          git config user.name "ElephantNote Bot"
          git config user.email "actions@users.noreply.github.com"
          git add Elephant/backend/knowledge-core/src/wiki_core.rs \
            Elephant/backend/knowledge-core/src/wiki_graph_projection.rs \
            Elephant/backend/tauri/src/chat_runtime.rs \
            Elephant/backend/tauri/src/knowledge_wiki_library.rs \
            Elephant/backend/tauri/src/knowledge_wikis.rs \
            Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue \
            Elephant/frontend/app/components/views/ChatView.vue \
            Elephant/frontend/app/components/views/WikiView.vue
          git commit -m "Implement functional Wiki previews, links and refresh"
          git push --force-with-lease origin HEAD:${{ github.head_ref }}
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential pkg-config libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev
      - name: Validate implementation
        shell: bash
        run: |
          cargo test --manifest-path Elephant/backend/knowledge-core/Cargo.toml --all-targets -- --nocapture
          cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --no-default-features
          Elephant/node_modules/.bin/eslint Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue Elephant/frontend/app/components/views/WikiView.vue Elephant/frontend/app/components/views/ChatView.vue
          pnpm tauri:web:build
