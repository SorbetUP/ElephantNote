name: Implement Wiki experience phase 1

on:
  pull_request:
    branches:
      - feature/wiki-knowledge-continuation
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  implement:
    if: github.head_ref == 'assistant/wiki-experience-phase1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - name: Apply implementation
        shell: bash
        run: |
          if grep -q 'class="en-wiki-preview"' Elephant/frontend/app/components/views/WikiView.vue \
            && grep -q 'fn markdown_note_target' Elephant/backend/knowledge-core/src/wiki_core.rs; then
            echo 'Wiki experience source is already applied.'
            exit 0
          fi
          git fetch origin feature/wiki-knowledge-continuation
          git show origin/feature/wiki-knowledge-continuation:.github/scripts/implement_wiki_experience_phase1.py > /tmp/impl.py
          python3 - <<'PY'
          from pathlib import Path
          p = Path('/tmp/impl.py')
          text = p.read_text()
          start = text.index("wiki_graph = 'Elephant/backend/knowledge-core/src/wiki_graph_projection.rs'\nreplace_once(\n")
          marker = "# The exact legacy parser is easier to extend"
          end = text.index(marker, start)
          text = text[:start] + "wiki_graph = 'Elephant/backend/knowledge-core/src/wiki_graph_projection.rs'\n" + text[end:]
          old = '''replace_once(
              wiki_view,
              '    await loadLibrary()\\n  } catch (error) {\\n    setEntryError(entry.id, normalizeError(error))',
              '    await loadLibrary()\\n    await refreshKnowledgeViews(\\'wiki-generated\\')\\n  } catch (error) {\\n    setEntryError(entry.id, normalizeError(error))'
          )'''
          new = '''replace_once(
              wiki_view,
              "    selectedSuggestionId.value = ''\\n    await loadLibrary()\\n  } catch (error) {\\n    setEntryError(entry.id, normalizeError(error))",
              "    selectedSuggestionId.value = ''\\n    await loadLibrary()\\n    await refreshKnowledgeViews('wiki-generated')\\n  } catch (error) {\\n    setEntryError(entry.id, normalizeError(error))"
          )'''
          if old not in text:
              raise SystemExit('Could not patch the generate-specific WikiView replacement')
          p.write_text(text.replace(old, new, 1))
          PY
          python3 /tmp/impl.py
          cargo fmt --manifest-path Elephant/backend/knowledge-core/Cargo.toml
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml
      - name: Persist candidate implementation
        shell: bash
        run: |
          git config user.name "ElephantNote Bot"
          git config user.email "actions@users.noreply.github.com"
          git add Elephant/backend/knowledge-core/src/wiki_core.rs \
            Elephant/backend/knowledge-core/src/wiki_graph_projection.rs \
            Elephant/backend/tauri/src/chat_runtime.rs \
            Elephant/backend/tauri/src/knowledge_wiki_library.rs \
            Elephant/backend/tauri/src/knowledge_wikis.rs \
            Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue \
            Elephant/frontend/app/components/views/ChatView.vue \
            Elephant/frontend/app/components/views/WikiView.vue
          if ! git diff --cached --quiet; then
            git commit -m "Implement functional Wiki previews, links and refresh"
            git push origin HEAD:${{ github.head_ref }}
          fi
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential pkg-config libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev
      - name: Validate implementation
        shell: bash
        run: |
          set +e
          cargo test --manifest-path Elephant/backend/knowledge-core/Cargo.toml --all-targets -- --nocapture > /tmp/knowledge.log 2>&1
          core_status=$?
          cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --no-default-features > /tmp/tauri.log 2>&1
          tauri_status=$?
          pnpm exec eslint Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue Elephant/frontend/app/components/views/WikiView.vue Elephant/frontend/app/components/views/ChatView.vue > /tmp/eslint.log 2>&1
          lint_status=$?
          pnpm tauri:web:build > /tmp/build.log 2>&1
          build_status=$?
          set -e
          cat /tmp/knowledge.log /tmp/tauri.log /tmp/eslint.log /tmp/build.log
          if [ "$core_status" -ne 0 ] || [ "$tauri_status" -ne 0 ] || [ "$lint_status" -ne 0 ] || [ "$build_status" -ne 0 ]; then
            {
              echo "core=$core_status tauri=$tauri_status lint=$lint_status build=$build_status"
              echo '=== knowledge ==='; cat /tmp/knowledge.log
              echo '=== tauri ==='; cat /tmp/tauri.log
              echo '=== eslint ==='; cat /tmp/eslint.log
              echo '=== build ==='; cat /tmp/build.log
            } > .github/wiki-experience-phase1-validation-error.txt
            git config user.name "ElephantNote Bot"
            git config user.email "actions@users.noreply.github.com"
            git add .github/wiki-experience-phase1-validation-error.txt
            git commit -m "Record Wiki experience validation failure"
            git push origin HEAD:${{ github.head_ref }}
            exit 1
          fi
      - name: Mark validation complete
        shell: bash
        run: |
          if [ -f .github/wiki-experience-phase1-validation-error.txt ]; then
            git config user.name "ElephantNote Bot"
            git config user.email "actions@users.noreply.github.com"
            git rm .github/wiki-experience-phase1-validation-error.txt
            git commit -m "Clear Wiki experience validation diagnostics"
            git push origin HEAD:${{ github.head_ref }}
          fi
