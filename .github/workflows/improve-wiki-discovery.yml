name: Improve Wiki Discovery

on:
  pull_request:
    branches:
      - assistant/wiki-links-graph-integration
    paths:
      - .github/workflows/improve-wiki-discovery.yml

permissions:
  contents: write

jobs:
  improve:
    if: github.head_ref == 'assistant/wiki-organization-continuation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: assistant/wiki-organization-continuation
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Apply macro-topic discovery correction
        run: python3 .github/scripts/apply_macro_wiki_patch.py

      - name: Format patched sources
        run: cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml --all

      - name: Commit formatted correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            Elephant/backend/tauri/src/knowledge_wiki_discovery.rs \
            Elephant/frontend/app/components/views/WikiView.vue \
            tests/app/unit/wikiDiscoveryQualityRegression.spec.js
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit --no-verify -m "fix: propose broad semantic wiki topics"
          git push origin HEAD:assistant/wiki-organization-continuation

      - name: Validate focused Rust tests
        continue-on-error: true
        run: |
          set -o pipefail
          cargo test --manifest-path Elephant/backend/tauri/Cargo.toml knowledge_wiki_discovery --lib 2>&1 | tee wiki-discovery-validation.log

      - name: Validate renderer contracts
        continue-on-error: true
        run: |
          set -o pipefail
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/eslint \
            Elephant/frontend/app/components/views/WikiView.vue \
            tests/app/unit/wikiDiscoveryQualityRegression.spec.js 2>&1 | tee -a wiki-discovery-validation.log
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            tests/app/unit/wikiDiscoveryQualityRegression.spec.js \
            tests/app/unit/graphWikiScaleRegression.spec.js 2>&1 | tee -a wiki-discovery-validation.log

      - name: Upload focused validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wiki-discovery-validation
          path: wiki-discovery-validation.log
          if-no-files-found: ignore
