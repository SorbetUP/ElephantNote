name: Inspect Local AI Settings

on:
  pull_request:
    branches:
      - assistant/wiki-links-graph-integration
    paths:
      - .github/workflows/inspect-local-ai-settings.yml

jobs:
  inspect:
    if: github.head_ref == 'assistant/wiki-organization-continuation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: assistant/wiki-organization-continuation
      - name: Locate local runtime configuration UI
        run: |
          {
            echo '=== localRuntime references ==='
            grep -R -n --exclude-dir=node_modules --exclude='*.map' 'localRuntime' Elephant/frontend Elephant/shared 2>/dev/null || true
            echo '=== llamaServerMode references ==='
            grep -R -n --exclude-dir=node_modules --exclude='*.map' 'llamaServerMode' Elephant/frontend Elephant/shared 2>/dev/null || true
            echo '=== allowLocalRuntimeAutostart references ==='
            grep -R -n --exclude-dir=node_modules --exclude='*.map' 'allowLocalRuntimeAutostart' Elephant/frontend Elephant/shared 2>/dev/null || true
            echo '=== AI settings files ==='
            find Elephant/frontend -type f \( -iname '*ai*settings*' -o -iname '*settings*ai*' -o -iname '*local*runtime*' \) -print
          } > local-ai-settings.txt
      - uses: actions/upload-artifact@v4
        with:
          name: local-ai-settings-inspection
          path: local-ai-settings.txt
