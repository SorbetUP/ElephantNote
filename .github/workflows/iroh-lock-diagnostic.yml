name: Iroh Lock Diagnostic

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  generate-lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Resolve Cargo lockfile
        run: cargo generate-lockfile --manifest-path Elephant/backend/tauri/Cargo.toml
      - name: Upload resolved lockfile
        uses: actions/upload-artifact@v4
        with:
          name: iroh-cargo-lock
          path: Elephant/backend/tauri/Cargo.lock
          if-no-files-found: error
          retention-days: 1
