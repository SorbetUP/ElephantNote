name: Knowledge Core Format Once

on:
  push:
    branches:
      - feature/rust-knowledge-core

permissions:
  contents: write

concurrency:
  group: knowledge-core-format-once
  cancel-in-progress: true

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/rust-knowledge-core
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Format knowledge core
        run: cargo fmt --manifest-path Elephant/backend/knowledge-core/Cargo.toml
      - name: Commit formatting when needed
        shell: bash
        run: |
          if git diff --quiet -- Elephant/backend/knowledge-core; then
            echo "Knowledge core already formatted."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Elephant/backend/knowledge-core
          git commit -m "style(knowledge): apply rustfmt"
          git push origin HEAD:feature/rust-knowledge-core
