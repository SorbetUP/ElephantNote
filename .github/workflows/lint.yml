      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential curl file libayatana-appindicator3-dev libgtk-3-dev librsvg2-dev libssl-dev libwebkit2gtk-4.1-dev patchelf wget

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91
          components: rustfmt

      - name: Validate Rust implementation
        shell: bash
        run: |
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml -- Elephant/backend/tauri/src/chat_runtime/codex_app_server.rs
          cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --all-targets --no-default-features
          cargo test --manifest-path Elephant/backend/tauri/Cargo.toml --lib --no-default-features chat_runtime::codex_app_server::tests

      - name: Clean temporary files and push the repair
        shell: bash
        run: |
          cat > .github/workflows/lint.yml <<'YAML'
          name: Lint

          on:
            pull_request:
              types: [opened, synchronize, reopened]

          concurrency:
            group: ${{ github.workflow }}-${{ github.ref }}
            cancel-in-progress: true

          permissions:
            contents: read

          jobs:
            lint:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - uses: ./.github/actions/setup

                - name: Run ESLint
                  shell: bash
                  run: |
                    set -o pipefail
                    pnpm lint 2>&1 | tee eslint-output.txt

                - name: Upload ESLint output
                  if: always()
                  uses: actions/upload-artifact@v4
                  with:
                    name: eslint-output
                    path: eslint-output.txt
                    if-no-files-found: ignore
          YAML
          rm -f .github/workflows/codex-cargo-diagnostic.yml
          rm -f .github/workflows/fix-codex-chat-hang.yml
          rm -f .github/codex-chat-hang-trigger
          rm -f .github/codex-isolation-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No branch changes to commit"
            exit 0
          fi
          git commit -m "Isolate Codex chat from inherited runtime configuration"
          git push origin HEAD:feature/real-codex-subscription
