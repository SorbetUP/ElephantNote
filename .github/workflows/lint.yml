name: Lint

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: codex-finalize-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  lint:
    if: github.head_ref == 'feature/real-codex-subscription'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/real-codex-subscription
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Apply focused source cleanup
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          panel_path = Path('Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue')
          panel = panel_path.read_text()
          nav_end = panel.index('      </nav>') + len('      </nav>\n')
          actions_start = panel.index('      <div class="en-ai-actions">', nav_end)
          toolbar_end = panel.index('    </div>\n\n    <template', actions_start)
          panel = panel[:actions_start] + panel[toolbar_end:]
          panel = panel.replace(
              "import { Activity, Cpu, Link2, Plus, RotateCw, Save, Server, Trash2 } from '@lucide/vue'",
              "import { Activity, Cpu, Link2, Plus, RotateCw, Server, Trash2 } from '@lucide/vue'",
              1,
          )
          if 'en-ai-save-status' in panel or '<Save aria-hidden' in panel:
              raise SystemExit('Redundant AI toolbar controls remain')
          panel_path.write_text(panel)

          card_path = Path('Elephant/frontend/app/components/settings/ChatgptSubscriptionCard.vue')
          card = card_path.read_text()
          global_style = '''<style>
          .en-ai-settings > .en-ai-toolbar > .en-ai-actions { display: none !important; }
          </style>'''
          if card.count(global_style) != 1:
              raise SystemExit(f'Expected one temporary global toolbar style, found {card.count(global_style)}')
          card = card.replace(global_style, '', 1).rstrip() + '\n'
          if '<svg' not in card or 'fill="currentColor"' not in card:
              raise SystemExit('Inline theme-aware ChatGPT SVG is missing')
          card_path.write_text(card)

          test_path = Path('tests/app/unit/specs/main/elephantnote/settingsRedesign.spec.js')
          test = test_path.read_text()
          old_expectation = "    expect(source).toContain('class=\"en-ai-setting-row en-codex-row\"')"
          new_expectations = """    expect(source).toContain('<ChatgptSubscriptionCard')
              expect(source).not.toContain('en-ai-save-status')
              expect(source).not.toContain('<Save aria-hidden')"""
          if old_expectation in test:
              test = test.replace(old_expectation, new_expectations, 1)
          elif "expect(source).toContain('<ChatgptSubscriptionCard')" not in test:
              raise SystemExit('Neither old nor updated Codex-card assertion was found')
          test_path.write_text(test)
          PY

      - name: Validate focused frontend changes
        shell: bash
        run: |
          set -euxo pipefail
          Elephant/node_modules/.bin/eslint \
            Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue \
            Elephant/frontend/app/components/settings/ChatgptSubscriptionCard.vue \
            tests/app/unit/specs/main/elephantnote/settingsRedesign.spec.js
          pnpm exec vitest run \
            tests/app/unit/specs/main/elephantnote/settingsRedesign.spec.js \
            tests/app/unit/codexRateLimits.spec.js
          pnpm tauri:web:build

      - name: Restore workflow and commit validated cleanup
        shell: bash
        run: |
          set -euxo pipefail
          git show origin/develop:.github/workflows/lint.yml > .github/workflows/lint.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            .github/workflows/lint.yml \
            Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue \
            Elephant/frontend/app/components/settings/ChatgptSubscriptionCard.vue \
            tests/app/unit/specs/main/elephantnote/settingsRedesign.spec.js
          git commit -m "Clean up ChatGPT settings UI and update focused tests"
          git push origin HEAD:feature/real-codex-subscription
