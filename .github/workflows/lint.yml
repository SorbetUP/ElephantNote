name: Lint

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Run ESLint
        shell: bash
        run: |
          set -o pipefail
          pnpm lint 2>&1 | tee eslint-output.txt

      - name: Upload ESLint output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-output
          path: eslint-output.txt
          if-no-files-found: ignore

  codex-bundle-refactor:
    if: github.head_ref == 'feature/real-codex-subscription'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/real-codex-subscription
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Apply reviewed refactor
        run: python3 .github/scripts/apply_codex_bundle_and_limits.py

      - name: Capture provider lint diagnostics
        shell: bash
        run: |
          set +e
          pnpm exec eslint --fix --format json Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue > codex-provider-eslint.json
          echo "$?" > codex-provider-eslint.exit
          exit 0

      - name: Upload provider lint diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: codex-provider-eslint
          path: |
            codex-provider-eslint.json
            codex-provider-eslint.exit

      - name: Report provider lint errors
        run: |
          node - <<'NODE'
          const fs = require('node:fs')
          const exitCode = Number(fs.readFileSync('codex-provider-eslint.exit', 'utf8').trim())
          const reports = JSON.parse(fs.readFileSync('codex-provider-eslint.json', 'utf8'))
          for (const report of reports) {
            for (const message of report.messages || []) {
              console.error(`${report.filePath}:${message.line}:${message.column} ${message.ruleId || 'parse'} ${message.message}`)
            }
          }
          if (exitCode !== 0) process.exit(exitCode)
          NODE

      - name: Auto-fix rate-limit helper and tests
        run: pnpm exec eslint --fix Elephant/frontend/app/components/settings/codexRateLimits.js tests/app/unit/codexRateLimits.spec.js

      - name: Check Codex bundler syntax
        run: node --check build/scripts/ensure-tauri-codex-runtime.mjs

      - name: Check rate-limit helper syntax
        run: node --check Elephant/frontend/app/components/settings/codexRateLimits.js

      - name: Lint generated frontend files
        run: pnpm exec eslint Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue Elephant/frontend/app/components/settings/codexRateLimits.js tests/app/unit/codexRateLimits.spec.js

      - name: Run focused rate-limit tests
        run: pnpm exec vitest run tests/app/unit/codexRateLimits.spec.js

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential curl file libayatana-appindicator3-dev libgtk-3-dev librsvg2-dev libssl-dev libwebkit2gtk-4.1-dev patchelf wget

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91
          components: rustfmt

      - name: Validate Rust runtime resolution
        run: |
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml
          cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --all-targets --no-default-features
          cargo test --manifest-path Elephant/backend/tauri/Cargo.toml --lib --no-default-features bundled_codex_candidates_prefer_packaged_resources
          cargo test --manifest-path Elephant/backend/tauri/Cargo.toml --lib --no-default-features chat_runtime::codex_app_server::tests

      - name: Push validated implementation
        run: |
          git fetch origin develop
          git checkout origin/develop -- .github/workflows/lint.yml
          rm -f .github/workflows/apply-codex-bundle-and-limits.yml
          rm -f .github/scripts/apply_codex_bundle_and_limits.py
          rm -f .github/codex-bundle-refactor-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Bundle Codex at build time and show real usage windows"
          git push origin HEAD:feature/real-codex-subscription
