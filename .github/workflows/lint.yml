name: Lint

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply physical addon boundary migration
        if: github.head_ref == 'feature/physical-addon-packages'
        run: python3 build/scripts/apply-physical-boundary-fixes.py

      - uses: ./.github/actions/setup

      - name: Run ESLint
        shell: bash
        run: |
          set -o pipefail
          pnpm lint 2>&1 | tee eslint-output.txt

      - name: Run focused migration tests
        if: github.head_ref == 'feature/physical-addon-packages'
        shell: bash
        run: |
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            tests/app/unit/addons/addonNativeServiceContracts.spec.js \
            tests/app/unit/addons/semanticBackendAbsence.spec.js \
            tests/app/unit/addons/syncMigrationBoundary.spec.js \
            tests/app/unit/addons/trustedAddonModuleGraph.spec.js

      - name: Commit validated migration
        if: github.head_ref == 'feature/physical-addon-packages'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Physical boundary migration already applied."
            exit 0
          fi
          git commit -m "fix(addons): wire physical module and service boundaries"
          git pull --rebase origin feature/physical-addon-packages
          git push origin HEAD:feature/physical-addon-packages

      - name: Upload ESLint output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-output
          path: eslint-output.txt
          if-no-files-found: ignore
