name: Lint

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Run ESLint
        shell: bash
        run: |
          set -o pipefail
          pnpm lint 2>&1 | tee eslint-output.txt

      - name: Upload ESLint output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-output
          path: eslint-output.txt
          if-no-files-found: ignore

  codex-chat-repair:
    if: github.head_ref == 'feature/real-codex-subscription'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/real-codex-subscription
          fetch-depth: 0

      - name: Isolate Codex app-server state and fix event handling
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          path = Path('Elephant/backend/tauri/src/chat_runtime/codex_app_server.rs')
          text = path.read_text()
          if 'const ISOLATED_CODEX_HOME_DIR:' in text:
              print('Codex isolation patch already present')
          else:
              replacements = [
                  (
                      'const TURN_READ_ONLY_SANDBOX: &str = "readOnly";',
                      'const TURN_READ_ONLY_SANDBOX: &str = "readOnly";\nconst ISOLATED_CODEX_HOME_DIR: &str = "elephantnote-chat-home";',
                      'isolated home constant',
                  ),
                  (
                      '''fn home_dir() -> Option<PathBuf> {
    env::var_os("HOME")
        .map(PathBuf::from)
        .or_else(|| env::var_os("USERPROFILE").map(PathBuf::from))
}
''',
