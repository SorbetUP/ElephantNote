name: Lint

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  diagnose-local-embedding-picker:
    if: github.head_ref == 'assistant/wiki-organization-continuation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: assistant/wiki-organization-continuation
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - name: Run patch and capture diagnostics
        shell: bash
        run: |
          set +e
          python3 - <<'PY' > embedding-picker-patch.log 2>&1
          from pathlib import Path
          import textwrap
          import traceback
          try:
              workflow = Path('.github/workflows/fix-local-embedding-model-picker.yml').read_text()
              script = workflow.split("python3 - <<'PY'\n", 1)[1].split('\n          PY', 1)[0]
              exec(compile(textwrap.dedent(script), 'fix-local-embedding-model-picker', 'exec'))
          except Exception:
              traceback.print_exc()
              raise
          PY
          echo $? > embedding-picker-patch.status
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: embedding-picker-patch-diagnostics
          path: |
            embedding-picker-patch.log
            embedding-picker-patch.status

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Run ESLint
        shell: bash
        run: |
          set -o pipefail
          pnpm lint 2>&1 | tee eslint-output.txt

      - name: Upload ESLint output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-output
          path: eslint-output.txt
          if-no-files-found: ignore
