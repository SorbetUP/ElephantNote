name: Lint

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  apply-ai-settings-codex-fix:
    if: github.head_ref == 'assistant/wiki-organization-continuation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: assistant/wiki-organization-continuation
          fetch-depth: 0
      - name: Patch sources
        run: python3 scripts/apply_ai_settings_codex_fix.py
      - name: Commit source fix
        run: |
          rm -f .github/workflows/fix-codex-web-search-config.yml
          git rm scripts/apply_ai_settings_codex_fix.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit --no-verify -m "fix: remove embedding count hint and restore Codex chat"
          git push origin HEAD:assistant/wiki-organization-continuation

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Run ESLint
        shell: bash
        run: |
          set -o pipefail
          pnpm lint 2>&1 | tee eslint-output.txt

      - name: Upload ESLint output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-output
          path: eslint-output.txt
          if-no-files-found: ignore
