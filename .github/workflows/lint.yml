name: Lint

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Run ESLint
        shell: bash
        run: |
          set -o pipefail
          pnpm lint 2>&1 | tee eslint-output.txt

      - name: Upload ESLint output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-output
          path: eslint-output.txt
          if-no-files-found: ignore

  codex-bundle-refactor:
    if: github.head_ref == 'feature/real-codex-subscription'
    runs-on: ubuntu-latest
    env:
      NODE_PATH: Elephant/node_modules
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/real-codex-subscription
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Apply reviewed refactor
        run: |
          python3 .github/scripts/apply_codex_bundle_and_limits.py
          python3 .github/scripts/fix_codex_bundle_patch.py

      - name: Auto-fix generated frontend files
        run: Elephant/node_modules/.bin/eslint --fix Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue Elephant/frontend/app/components/settings/codexRateLimits.js tests/app/unit/codexRateLimits.spec.js

      - name: Check Codex bundler syntax
        run: node --check build/scripts/ensure-tauri-codex-runtime.mjs

      - name: Check rate-limit helper syntax
        run: node --check Elephant/frontend/app/components/settings/codexRateLimits.js

      - name: Lint generated frontend files
        run: Elephant/node_modules/.bin/eslint Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue Elephant/frontend/app/components/settings/codexRateLimits.js tests/app/unit/codexRateLimits.spec.js

      - name: Run focused rate-limit tests
        run: Elephant/node_modules/.bin/vitest run tests/app/unit/codexRateLimits.spec.js

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential curl file libayatana-appindicator3-dev libgtk-3-dev librsvg2-dev libssl-dev libwebkit2gtk-4.1-dev patchelf wget

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91
          components: rustfmt

      - name: Format only changed Rust files
        run: rustfmt --edition 2021 Elephant/backend/tauri/src/lib_min.rs Elephant/backend/tauri/src/chat_runtime/codex_app_server.rs

      - name: Compile all Rust targets
        run: cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --all-targets --no-default-features

      - name: Test bundled Codex path resolution
        run: cargo test --manifest-path Elephant/backend/tauri/Cargo.toml --lib --no-default-features bundled_codex_candidates_prefer_packaged_resources

      - name: Test Codex app-server runtime
        run: cargo test --manifest-path Elephant/backend/tauri/Cargo.toml --lib --no-default-features chat_runtime::codex_app_server::tests

      - name: Push validated implementation
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin develop
          git checkout origin/develop -- .github/workflows/lint.yml
          rm -f .github/workflows/apply-codex-bundle-and-limits.yml
          rm -f .github/scripts/apply_codex_bundle_and_limits.py
          rm -f .github/scripts/fix_codex_bundle_patch.py
          rm -f .github/codex-bundle-refactor-trigger

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            .gitignore \
            Elephant/backend/tauri/Cargo.toml \
            Elephant/backend/tauri/src/chat_runtime/codex_app_server.rs \
            Elephant/backend/tauri/src/lib_min.rs \
            Elephant/backend/tauri/tauri.conf.json \
            Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue \
            Elephant/frontend/app/components/settings/codexRateLimits.js \
            build/scripts/build_dev.sh \
            build/scripts/ensure-tauri-codex-runtime.mjs \
            package.json \
            tests/app/unit/codexRateLimits.spec.js \
            .github/workflows/lint.yml

          git add -u Elephant/backend/tauri/src/chat_runtime/codex_app_server/codex_runtime_installer.rs || true
          git add -u \
            .github/workflows/apply-codex-bundle-and-limits.yml \
            .github/scripts/apply_codex_bundle_and_limits.py \
            .github/scripts/fix_codex_bundle_patch.py \
            .github/codex-bundle-refactor-trigger || true

          git diff --cached --name-only
          git commit -m "Bundle Codex at build time and show real usage windows"
          git push origin HEAD:feature/real-codex-subscription
