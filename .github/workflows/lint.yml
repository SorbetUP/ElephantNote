name: Lint

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  lint:
    if: github.head_ref == 'feature/real-codex-subscription'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/real-codex-subscription
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Apply focused UI fixes
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          panel_path = Path('Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue')
          panel = panel_path.read_text()
          toolbar_actions = '''      <div class="en-ai-actions">
        <span class="en-ai-save-status">{{ autosaveMessage || 'Saved' }}</span>
        <button
          class="secondary compact"
          type="button"
          :disabled="loading"
          @click="loadConfig"
        >
          <RotateCw aria-hidden="true" /> Refresh
        </button>
        <button
          class="primary compact"
          type="button"
          :disabled="saving"
          @click="saveConfig"
        >
          <Save aria-hidden="true" />{{ saving ? 'Saving…' : 'Save' }}
        </button>
      </div>
'''
          if panel.count(toolbar_actions) != 1:
              raise SystemExit(f'Expected one AI toolbar action block, found {panel.count(toolbar_actions)}')
          panel = panel.replace(toolbar_actions, '', 1)
          panel = panel.replace(
              'import { Activity, Cpu, Link2, Plus, RotateCw, Save, Server, Trash2 } from \'@lucide/vue\'',
              'import { Activity, Cpu, Link2, Plus, RotateCw, Server, Trash2 } from \'@lucide/vue\'',
              1,
          )
          panel_path.write_text(panel)

          card_path = Path('Elephant/frontend/app/components/settings/ChatgptSubscriptionCard.vue')
          card = card_path.read_text()
          old_logo = '''        <span
          class="en-chatgpt-logo"
          :style="{ '--chatgpt-logo-url': `url(${chatgptLogoUrl})` }"
          aria-hidden="true"
        />'''
          logo_path = "M21.55 10.004a5.416 5.416 0 00-.478-4.501c-1.217-2.09-3.662-3.166-6.05-2.66A5.59 5.59 0 0010.831 1C8.39.995 6.224 2.546 5.473 4.838A5.553 5.553 0 001.76 7.496a5.487 5.487 0 00.691 6.5 5.416 5.416 0 00.477 4.502c1.217 2.09 3.662 3.165 6.05 2.66A5.586 5.586 0 0013.168 23c2.443.006 4.61-1.546 5.361-3.84a5.553 5.553 0 003.715-2.66 5.488 5.488 0 00-.693-6.497v.001zm-8.381 11.558a4.199 4.199 0 01-2.675-.954c.034-.018.093-.05.132-.074l4.44-2.53a.71.71 0 00.364-.623v-6.176l1.877 1.069c.02.01.033.029.036.05v5.115c-.003 2.274-1.87 4.118-4.174 4.123zM4.192 17.78a4.059 4.059 0 01-.498-2.763c.032.02.09.055.131.078l4.44 2.53c.225.13.504.13.73 0l5.42-3.088v2.138a.068.068 0 01-.027.057L9.9 19.288c-1.999 1.136-4.552.46-5.707-1.51h-.001zM3.023 8.216A4.15 4.15 0 015.198 6.41l-.002.151v5.06a.711.711 0 00.364.624l5.42 3.087-1.876 1.07a.067.067 0 01-.063.005l-4.489-2.559c-1.995-1.14-2.679-3.658-1.53-5.63h.001zm15.417 3.54l-5.42-3.088L14.896 7.6a.067.067 0 01.063-.006l4.489 2.557c1.998 1.14 2.683 3.662 1.529 5.633a4.163 4.163 0 01-2.174 1.807V12.38a.71.71 0 00-.363-.623zm1.867-2.773a6.04 6.04 0 00-.132-.078l-4.44-2.53a.731.731 0 00-.729 0l-5.42 3.088V7.325a.068.068 0 01.027-.057L14.1 4.713c2-1.137 4.555-.46 5.707 1.513.487.833.664 1.809.499 2.757h.001zm-11.741 3.81l-1.877-1.068a.065.065 0 01-.036-.051V6.559c.001-2.277 1.873-4.122 4.181-4.12.976 0 1.92.338 2.671.954-.034.018-.092.05-.131.073l-4.44 2.53a.71.71 0 00-.365.623l-.003 6.173v.002zm1.02-2.168L12 9.25l2.414 1.375v2.75L12 14.75l-2.415-1.375v-2.75z"
          new_logo = f'''        <!-- OpenAI monochrome mark from lobehub/lobe-icons (MIT). -->
        <svg
          class="en-chatgpt-logo"
          viewBox="0 0 24 24"
          aria-hidden="true"
        >
          <path
            fill="currentColor"
            fill-rule="evenodd"
            d="{logo_path}"
          />
        </svg>'''
          if card.count(old_logo) != 1:
              raise SystemExit(f'Expected one CSS-mask logo, found {card.count(old_logo)}')
          card = card.replace(old_logo, new_logo, 1)
          card = card.replace("import chatgptLogoUrl from './chatgpt-logo.svg'\n", '', 1)
          card = card.replace(':global(.en-ai-toolbar > .en-ai-actions) { display: none; }\n', '', 1)
          old_logo_css = '.en-chatgpt-logo { display: block; flex: 0 0 auto; width: 30px; height: 30px; background: var(--en-text); -webkit-mask: var(--chatgpt-logo-url) center / contain no-repeat; mask: var(--chatgpt-logo-url) center / contain no-repeat; }'
          new_logo_css = '.en-chatgpt-logo { display: block; flex: 0 0 auto; width: 30px; height: 30px; color: var(--en-text); }'
          if card.count(old_logo_css) != 1:
              raise SystemExit('Expected CSS-mask logo rule')
          card = card.replace(old_logo_css, new_logo_css, 1)
          card_path.write_text(card)

          Path('Elephant/frontend/app/components/settings/chatgpt-logo.svg').unlink(missing_ok=True)
          PY

      - name: Validate frontend
        shell: bash
        run: |
          pnpm lint
          pnpm tauri:web:build

      - name: Restore workflow and commit validated fix
        shell: bash
        run: |
          git show origin/develop:.github/workflows/lint.yml > .github/workflows/lint.yml
          rm -f .github/workflows/fix-ai-toolbar-chatgpt-logo.yml
          rm -f .github/ai-toolbar-logo-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix ChatGPT logo and remove redundant AI toolbar actions"
          git push origin HEAD:feature/real-codex-subscription
