name: Lint

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Run ESLint
        shell: bash
        run: |
          set -o pipefail
          pnpm lint 2>&1 | tee eslint-output.txt

      - name: Upload ESLint output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-output
          path: eslint-output.txt
          if-no-files-found: ignore

  codex-runtime-quality:
    if: github.head_ref == 'feature/real-codex-subscription'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/real-codex-subscription
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Refactor Codex runtime and settings lifecycle
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          rust_path = Path('Elephant/backend/tauri/src/chat_runtime/codex_app_server.rs')
          text = rust_path.read_text()

          def replace_once(old, new, label):
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected exactly one occurrence, found {count}')
              text = text.replace(old, new, 1)

          replace_once(
              '    time::{timeout, Instant},',
              '    time::{timeout, timeout_at, Instant},',
              'tokio timeout imports',
          )
          replace_once(
              'const TURN_READ_ONLY_SANDBOX: &str = "readOnly";',
              'const TURN_READ_ONLY_SANDBOX: &str = "readOnly";\nconst CODEX_HOME_DIR: &str = "home";\nconst EVENT_BUFFER_CAPACITY: usize = 1024;',
              'runtime constants',
          )
          replace_once(
              '''fn home_dir() -> Option<PathBuf> {
    env::var_os("HOME")
        .map(PathBuf::from)
        .or_else(|| env::var_os("USERPROFILE").map(PathBuf::from))
}
''',
