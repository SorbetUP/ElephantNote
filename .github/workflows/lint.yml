name: Lint

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  apply-local-embedding-picker:
    if: github.head_ref == 'assistant/wiki-organization-continuation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: assistant/wiki-organization-continuation
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - name: Apply downloaded embedding model picker
        run: python3 scripts/fix_local_embedding_picker.py
      - name: Validate model picker
        run: |
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/eslint \
            Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue \
            tests/app/unit/aiEmbeddingModelPicker.spec.js
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            tests/app/unit/aiEmbeddingModelPicker.spec.js
      - name: Restore workflow and commit
        run: |
          cat > .github/workflows/lint.yml <<'YAML'
          name: Lint

          on:
            pull_request:
              types: [opened, synchronize, reopened]

          concurrency:
            group: ${{ github.workflow }}-${{ github.ref }}
            cancel-in-progress: true

          permissions:
            contents: read

          jobs:
            lint:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - uses: ./.github/actions/setup

                - name: Run ESLint
                  shell: bash
                  run: |
                    set -o pipefail
                    pnpm lint 2>&1 | tee eslint-output.txt

                - name: Upload ESLint output
                  if: always()
                  uses: actions/upload-artifact@v4
                  with:
                    name: eslint-output
                    path: eslint-output.txt
                    if-no-files-found: ignore
          YAML
          rm -f \
            .github/workflows/fix-local-embedding-model-picker.yml \
            .github/workflows/run-local-embedding-model-picker.yml \
            scripts/fix_local_embedding_picker.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit --no-verify -m "fix: list downloaded embedding models in AI settings"
          git push origin HEAD:assistant/wiki-organization-continuation

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Run ESLint
        shell: bash
        run: |
          set -o pipefail
          pnpm lint 2>&1 | tee eslint-output.txt

      - name: Upload ESLint output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-output
          path: eslint-output.txt
          if-no-files-found: ignore
