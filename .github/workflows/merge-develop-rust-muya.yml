name: Merge develop into Rust Muya

on:
  push:
    branches:
      - feature/rust-muya-editor-core
    paths:
      - '.github/workflows/merge-develop-rust-muya.yml'

permissions:
  contents: write

concurrency:
  group: merge-develop-rust-muya
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/rust-muya-editor-core
          fetch-depth: 0

      - name: Merge develop and preserve the Rust Muya integration
        shell: bash
        run: |
          set -euxo pipefail
          git fetch origin develop
          git config user.name 'ElephantNote CI'
          git config user.email 'actions@users.noreply.github.com'
          git merge --no-commit --no-ff -X ours origin/develop

          git checkout origin/develop -- \
            .gitignore \
            Elephant/backend/tauri/Cargo.toml \
            Elephant/backend/tauri/src/chat_runtime.rs \
            Elephant/backend/tauri/src/chat_runtime/codex_app_server.rs \
            Elephant/backend/tauri/tauri.conf.json \
            Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue \
            Elephant/frontend/app/components/settings/ChatgptSubscriptionCard.vue \
            Elephant/frontend/app/components/settings/codexRateLimits.js \
            build/scripts/build_dev.sh \
            build/scripts/ensure-tauri-codex-runtime.mjs \
            package.json \
            tests/app/unit/codexRateLimits.spec.js \
            tests/app/unit/specs/main/elephantnote/settingsRedesign.spec.js

          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml
          rm .github/workflows/merge-develop-rust-muya.yml

          git add -A
          git commit -m 'Merge develop into Rust Muya branch'
          git push origin HEAD:feature/rust-muya-editor-core
