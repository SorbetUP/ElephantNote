name: Mobile Knowledge lock and format

on:
  push:
    paths:
      - '.github/workflows/mobile-knowledge-lock-fix.yml'

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop_next-integration-repair
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.91.0'
          components: rustfmt

      - name: Format embedded Knowledge Rust code
        run: |
          cargo fmt --manifest-path addons/official/knowledge/native/knowledge-core/Cargo.toml
          cargo fmt --manifest-path addons/official/knowledge/native/Cargo.toml
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml

      - name: Regenerate Tauri lockfile
        run: cargo generate-lockfile --manifest-path Elephant/backend/tauri/Cargo.toml

      - name: Test reusable Knowledge core
        run: cargo test --manifest-path addons/official/knowledge/native/knowledge-core/Cargo.toml

      - name: Check desktop Tauri shell
        run: cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --all-targets

      - name: Commit generated files
        shell: bash
        run: |
          set -euxo pipefail
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            Elephant/backend/tauri/Cargo.lock \
            Elephant/backend/tauri/src/addon_services.rs \
            Elephant/backend/tauri/src/embedded_addon_services.rs \
            addons/official/knowledge/native/src/main.rs \
            addons/official/knowledge/native/knowledge-core/src
          git commit -m 'chore(rust): normalize embedded mobile Knowledge host'
          git push origin HEAD:develop_next-integration-repair
