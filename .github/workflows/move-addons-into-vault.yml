name: Apply per-vault addon storage

on:
  push:
    branches:
      - feature/addon-runtime-platform
    paths:
      - .github/workflows/move-addons-into-vault.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/addon-runtime-platform
          fetch-depth: 0

      - name: Move external addon storage into active vault
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('Elephant/backend/tauri/src/addons.rs')
          source = path.read_text()

          replacements = [
              (
                  'use tauri::{AppHandle, Manager, State};',
                  'use tauri::{AppHandle, State};'
              ),
              (
                  'use crate::vault::config as vault_config;\n',
                  'use crate::vault::config as vault_config;\nuse crate::vault_layout;\n'
              ),
              (
                  '''fn addons_root(app: &AppHandle) -> R<PathBuf> {
            let root = app.path().app_data_dir().map_err(|error| error.to_string())?.join("addons");
            fs::create_dir_all(root.join("packages")).map_err(|error| error.to_string())?;
            fs::create_dir_all(root.join("data")).map_err(|error| error.to_string())?;
            Ok(root)
          }''',
                  '''fn addons_root(app: &AppHandle) -> R<PathBuf> {
            let vault = vault_config::get_active_vault(app)?;
            let root = vault_layout::addons_dir(&vault.path);
            fs::create_dir_all(root.join("packages")).map_err(|error| error.to_string())?;
            fs::create_dir_all(root.join("data")).map_err(|error| error.to_string())?;
            Ok(root)
          }'''
              )
          ]

          for old, new in replacements:
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f'Expected exactly one match, found {count}: {old[:100]!r}')
              source = source.replace(old, new, 1)

          path.write_text(source)
          PY

      - name: Verify and commit
        shell: bash
        run: |
          set -euxo pipefail
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml
          cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --lib
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Elephant/backend/tauri/src/addons.rs
          git commit -m "feat(addons): store external addons inside active vault [skip ci]"
          git push origin HEAD:feature/addon-runtime-platform
