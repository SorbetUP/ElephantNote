name: Apply Muya Atomic Batch

on:
  push:
    branches:
      - refactor/muya-js-modular-parity

permissions:
  contents: write

jobs:
  apply:
    if: github.event.head_commit.message == 'chore: run Muya atomic decomposition batch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/muya-js-modular-parity
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - name: Apply atomic source archive
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/muya-atomic.b64 <<'PAYLOAD'

PAYLOAD
          base64 --decode /tmp/muya-atomic.b64 > /tmp/muya-atomic.tgz
          tar -xzf /tmp/muya-atomic.tgz -C "$GITHUB_WORKSPACE"
      - name: Validate decomposition
        shell: bash
        env:
          MUYA_REFERENCE_REF: 8a4d643f950ab49082767e1bc719667d6eb43d14
        run: |
          set -euo pipefail
          node build/scripts/check-muya-module-size.mjs
          node build/scripts/run-muya-characterization.mjs
          pnpm exec eslint Elephant/frontend/src/muya/lib
      - name: Commit validated source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Elephant/frontend/src/muya/lib
          git commit -m "refactor(muya): split selection parser render and drag drop atoms"
          git push origin HEAD:refactor/muya-js-modular-parity
