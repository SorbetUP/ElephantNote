name: Register complete Muya Rust command

on:
  push:
    branches:
      - feature/rust-muya-editor-core

permissions:
  contents: write

jobs:
  register:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/rust-muya-editor-core
          fetch-depth: 0
      - name: Register command and remove one-shot workflow
        shell: bash
        run: |
          set -euxo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('Elephant/backend/tauri/src/lib_min.rs')
          text = path.read_text()
          needle = '            markdown::muya_session::tauri_muya_session_apply_parity,\n'
          replacement = needle + '            markdown::muya_session::tauri_muya_session_apply_complete,\n'
          if 'tauri_muya_session_apply_complete' not in text:
              if needle not in text:
                  raise SystemExit('Muya session registration anchor not found')
              text = text.replace(needle, replacement, 1)
              path.write_text(text)
          Path('.github/workflows/muya-complete-register.yml').unlink()
          PY
          git config user.name 'ElephantNote CI'
          git config user.email 'actions@users.noreply.github.com'
          git add Elephant/backend/tauri/src/lib_min.rs .github/workflows/muya-complete-register.yml
          git commit -m 'feat(muya): register complete Rust session command'
          git push origin HEAD:feature/rust-muya-editor-core
