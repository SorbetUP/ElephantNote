name: Complete Muya Rust search patch

on:
  push:
    branches:
      - feature/rust-muya-editor-core

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/rust-muya-editor-core
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Add native search query and remove one-shot workflow
        shell: bash
        run: |
          set -euxo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('Elephant/backend/tauri/src/markdown/muya_ui.rs')
          text = path.read_text()
          enum_anchor = '''    PreviewDescriptor {
                  block_type: String,
                  language: Option<String>,
                  text: String,
              },
          }'''.replace('          ', '')
          enum_replacement = '''    PreviewDescriptor {
              block_type: String,
              language: Option<String>,
              text: String,
          },
          Search {
              query: String,
              #[serde(default)]
              case_sensitive: bool,
              #[serde(default)]
              whole_word: bool,
          },
          }'''.replace('          ', '')
          if 'Search {' not in text:
              if enum_anchor not in text:
                  raise SystemExit('MuyaUiQuery enum anchor not found')
              text = text.replace(enum_anchor, enum_replacement, 1)

          match_anchor = '''        MuyaUiQuery::PreviewDescriptor {
              block_type,
              language,
              text,
          } => Ok(preview_descriptor(&block_type, language.as_deref(), &text)),
      }'''
          match_replacement = '''        MuyaUiQuery::PreviewDescriptor {
              block_type,
              language,
              text,
          } => Ok(preview_descriptor(&block_type, language.as_deref(), &text)),
          MuyaUiQuery::Search {
              query,
              case_sensitive,
              whole_word,
          } => Ok(search_matches(require_state(state)?, &query, case_sensitive, whole_word)),
      }'''
          if 'MuyaUiQuery::Search {' not in text:
              if match_anchor not in text:
                  raise SystemExit('MuyaUiQuery match anchor not found')
              text = text.replace(match_anchor, match_replacement, 1)

          function_anchor = 'pub fn preview_descriptor(block_type: &str, language: Option<&str>, text: &str) -> Value {'
          search_function = r'''pub fn search_matches(
              state: &MuyaEditorState,
              query: &str,
              case_sensitive: bool,
              whole_word: bool,
          ) -> Value {
              if query.is_empty() {
                  return json!({ "query": query, "matches": [] });
              }
              let haystack = if case_sensitive {
                  state.markdown.clone()
              } else {
                  state.markdown.to_lowercase()
              };
              let needle = if case_sensitive {
                  query.to_string()
              } else {
                  query.to_lowercase()
              };
              let mut matches = Vec::new();
              let mut offset = 0usize;
              while offset <= haystack.len() {
                  let Some(relative) = haystack[offset..].find(&needle) else {
                      break;
                  };
                  let start = offset + relative;
                  let end = start + needle.len();
                  let before = state.markdown[..start].chars().next_back();
                  let after = state.markdown[end..].chars().next();
                  let boundary = !whole_word
                      || (before.map_or(true, |character| {
                          !character.is_alphanumeric() && character != '_'
                      }) && after.map_or(true, |character| {
                          !character.is_alphanumeric() && character != '_'
                      }));
                  if boundary {
                      matches.push(json!({
                          "start": state.markdown[..start].encode_utf16().count(),
                          "end": state.markdown[..end].encode_utf16().count()
                      }));
                  }
                  offset = end.max(start + 1);
                  if offset >= haystack.len() {
                      break;
                  }
              }
              json!({ "query": query, "matches": matches })
          }

          '''
          if 'pub fn search_matches(' not in text:
              if function_anchor not in text:
                  raise SystemExit('search function insertion anchor not found')
              text = text.replace(function_anchor, search_function + function_anchor, 1)
          path.write_text(text)

          path = Path('Elephant/frontend/src/renderer/src/muya/rustEngineRuntime.js')
          text = path.read_text()
          anchor = '''    selectAll: () => applyComplete({ type: 'selectAll' }),
              jsonState: async() => ensureJsonState(await query({ type: 'jsonState' })),'''.replace('              ', '')
          replacement = '''    selectAll: () => applyComplete({ type: 'selectAll' }),
          searchMatches: (searchQuery, { caseSensitive = false, wholeWord = false } = {}) => query({
            type: 'search',
            query: String(searchQuery),
            caseSensitive: Boolean(caseSensitive),
            wholeWord: Boolean(wholeWord)
          }),
          jsonState: async() => ensureJsonState(await query({ type: 'jsonState' })),'''.replace('          ', '')
          if 'searchMatches:' not in text:
              if anchor not in text:
                  raise SystemExit('Rust client search anchor not found')
              text = text.replace(anchor, replacement, 1)
          path.write_text(text)

          path = Path('Elephant/frontend/src/renderer/src/muya/realMuyaRustMirrorRuntime.js')
          text = path.read_text()
          if 'searchMatches: unavailable' not in text:
              text = text.replace('    selectAll: unavailable,\n', '    selectAll: unavailable,\n    searchMatches: unavailable,\n', 1)
          anchor = '''    selectAll: command('rust-select-all', (engine) => engine.selectAll()),
              get state()'''.replace('              ', '')
          replacement = '''    selectAll: command('rust-select-all', (engine) => engine.selectAll()),
          searchMatches: commandWith('rust-search', (engine, queryText, options = {}) => (
            engine.searchMatches(queryText, options)
          )),
          clipboard: command('rust-clipboard', (engine) => engine.clipboard()),
          get state()'''.replace('          ', '')
          if "searchMatches: commandWith('rust-search'" not in text:
              if anchor not in text:
                  raise SystemExit('Mirror search anchor not found')
              text = text.replace(anchor, replacement, 1)
          path.write_text(text)

          path = Path('Elephant/frontend/src/renderer/src/muya/realMuyaRustAdapter.js')
          text = path.read_text()
          old = '''  search (value, options = {}) {
              this.__rustSearch = {
                value: String(value || ''),
                options: { ...options },
                index: -1
              }
              return []
            }

            find (action) {
              if (!this.__rustSearch?.value) return []
              this.__rustSearch.index += action === 'pre' ? -1 : 1
              return []
            }'''.replace('            ', '')
          new = '''  async search (value, options = {}) {
              const query = String(value || '')
              const result = await this.__requireRust().searchMatches(query, {
                caseSensitive: Boolean(options.caseSensitive),
                wholeWord: Boolean(options.wholeWord)
              })
              const markdown = this.getMarkdown()
              const matches = (result?.matches || []).map(({ start, end }) => {
                const indexCursor = selectionToMuyaIndexCursor(markdown, {
                  anchor: start,
                  focus: end
                })
                const cursor = this.contentState.convertMuyaIndexCursortoCursor(indexCursor)
                return { start: cursor.start, end: cursor.end, active: false }
              })
              this.contentState.searchMatches = { value: query, matches, index: matches.length ? 0 : -1 }
              if (matches.length) matches[0].active = true
              this.contentState.render(Boolean(options.selectHighlight))
              return this.contentState.searchMatches
            }

            find (action) {
              const search = this.contentState.searchMatches
              if (!search?.matches?.length) return search
              const delta = action === 'pre' ? -1 : 1
              search.index = (search.index + delta + search.matches.length) % search.matches.length
              search.matches.forEach((match, index) => { match.active = index === search.index })
              this.contentState.render(true)
              return search
            }'''.replace('            ', '')
          if old not in text:
              raise SystemExit('Adapter search block not found')
          text = text.replace(old, new, 1)
          path.write_text(text)

          Path('.github/workflows/muya-complete-search-patch.yml').unlink()
          PY
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml
          git config user.name 'ElephantNote CI'
          git config user.email 'actions@users.noreply.github.com'
          git add Elephant/backend/tauri/src/markdown/muya_ui.rs \
            Elephant/frontend/src/renderer/src/muya/rustEngineRuntime.js \
            Elephant/frontend/src/renderer/src/muya/realMuyaRustMirrorRuntime.js \
            Elephant/frontend/src/renderer/src/muya/realMuyaRustAdapter.js \
            .github/workflows/muya-complete-search-patch.yml
          git commit -m 'feat(muya): move search and clipboard queries to Rust'
          git push origin HEAD:feature/rust-muya-editor-core
