name: Muya Host Discovery

on:
  push:
    branches:
      - 'refactor/muya-rust-file-by-file'
    paths:
      - '.github/workflows/muya-host-discovery.yml'
  pull_request:
    paths:
      - '.github/workflows/muya-host-discovery.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Locate Muya host references
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build
          node <<'NODE' > build/muya-host-boundary.txt
          const { readdirSync, readFileSync, statSync } = require('node:fs')
          const { join, relative, sep } = require('node:path')

          const roots = ['Elephant/frontend', 'Elephant/shared', 'tests']
          const extensions = new Set(['.js', '.mjs', '.vue', '.ts', '.tsx'])
          const matches = []

          const walk = (path) => {
            const stat = statSync(path)
            if (stat.isDirectory()) {
              const normalized = path.split(sep).join('/')
              if (normalized.includes('/node_modules/') || normalized.includes('/frontend/src/muya')) {
                return
              }
              for (const entry of readdirSync(path)) walk(join(path, entry))
              return
            }
            const extension = path.slice(path.lastIndexOf('.'))
            if (!extensions.has(extension)) return
            const lines = readFileSync(path, 'utf8').split(/\r?\n/)
            lines.forEach((line, index) => {
              if (/\bMuya\b|\bmuya\b/.test(line)) {
                matches.push(`${relative('.', path)}:${index + 1}:${line}`)
              }
            })
          }

          for (const root of roots) walk(root)
          console.log('# Muya references outside the Muya library')
          console.log(matches.join('\n'))
          NODE
          cat build/muya-host-boundary.txt

      - name: Upload host boundary report
        uses: actions/upload-artifact@v4
        with:
          name: muya-host-boundary
          path: build/muya-host-boundary.txt
          if-no-files-found: error
          retention-days: 1
