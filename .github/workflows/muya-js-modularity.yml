name: Rust Editor Ownership

on:
  push:
    branches:
      - develop_next
    paths:
      - 'Elephant/frontend/src/muya/**'
      - 'Elephant/frontend/app/**'
      - 'Elephant/frontend/src/renderer/src/**'
      - 'Elephant/crates/muya-core/**'
      - 'Elephant/crates/muya-wasm/**'
      - '.github/workflows/muya-js-modularity.yml'
  pull_request:
    paths:
      - 'Elephant/frontend/src/muya/**'
      - 'Elephant/frontend/app/**'
      - 'Elephant/frontend/src/renderer/src/**'
      - 'Elephant/crates/muya-core/**'
      - 'Elephant/crates/muya-wasm/**'
      - '.github/workflows/muya-js-modularity.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ownership:
    name: Validate Rust editor ownership
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Test the Rust editor core
        run: cargo test --manifest-path Elephant/crates/muya-core/Cargo.toml

      - name: Reject production imports of the legacy Muya JavaScript runtime
        shell: bash
        run: |
          set -euo pipefail
          violations=$(grep -RInE \
            --include='*.js' --include='*.mjs' --include='*.ts' --include='*.vue' \
            --exclude='*.spec.js' --exclude='*.test.js' \
            "(from|import)[[:space:]]*['\"][^'\"]*(frontend/src/muya|/muya/(lib|modules|ui)|@/muya)" \
            Elephant/frontend/app Elephant/frontend/src/renderer/src || true)
          if [ -n "$violations" ]; then
            echo 'Production code still imports the legacy Muya JavaScript runtime:' >&2
            echo "$violations" >&2
            exit 1
          fi

      - name: Verify the production editor resource is Rust-owned
        shell: bash
        run: |
          set -euo pipefail
          grep -F "engine: 'rust'" Elephant/frontend/src/renderer/src/muya/editorRuntimeResource.js
          grep -F "api.resources.provide(EDITOR_RESOURCE_ID" Elephant/frontend/src/renderer/src/muya/index.js
          ! grep -RIn "host?.get('muya')" Elephant/frontend/src/renderer/src/addons addons/official
