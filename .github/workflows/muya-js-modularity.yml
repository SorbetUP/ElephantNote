name: Muya JS Modularity

on:
  push:
    branches:
      - 'refactor/muya-js-modular-parity'
    paths:
      - 'Elephant/frontend/src/muya/**'
      - 'build/scripts/check-muya-module-size.mjs'
      - '.github/workflows/muya-js-modularity.yml'
  pull_request:
    paths:
      - 'Elephant/frontend/src/muya/**'
      - 'build/scripts/check-muya-module-size.mjs'
      - '.github/workflows/muya-js-modularity.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  modularity:
    name: Enforce 200-line Muya modules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Audit Muya module sizes
        run: node build/scripts/check-muya-module-size.mjs
      - name: Upload Muya module inventory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: muya-module-size-${{ github.run_id }}
          path: build/muya-module-size.json
          if-no-files-found: error
          retention-days: 14
      - name: Upload Muya source snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: muya-source-${{ github.run_id }}
          path: Elephant/frontend/src/muya
          if-no-files-found: error
          retention-days: 2
