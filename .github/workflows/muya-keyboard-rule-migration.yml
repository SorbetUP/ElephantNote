name: Apply Rust Muya Keyboard Rule Migration

on:
  push:
    branches:
      - feature/rust-muya-editor-core
    paths:
      - '.github/workflows/muya-keyboard-rule-migration.yml'

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/rust-muya-editor-core
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Apply selection-aware keyboard rule implementation
        shell: bash
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('Elephant/backend/tauri/src/markdown/muya_parity.rs')
          source = path.read_text()

          pattern = re.compile(
              r'        MuyaParityCommand::KeyboardRule \{ key, shift_key \} => \{\n'
              r'            let next = apply_keyboard_rule\(&state\.markdown, &key, shift_key\);\n'
              r'            replace_document_if_changed\(state, next\)\n'
              r'        \}'
          )
          replacement_branch = '''        MuyaParityCommand::KeyboardRule { key, shift_key } => {
              let selection = state.selection;
              apply_keyboard_rule_at_selection(state, &key, shift_key, selection.focus)
          }'''
          source, count = pattern.subn(replacement_branch, source, count=1)
          if count != 1:
              raise SystemExit(f'keyboard command branch replacement count={count}')

          start = source.index('pub fn apply_keyboard_rule(')
          end = source.index('\nfn list_continuation', start)
          replacement = r'''pub fn apply_keyboard_rule(markdown: &str, key: &str, shift_key: bool) -> String {
              let cursor = utf16_len(markdown);
              apply_keyboard_rule_to_markdown(markdown, key, shift_key, cursor).0
          }

          fn apply_keyboard_rule_at_selection(
              mut state: MuyaEditorState,
              key: &str,
              shift_key: bool,
              cursor: usize,
          ) -> Result<MuyaEditorTransaction, String> {
              let before_selection = state.selection;
              let (next, next_cursor) =
                  apply_keyboard_rule_to_markdown(&state.markdown, key, shift_key, cursor);
              if next == state.markdown {
                  return apply_command(
                      state,
                      MuyaEditorCommand::SetSelection {
                          anchor: before_selection.anchor,
                          focus: before_selection.focus,
                      },
                  );
              }

              let end = utf16_len(&state.markdown);
              state = apply_command(
                  state,
                  MuyaEditorCommand::SetSelection {
                      anchor: 0,
                      focus: end,
                  },
              )?
              .state;
              let document_transaction = apply_command(
                  state,
                  MuyaEditorCommand::ReplaceSelection { text: next },
              )?;
              let selection_transaction = apply_command(
                  document_transaction.state,
                  MuyaEditorCommand::SetSelection {
                      anchor: next_cursor,
                      focus: next_cursor,
                  },
              )?;

              Ok(MuyaEditorTransaction {
                  state: selection_transaction.state,
                  document_changed: true,
                  selection_changed: before_selection.anchor != next_cursor
                      || before_selection.focus != next_cursor,
              })
          }

          fn apply_keyboard_rule_to_markdown(
              markdown: &str,
              key: &str,
              shift_key: bool,
              cursor_utf16: usize,
          ) -> (String, usize) {
              let cursor = utf16_to_byte_index(markdown, cursor_utf16.min(utf16_len(markdown)));
              let line_start = markdown[..cursor]
                  .rfind('\n')
                  .map_or(0, |index| index + 1);
              let line_end = markdown[cursor..]
                  .find('\n')
                  .map_or(markdown.len(), |offset| cursor + offset);
              let current = &markdown[line_start..line_end];

              if key == "Tab" {
                  let replacement = if shift_key {
                      current.strip_prefix("  ").unwrap_or(current).to_string()
                  } else {
                      format!("  {current}")
                  };
                  if replacement == current {
                      return (markdown.to_string(), cursor_utf16);
                  }
                  let mut next = String::with_capacity(
                      markdown.len() + replacement.len().saturating_sub(current.len()),
                  );
                  next.push_str(&markdown[..line_start]);
                  next.push_str(&replacement);
                  next.push_str(&markdown[line_end..]);
                  let relative_cursor = cursor.saturating_sub(line_start);
                  let next_relative = if shift_key {
                      relative_cursor.saturating_sub(current.len().saturating_sub(replacement.len()))
                  } else {
                      relative_cursor + replacement.len().saturating_sub(current.len())
                  };
                  let next_cursor_byte = line_start + next_relative.min(replacement.len());
                  return (next.clone(), utf16_len(&next[..next_cursor_byte]));
              }

              if key != "Enter" || cursor != line_end {
                  return (markdown.to_string(), cursor_utf16);
              }

              let Some(continuation) = list_continuation(current) else {
                  return (markdown.to_string(), cursor_utf16);
              };
              let insertion = format!("\n{continuation}");
              let mut next = String::with_capacity(markdown.len() + insertion.len());
              next.push_str(&markdown[..cursor]);
              next.push_str(&insertion);
              next.push_str(&markdown[cursor..]);
              let next_cursor_byte = cursor + insertion.len();
              let next_cursor = utf16_len(&next[..next_cursor_byte]);
              (next, next_cursor)
          }
          '''
          source = source[:start] + replacement + source[end:]

          marker = '    fn keyboard_rules_continue_lists() {'
          if marker not in source:
              raise SystemExit('keyboard test marker not found')
          extra = '''    #[test]
              fn keyboard_rule_uses_the_active_middle_line_and_restores_selection() {
                  let mut state = MuyaEditorState::new("- first\\n- second\\nafter".to_string());
                  state.selection = super::super::muya_engine::MuyaSelection::collapsed(16);
                  let transaction = apply_parity_command(
                      state,
                      MuyaParityCommand::KeyboardRule {
                          key: "Enter".to_string(),
                          shift_key: false,
                      },
                  )
                  .expect("list continuation should apply");

                  assert_eq!(transaction.state.markdown, "- first\\n- second\\n- \\nafter");
                  assert_eq!(transaction.state.selection.anchor, 19);
                  assert_eq!(transaction.state.selection.focus, 19);
                  assert_eq!(transaction.state.undo_stack.len(), 1);
              }

              #[test]
              fn tab_rule_indents_only_the_active_line() {
                  let mut state = MuyaEditorState::new("- first\\n- second\\nafter".to_string());
                  state.selection = super::super::muya_engine::MuyaSelection::collapsed(12);
                  let transaction = apply_parity_command(
                      state,
                      MuyaParityCommand::KeyboardRule {
                          key: "Tab".to_string(),
                          shift_key: false,
                      },
                  )
                  .expect("indentation should apply");

                  assert_eq!(transaction.state.markdown, "- first\\n  - second\\nafter");
                  assert_eq!(transaction.state.selection.anchor, 14);
              }

          '''
          source = source.replace(marker, extra + marker, 1)
          path.write_text(source)
          PY

          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml
          rm .github/workflows/muya-keyboard-rule-migration.yml
          git config user.name 'ElephantNote CI'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'feat(muya): apply selection-aware Rust list rules'
          git push origin HEAD:feature/rust-muya-editor-core
