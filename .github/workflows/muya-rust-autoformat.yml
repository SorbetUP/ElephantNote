name: Muya Rust Autoformat

on:
  push:
    branches:
      - feature/rust-muya-complete
    paths:
      - .github/workflows/muya-rust-autoformat.yml

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/rust-muya-complete
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format only Rust-owned Muya modules
        shell: bash
        run: |
          set -euxo pipefail
          rustfmt --edition 2021 --config skip_children=true \
            Elephant/backend/tauri/src/markdown/mod.rs
          rustfmt --edition 2021 \
            Elephant/backend/tauri/src/markdown/muya_advanced.rs \
            Elephant/backend/tauri/src/markdown/muya_assets.rs \
            Elephant/backend/tauri/src/markdown/muya_clipboard_commands.rs \
            Elephant/backend/tauri/src/markdown/muya_clipboard_html.rs \
            Elephant/backend/tauri/src/markdown/muya_complete.rs \
            Elephant/backend/tauri/src/markdown/muya_engine.rs \
            Elephant/backend/tauri/src/markdown/muya_inline.rs \
            Elephant/backend/tauri/src/markdown/muya_parity.rs \
            Elephant/backend/tauri/src/markdown/muya_session.rs \
            Elephant/backend/tauri/src/markdown/muya_state.rs \
            Elephant/backend/tauri/src/markdown/muya_surface.rs \
            Elephant/backend/tauri/src/markdown/muya_ui.rs

          unexpected="$(git diff --name-only | grep -Ev '^Elephant/backend/tauri/src/markdown/(mod|muya_[a-z_]+)\.rs$' || true)"
          if [ -n "$unexpected" ]; then
            echo "Refusing to commit unexpected files:"
            echo "$unexpected"
            exit 1
          fi

      - name: Commit formatting
        shell: bash
        run: |
          set -euxo pipefail
          if git diff --quiet; then
            echo 'No formatting changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Elephant/backend/tauri/src/markdown
          git commit -m 'style(muya): apply rustfmt to Rust editor modules'
          git push origin HEAD:feature/rust-muya-complete
