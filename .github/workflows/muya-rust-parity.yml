name: Muya Rust Parity

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'build/scripts/apply-muya-runtime-race-fix.py'
      - '.github/workflows/muya-rust-parity.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guarded-programmatic-load-fix:
    name: Apply guarded Muya runtime race fix
    if: github.event_name == 'pull_request' && github.head_ref == 'feature/rust-muya-complete' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/rust-muya-complete
          fetch-depth: 1

      - name: Apply verified migration
        run: python build/scripts/apply-muya-runtime-race-fix.py

      - name: Verify exact patch scope
        shell: bash
        run: |
          set -euo pipefail
          changed="$({ git diff --name-only; git ls-files --others --exclude-standard; } | sort -u)"
          expected="$(printf '%s\n' \
            Elephant/backend/tauri/src/markdown/muya_advanced.rs \
            Elephant/backend/tauri/src/markdown/muya_surface.rs \
            Elephant/frontend/src/renderer/src/muya/realMuyaRustAdapter.js \
            Elephant/frontend/src/renderer/src/muya/rustProgrammaticChangeGuard.js \
            tests/app/unit/muyaRustProgrammaticLoad.spec.js | sort)"
          printf 'Changed files:\n%s\n' "$changed"
          test "$changed" = "$expected"

      - name: Commit fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            Elephant/backend/tauri/src/markdown/muya_advanced.rs \
            Elephant/backend/tauri/src/markdown/muya_surface.rs \
            Elephant/frontend/src/renderer/src/muya/realMuyaRustAdapter.js \
            Elephant/frontend/src/renderer/src/muya/rustProgrammaticChangeGuard.js \
            tests/app/unit/muyaRustProgrammaticLoad.spec.js
          git commit -m 'fix(muya): serialize programmatic Rust document loads'
          git push origin HEAD:feature/rust-muya-complete
