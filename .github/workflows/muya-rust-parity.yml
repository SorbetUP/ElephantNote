name: Muya Rust Parity

on:
  push:
    branches:
      - 'feature/**'
      - 'assistant/**'
    paths:
      - 'Elephant/backend/tauri/src/markdown/**'
      - 'Elephant/backend/tauri/src/lib_min.rs'
      - 'Elephant/frontend/src/renderer/src/muya/**'
      - 'Elephant/frontend/src/renderer/src/components/editorWithTabs/**'
      - 'Elephant/frontend/app/components/shell/MainContent.vue'
      - 'Elephant/shared/muyaParityCases.json'
      - 'Elephant/shared/muyaJsonStateCases.json'
      - 'tests/app/unit/muya*.spec.js'
      - 'vite.tauri.config.mjs'
      - '.github/workflows/muya-rust-parity.yml'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'Elephant/backend/tauri/src/markdown/**'
      - 'Elephant/backend/tauri/src/lib_min.rs'
      - 'Elephant/frontend/src/renderer/src/muya/**'
      - 'Elephant/frontend/src/renderer/src/components/editorWithTabs/**'
      - 'Elephant/frontend/app/components/shell/MainContent.vue'
      - 'Elephant/shared/muyaParityCases.json'
      - 'Elephant/shared/muyaJsonStateCases.json'
      - 'tests/app/unit/muya*.spec.js'
      - 'vite.tauri.config.mjs'
      - '.github/workflows/muya-rust-parity.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  parity:
    name: Rust and renderer parity
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      CARGO_TERM_COLOR: always
      DEBIAN_FRONTEND: noninteractive
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri Linux dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            wget

      - uses: ./.github/actions/setup

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Elephant/backend/tauri/target
          key: ${{ runner.os }}-muya-rust-${{ hashFiles('Elephant/backend/tauri/Cargo.lock', 'Elephant/backend/tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-muya-rust-
            ${{ runner.os }}-cargo-

      - name: Check Rust formatting
        shell: bash
        run: |
          set -o pipefail
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml -- --check 2>&1 | tee muya-rustfmt.log

      - name: Compile Tauri Rust backend
        shell: bash
        run: |
          set -o pipefail
          cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --all-targets --no-default-features 2>&1 | tee muya-cargo-check.log

      - name: Run Rust Muya tests
        shell: bash
        run: |
          set -o pipefail
          cargo test --manifest-path Elephant/backend/tauri/Cargo.toml --lib markdown:: --no-default-features -- --nocapture 2>&1 | tee muya-rust-tests.log

      - name: Upload Rust diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: muya-rust-diagnostics-${{ github.run_id }}
          path: |
            muya-rustfmt.log
            muya-cargo-check.log
            muya-rust-tests.log
          if-no-files-found: warn
          retention-days: 14

      - name: Run renderer Muya parity tests
        shell: bash
        run: |
          set -o pipefail
          pnpm exec vitest run \
            tests/app/unit/muyaRustCompleteOwnership.spec.js \
            tests/app/unit/muyaRustCompleteSession.spec.js \
            tests/app/unit/muyaRustEngineRuntime.spec.js \
            tests/app/unit/muyaRustSessionRuntime.spec.js \
            tests/app/unit/muyaRustGroupedHistoryClient.spec.js \
            tests/app/unit/muyaRustBackedRuntime.spec.js \
            tests/app/unit/muyaRustEditorActivation.spec.js \
            tests/app/unit/muyaRustMuyaDomParity.spec.js \
            tests/app/unit/muyaRealSurfaceRustMirror.spec.js \
            tests/app/unit/muyaRuntimeFlags.spec.js \
            tests/app/unit/muyaRuntimeVueIntegration.spec.js \
            tests/app/unit/muyaSharedParityMatrix.spec.js \
            tests/app/unit/muyaJsonStateSharedParity.spec.js \
            tests/app/unit/muyaMarkdownSelectionRuntime.spec.js \
            tests/app/unit/muyaFullEditorRuntime.spec.js \
            tests/app/unit/muyaRuntimeInputParity.spec.js 2>&1 | tee muya-renderer-tests.log

      - name: Upload renderer diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: muya-renderer-diagnostics-${{ github.run_id }}
          path: muya-renderer-tests.log
          if-no-files-found: warn
          retention-days: 14
