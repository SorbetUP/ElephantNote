name: Muya Rust Parity

on:
  push:
    branches:
      - 'feature/**'
      - 'assistant/**'
    paths:
      - 'Elephant/backend/tauri/src/markdown/**'
      - 'Elephant/backend/tauri/src/lib_min.rs'
      - 'Elephant/frontend/src/renderer/src/muya/**'
      - 'Elephant/frontend/src/renderer/src/components/editorWithTabs/**'
      - 'Elephant/frontend/app/components/shell/MainContent.vue'
      - 'Elephant/shared/muyaParityCases.json'
      - 'Elephant/shared/muyaJsonStateCases.json'
      - 'tests/app/unit/muya*.spec.js'
      - 'vite.tauri.config.mjs'
      - '.github/workflows/muya-rust-parity.yml'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'Elephant/backend/tauri/src/markdown/**'
      - 'Elephant/backend/tauri/src/lib_min.rs'
      - 'Elephant/frontend/src/renderer/src/muya/**'
      - 'Elephant/frontend/src/renderer/src/components/editorWithTabs/**'
      - 'Elephant/frontend/app/components/shell/MainContent.vue'
      - 'Elephant/shared/muyaParityCases.json'
      - 'Elephant/shared/muyaJsonStateCases.json'
      - 'tests/app/unit/muya*.spec.js'
      - 'vite.tauri.config.mjs'
      - '.github/workflows/muya-rust-parity.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  guarded-programmatic-load-fix:
    name: Guarded Muya programmatic-load race fix
    if: github.event_name == 'pull_request' && github.head_ref == 'feature/rust-muya-complete' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/rust-muya-complete
          fetch-depth: 1

      - name: Setup Rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Patch only the verified Muya race and warnings
        shell: bash
        run: |
          set -euxo pipefail
          python - <<'PY'
          from pathlib import Path

          adapter_path = Path('Elephant/frontend/src/renderer/src/muya/realMuyaRustAdapter.js')
          adapter = adapter_path.read_text()

          replacements = [
              ("import Muya from '../../../muya/lib'\n", "import Muya from '../../../muya/lib'\nimport { createProgrammaticChangeGuard } from './rustProgrammaticChangeGuard.js'\n"),
              ("    this.__rustExpectedMarkdown = null\n    this.__rustApplying = false\n", "    this.__rustProgrammaticChanges = this.__rustProgrammaticChanges || createProgrammaticChangeGuard()\n    this.__rustApplying = false\n"),
              ("      if (typeof markdown !== 'string') return\n      if (this.__rustExpectedMarkdown === markdown) {\n        this.__rustExpectedMarkdown = null\n        return\n      }\n", "      if (typeof markdown !== 'string') return\n      if (this.__programmaticGuard().consume()) return\n"),
              ("      console.error('[elephantnote:muya-rust] rejected non-canonical JavaScript mutation')\n      this.__rustExpectedMarkdown = state.markdown\n      super.setMarkdown(\n", "      console.error('[elephantnote:muya-rust] rejected non-canonical JavaScript mutation', {\n        canonicalLength: state.markdown.length,\n        receivedLength: markdown.length,\n        revision: state.revision\n      })\n      this.__setProgrammaticMarkdown(\n"),
              ("    this.on('change', this.__rustChangeListener)\n    this.on('selectionChange', this.__rustSelectionListener)\n  }\n\n  __reportRustError = (error) => {\n", "    this.on('change', this.__rustChangeListener)\n    this.on('selectionChange', this.__rustSelectionListener)\n  }\n\n  __programmaticGuard () {\n    if (!this.__rustProgrammaticChanges) {\n      this.__rustProgrammaticChanges = createProgrammaticChangeGuard()\n    }\n    return this.__rustProgrammaticChanges\n  }\n\n  __setProgrammaticMarkdown (markdown, cursor, isRenderCursor = true, muyaIndexCursor, blocks) {\n    return this.__programmaticGuard().run(() => super.setMarkdown(\n      markdown, cursor, isRenderCursor, muyaIndexCursor, blocks\n    ))\n  }\n\n  __reportRustError = (error) => {\n"),
              ("      if (!this.__rustMirror?.active || this.__rustApplying || this.__rustComposition) return\n", "      if (!this.__rustMirror?.active || this.__rustApplying || this.__rustComposition || this.__programmaticGuard().pending) return\n"),
              ("    try {\n      const { markdown, cursor } = this.__selection()\n", "    try {\n      await engine.flush()\n      const { markdown, cursor } = this.__selection()\n"),
              ("    this.__rustExpectedMarkdown = state.markdown\n    super.setMarkdown(\n", "    this.__setProgrammaticMarkdown(\n"),
              ("  setMarkdown (markdown, ...args) {\n    const result = super.setMarkdown(markdown, ...args)\n    this.__rustExpectedMarkdown = null\n    this.__rustComposition = null\n    this.__rustMirror?.reset(markdown, 'set-markdown', { muyaIndexCursor: args[2] })\n      .then(() => this.__refreshClipboard())\n      .catch(this.__reportRustError)\n    return result\n  }\n", "  setMarkdown (markdown, ...args) {\n    const result = this.__setProgrammaticMarkdown(markdown, ...args)\n    this.__rustComposition = null\n    this.__rustMirror?.reset(markdown, 'set-markdown', { muyaIndexCursor: args[2] })\n      .then(() => this.__refreshClipboard())\n      .catch(this.__reportRustError)\n    return result\n  }\n"),
          ]

          for index, (old, new) in enumerate(replacements, start=1):
              count = adapter.count(old)
              if count != 1:
                  raise SystemExit(f'adapter replacement {index} expected one match, found {count}')
              adapter = adapter.replace(old, new)
          adapter_path.write_text(adapter)

          guard_path = Path('Elephant/frontend/src/renderer/src/muya/rustProgrammaticChangeGuard.js')
          if guard_path.exists():
              raise SystemExit(f'{guard_path} already exists')
          guard_path.write_text("""export const createProgrammaticChangeGuard = () => {\n  let pending = 0\n\n  return {\n    run (render) {\n      if (typeof render !== 'function') throw new TypeError('A programmatic Muya render callback is required.')\n      pending += 1\n      try {\n        return render()\n      } catch (error) {\n        pending = Math.max(0, pending - 1)\n        throw error\n      }\n    },\n\n    consume () {\n      if (pending <= 0) return false\n      pending -= 1\n      return true\n    },\n\n    get pending () {\n      return pending\n    }\n  }\n}\n""")

          test_path = Path('tests/app/unit/muyaRustProgrammaticLoad.spec.js')
          if test_path.exists():
              raise SystemExit(f'{test_path} already exists')
          test_path.write_text("""import { describe, expect, it, vi } from 'vitest'\n\nimport { createProgrammaticChangeGuard } from '../../../Elephant/frontend/src/renderer/src/muya/rustProgrammaticChangeGuard.js'\n\ndescribe('Muya Rust programmatic render guard', () => {\n  it('consumes every deferred change from consecutive note loads without hiding the next real mutation', () => {\n    const guard = createProgrammaticChangeGuard()\n    const render = vi.fn((markdown) => markdown.length)\n\n    expect(guard.run(() => render('old note'))).toBe(8)\n    expect(guard.run(() => render('x'.repeat(722)))).toBe(722)\n    expect(guard.pending).toBe(2)\n    expect(guard.consume()).toBe(true)\n    expect(guard.consume()).toBe(true)\n    expect(guard.pending).toBe(0)\n    expect(guard.consume()).toBe(false)\n    expect(render).toHaveBeenCalledTimes(2)\n  })\n\n  it('does not leak a synthetic-change slot when Muya rendering throws', () => {\n    const guard = createProgrammaticChangeGuard()\n    expect(() => guard.run(() => { throw new Error('render failed') })).toThrow('render failed')\n    expect(guard.pending).toBe(0)\n    expect(guard.consume()).toBe(false)\n  })\n})\n""")

          for rust_name in ['muya_advanced.rs', 'muya_surface.rs']:
              path = Path('Elephant/backend/tauri/src/markdown') / rust_name
              text = path.read_text()
              old = '    MuyaEditorTransaction, MuyaSelection,\n'
              if text.count(old) != 1:
                  raise SystemExit(f'expected one unused MuyaSelection import in {path}')
              path.write_text(text.replace(old, '    MuyaEditorTransaction,\n'))
          PY

          rustfmt --edition 2021 \
            Elephant/backend/tauri/src/markdown/muya_advanced.rs \
            Elephant/backend/tauri/src/markdown/muya_surface.rs

          changed="$(git diff --name-only | sort)"
          expected="$(printf '%s\n' \
            Elephant/backend/tauri/src/markdown/muya_advanced.rs \
            Elephant/backend/tauri/src/markdown/muya_surface.rs \
            Elephant/frontend/src/renderer/src/muya/realMuyaRustAdapter.js \
            Elephant/frontend/src/renderer/src/muya/rustProgrammaticChangeGuard.js \
            tests/app/unit/muyaRustProgrammaticLoad.spec.js | sort)"
          test "$changed" = "$expected"

      - name: Commit the guarded fix
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            Elephant/backend/tauri/src/markdown/muya_advanced.rs \
            Elephant/backend/tauri/src/markdown/muya_surface.rs \
            Elephant/frontend/src/renderer/src/muya/realMuyaRustAdapter.js \
            Elephant/frontend/src/renderer/src/muya/rustProgrammaticChangeGuard.js \
            tests/app/unit/muyaRustProgrammaticLoad.spec.js
          git commit -m 'fix(muya): serialize programmatic Rust document loads'
          git push origin HEAD:feature/rust-muya-complete

  parity:
    name: Rust and renderer parity
    needs: guarded-programmatic-load-fix
    if: always() && (needs.guarded-programmatic-load-fix.result == 'success' || needs.guarded-programmatic-load-fix.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      CARGO_TERM_COLOR: always
      DEBIAN_FRONTEND: noninteractive
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri Linux dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            wget

      - uses: ./.github/actions/setup

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Elephant/backend/tauri/target
          key: ${{ runner.os }}-muya-rust-${{ hashFiles('Elephant/backend/tauri/Cargo.lock', 'Elephant/backend/tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-muya-rust-
            ${{ runner.os }}-cargo-

      - name: Check Rust migration formatting
        shell: bash
        run: |
          set -euo pipefail
          {
            rustfmt --edition 2021 --check --config skip_children=true \
              Elephant/backend/tauri/src/markdown/mod.rs
            rustfmt --edition 2021 --check \
              Elephant/backend/tauri/src/markdown/muya_advanced.rs \
              Elephant/backend/tauri/src/markdown/muya_assets.rs \
              Elephant/backend/tauri/src/markdown/muya_clipboard_commands.rs \
              Elephant/backend/tauri/src/markdown/muya_clipboard_html.rs \
              Elephant/backend/tauri/src/markdown/muya_complete.rs \
              Elephant/backend/tauri/src/markdown/muya_engine.rs \
              Elephant/backend/tauri/src/markdown/muya_inline.rs \
              Elephant/backend/tauri/src/markdown/muya_parity.rs \
              Elephant/backend/tauri/src/markdown/muya_session.rs \
              Elephant/backend/tauri/src/markdown/muya_state.rs \
              Elephant/backend/tauri/src/markdown/muya_surface.rs \
              Elephant/backend/tauri/src/markdown/muya_ui.rs
          } 2>&1 | tee muya-rustfmt.log

      - name: Compile Tauri Rust backend
        shell: bash
        run: |
          set -o pipefail
          cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --all-targets --no-default-features 2>&1 | tee muya-cargo-check.log

      - name: Run Rust Muya tests
        shell: bash
        run: |
          set -o pipefail
          cargo test --manifest-path Elephant/backend/tauri/Cargo.toml --lib markdown:: --no-default-features -- --nocapture 2>&1 | tee muya-rust-tests.log

      - name: Upload Rust diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: muya-rust-diagnostics-${{ github.run_id }}
          path: |
            muya-rustfmt.log
            muya-cargo-check.log
            muya-rust-tests.log
          if-no-files-found: warn
          retention-days: 14

      - name: Run renderer Muya parity tests
        shell: bash
        run: |
          set -o pipefail
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            tests/app/unit/muyaRustCompleteOwnership.spec.js \
            tests/app/unit/muyaRustCompleteSession.spec.js \
            tests/app/unit/muyaRustProgrammaticLoad.spec.js \
            tests/app/unit/muyaRustEngineRuntime.spec.js \
            tests/app/unit/muyaRustSessionRuntime.spec.js \
            tests/app/unit/muyaRustGroupedHistoryClient.spec.js \
            tests/app/unit/muyaRustBackedRuntime.spec.js \
            tests/app/unit/muyaRustEditorActivation.spec.js \
            tests/app/unit/muyaRustMuyaDomParity.spec.js \
            tests/app/unit/muyaRealSurfaceRustMirror.spec.js \
            tests/app/unit/muyaRuntimeFlags.spec.js \
            tests/app/unit/muyaRuntimeVueIntegration.spec.js \
            tests/app/unit/muyaSharedParityMatrix.spec.js \
            tests/app/unit/muyaJsonStateSharedParity.spec.js \
            tests/app/unit/muyaMarkdownSelectionRuntime.spec.js \
            tests/app/unit/muyaFullEditorRuntime.spec.js \
            tests/app/unit/muyaRuntimeInputParity.spec.js 2>&1 | tee muya-renderer-tests.log

      - name: Build Tauri renderer with Rust-owned Muya
        shell: bash
        run: |
          set -o pipefail
          pnpm tauri:web:build 2>&1 | tee muya-renderer-build.log

      - name: Verify Rust-owned Muya code is shipped
        shell: bash
        run: |
          set -euxo pipefail
          test -d build/out/renderer
          grep -R -F -q 'muya-ui-rust-core' build/out/renderer
          grep -R -F -q 'real Muya UI with Rust-owned core active' build/out/renderer
          grep -R -F -q 'JavaScript fallback is disabled' build/out/renderer

      - name: Upload renderer diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: muya-renderer-diagnostics-${{ github.run_id }}
          path: |
            muya-renderer-tests.log
            muya-renderer-build.log
          if-no-files-found: warn
          retention-days: 14
