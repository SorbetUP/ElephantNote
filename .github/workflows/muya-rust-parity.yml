name: Muya Rust Parity

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/muya-rust-parity.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guarded-test-import-fix:
    name: Add test-only Muya selection imports
    if: github.event_name == 'pull_request' && github.head_ref == 'feature/rust-muya-complete' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/rust-muya-complete
          fetch-depth: 1

      - name: Add imports only for Rust test builds
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          for name in ['muya_advanced.rs', 'muya_surface.rs']:
              path = Path('Elephant/backend/tauri/src/markdown') / name
              text = path.read_text()
              anchor = 'use serde::{Deserialize, Serialize};\n\n'
              replacement = (
                  'use serde::{Deserialize, Serialize};\n\n'
                  '#[cfg(test)]\n'
                  'use super::muya_engine::MuyaSelection;\n\n'
              )
              if text.count(anchor) != 1:
                  raise SystemExit(f'expected one serde import anchor in {path}')
              if 'use super::muya_engine::MuyaSelection;' in text:
                  raise SystemExit(f'test-only selection import already exists in {path}')
              path.write_text(text.replace(anchor, replacement, 1))
          PY

          changed="$(git diff --name-only | sort)"
          expected="$(printf '%s\n' \
            Elephant/backend/tauri/src/markdown/muya_advanced.rs \
            Elephant/backend/tauri/src/markdown/muya_surface.rs | sort)"
          test "$changed" = "$expected"

      - name: Commit fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            Elephant/backend/tauri/src/markdown/muya_advanced.rs \
            Elephant/backend/tauri/src/markdown/muya_surface.rs
          git commit -m 'fix(muya): scope selection imports to Rust tests'
          git push origin HEAD:feature/rust-muya-complete
