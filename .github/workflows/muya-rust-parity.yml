name: Muya Rust Parity

on:
  push:
    branches:
      - 'feature/**'
      - 'assistant/**'
    paths:
      - 'Elephant/backend/tauri/src/markdown/**'
      - 'Elephant/backend/tauri/src/lib_min.rs'
      - 'Elephant/frontend/src/renderer/src/muya/**'
      - 'Elephant/frontend/src/renderer/src/components/editorWithTabs/**'
      - 'Elephant/frontend/app/components/shell/MainContent.vue'
      - 'Elephant/shared/muyaParityCases.json'
      - 'Elephant/shared/muyaJsonStateCases.json'
      - 'tests/app/unit/muya*.spec.js'
      - 'vite.tauri.config.mjs'
      - '.github/workflows/muya-rust-parity.yml'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'Elephant/backend/tauri/src/markdown/**'
      - 'Elephant/backend/tauri/src/lib_min.rs'
      - 'Elephant/frontend/src/renderer/src/muya/**'
      - 'Elephant/frontend/src/renderer/src/components/editorWithTabs/**'
      - 'Elephant/frontend/app/components/shell/MainContent.vue'
      - 'Elephant/shared/muyaParityCases.json'
      - 'Elephant/shared/muyaJsonStateCases.json'
      - 'tests/app/unit/muya*.spec.js'
      - 'vite.tauri.config.mjs'
      - '.github/workflows/muya-rust-parity.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  guarded-programmatic-render-fix:
    name: Guarded programmatic render fix
    if: github.event_name == 'pull_request' && github.head_ref == 'feature/rust-muya-complete' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/rust-muya-complete
          fetch-depth: 0

      - name: Patch only Muya programmatic render guard files
        shell: bash
        run: |
          set -euxo pipefail
          python - <<'PY'
          from pathlib import Path

          adapter = Path('Elephant/frontend/src/renderer/src/muya/realMuyaRustAdapter.js')
          text = adapter.read_text()
          old = """      if (typeof markdown !== 'string') return
      if (this.__programmaticGuard().consume()) return
      if (this.__rustComposition) {
"""
          new = """      if (typeof markdown !== 'string') return
      const programmaticGuard = this.__programmaticGuard()
      if (programmaticGuard.consume(markdown)) return
      if (programmaticGuard.pending) {
        console.warn('[elephantnote:muya-rust] ignored non-canonical programmatic mutation', {
          expectedLength: programmaticGuard.expectedMarkdown?.length ?? null,
          receivedLength: markdown.length
        })
        return
      }
      if (this.__rustComposition) {
"""
          if text.count(old) != 1:
            raise SystemExit(f'expected one change-listener guard block, found {text.count(old)}')
          text = text.replace(old, new)

          old = """    return this.__programmaticGuard().run(() => super.setMarkdown(
      markdown,
      cursor,
      isRenderCursor,
      muyaIndexCursor,
      blocks
    ))
"""
          new = """    return this.__programmaticGuard().run(() => super.setMarkdown(
      markdown,
      cursor,
      isRenderCursor,
      muyaIndexCursor,
      blocks
    ), { expectedMarkdown: String(markdown ?? '') })
"""
          if text.count(old) != 1:
            raise SystemExit(f'expected one setMarkdown guard block, found {text.count(old)}')
          adapter.write_text(text.replace(old, new))

          Path('Elephant/frontend/src/renderer/src/muya/rustProgrammaticChangeGuard.js').write_text("""const DEFAULT_BURST = 256
const DEFAULT_TTL_MS = 750

export const createProgrammaticChangeGuard = ({
  now = () => Date.now(),
  burst = DEFAULT_BURST,
  ttlMs = DEFAULT_TTL_MS
} = {}) => {
  let pending = 0
  let deadline = 0
  let expectedMarkdown = null

  const currentTime = () => Number(now()) || 0
  const clearIfExpired = () => {
    if (pending <= 0 && deadline > 0 && currentTime() > deadline) {
      deadline = 0
      expectedMarkdown = null
    }
  }
  const arm = ({ expectedMarkdown: nextExpectedMarkdown } = {}) => {
    pending = Math.max(pending, Number(burst) || DEFAULT_BURST)
    deadline = currentTime() + (Number(ttlMs) || DEFAULT_TTL_MS)
    expectedMarkdown = typeof nextExpectedMarkdown === 'string' ? nextExpectedMarkdown : null
  }

  return {
    run (render, options = {}) {
      if (typeof render !== 'function') throw new TypeError('A programmatic Muya render callback is required.')
      arm(options)
      try {
        return render()
      } catch (error) {
        pending = 0
        deadline = 0
        expectedMarkdown = null
        throw error
      }
    },

    consume (markdown) {
      clearIfExpired()
      if (pending <= 0 && deadline <= 0) return false
      if (expectedMarkdown !== null && String(markdown ?? '') !== expectedMarkdown) return false
      pending = Math.max(0, pending - 1)
      deadline = currentTime() + (Number(ttlMs) || DEFAULT_TTL_MS)
      return true
    },

    clear () {
      pending = 0
      deadline = 0
      expectedMarkdown = null
    },

    get pending () {
      clearIfExpired()
      return pending > 0 || deadline > 0
    },

    get expectedMarkdown () {
      clearIfExpired()
      return expectedMarkdown
    }
  }
}
""")

          Path('tests/app/unit/muyaRustProgrammaticGuard.spec.js').write_text("""import { describe, expect, it } from 'vitest'
import { createProgrammaticChangeGuard } from '../../../Elephant/frontend/src/renderer/src/muya/rustProgrammaticChangeGuard.js'

describe('Muya Rust programmatic change guard', () => {
  it('accepts repeated matching changes emitted by one programmatic render', () => {
    let now = 1000
    const guard = createProgrammaticChangeGuard({ now: () => now, burst: 3, ttlMs: 50 })
    guard.run(() => 'rendered', { expectedMarkdown: 'canonical' })
    expect(guard.consume('canonical')).toBe(true)
    expect(guard.consume('canonical')).toBe(true)
    now += 25
    expect(guard.consume('canonical')).toBe(true)
  })

  it('keeps stale cleanup rollbacks out of the canonical Rust path during a guarded render', () => {
    const guard = createProgrammaticChangeGuard({ now: () => 1000, burst: 3, ttlMs: 50 })
    guard.run(() => null, { expectedMarkdown: 'canonical' })
    expect(guard.consume('stale rollback')).toBe(false)
    expect(guard.pending).toBe(true)
    expect(guard.expectedMarkdown).toBe('canonical')
  })

  it('expires the programmatic window before later user mutations', () => {
    let now = 1000
    const guard = createProgrammaticChangeGuard({ now: () => now, burst: 1, ttlMs: 50 })
    guard.run(() => null, { expectedMarkdown: 'canonical' })
    now += 51
    expect(guard.pending).toBe(false)
    expect(guard.consume('canonical')).toBe(false)
  })
})
""")
          PY
          changed="$(git diff --name-only | sort)"
          expected="Elephant/frontend/src/renderer/src/muya/realMuyaRustAdapter.js
Elephant/frontend/src/renderer/src/muya/rustProgrammaticChangeGuard.js
tests/app/unit/muyaRustProgrammaticGuard.spec.js"
          test "$changed" = "$expected"

      - name: Commit the guarded fix
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Elephant/frontend/src/renderer/src/muya/realMuyaRustAdapter.js \
            Elephant/frontend/src/renderer/src/muya/rustProgrammaticChangeGuard.js \
            tests/app/unit/muyaRustProgrammaticGuard.spec.js
          git commit -m 'fix(muya): tolerate programmatic render bursts'
          git push origin HEAD:feature/rust-muya-complete

  parity:
    name: Rust and renderer parity
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      CARGO_TERM_COLOR: always
      DEBIAN_FRONTEND: noninteractive
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri Linux dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            wget

      - uses: ./.github/actions/setup

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Elephant/backend/tauri/target
          key: ${{ runner.os }}-muya-rust-${{ hashFiles('Elephant/backend/tauri/Cargo.lock', 'Elephant/backend/tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-muya-rust-
            ${{ runner.os }}-cargo-

      - name: Check Rust migration formatting
        shell: bash
        run: |
          set -euo pipefail
          {
            rustfmt --edition 2021 --check --config skip_children=true \
              Elephant/backend/tauri/src/markdown/mod.rs
            rustfmt --edition 2021 --check \
              Elephant/backend/tauri/src/markdown/muya_advanced.rs \
              Elephant/backend/tauri/src/markdown/muya_assets.rs \
              Elephant/backend/tauri/src/markdown/muya_clipboard_commands.rs \
              Elephant/backend/tauri/src/markdown/muya_clipboard_html.rs \
              Elephant/backend/tauri/src/markdown/muya_complete.rs \
              Elephant/backend/tauri/src/markdown/muya_engine.rs \
              Elephant/backend/tauri/src/markdown/muya_inline.rs \
              Elephant/backend/tauri/src/markdown/muya_parity.rs \
              Elephant/backend/tauri/src/markdown/muya_session.rs \
              Elephant/backend/tauri/src/markdown/muya_state.rs \
              Elephant/backend/tauri/src/markdown/muya_surface.rs \
              Elephant/backend/tauri/src/markdown/muya_ui.rs
          } 2>&1 | tee muya-rustfmt.log

      - name: Compile Tauri Rust backend
        shell: bash
        run: |
          set -o pipefail
          cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --all-targets --no-default-features 2>&1 | tee muya-cargo-check.log

      - name: Run Rust Muya tests
        shell: bash
        run: |
          set -o pipefail
          cargo test --manifest-path Elephant/backend/tauri/Cargo.toml --lib markdown:: --no-default-features -- --nocapture 2>&1 | tee muya-rust-tests.log

      - name: Upload Rust diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: muya-rust-diagnostics-${{ github.run_id }}
          path: |
            muya-rustfmt.log
            muya-cargo-check.log
            muya-rust-tests.log
          if-no-files-found: warn
          retention-days: 14

      - name: Run renderer Muya parity tests
        shell: bash
        run: |
          set -o pipefail
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            tests/app/unit/muyaRustCompleteOwnership.spec.js \
            tests/app/unit/muyaRustCompleteSession.spec.js \
            tests/app/unit/muyaRustProgrammaticGuard.spec.js \
            tests/app/unit/muyaRustProgrammaticLoad.spec.js \
            tests/app/unit/muyaRustEngineRuntime.spec.js \
            tests/app/unit/muyaRustSessionRuntime.spec.js \
            tests/app/unit/muyaRustGroupedHistoryClient.spec.js \
            tests/app/unit/muyaRustBackedRuntime.spec.js \
            tests/app/unit/muyaRustEditorActivation.spec.js \
            tests/app/unit/muyaRustMuyaDomParity.spec.js \
            tests/app/unit/muyaRealSurfaceRustMirror.spec.js \
            tests/app/unit/muyaRuntimeFlags.spec.js \
            tests/app/unit/muyaRuntimeVueIntegration.spec.js \
            tests/app/unit/muyaSharedParityMatrix.spec.js \
            tests/app/unit/muyaJsonStateSharedParity.spec.js \
            tests/app/unit/muyaMarkdownSelectionRuntime.spec.js \
            tests/app/unit/muyaFullEditorRuntime.spec.js \
            tests/app/unit/muyaRuntimeInputParity.spec.js 2>&1 | tee muya-renderer-tests.log

      - name: Build Tauri renderer with Rust-owned Muya
        shell: bash
        run: |
          set -o pipefail
          pnpm tauri:web:build 2>&1 | tee muya-renderer-build.log

      - name: Verify Rust-owned Muya code is shipped
        shell: bash
        run: |
          set -euxo pipefail
          test -d build/out/renderer
          grep -R -F -q 'muya-ui-rust-core' build/out/renderer
          grep -R -F -q 'real Muya UI with Rust-owned core active' build/out/renderer
          grep -R -F -q 'JavaScript fallback is disabled' build/out/renderer

      - name: Upload renderer diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: muya-renderer-diagnostics-${{ github.run_id }}
          path: |
            muya-renderer-tests.log
            muya-renderer-build.log
          if-no-files-found: warn
          retention-days: 14
