name: Structured Muya Test Diagnostics

on:
  push:
    branches:
      - feature/rust-muya-editor-core
    paths:
      - '.github/workflows/muya-structured-tests-diagnostic.yml'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      HUSKY: '0'
      NODE_ENV: test
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/rust-muya-editor-core
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Run and persist structured Muya contracts
        shell: bash
        run: |
          set +e
          mkdir -p .github/validation
          pnpm exec vitest run \
            tests/app/unit/muyaRustSessionRuntime.spec.js \
            tests/app/unit/muyaRustStructuredSession.spec.js \
            tests/app/unit/muyaRealSurfaceRustMirror.spec.js \
            tests/app/unit/muyaRustEditorActivation.spec.js \
            > .github/validation/structured-tests.md 2>&1
          status=$?
          printf '\n\nExit status: %s\n' "$status" >> .github/validation/structured-tests.md
          rm .github/workflows/muya-structured-tests-diagnostic.yml
          git config user.name 'ElephantNote CI'
          git config user.email 'actions@users.noreply.github.com'
          git add -f .github/validation/structured-tests.md
          git add -u .github/workflows/muya-structured-tests-diagnostic.yml
          git commit -m 'ci: record structured Muya test output'
          git push origin HEAD:feature/rust-muya-editor-core
          exit 0
