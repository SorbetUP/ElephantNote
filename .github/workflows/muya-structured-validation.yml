name: Structured Rust Muya Validation

on:
  push:
    branches:
      - feature/rust-muya-editor-core
    paths:
      - '.github/workflows/muya-structured-validation.yml'

permissions:
  contents: write

concurrency:
  group: structured-rust-muya-validation
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      HUSKY: '0'
      NODE_ENV: test
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/rust-muya-editor-core
          fetch-depth: 0

      - id: linux_dependencies
        name: Install Linux dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libsecret-1-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libx11-dev \
            libxkbfile-dev \
            patchelf \
            rpm \
            wget \
            xz-utils

      - id: setup
        uses: ./.github/actions/setup

      - id: critical
        name: Critical flow guard
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p .github/validation
          node build/scripts/verify-critical-flows.mjs 2>&1 | tee /tmp/critical-flow.txt
          status=${PIPESTATUS[0]}
          tail -n 300 /tmp/critical-flow.txt > .github/validation/critical-flow.txt
          exit "$status"

      - id: security
        name: Security guardrails
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          workflow=.github/workflows/muya-structured-validation.yml
          mv "$workflow" /tmp/muya-structured-validation.yml
          pnpm security:guard 2>&1 | tee /tmp/security.txt
          status=${PIPESTATUS[0]}
          mv /tmp/muya-structured-validation.yml "$workflow"
          tail -n 300 /tmp/security.txt > .github/validation/security.txt
          exit "$status"

      - id: platform
        name: Tauri platform compatibility
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pnpm tauri:platform:check 2>&1 | tee /tmp/platform.txt
          status=${PIPESTATUS[0]}
          tail -n 300 /tmp/platform.txt > .github/validation/platform.txt
          exit "$status"

      - id: lint
        name: Lint
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pnpm lint 2>&1 | tee /tmp/lint.txt
          status=${PIPESTATUS[0]}
          tail -n 300 /tmp/lint.txt > .github/validation/lint.txt
          exit "$status"

      - id: rustfmt
        name: Rust formatting
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml -- --check 2>&1 | tee /tmp/rustfmt.txt
          status=${PIPESTATUS[0]}
          tail -n 300 /tmp/rustfmt.txt > .github/validation/rustfmt.txt
          exit "$status"

      - id: rust_check
        name: Rust check
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --all-targets --no-default-features 2>&1 | tee /tmp/rust-check.txt
          status=${PIPESTATUS[0]}
          tail -n 300 /tmp/rust-check.txt > .github/validation/rust-check.txt
          exit "$status"

      - id: rust_tests
        name: Rust tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cargo test --manifest-path Elephant/backend/tauri/Cargo.toml --lib --no-default-features 2>&1 | tee /tmp/rust-tests.txt
          status=${PIPESTATUS[0]}
          tail -n 300 /tmp/rust-tests.txt > .github/validation/rust-tests.txt
          exit "$status"

      - id: structured_tests
        name: Structured Muya unit contracts
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            tests/app/unit/muyaRustSessionRuntime.spec.js \
            tests/app/unit/muyaRustStructuredSession.spec.js \
            tests/app/unit/muyaRealSurfaceRustMirror.spec.js \
            tests/app/unit/muyaRustEditorActivation.spec.js \
            2>&1 | tee /tmp/structured-tests.txt
          status=${PIPESTATUS[0]}
          tail -n 300 /tmp/structured-tests.txt > .github/validation/structured-tests.txt
          exit "$status"

      - id: renderer
        name: Build renderer
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pnpm tauri:web:build 2>&1 | tee /tmp/renderer.txt
          status=${PIPESTATUS[0]}
          tail -n 300 /tmp/renderer.txt > .github/validation/renderer.txt
          exit "$status"

      - id: unit_tests
        name: Full unit suite
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pnpm test:unit 2>&1 | tee /tmp/unit-tests.txt
          status=${PIPESTATUS[0]}
          tail -n 300 /tmp/unit-tests.txt > .github/validation/unit-tests.txt
          exit "$status"

      - name: Persist validation result
        if: always()
        shell: bash
        env:
          LINUX_DEPENDENCIES: ${{ steps.linux_dependencies.outcome }}
          SETUP: ${{ steps.setup.outcome }}
          CRITICAL: ${{ steps.critical.outcome }}
          SECURITY: ${{ steps.security.outcome }}
          PLATFORM: ${{ steps.platform.outcome }}
          LINT: ${{ steps.lint.outcome }}
          RUSTFMT: ${{ steps.rustfmt.outcome }}
          RUST_CHECK: ${{ steps.rust_check.outcome }}
          RUST_TESTS: ${{ steps.rust_tests.outcome }}
          STRUCTURED_TESTS: ${{ steps.structured_tests.outcome }}
          RENDERER: ${{ steps.renderer.outcome }}
          UNIT_TESTS: ${{ steps.unit_tests.outcome }}
        run: |
          set -euxo pipefail
          mkdir -p .github/validation
          cat > .github/validation/structured-rust-muya.json <<EOF
          {
            "linuxDependencies": "$LINUX_DEPENDENCIES",
            "setup": "$SETUP",
            "critical": "$CRITICAL",
            "security": "$SECURITY",
            "platform": "$PLATFORM",
            "lint": "$LINT",
            "rustfmt": "$RUSTFMT",
            "rustCheck": "$RUST_CHECK",
            "rustTests": "$RUST_TESTS",
            "structuredTests": "$STRUCTURED_TESTS",
            "renderer": "$RENDERER",
            "unitTests": "$UNIT_TESTS",
            "validatedCommit": "${GITHUB_SHA}"
          }
          EOF

          all_success=true
          for outcome in \
            "$LINUX_DEPENDENCIES" "$SETUP" "$CRITICAL" "$SECURITY" "$PLATFORM" \
            "$LINT" "$RUSTFMT" "$RUST_CHECK" "$RUST_TESTS" "$STRUCTURED_TESTS" \
            "$RENDERER" "$UNIT_TESTS"; do
            if [ "$outcome" != success ]; then
              all_success=false
            fi
          done

          if [ "$all_success" = true ]; then
            rm -rf .github/validation
            rm .github/workflows/muya-structured-validation.yml
          fi

          git config user.name 'ElephantNote CI'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m "ci: record structured Rust Muya validation ($all_success)"
          git push origin HEAD:feature/rust-muya-editor-core
