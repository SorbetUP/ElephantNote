name: Muya WASM Adapter

on:
  push:
    branches:
      - 'refactor/muya-rust-file-by-file'
    paths:
      - 'Elephant/crates/muya-core/**'
      - 'Elephant/crates/muya-wasm/**'
      - 'Elephant/frontend/src/muya/lib/rust/**'
      - 'Elephant/frontend/src/muya/lib/core/setup.js'
      - 'Elephant/frontend/src/muya/lib/config/options.js'
      - 'tests/app/unit/specs/muya/rustBridge.spec.js'
      - 'tests/app/unit/specs/muya/rustLogicalDocument.spec.js'
      - 'tests/app/unit/specs/muya/rustDomRenderer.spec.js'
      - '.github/workflows/muya-wasm.yml'
  pull_request:
    paths:
      - 'Elephant/crates/muya-core/**'
      - 'Elephant/crates/muya-wasm/**'
      - 'Elephant/frontend/src/muya/lib/rust/**'
      - 'Elephant/frontend/src/muya/lib/core/setup.js'
      - 'Elephant/frontend/src/muya/lib/config/options.js'
      - 'tests/app/unit/specs/muya/rustBridge.spec.js'
      - 'tests/app/unit/specs/muya/rustLogicalDocument.spec.js'
      - 'tests/app/unit/specs/muya/rustDomRenderer.spec.js'
      - '.github/workflows/muya-wasm.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  adapter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.91.0'
          targets: wasm32-unknown-unknown
          components: rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            Elephant/crates/muya-core
            Elephant/crates/muya-wasm

      - name: Generate formatting candidate
        run: |
          cargo fmt --manifest-path Elephant/crates/muya-wasm/Cargo.toml
          mkdir -p build/muya-rustfmt
          cp Elephant/crates/muya-core/src/protocol/mod.rs build/muya-rustfmt/protocol.rs
          cp Elephant/crates/muya-wasm/src/lib.rs build/muya-rustfmt/wasm-lib.rs

      - name: Upload formatting candidate
        uses: actions/upload-artifact@v4
        with:
          name: muya-rustfmt-candidate
          path: build/muya-rustfmt
          if-no-files-found: error
          retention-days: 1

      - name: Verify formatting is committed
        run: git diff --exit-code -- Elephant/crates/muya-core Elephant/crates/muya-wasm

      - name: Test adapter protocol on host
        run: cargo test --manifest-path Elephant/crates/muya-wasm/Cargo.toml

      - name: Check WebAssembly target
        run: cargo check --manifest-path Elephant/crates/muya-wasm/Cargo.toml --target wasm32-unknown-unknown

  browser-bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Lint Rust bridge modules
        shell: bash
        run: |
          set -o pipefail
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/eslint \
            Elephant/frontend/src/muya/lib/rust \
            Elephant/frontend/src/muya/lib/core/setup.js \
            Elephant/frontend/src/muya/lib/config/options.js \
            tests/app/unit/specs/muya/rustBridge.spec.js \
            tests/app/unit/specs/muya/rustLogicalDocument.spec.js \
            tests/app/unit/specs/muya/rustDomRenderer.spec.js \
            2>&1 | tee muya-rust-eslint.txt

      - name: Test Rust browser bridge
        if: always()
        shell: bash
        run: |
          set -o pipefail
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            tests/app/unit/specs/muya/rustBridge.spec.js \
            tests/app/unit/specs/muya/rustLogicalDocument.spec.js \
            tests/app/unit/specs/muya/rustDomRenderer.spec.js \
            2>&1 | tee muya-rust-vitest.txt

      - name: Upload browser bridge diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: muya-rust-browser-diagnostics
          path: |
            muya-rust-eslint.txt
            muya-rust-vitest.txt
          if-no-files-found: ignore
          retention-days: 7
