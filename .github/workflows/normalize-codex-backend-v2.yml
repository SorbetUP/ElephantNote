name: Normalize Codex backend patch v2

on:
  pull_request:
    branches:
      - develop

permissions:
  contents: write

jobs:
  normalize:
    if: github.head_ref == 'feature/real-codex-subscription'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/real-codex-subscription
          fetch-depth: 0

      - name: Restore clean source and patch protocol values
        shell: bash
        run: |
          set -euo pipefail
          path='Elephant/backend/tauri/src/chat_runtime/codex_app_server.rs'
          git show 6298ea4406460871d0c255dd8c9576e5356a5d67:"$path" > "$path"
          python3 <<'PY'
          from pathlib import Path

          path = Path('Elephant/backend/tauri/src/chat_runtime/codex_app_server.rs')
          text = path.read_text()
          thread_old = '"sandbox": "readOnly",'
          turn_old = '''"sandboxPolicy": {
          "type": "readOnly",
          "access": {
            "type": "restricted",
            "includePlatformDefaults": true,
            "readableRoots": [cwd.to_string_lossy()]
          }
        }'''
          turn_new = '''"sandboxPolicy": {
          "type": "readOnly",
          "networkAccess": false
        }'''
          assert text.count(thread_old) == 1, text.count(thread_old)
          assert text.count(turn_old) == 1, text.count(turn_old)
          text = text.replace(thread_old, '"sandbox": "read-only",', 1)
          text = text.replace(turn_old, turn_new, 1)
          path.write_text(text)
          PY
          grep -F '"sandbox": "read-only"' "$path"
          grep -F '"networkAccess": false' "$path"
          rm -f .github/workflows/normalize-codex-backend.yml
          rm -f .github/workflows/normalize-codex-backend-v2.yml

      - name: Commit minimal backend diff
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Keep Codex protocol fix as minimal source patch"
          git push origin HEAD:feature/real-codex-subscription
