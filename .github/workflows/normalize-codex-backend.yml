name: Normalize Codex backend patch

on:
  push:
    branches:
      - feature/real-codex-subscription
  pull_request:
    branches:
      - develop

permissions:
  contents: write

jobs:
  normalize:
    if: github.event_name == 'push' || github.head_ref == 'feature/real-codex-subscription'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/real-codex-subscription
          fetch-depth: 0

      - name: Restore base formatting and apply protocol fix
        shell: bash
        run: |
          set -euo pipefail
          path='Elephant/backend/tauri/src/chat_runtime/codex_app_server.rs'
          git show 6298ea4406460871d0c255dd8c9576e5356a5d67:"$path" > "$path"
          python3 <<'PY'
          from pathlib import Path

          path = Path('Elephant/backend/tauri/src/chat_runtime/codex_app_server.rs')
          text = path.read_text()
          old_thread = '"sandbox": "readOnly",'
          old_turn = '''"sandboxPolicy": {
          "type": "readOnly",
          "access": {
            "type": "restricted",
            "includePlatformDefaults": true,
            "readableRoots": [cwd.to_string_lossy()]
          }
        }'''
          new_turn = '''"sandboxPolicy": {
          "type": "readOnly",
          "networkAccess": false
        }'''
          if text.count(old_thread) != 1:
              raise SystemExit(f'Expected one thread sandbox value, found {text.count(old_thread)}')
          if text.count(old_turn) != 1:
              raise SystemExit(f'Expected one turn sandbox block, found {text.count(old_turn)}')
          text = text.replace(old_thread, '"sandbox": "read-only",', 1)
          text = text.replace(old_turn, new_turn, 1)
          if '"sandbox": "readOnly"' in text:
              raise SystemExit('Legacy thread sandbox value remains')
          path.write_text(text)
          PY

          grep -F '"sandbox": "read-only"' "$path"
          grep -F '"networkAccess": false' "$path"
          rm .github/workflows/normalize-codex-backend.yml

      - name: Commit normalized source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Elephant/backend/tauri/src/chat_runtime/codex_app_server.rs .github/workflows/normalize-codex-backend.yml
          git commit -m "Keep Codex protocol fix as minimal source patch"
          git push origin HEAD:feature/real-codex-subscription
