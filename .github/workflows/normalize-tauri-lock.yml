name: Normalize Tauri lockfile

on:
  push:
    branches:
      - develop_next-integration-repair
    paths:
      - .github/workflows/normalize-tauri-lock.yml
      - Elephant/backend/tauri/Cargo.toml
      - Elephant/backend/tauri/Cargo.lock

permissions:
  contents: write

concurrency:
  group: normalize-tauri-lock-${{ github.ref }}
  cancel-in-progress: true

jobs:
  normalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop_next-integration-repair
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Generate canonical lockfile
        working-directory: Elephant/backend/tauri
        run: cargo generate-lockfile
      - name: Commit generated lockfile when needed
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- Elephant/backend/tauri/Cargo.lock; then
            echo 'Cargo.lock is already canonical.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Elephant/backend/tauri/Cargo.lock
          git commit -m 'Normalize Tauri Cargo.lock'
          git push origin HEAD:develop_next-integration-repair
