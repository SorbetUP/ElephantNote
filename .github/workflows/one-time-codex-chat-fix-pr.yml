name: One-time Codex chat fix PR

on:
  pull_request:
    branches:
      - develop

permissions:
  contents: write

jobs:
  patch-and-validate:
    if: github.head_ref == 'feature/real-codex-subscription'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91
          components: rustfmt

      - name: Execute the reviewed one-time patch
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import textwrap

          workflow = Path('.github/workflows/one-time-codex-chat-fix.yml').read_text()
          marker = "          python3 <<'PY'\n"
          end_marker = "\n          PY\n"
          body = workflow.split(marker, 1)[1].split(end_marker, 1)[0]
          exec(compile(textwrap.dedent(body), 'one-time-codex-chat-fix.py', 'exec'))
          Path('.github/workflows/one-time-codex-chat-fix-pr.yml').unlink()
          PY

      - name: Format Rust
        run: cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml --all

      - name: Validate Rust
        run: |
          cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --all-targets --no-default-features
          cargo test --manifest-path Elephant/backend/tauri/Cargo.toml --no-default-features builds_protocol_compatible_sandbox_payloads

      - name: Validate settings component
        run: |
          pnpm exec eslint Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue
          pnpm tauri:web:build

      - name: Commit validated fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Elephant/backend/tauri/src/chat_runtime/codex_app_server.rs Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue .github/workflows/one-time-codex-chat-fix.yml .github/workflows/one-time-codex-chat-fix-pr.yml
          git commit -m "Fix Codex chat sandbox contract and refine provider UI"
          git push origin HEAD:feature/real-codex-subscription
