name: One-time Codex chat fix

on:
  push:
    branches:
      - feature/real-codex-subscription

permissions:
  contents: write

jobs:
  patch-placeholder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch source
        run: |
          python3 <<'PY'
          from pathlib import Path
          exec(compile(Path('build/scripts/codex_followup_patch.py').read_text(), 'codex_followup_patch.py', 'exec'))
          Path('.github/workflows/one-time-codex-chat-fix.yml').unlink()
          PY
