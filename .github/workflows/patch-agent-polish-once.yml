              new = '''fn normalized_search_tokens(query: &str) -> Vec<String> {
    query.split(|character: char| !character.is_alphanumeric())
        .map(|token| token.trim().to_lowercase())
        .filter(|token| token.chars().count() >= 2)
        .collect()
}

fn to_fts_query(query: &str) -> String {
    normalized_search_tokens(query).into_iter()
        .map(|token| format!("\"{}\"*", token.replace('"', "\"\"")))
        .collect::<Vec<_>>().join(" ")
}

fn to_relaxed_fts_query(query: &str) -> String {
    const STOP_WORDS: &[&str] = &["afin", "avec", "dans", "des", "est", "faire", "les", "mes", "mon", "pour", "que", "sur", "une", "un", "the", "and", "for", "from", "with"];
    let mut tokens = normalized_search_tokens(query).into_iter()
        .filter(|token| token.chars().count() >= 3)
        .filter(|token| !STOP_WORDS.contains(&token.as_str()))
        .collect::<Vec<_>>();
    tokens.sort(); tokens.dedup();
    tokens.into_iter().map(|token| format!("\"{}\"*", token.replace('"', "\"\"")))
        .collect::<Vec<_>>().join(" OR ")
}
'''
