              new = '''    pub fn search(&self, query: &str, limit: usize) -> Result<Vec<KnowledgeSearchHit>, String> {
        let limit = limit.clamp(1, 100);
        let strict_query = to_fts_query(query);
        if strict_query.is_empty() { return Ok(Vec::new()); }
        let mut output = self.search_fts(&strict_query, limit)?;
        if output.len() < limit {
            let relaxed_query = to_relaxed_fts_query(query);
            if !relaxed_query.is_empty() && relaxed_query != strict_query {
                let mut seen = output.iter().map(|hit| hit.chunk_id.clone()).collect::<HashSet<_>>();
                for hit in self.search_fts(&relaxed_query, limit)? {
                    if seen.insert(hit.chunk_id.clone()) { output.push(hit); }
                    if output.len() >= limit { break; }
                }
            }
        }
        Ok(output)
    }

    fn search_fts(&self, fts_query: &str, limit: usize) -> Result<Vec<KnowledgeSearchHit>, String> {
        let mut statement = self.conn.prepare(
            "SELECT relative_path, title, heading, chunk_id,
                    snippet(chunk_search, 4, '', '', ' … ', 32), bm25(chunk_search),
                    c.start_offset, c.end_offset
