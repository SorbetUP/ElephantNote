name: Apply final agent and embedding fixes once

on:
  push:
    branches:
      - assistant/wiki-links-graph-integration

concurrency:
  group: final-agent-embedding-fix
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  patch:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: assistant/wiki-links-graph-integration
          fetch-depth: 0

      - name: Apply idempotent product patch
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          def replace_once(path, old, new, marker=None):
              p = Path(path)
              text = p.read_text()
              if marker and marker in text:
                  return
              if old not in text:
                  raise SystemExit(f"missing patch anchor in {path}: {old[:120]!r}")
              p.write_text(text.replace(old, new, 1))

          # Atomic and idempotent approve+execute boundary.
          replace_once(
              'Elephant/backend/tauri/src/knowledge_chat_actions.rs',
              '''    let root = active_vault_root(&app)?;
    let proposal = {
        let store = active_store(&root)?;
        store
            .chat_action_proposal(&proposal_id)?
            .ok_or_else(|| format!("Unknown chat action proposal: {proposal_id}"))?
    };

    let is_wiki = matches!(
''',
              '''    let root = active_vault_root(&app)?;
    let initial = {
        let store = active_store(&root)?;
        store
            .chat_action_proposal(&proposal_id)?
            .ok_or_else(|| format!("Unknown chat action proposal: {proposal_id}"))?
    };
    let proposal = match initial.status.clone() {
        ChatActionStatus::Proposed => {
            eprintln!("[Knowledge][ChatAction] approve-and-execute id={proposal_id}");
            active_store(&root)?
                .transition_chat_action(&proposal_id, ChatActionStatus::Approved)?
        }
        ChatActionStatus::Approved => initial,
        ChatActionStatus::Executed => {
            let result = initial.result.clone().unwrap_or(Value::Null);
            return Ok(ChatActionExecution { proposal: initial, result });
        }
        ChatActionStatus::Rejected => return Err("Rejected chat actions cannot be executed.".into()),
        ChatActionStatus::Failed => {
            return Err(initial.error.clone().unwrap_or_else(||
                "Failed chat action cannot be retried without a new proposal.".into()));
        }
    };

    let is_wiki = matches!(
''',
