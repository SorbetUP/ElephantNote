name: Patch Wiki Knowledge Continuation Once

on:
  push:
    branches:
      - feature/wiki-knowledge-continuation
  pull_request:
    branches:
      - feature/rust-knowledge-core
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/wiki-knowledge-continuation
          fetch-depth: 0
      - name: Capture the failed Tauri check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .github/diagnostics
          gh run view 29057587121 --repo "$GITHUB_REPOSITORY" --log-failed > .github/diagnostics/wiki-continuation-cargo-check.log
          test -s .github/diagnostics/wiki-continuation-cargo-check.log
      - name: Commit diagnostic
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/diagnostics/wiki-continuation-cargo-check.log
          git commit -m 'chore(ci): expose wiki integration compile failure' || exit 0
          git push origin HEAD:feature/wiki-knowledge-continuation
