name: Patch Wiki Knowledge Continuation Once

on:
  push:
    branches:
      - feature/wiki-knowledge-continuation
  pull_request:
    branches:
      - feature/rust-knowledge-core
  workflow_dispatch:

permissions:
  actions: read
  pull-requests: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/wiki-knowledge-continuation
          fetch-depth: 0
      - name: Report the failed Tauri check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run view 29057587121 --repo "$GITHUB_REPOSITORY" --log-failed > /tmp/wiki-check.log
          test -s /tmp/wiki-check.log
          {
            echo '### Wiki continuation compile diagnostic'
            echo
            echo '```text'
            tail -n 120 /tmp/wiki-check.log
            echo '```'
          } > /tmp/wiki-check-comment.md
          gh pr comment 37 --repo "$GITHUB_REPOSITORY" --body-file /tmp/wiki-check-comment.md
