name: Patch Wiki Knowledge Continuation Once

on:
  push:
    branches:
      - feature/wiki-knowledge-continuation
  pull_request:
    branches:
      - feature/rust-knowledge-core
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: patch-wiki-knowledge-continuation
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/wiki-knowledge-continuation
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install Tauri build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Apply real wiki continuation implementation
        shell: python
        run: |
          from pathlib import Path
          import subprocess

          subprocess.run(['git', 'fetch', 'origin', 'feature/real-codex-subscription'], check=True)

          def read(path):
              return Path(path).read_text()

          def write(path, content):
              target = Path(path)
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_text(content)

          def copy_from_codex(path):
              result = subprocess.run(
                  ['git', 'show', f'origin/feature/real-codex-subscription:{path}'],
                  check=True,
                  capture_output=True,
                  text=True,
              )
              write(path, result.stdout)

          codex_path = 'Elephant/backend/tauri/src/chat_runtime/codex_app_server.rs'
          installer_path = 'Elephant/backend/tauri/src/chat_runtime/codex_app_server/codex_runtime_installer.rs'
          copy_from_codex(codex_path)
          copy_from_codex(installer_path)

          codex = read(codex_path)
          codex = codex.replace('.await\n        .ok()??;', '.await\n        .ok()?.ok()?;')
          non_macos_marker = '''    #[cfg(not(unix))]\n    {\n        None\n    }\n}'''
          if '.ok()??' in codex:
              raise SystemExit('Invalid Option/Result propagation remains in Codex runtime')
          write(codex_path, codex)

          cargo_path = 'Elephant/backend/tauri/Cargo.toml'
          cargo = read(cargo_path)
          for anchor, addition in [
              ('encoding_rs = "0.8"\n', 'flate2 = "1"\n'),
              ('serde_json = "1"\n', 'sha2 = "0.10"\ntar = "0.4"\n'),
              ('which = "6"\n', 'zip = { version = "2", default-features = false, features = ["deflate"] }\n'),
          ]:
              if addition.strip() not in cargo:
                  if anchor not in cargo:
                      raise SystemExit(f'Cargo anchor not found: {anchor!r}')
                  cargo = cargo.replace(anchor, anchor + addition)
          cargo = cargo.replace(
              'tokio = { version = "1.49", features = ["fs", "io-util", "macros", "rt-multi-thread", "sync", "time"] }',
              'tokio = { version = "1.49", features = ["fs", "io-util", "macros", "process", "rt-multi-thread", "sync", "time"] }',
          )
          write(cargo_path, cargo)

          chat_path = 'Elephant/backend/tauri/src/chat_runtime.rs'
          chat = read(chat_path)
          module_decl = '#[cfg(not(mobile))]\npub(crate) mod codex_app_server;\n\n'
          if module_decl not in chat:
              marker = 'use elephantnote_knowledge_core::{KnowledgeSearchHit, KnowledgeStore};\n'
              if marker not in chat:
                  raise SystemExit('chat_runtime module insertion marker not found')
              chat = chat.replace(marker, module_decl + marker, 1)
          write(chat_path, chat)

          wiki_path = 'Elephant/backend/tauri/src/knowledge_wikis.rs'
          wiki = read(wiki_path)
          wiki = wiki.replace(
              'use std::collections::HashSet;\nuse std::path::{Path, PathBuf};',
              'use std::collections::HashSet;\nuse std::path::{Path, PathBuf};\nuse std::sync::{Mutex, OnceLock};',
          )

          guard_code = '''\nstatic ACTIVE_WIKI_GENERATIONS: OnceLock<Mutex<HashSet<String>>> = OnceLock::new();\n\nstruct WikiGenerationGuard {\n    key: String,\n}\n\nimpl Drop for WikiGenerationGuard {\n    fn drop(&mut self) {\n        if let Ok(mut active) = ACTIVE_WIKI_GENERATIONS\n            .get_or_init(|| Mutex::new(HashSet::new()))\n            .lock()\n        {\n            active.remove(&self.key);\n        }\n    }\n}\n\nfn acquire_wiki_generation(topic: &str) -> Result<WikiGenerationGuard, String> {\n    let key = topic.trim().to_lowercase();\n    let mut active = ACTIVE_WIKI_GENERATIONS\n        .get_or_init(|| Mutex::new(HashSet::new()))\n        .lock()\n        .map_err(|_| "Wiki generation lock is poisoned.".to_string())?;\n    if !active.insert(key.clone()) {\n        return Err(format!(\n            "A wiki generation is already running for topic `{}`.",\n            topic.trim()\n        ));\n    }\n    Ok(WikiGenerationGuard { key })\n}\n'''
          constants_marker = 'const DEFAULT_MAX_SECTIONS: usize = 10;\n'
          if 'static ACTIVE_WIKI_GENERATIONS' not in wiki:
              if constants_marker not in wiki:
                  raise SystemExit('wiki guard insertion marker not found')
              wiki = wiki.replace(constants_marker, constants_marker + guard_code, 1)

          empty_check = '''    if topic.trim().is_empty() {\n        return Err("Wiki topic cannot be empty.".into());\n    }\n'''
          if 'let _generation_guard = acquire_wiki_generation(&topic)?;' not in wiki:
              if empty_check not in wiki:
                  raise SystemExit('wiki generation guard call marker not found')
              wiki = wiki.replace(
                  empty_check,
                  empty_check + '    let _generation_guard = acquire_wiki_generation(&topic)?;\n',
                  1,
              )

          codex_helper = '''\nfn is_codex_provider(provider: &str) -> bool {\n    matches!(\n        provider,\n        "codex" | "chatgpt" | "codex-app-server" | "openai-codex"\n    )\n}\n\n'''
          bundled_marker = 'fn is_bundled_local_provider(provider: &str) -> bool {'
          if 'fn is_codex_provider' not in wiki:
              if bundled_marker not in wiki:
                  raise SystemExit('Codex provider helper marker not found')
              wiki = wiki.replace(bundled_marker, codex_helper + bundled_marker, 1)

          codex_route = '''    if is_codex_provider(&provider) {\n        #[cfg(mobile)]\n        {\n            let _ = (app, request, payload);\n            return Err("Codex wiki generation is unavailable on mobile in this build.".into());\n        }\n\n        #[cfg(not(mobile))]\n        {\n            let prompt = format!(\n                "{}\\n\\n{}\\n\\nReturn exactly one JSON object. Schema name: {}",\n                request.system_prompt, request.user_prompt, request.json_schema_name\n            );\n            return crate::chat_runtime::codex_app_server::chat(app, &route.model, &prompt)\n                .await\n                .map(|result| result.answer);\n        }\n    }\n\n'''
          local_marker = '    if is_bundled_local_provider(&provider) {'
          if 'Codex wiki generation is unavailable on mobile' not in wiki:
              if local_marker not in wiki:
                  raise SystemExit('Codex route insertion marker not found')
              wiki = wiki.replace(local_marker, codex_route + local_marker, 1)

          tests = '''\n    #[test]\n    fn wiki_route_accepts_codex_subscription_provider() {\n        let payload = json!({\n            "aiConfig": {\n                "routes": {\n                    "chat": { "provider": "codex", "model": "gpt-5.4-mini" }\n                }\n            }\n        });\n        let route = selected_wiki_route(&payload).unwrap();\n        assert_eq!(route.provider, "codex");\n        assert_eq!(route.model, "gpt-5.4-mini");\n        assert!(is_codex_provider(&route.provider));\n    }\n\n    #[test]\n    fn duplicate_topic_generation_is_rejected_until_guard_drops() {\n        let first = acquire_wiki_generation("Minecraft").unwrap();\n        assert!(acquire_wiki_generation(" minecraft ").is_err());\n        drop(first);\n        assert!(acquire_wiki_generation("Minecraft").is_ok());\n    }\n'''
          if 'wiki_route_accepts_codex_subscription_provider' not in wiki:
              pos = wiki.rfind('\n}')
              if pos < 0:
                  raise SystemExit('wiki test module closing brace not found')
              wiki = wiki[:pos] + tests + wiki[pos:]
          write(wiki_path, wiki)

          relation_path = 'Elephant/backend/knowledge-core/src/relation_storage.rs'
          relations = read(relation_path)
          reset_method = '''\n    pub fn reset_derived_explicit_link_relations(&self) -> Result<usize, String> {\n        let conn = open_relation_connection(self.database_path())?;\n        conn.execute_batch(RELATION_SCHEMA)\n            .map_err(|error| error.to_string())?;\n        conn.execute(\n            "DELETE FROM knowledge_relations WHERE relation_type='explicit_link'",\n            [],\n        )\n        .map_err(|error| error.to_string())\n    }\n'''
          method_marker = '\n    pub fn sync_markdown_relations(&self, document: &DocumentSnapshot) -> Result<usize, String> {'
          if 'reset_derived_explicit_link_relations' not in relations:
              if method_marker not in relations:
                  raise SystemExit('relation reset insertion marker not found')
              relations = relations.replace(method_marker, reset_method + method_marker, 1)

          relation_test = '''\n    #[test]\n    fn explicit_link_reset_removes_only_rebuildable_links() {\n        let root = temp_vault("reset-explicit-links");\n        fs::create_dir_all(&root).unwrap();\n        let mut store = KnowledgeStore::open(&root).unwrap();\n        let source = analyze_markdown("A.md", "# A\\nSee [[B]].", 1);\n        store.upsert_document(&source).unwrap();\n        store.sync_markdown_relations(&source).unwrap();\n        assert_eq!(store.list_relations(None, 10).unwrap().len(), 1);\n        assert_eq!(store.reset_derived_explicit_link_relations().unwrap(), 1);\n        assert!(store.list_relations(None, 10).unwrap().is_empty());\n        fs::remove_dir_all(root).ok();\n    }\n'''
          if 'explicit_link_reset_removes_only_rebuildable_links' not in relations:
              pos = relations.rfind('\n}')
              if pos < 0:
                  raise SystemExit('relation test module closing brace not found')
              relations = relations[:pos] + relation_test + relations[pos:]
          write(relation_path, relations)

          pipeline_path = 'Elephant/backend/knowledge-core/src/pipeline.rs'
          pipeline = read(pipeline_path)
          reset_call = '''    let reset_explicit_links = store.reset_derived_explicit_link_relations()?;\n    if reset_explicit_links > 0 {\n        eprintln!(\n            "[Knowledge][Rebuild] derived:reset explicit_links={}",\n            reset_explicit_links\n        );\n    }\n'''
          init_marker = '    store.initialize_wikis()?;\n'
          if 'derived:reset explicit_links' not in pipeline:
              if init_marker not in pipeline:
                  raise SystemExit('pipeline reset insertion marker not found')
              pipeline = pipeline.replace(init_marker, init_marker + reset_call, 1)
          write(pipeline_path, pipeline)

          wiki_storage_path = 'Elephant/backend/knowledge-core/src/wiki_storage.rs'
          wiki_storage = read(wiki_storage_path)
          replace_pending = '''        if matches!(draft.status, WikiDraftStatus::Proposed) {\n            conn.execute(\n                "DELETE FROM wiki_drafts WHERE slug=?1 AND status='proposed' AND id!=?2",\n                params![draft.slug, draft.id],\n            )\n            .map_err(|error| error.to_string())?;\n        }\n'''
          schema_exec = '''        conn.execute_batch(WIKI_SCHEMA)\n            .map_err(|error| error.to_string())?;\n        let citations_json ='''
          if "DELETE FROM wiki_drafts WHERE slug=?1 AND status='proposed'" not in wiki_storage:
              if schema_exec not in wiki_storage:
                  raise SystemExit('wiki proposal replacement marker not found')
              wiki_storage = wiki_storage.replace(
                  schema_exec,
                  '''        conn.execute_batch(WIKI_SCHEMA)\n            .map_err(|error| error.to_string())?;\n''' + replace_pending + '        let citations_json =',
                  1,
              )
          write(wiki_storage_path, wiki_storage)

      - name: Format Rust
        run: |
          cargo fmt --manifest-path Elephant/backend/knowledge-core/Cargo.toml
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml

      - name: Run knowledge-core tests
        run: cargo test --manifest-path Elephant/backend/knowledge-core/Cargo.toml --all-targets -- --nocapture

      - name: Check Tauri integration
        run: cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --no-default-features --message-format short

      - name: Run focused Tauri wiki tests
        run: cargo test --manifest-path Elephant/backend/tauri/Cargo.toml --no-default-features knowledge_wikis -- --nocapture

      - name: Commit implementation
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            Elephant/backend/knowledge-core/src/pipeline.rs \
            Elephant/backend/knowledge-core/src/relation_storage.rs \
            Elephant/backend/knowledge-core/src/wiki_storage.rs \
            Elephant/backend/tauri/Cargo.toml \
            Elephant/backend/tauri/Cargo.lock \
            Elephant/backend/tauri/src/chat_runtime.rs \
            Elephant/backend/tauri/src/chat_runtime/codex_app_server.rs \
            Elephant/backend/tauri/src/chat_runtime/codex_app_server/codex_runtime_installer.rs \
            Elephant/backend/tauri/src/knowledge_wikis.rs
          if git diff --cached --quiet; then
            echo 'Implementation already committed.'
            exit 0
          fi
          git commit -m 'feat(knowledge): complete real Codex wiki generation'
          git push origin HEAD:feature/wiki-knowledge-continuation
