name: Publish Wiki Topic Model V2

on:
  pull_request:
    branches:
      - assistant/wiki-links-graph-integration
    paths:
      - .github/workflows/publish-wiki-topic-model-v2.yml

permissions:
  contents: write

jobs:
  publish:
    if: github.head_ref == 'assistant/wiki-organization-continuation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: assistant/wiki-organization-continuation
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - name: Install Linux Tauri build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Apply topic-model patch
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import textwrap
          workflow = Path('.github/workflows/refine-wiki-topic-model-v2.yml').read_text()
          script = workflow.split("python3 - <<'PY'\n", 1)[1].split('\n          PY', 1)[0]
          exec(compile(textwrap.dedent(script), 'refine-wiki-topic-model-v2', 'exec'))
          PY
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml --all
      - name: Validate topic model
        run: |
          cargo test --manifest-path Elephant/backend/tauri/Cargo.toml knowledge_wiki_discovery --lib
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            tests/app/unit/wikiDiscoveryQualityRegression.spec.js
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/eslint \
            Elephant/frontend/app/components/views/WikiView.vue
      - name: Commit topic model
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            Elephant/backend/tauri/src/knowledge_wiki_discovery.rs \
            Elephant/backend/tauri/src/knowledge_wiki_discovery/topic_graph.rs \
            tests/app/unit/wikiDiscoveryQualityRegression.spec.js
          git commit --no-verify -m "refactor: build Wikis from semantic topic communities"
          git push origin HEAD:assistant/wiki-organization-continuation
