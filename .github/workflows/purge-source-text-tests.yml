name: Purge source-text tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: purge-source-text-tests-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  purge:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/addon-runtime-stabilization'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Remove inventoried source-text tests
        run: node build/scripts/purge-source-text-tests.mjs

      - name: Commit one atomic cleanup
        shell: bash
        run: |
          set -euxo pipefail
          if git diff --quiet --exit-code; then
            echo 'No source-text tests remain.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'test: remove source-text behavior simulations'
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
