name: Refine Wiki Source Assignment

on:
  pull_request:
    branches:
      - assistant/wiki-links-graph-integration
    paths:
      - .github/workflows/refine-wiki-source-assignment.yml

permissions:
  contents: write

jobs:
  refine:
    if: github.head_ref == 'assistant/wiki-organization-continuation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: assistant/wiki-organization-continuation
          fetch-depth: 0
      - uses: ./.github/actions/setup

      - name: Replace quota expansion with semantic separation
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('Elephant/backend/tauri/src/knowledge_wiki_discovery.rs')
          source = path.read_text()
          start = source.index('fn expanded_members(')
          end = source.index('\n#[cfg(not(mobile))]\nfn candidate_overlap', start)
          replacement = r'''fn expanded_members(
              profile: &[f32],
              core_members: &[usize],
              documents: &[DocumentVector],
              route_threshold: f32,
          ) -> (Vec<usize>, f32) {
              let core_set = core_members.iter().copied().collect::<HashSet<_>>();
              let mut ranked = documents
                  .iter()
                  .enumerate()
                  .map(|(index, document)| (index, cosine(profile, &document.vector)))
                  .collect::<Vec<_>>();
              ranked.sort_by(|left, right| right.1.total_cmp(&left.1));

              let mut core_scores = core_members
                  .iter()
                  .filter_map(|index| documents.get(*index))
                  .map(|document| cosine(profile, &document.vector))
                  .collect::<Vec<_>>();
              core_scores.sort_by(|left, right| left.total_cmp(right));
              let core_quartile = core_scores
                  .get(core_scores.len().saturating_sub(1) / 4)
                  .copied()
                  .unwrap_or(route_threshold);

              let mut background_scores = ranked
                  .iter()
                  .filter(|(index, _)| !core_set.contains(index))
                  .map(|(_, score)| *score)
                  .collect::<Vec<_>>();
              background_scores.sort_by(|left, right| left.total_cmp(right));
              let background_p90 = background_scores
                  .get(background_scores.len().saturating_mul(9) / 10)
                  .copied()
                  .unwrap_or(route_threshold - 0.20);

              let absolute_floor = (route_threshold - 0.24).clamp(0.44, 0.66);
              let separation_midpoint = (core_quartile + background_p90) / 2.0;
              let adaptive_floor = separation_midpoint
                  .max(absolute_floor)
                  .min((core_quartile - 0.02).max(absolute_floor));

              let mut selected = core_set;
              for (index, score) in ranked {
                  if selected.len() >= 400 {
                      break;
                  }
                  if score >= adaptive_floor {
                      selected.insert(index);
                  }
              }
              let mut selected = selected.into_iter().collect::<Vec<_>>();
              selected.sort_by(|left, right| {
                  cosine(profile, &documents[*right].vector)
                      .total_cmp(&cosine(profile, &documents[*left].vector))
              });
              selected.truncate(400);
              (selected, adaptive_floor)
          }
          '''
          source = source[:start] + replacement + source[end:]

          old_test = r'''    fn macro_topic_expansion_grows_a_small_core() {
                  let documents = vec![
                      DocumentVector {
                          path: "a".into(),
                          title: "A".into(),
                          excerpt: String::new(),
                          vector: normalize_vector(vec![1.0, 0.0]).unwrap(),
                      },
                      DocumentVector {
                          path: "b".into(),
                          title: "B".into(),
                          excerpt: String::new(),
                          vector: normalize_vector(vec![0.99, 0.03]).unwrap(),
                      },
                      DocumentVector {
                          path: "c".into(),
                          title: "C".into(),
                          excerpt: String::new(),
                          vector: normalize_vector(vec![0.96, 0.08]).unwrap(),
                      },
                      DocumentVector {
                          path: "d".into(),
                          title: "D".into(),
                          excerpt: String::new(),
                          vector: normalize_vector(vec![0.92, 0.15]).unwrap(),
                      },
                  ];
                  let profile = centroid_for_members(&[0, 1], &documents).unwrap();
                  let (expanded, floor) = expanded_members(&profile, &[0, 1], &documents, 0.72);
                  assert_eq!(expanded.len(), 4);
                  assert!((0.48..=0.74).contains(&floor));
              }'''
          new_test = r'''    fn macro_topic_expansion_uses_semantic_separation_without_quota_fill() {
                  let documents = vec![
                      DocumentVector {
                          path: "a".into(),
                          title: "A".into(),
                          excerpt: String::new(),
                          vector: normalize_vector(vec![1.0, 0.0]).unwrap(),
                      },
                      DocumentVector {
                          path: "b".into(),
                          title: "B".into(),
                          excerpt: String::new(),
                          vector: normalize_vector(vec![0.99, 0.03]).unwrap(),
                      },
                      DocumentVector {
                          path: "c".into(),
                          title: "C".into(),
                          excerpt: String::new(),
                          vector: normalize_vector(vec![0.96, 0.08]).unwrap(),
                      },
                      DocumentVector {
                          path: "unrelated".into(),
                          title: "Unrelated".into(),
                          excerpt: String::new(),
                          vector: normalize_vector(vec![0.0, 1.0]).unwrap(),
                      },
                  ];
                  let profile = centroid_for_members(&[0, 1], &documents).unwrap();
                  let (expanded, floor) = expanded_members(&profile, &[0, 1], &documents, 0.72);
                  assert_eq!(expanded.len(), 3);
                  assert!(expanded.contains(&0));
                  assert!(expanded.contains(&1));
                  assert!(expanded.contains(&2));
                  assert!(!expanded.contains(&3));
                  assert!((0.44..=0.98).contains(&floor));
              }'''
          if old_test not in source:
              raise SystemExit('macro expansion test pattern not found')
          source = source.replace(old_test, new_test, 1)
          path.write_text(source)

          contract = Path('tests/app/unit/wikiDiscoveryQualityRegression.spec.js')
          test_source = contract.read_text()
          test_source = test_source.replace(
              "expect(discovery).toContain('fn expanded_members')",
              "expect(discovery).toContain('fn expanded_members')\n    expect(discovery).toContain('background_p90')\n    expect(discovery).not.toContain('selected.len() < target')",
              1,
          )
          contract.write_text(test_source)
          PY
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml --all

      - name: Validate source assignment
        run: |
          cargo test --manifest-path Elephant/backend/tauri/Cargo.toml knowledge_wiki_discovery --lib
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            tests/app/unit/wikiDiscoveryQualityRegression.spec.js

      - name: Commit refined assignment
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            Elephant/backend/tauri/src/knowledge_wiki_discovery.rs \
            tests/app/unit/wikiDiscoveryQualityRegression.spec.js
          git commit --no-verify -m "fix: keep Wiki source counts semantically grounded"
          git push origin HEAD:assistant/wiki-organization-continuation
