name: Refine Wiki Topic Model V2

on:
  pull_request:
    branches:
      - assistant/wiki-links-graph-integration
    paths:
      - .github/workflows/refine-wiki-topic-model-v2.yml

permissions:
  contents: write

jobs:
  refine:
    if: github.head_ref == 'assistant/wiki-organization-continuation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: assistant/wiki-organization-continuation
          fetch-depth: 0
      - uses: ./.github/actions/setup

      - name: Integrate deterministic graph discovery and competitive assignment
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('Elephant/backend/tauri/src/knowledge_wiki_discovery.rs')
          source = path.read_text()

          module_import = '''#[cfg(not(mobile))]
          mod topic_graph;
          #[cfg(not(mobile))]
          use topic_graph::{
              assign_competitively, build_assignment_profile, build_topic_communities,
          };
          '''
          if 'mod topic_graph;' not in source:
              source = source.replace('use tauri::AppHandle;\n', 'use tauri::AppHandle;\n\n' + module_import, 1)

          source = re.sub(
              r'\n#\[cfg\(not\(mobile\)\)\]\n#\[derive\(Debug, Clone\)\]\nstruct Cluster \{.*?\n\}\n',
              '\n',
              source,
              count=1,
              flags=re.S,
          )

          pending_struct = '''
          #[cfg(not(mobile))]
          #[derive(Debug, Clone)]
          struct PendingTopic {
              topic: String,
              title: String,
              reason: String,
              preview: String,
              suggested_sections: Vec<String>,
              core_members: Vec<usize>,
          }
          '''
          if 'struct PendingTopic' not in source:
              marker = '#[cfg(not(mobile))]\nfn default_true() -> bool {'
              source = source.replace(marker, pending_struct + '\n' + marker, 1)

          start = source.find('#[cfg(not(mobile))]\nfn recompute_centroid')
          end = source.find('#[cfg(not(mobile))]\nfn candidate_overlap', start)
          if start >= 0 and end >= 0:
              source = source[:start] + source[end:]
          elif 'fn cluster_documents(' in source or 'fn expanded_members(' in source:
              raise SystemExit('legacy clustering block boundaries not found')

          generic_helper = r'''#[cfg(not(mobile))]
          fn is_generic_topic(title: &str, topic: &str) -> bool {
              let normalized = format!("{} {}", title, topic)
                  .to_lowercase()
                  .chars()
                  .map(|character| if character.is_alphanumeric() { character } else { ' ' })
                  .collect::<String>();
              let tokens = normalized
                  .split_whitespace()
                  .filter(|token| token.len() > 1)
                  .collect::<Vec<_>>();
              let generic = [
                  "site", "discover", "découvrez", "decouvrez", "comment", "account",
                  "compte", "code", "programming", "programmation", "animation", "photo",
                  "video", "note", "notes", "project", "projet", "content", "contenu",
              ];
              tokens.len() <= 2 && tokens.iter().all(|token| generic.contains(token))
          }

          #[cfg(not(mobile))]
          fn target_topic_limit(document_count: usize, requested: usize) -> usize {
              let natural = ((document_count as f32).sqrt() / 4.0).round() as usize;
              natural.clamp(4, 12).min(requested.clamp(1, 24))
          }

          '''
          if 'fn is_generic_topic' not in source:
              marker = '#[cfg(not(mobile))]\nfn json_object_from_text'
              source = source.replace(marker, generic_helper + marker, 1)

          source = source.replace(
              '    let clusters = cluster_documents(&documents, route.threshold);',
              '''    let vectors = documents
                  .iter()
                  .map(|document| document.vector.clone())
                  .collect::<Vec<_>>();
              let clusters = build_topic_communities(&vectors, route.threshold);''',
              1,
          )

          old_representatives = '''            let mut representative_members = cluster.members.clone();
                      representative_members.sort_by(|left, right| {
                          cosine(&cluster.centroid, &documents[*right].vector)
                              .total_cmp(&cosine(&cluster.centroid, &documents[*left].vector))
                      });
                      let notes = representative_members
                          .iter()
                          .take(10)'''
          new_representatives = '''            let notes = cluster
                          .representatives
                          .iter()'''
          if old_representatives not in source:
              raise SystemExit('representative member block not found')
          source = source.replace(old_representatives, new_representatives, 1)
          source = source.replace(
              '                "coherence": cluster.coherence,\n                "notes": notes',
              '                "coherence": cluster.coherence,\n                "distinctiveness": cluster.distinctiveness,\n                "notes": notes',
              1,
          )

          prompt_start = source.index('    let prompt = format!(\n', source.index('    let minimum_sources ='))
          prompt_end = source.index('    let result = codex_app_server::chat_with_effort', prompt_start)
          prompt_block = r'''    let proposal_limit = target_topic_limit(documents.len(), limit);
              let prompt = format!(
                  "You are designing a durable knowledge map for a personal note vault. The groups below are deterministic mutual-nearest-neighbor GRAPH COMMUNITIES, not final Wiki proposals. Merge communities only when they form one durable subject. Return at most {} high-value topics, not a quota. Every included topic must have at least {} core notes after merging. Prefer topics that are specific enough to be useful, broad enough to organize a meaningful part of the vault, distinct from the other proposals, and likely to support a substantial reference article. Reject activity fragments, timestamp dumps, duplicated posts, generic interface vocabulary, media-format labels, and vague labels such as Site, Discover, Comment, Account, Code, Programming or Animation. A community id may belong to at most one topic. Use the representative notes, community coherence and distinctiveness to decide. Return exactly one JSON object with this shape and no prose:\n{{\"candidates\":[{{\"cluster_ids\":[0,3,7],\"include\":true,\"title\":\"Readable specific title\",\"topic\":\"normalized specific topic\",\"reason\":\"Why this subject is useful and distinct\",\"preview\":\"Precise scope of the future Wiki\",\"suggested_sections\":[\"Section\"]}}]}}\n\nGraph communities:\n{}",
                  proposal_limit,
                  minimum_sources,
                  serde_json::to_string_pretty(&cluster_payload).map_err(|error| error.to_string())?
              );
          '''
          source = source[:prompt_start] + prompt_block + source[prompt_end:]

          block_start = source.index('    let existing_topics = KnowledgeStore::open(&root)?')
          block_end = source.index('    eprintln!(\n        "[knowledge] wiki:semantic-discovery', block_start)
          replacement = r'''    let existing_wikis = KnowledgeStore::open(&root)?.list_wiki_drafts(None, 1_000)?;
              let existing_topics = existing_wikis
                  .iter()
                  .map(|draft| draft.topic.trim().to_lowercase())
                  .collect::<HashSet<_>>();
              let existing_source_sets = existing_wikis
                  .iter()
                  .filter(|draft| !draft.source_paths.is_empty())
                  .map(|draft| draft.source_paths.clone())
                  .collect::<Vec<_>>();

              let mut used_communities = HashSet::new();
              let mut pending = Vec::<PendingTopic>::new();
              for label in envelope
                  .candidates
                  .into_iter()
                  .filter(|candidate| candidate.include)
              {
                  let topic = label.topic.trim().to_lowercase();
                  let title = label.title.trim().to_string();
                  if topic.is_empty()
                      || title.is_empty()
                      || topic_matches_existing(&topic, &existing_topics)
                  {
                      continue;
                  }
                  let mut community_ids = label.cluster_ids.clone();
                  if let Some(cluster_id) = label.cluster_id {
                      community_ids.push(cluster_id);
                  }
                  community_ids.sort_unstable();
                  community_ids.dedup();
                  community_ids.retain(|cluster_id| {
                      *cluster_id < clusters.len() && !used_communities.contains(cluster_id)
                  });
                  if community_ids.is_empty() {
                      continue;
                  }

                  let mut core_set = HashSet::new();
                  let mut weighted_distinctiveness = 0.0;
                  let mut weighted_size = 0usize;
                  for community_id in &community_ids {
                      let community = &clusters[*community_id];
                      core_set.extend(community.members.iter().copied());
                      weighted_distinctiveness +=
                          community.distinctiveness * community.members.len() as f32;
                      weighted_size += community.members.len();
                  }
                  let mut core_members = core_set.into_iter().collect::<Vec<_>>();
                  core_members.sort_unstable();
                  let merged_distinctiveness = weighted_distinctiveness / weighted_size.max(1) as f32;
                  if core_members.len() < minimum_sources {
                      eprintln!(
                          "[knowledge] wiki:topic-rejected reason=small-core title={} communities={:?} core_sources={} minimum_sources={}",
                          title,
                          community_ids,
                          core_members.len(),
                          minimum_sources
                      );
                      continue;
                  }
                  if is_generic_topic(&title, &topic)
                      && (core_members.len() < minimum_sources.saturating_mul(2)
                          || merged_distinctiveness < 0.08)
                  {
                      eprintln!(
                          "[knowledge] wiki:topic-rejected reason=generic title={} communities={:?} core_sources={} distinctiveness={:.4}",
                          title,
                          community_ids,
                          core_members.len(),
                          merged_distinctiveness
                      );
                      continue;
                  }
                  used_communities.extend(community_ids.iter().copied());
                  pending.push(PendingTopic {
                      topic,
                      title,
                      reason: label.reason.trim().to_string(),
                      preview: label.preview.trim().to_string(),
                      suggested_sections: label
                          .suggested_sections
                          .iter()
                          .map(|value| value.trim().to_string())
                          .filter(|value| !value.is_empty())
                          .take(12)
                          .collect(),
                      core_members,
                  });
              }

              let descriptor_inputs = pending
                  .iter()
                  .map(|topic| {
                      format!(
                          "Knowledge topic: {}\nScope: {}\nSections: {}",
                          topic.title,
                          topic.preview,
                          topic.suggested_sections.join(", ")
                      )
                  })
                  .collect::<Vec<_>>();
              let descriptor_vectors = if descriptor_inputs.is_empty() {
                  Vec::new()
              } else {
                  embed_batch(app, &route, &descriptor_inputs).await?
              };

              let mut qualified = Vec::<PendingTopic>::new();
              let mut profiles = Vec::new();
              for (topic, descriptor_vector) in pending.into_iter().zip(descriptor_vectors) {
                  let Some(profile) = build_assignment_profile(
                      &topic.core_members,
                      &descriptor_vector,
                      &vectors,
                      route.threshold,
                  ) else {
                      continue;
                  };
                  if profile.confidence < 0.24
                      || (profile.distinctiveness < -0.02
                          && topic.core_members.len() < minimum_sources.saturating_mul(2))
                  {
                      eprintln!(
                          "[knowledge] wiki:topic-rejected reason=weak-separation title={} core_sources={} confidence={:.4} distinctiveness={:.4}",
                          topic.title,
                          topic.core_members.len(),
                          profile.confidence,
                          profile.distinctiveness
                      );
                      continue;
                  }
                  qualified.push(topic);
                  profiles.push(profile);
              }

              let assignments = assign_competitively(&profiles, &vectors);
              let mut candidates = Vec::new();
              for ((topic, profile), members) in qualified
                  .into_iter()
                  .zip(profiles.into_iter())
                  .zip(assignments)
              {
                  if members.len() < minimum_sources {
                      continue;
                  }
                  let source_paths = members
                      .iter()
                      .map(|index| documents[*index].path.clone())
                      .collect::<Vec<_>>();
                  if existing_source_sets
                      .iter()
                      .any(|existing| candidate_overlap(&source_paths, existing) >= 0.72)
                  {
                      eprintln!(
                          "[knowledge] wiki:topic-rejected reason=existing-wiki-overlap title={} sources={}",
                          topic.title,
                          source_paths.len()
                      );
                      continue;
                  }
                  let source_titles = members
                      .iter()
                      .map(|index| documents[*index].title.clone())
                      .collect::<Vec<_>>();
                  let core_sources = topic.core_members.len();
                  let related_sources = source_paths.len().saturating_sub(core_sources);
                  eprintln!(
                      "[knowledge] wiki:topic-qualified topic={} core_sources={} related_sources={} total_sources={} floor={:.4} coherence={:.4} distinctiveness={:.4} confidence={:.4}",
                      topic.topic,
                      core_sources,
                      related_sources,
                      source_paths.len(),
                      profile.floor,
                      profile.coherence,
                      profile.distinctiveness,
                      profile.confidence
                  );
                  candidates.push(SemanticWikiCandidate {
                      topic: topic.topic,
                      title: topic.title,
                      reason: topic.reason,
                      preview: topic.preview,
                      suggested_sections: topic.suggested_sections,
                      source_paths,
                      source_titles,
                      score: members
                          .len()
                          .saturating_mul(1_000)
                          .saturating_add(core_sources.saturating_mul(250))
                          .saturating_add((profile.confidence * 1_000.0) as usize),
                      coherence: profile.coherence,
                  });
              }
              candidates.sort_by(|left, right| right.score.cmp(&left.score));
              let mut deduplicated: Vec<SemanticWikiCandidate> = Vec::new();
              for candidate in candidates {
                  let duplicate = deduplicated.iter().any(|existing| {
                      candidate.topic == existing.topic
                          || candidate_overlap(&candidate.source_paths, &existing.source_paths) >= 0.65
                  });
                  if !duplicate {
                      deduplicated.push(candidate);
                  }
              }
              deduplicated.truncate(proposal_limit);
              let candidates = deduplicated;
              {
                  let connection = open_connection(&root)?;
                  connection
                      .execute(
                          "DELETE FROM wiki_saved_candidates WHERE origin='semantic'",
                          [],
                      )
                      .map_err(|error| error.to_string())?;
                  persist_candidates(&connection, &candidates)?;
              }
          '''
          source = source[:block_start] + replacement + source[block_end:]

          source = source.replace(
              '"[knowledge] wiki:semantic-discovery documents={} clusters={} accepted={} embedding_model={} label_model={}",',
              '"[knowledge] wiki:semantic-discovery-v2 documents={} communities={} accepted={} embedding_model={} label_model={}",',
              1,
          )
          path.write_text(source)

          test_path = Path('tests/app/unit/wikiDiscoveryQualityRegression.spec.js')
          test = test_path.read_text()
          if "const topicGraph" not in test:
              test = test.replace(
                  "const discovery = fs.readFileSync('Elephant/backend/tauri/src/knowledge_wiki_discovery.rs', 'utf8')",
                  "const discovery = fs.readFileSync('Elephant/backend/tauri/src/knowledge_wiki_discovery.rs', 'utf8')\nconst topicGraph = fs.readFileSync('Elephant/backend/tauri/src/knowledge_wiki_discovery/topic_graph.rs', 'utf8')",
                  1,
              )
          test = re.sub(
              r"  it\('merges micro-clusters and expands sources globally'.*?\n  \}\)",
              """  it('builds deterministic graph communities and assigns notes competitively', () => {
              expect(discovery).toContain('build_topic_communities')
              expect(discovery).toContain('build_assignment_profile')
              expect(discovery).toContain('assign_competitively')
              expect(discovery).toContain('semantic-discovery-v2')
              expect(topicGraph).toContain('mutual')
              expect(topicGraph).toContain('label_propagation')
              expect(topicGraph).toContain('background_p95')
              expect(topicGraph).not.toContain('selected.len() < target')
              expect(discovery).toContain("DELETE FROM wiki_saved_candidates WHERE origin='semantic'")
            })""",
              test,
              count=1,
              flags=re.S,
          )
          test = re.sub(
              r"  it\('ranks durable coverage ahead of tiny high-coherence clusters'.*?\n  \}\)",
              """  it('filters generic topics and avoids duplicated or existing Wikis', () => {
              expect(discovery).toContain('is_generic_topic')
              expect(discovery).toContain('existing-wiki-overlap')
              expect(discovery).toContain('candidate_overlap')
              expect(discovery).toContain('target_topic_limit')
            })""",
              test,
              count=1,
              flags=re.S,
          )
          test_path.write_text(test)
          PY
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml --all

      - name: Validate focused Rust and renderer contracts
        run: |
          cargo test --manifest-path Elephant/backend/tauri/Cargo.toml knowledge_wiki_discovery --lib
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            tests/app/unit/wikiDiscoveryQualityRegression.spec.js
          pnpm --dir Elephant exec eslint frontend/app/components/views/WikiView.vue

      - name: Commit refined topic model
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            Elephant/backend/tauri/src/knowledge_wiki_discovery.rs \
            Elephant/backend/tauri/src/knowledge_wiki_discovery/topic_graph.rs \
            tests/app/unit/wikiDiscoveryQualityRegression.spec.js
          git commit --no-verify -m "refactor: build Wikis from semantic topic communities"
          git push origin HEAD:assistant/wiki-organization-continuation
