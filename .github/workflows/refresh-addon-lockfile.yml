name: Refresh addon extraction lockfile

on:
  push:
    branches:
      - feature/physical-addon-packages
    paths:
      - .github/workflows/refresh-addon-lockfile.yml

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/physical-addon-packages
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Remove Calendar-only root importer entries
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('pnpm-lock.yaml')
          lines = path.read_text().splitlines(keepends=True)
          removed = []
          output = []
          index = 0
          schedule_prefix = "      '@schedule-x/"

          while index < len(lines):
              line = lines[index]
              if line.startswith(schedule_prefix):
                  package = line.strip().rstrip(':')
                  removed.append(package)
                  index += 1
                  while index < len(lines):
                      candidate = lines[index]
                      if candidate.startswith('      ') and not candidate.startswith('        '):
                          break
                      index += 1
                  continue
              output.append(line)
              index += 1

          expected = {
              "'@schedule-x/calendar'",
              "'@schedule-x/current-time'",
              "'@schedule-x/drag-and-drop'",
              "'@schedule-x/event-recurrence'",
              "'@schedule-x/theme-default'",
              "'@schedule-x/vue'",
          }
          if set(removed) != expected:
              raise SystemExit(f'Unexpected Schedule-X importer removal set: {removed}')
          path.write_text(''.join(output))
          print(f'Removed root importer entries: {removed}')
          PY

      - name: Verify frozen dependency installation
        id: verify
        shell: bash
        run: |
          set +e
          npm install -g pnpm@10.33.4 2>&1 | tee lockfile-refresh.log
          install_pnpm=${PIPESTATUS[0]}
          if [ "$install_pnpm" -eq 0 ]; then
            pnpm install --frozen-lockfile --ignore-scripts 2>&1 | tee -a lockfile-refresh.log
            frozen_status=${PIPESTATUS[0]}
          else
            frozen_status="$install_pnpm"
          fi
          echo "status=$frozen_status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit refreshed lockfile or diagnostic
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ "${{ steps.verify.outputs.status }}" != "0" ]; then
            git reset --hard HEAD
            mkdir -p ci
            cp lockfile-refresh.log ci/lockfile-refresh.log
            git add ci/lockfile-refresh.log
            git commit -m "chore(ci): record lockfile refresh failure"
            git push origin HEAD:feature/physical-addon-packages
            exit 1
          fi
          git rm .github/workflows/refresh-addon-lockfile.yml
          git add pnpm-lock.yaml
          git commit -m "fix(ci): refresh lockfile after physical addon extraction"
          git push origin HEAD:feature/physical-addon-packages
