name: Refresh addon extraction lockfile

on:
  push:
    branches:
      - feature/physical-addon-packages
    paths:
      - .github/workflows/refresh-addon-lockfile.yml

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/physical-addon-packages
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Regenerate root importer without Calendar core dependencies
        shell: bash
        run: |
          set -euxo pipefail
          npm install -g pnpm@10.33.4
          pnpm install --lockfile-only --no-frozen-lockfile --ignore-scripts
          pnpm install --frozen-lockfile --ignore-scripts

      - name: Commit refreshed lockfile and remove temporary workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/refresh-addon-lockfile.yml
          git add pnpm-lock.yaml
          git commit -m "fix(ci): refresh lockfile after physical addon extraction"
          git push origin HEAD:feature/physical-addon-packages
