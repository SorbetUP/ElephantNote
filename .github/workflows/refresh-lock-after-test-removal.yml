name: Refresh lock after test removal

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: refresh-test-lock-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  refresh:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/addon-runtime-stabilization'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.4 --activate
          pnpm --version

      - name: Regenerate exact lockfile without legacy test dependencies
        run: pnpm install --lockfile-only --no-frozen-lockfile --ignore-scripts

      - name: Commit lockfile only
        shell: bash
        run: |
          set -euxo pipefail
          git diff -- pnpm-lock.yaml
          if git diff --quiet --exit-code -- pnpm-lock.yaml; then
            echo 'Lockfile is already current.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add pnpm-lock.yaml
          git commit -m 'chore(deps): remove legacy JS test dependencies from lockfile'
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
