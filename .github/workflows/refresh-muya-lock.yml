name: Refresh Muya Cargo Lock

on:
  push:
    branches:
      - refactor/muya-rust-file-by-file
    paths:
      - Elephant/crates/muya-core/Cargo.toml
      - .github/workflows/refresh-muya-lock.yml
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  refresh-lock:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      TEMP_BRANCH: automation/muya-lock-refresh
      LOCK_PATH: Elephant/backend/tauri/Cargo.lock
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/muya-rust-file-by-file

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve Cargo dependencies
        run: cargo generate-lockfile --manifest-path Elephant/backend/tauri/Cargo.toml

      - name: Write lockfile to temporary branch
        shell: bash
        run: |
          set -euxo pipefail
          HEAD_SHA=$(git rev-parse HEAD)
          REF_PATH="repos/${GITHUB_REPOSITORY}/git/refs/heads/${TEMP_BRANCH}"
          if gh api "$REF_PATH" >/dev/null 2>&1; then
            gh api --method PATCH "$REF_PATH" -f sha="$HEAD_SHA" -F force=true >/dev/null
          else
            gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref="refs/heads/${TEMP_BRANCH}" \
              -f sha="$HEAD_SHA" >/dev/null
          fi

          LOCK_SHA=$(gh api "repos/${GITHUB_REPOSITORY}/contents/${LOCK_PATH}?ref=${TEMP_BRANCH}" --jq .sha)
          BASE64_CONTENT=$(base64 -w0 "$LOCK_PATH")
          jq -n \
            --arg message "Update Cargo lock for Muya grapheme support" \
            --arg content "$BASE64_CONTENT" \
            --arg branch "$TEMP_BRANCH" \
            --arg sha "$LOCK_SHA" \
            '{message: $message, content: $content, branch: $branch, sha: $sha}' \
            > /tmp/update-lock.json
          gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${LOCK_PATH}" \
            --input /tmp/update-lock.json >/dev/null

      - name: Upload resolved lockfile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: muya-cargo-lock
          path: Elephant/backend/tauri/Cargo.lock
          if-no-files-found: error
          retention-days: 1
