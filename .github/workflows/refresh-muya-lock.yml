name: Refresh Muya Cargo Lock

on:
  push:
    branches:
      - refactor/muya-rust-file-by-file
    paths:
      - Elephant/crates/muya-core/Cargo.toml
      - .github/workflows/refresh-muya-lock.yml
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  refresh-lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/muya-rust-file-by-file

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve Cargo dependencies
        run: cargo generate-lockfile --manifest-path Elephant/backend/tauri/Cargo.toml

      - name: Commit to temporary branch
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c automation/muya-lock-refresh
          git add Elephant/backend/tauri/Cargo.lock
          git commit -m "Update Cargo lock for Muya grapheme support"
          git push --force origin HEAD:automation/muya-lock-refresh

      - name: Upload resolved lockfile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: muya-cargo-lock
          path: Elephant/backend/tauri/Cargo.lock
          if-no-files-found: error
          retention-days: 1
