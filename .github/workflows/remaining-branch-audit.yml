name: Audit remaining integration branches

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/remaining-branch-audit.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: remaining-branch-audit
  cancel-in-progress: false

jobs:
  audit:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.head.ref == 'develop_next-integration-repair' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop_next-integration-repair
          fetch-depth: 0

      - name: Build branch ancestry and unique-commit report
        shell: bash
        run: |
          set -euo pipefail
          git fetch --prune origin '+refs/heads/*:refs/remotes/origin/*'
          mkdir -p docs/repository
          report=docs/repository/remaining-branch-audit-2026-07-16.md
          current=origin/develop_next-integration-repair
          cat > "$report" <<'EOF'
          # Remaining branch audit — 2026-07-16

          Comparison target: `develop_next-integration-repair`.

          EOF

          branches=(
            develop_next-unified-candidate2
            develop_next-mobile-recovery
            develop_next
            feature/physical-addon-packages
            refactor/muya-rust-file-by-file
            assistant/wiki-organization-continuation
            assistant/wiki-links-graph-integration
            assistant/validate-knowledge-graph-wiki
            feature/trusted-addon-runtime
            feature/rust-knowledge-core
          )

          for branch in "${branches[@]}"; do
            ref="origin/$branch"
            if ! git show-ref --verify --quiet "refs/remotes/$ref"; then
              continue
            fi
            ahead=$(git rev-list --count "$current..$ref")
            behind=$(git rev-list --count "$ref..$current")
            merge_base=$(git merge-base "$current" "$ref")
            {
              echo "## \`$branch\`"
              echo
              echo "- Tip: \`$(git rev-parse "$ref")\`"
              echo "- Merge base: \`$merge_base\`"
              echo "- Unique commits not in integration: **$ahead**"
              echo "- Integration commits not in branch: **$behind**"
              echo
              echo '### Unique commits'
              echo
              if (( ahead == 0 )); then
                echo '_None._'
              else
                echo '```text'
                git log --reverse --date=iso-strict --format='%h %ad %an :: %s' "$current..$ref"
                echo '```'
              fi
              echo
              echo '### Unique changed paths'
              echo
              if (( ahead == 0 )); then
                echo '_None._'
              else
                echo '```text'
                git diff --name-status "$current...$ref" | head -250
                echo '```'
              fi
              echo
            } >> "$report"
          done

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/remaining-branch-audit.yml
          git add "$report"
          git commit -m 'docs(repo): audit remaining branch ancestry and unique commits'
          git push origin HEAD:develop_next-integration-repair

      - name: Upload branch audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: remaining-branch-audit
          path: docs/repository/remaining-branch-audit-2026-07-16.md
          if-no-files-found: warn
          retention-days: 30
