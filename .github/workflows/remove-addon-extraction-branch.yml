name: Remove temporary addon extraction branch

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/remove-addon-extraction-branch.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Delete temporary branch and workflow
        run: |
          set -euxo pipefail
          git push origin --delete automation/run-addon-extraction || true
          git rm .github/workflows/remove-addon-extraction-branch.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m 'chore(repo): remove temporary addon extraction automation'
          git push origin HEAD:main
