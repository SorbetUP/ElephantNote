name: Remove Legacy Knowledge Once

on:
  push:
    branches:
      - feature/rust-knowledge-core
  pull_request:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: remove-legacy-knowledge-once
  cancel-in-progress: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/rust-knowledge-core
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Apply no-legacy frontend migration
        run: |
          python build/scripts/remove_legacy_knowledge.py
          python build/scripts/fix_knowledge_graph.py
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Format changed frontend files
        run: |
          pnpm exec eslint --fix \
            Elephant/frontend/app/components/views/WikiView.vue \
            Elephant/frontend/src/renderer/src/platform/installKnowledgeRuntimeBridge.js \
            Elephant/frontend/src/renderer/src/platform/knowledgeRuntimeClient.js \
            Elephant/frontend/src/renderer/src/platform/tauriElephantNoteBridge.js || true
      - name: Diagnose targeted lint
        id: lint
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pnpm exec eslint \
            Elephant/frontend/app/components/views/WikiView.vue \
            Elephant/frontend/src/renderer/src/platform/installKnowledgeRuntimeBridge.js \
            Elephant/frontend/src/renderer/src/platform/knowledgeRuntimeClient.js \
            Elephant/frontend/src/renderer/src/platform/tauriElephantNoteBridge.js \
            --format stylish 2>&1 | tee legacy-removal-frontend-lint.log
      - name: Upload frontend diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: legacy-removal-frontend-diagnostics
          path: |
            legacy-removal-frontend-lint.log
            Elephant/frontend/app/components/views/WikiView.vue
            Elephant/frontend/src/renderer/src/platform/installKnowledgeRuntimeBridge.js
            Elephant/frontend/src/renderer/src/platform/knowledgeRuntimeClient.js
            Elephant/frontend/src/renderer/src/platform/tauriElephantNoteBridge.js
          if-no-files-found: error
          retention-days: 3
      - name: Enforce lint
        if: always()
        run: test '${{ steps.lint.outcome }}' = 'success'
