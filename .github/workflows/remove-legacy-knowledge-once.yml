name: Remove Legacy Knowledge Once

on:
  push:
    branches:
      - feature/rust-knowledge-core
  pull_request:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: remove-legacy-knowledge-once
  cancel-in-progress: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/rust-knowledge-core
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Apply no-legacy migration
        run: |
          python build/scripts/remove_legacy_knowledge.py
          python build/scripts/fix_knowledge_graph.py
      - name: Format Rust
        run: |
          cargo fmt --manifest-path Elephant/backend/knowledge-core/Cargo.toml
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml
      - name: Check and test knowledge core
        run: |
          cargo check --manifest-path Elephant/backend/knowledge-core/Cargo.toml --all-targets
          cargo test --manifest-path Elephant/backend/knowledge-core/Cargo.toml --all-targets
      - name: Check Tauri integration
        id: tauri_check
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --all-targets --no-default-features --message-format short 2>&1 | tee legacy-removal-tauri-check.log
      - name: Upload Tauri diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: legacy-removal-tauri-diagnostics
          path: |
            legacy-removal-tauri-check.log
            Elephant/backend/tauri/src/
            Elephant/backend/knowledge-core/src/
          if-no-files-found: error
          retention-days: 3
      - name: Enforce Tauri check
        if: always()
        run: test '${{ steps.tauri_check.outcome }}' = 'success'
