name: Remove legacy semantic backend

on:
  push:
    branches:
      - feature/physical-addon-packages
    paths:
      - .github/workflows/remove-legacy-semantic-backend.yml

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/physical-addon-packages
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Remove legacy embedding and rebuild commands
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          lib = Path('Elephant/backend/tauri/src/lib_min.rs')
          text = lib.read_text()
          text = text.replace('pub mod embeddings;\n', '')
          for line in [
              '      embeddings::tauri_embeddings_embed,\n',
              '      embeddings::tauri_embeddings_store,\n',
              '      embeddings::tauri_embeddings_search,\n',
              '      embeddings::tauri_embeddings_count,\n',
              '      embeddings::tauri_embeddings_clear_vault,\n',
              '      tauri_extra_commands::tauri_search_rebuild,\n',
          ]:
              if line not in text:
                  raise SystemExit(f'Missing expected legacy handler: {line.strip()}')
              text = text.replace(line, '')
          lib.write_text(text)

          commands = Path('Elephant/backend/tauri/src/tauri_extra_commands.rs')
          text = commands.read_text()
          start_marker = '#[tauri::command]\npub fn tauri_search_rebuild('
          start = text.find(start_marker)
          if start < 0:
              raise SystemExit('tauri_search_rebuild was not found')
          end_marker = '\n#[tauri::command]\npub fn tauri_sync_plan('
          end = text.find(end_marker, start)
          if end < 0:
              raise SystemExit('tauri_sync_plan boundary was not found')
          commands.write_text(text[:start] + text[end + 1:])

          workflow = Path('.github/workflows/addon-platform-validation.yml')
          text = workflow.read_text()
          anchor = '            tests/app/unit/addons/searchPackageOwnership.spec.js \\\n'
          addition = anchor + '            tests/app/unit/addons/semanticBackendAbsence.spec.js \\\n'
          if 'semanticBackendAbsence.spec.js' not in text:
              if anchor not in text:
                  raise SystemExit('Focused addon test anchor was not found')
              text = text.replace(anchor, addition)
          workflow.write_text(text)

          test = Path('tests/app/unit/addons/semanticBackendAbsence.spec.js')
          test.write_text('''import fs from 'node:fs'\nimport path from 'node:path'\nimport { describe, expect, it } from 'vitest'\n\nconst root = process.cwd()\nconst read = (file) => fs.readFileSync(path.join(root, file), 'utf8')\n\ndescribe('legacy semantic backend physical absence', () => {\n  it('does not ship the old embedding database module in Elephant core', () => {\n    expect(fs.existsSync(path.join(root, 'Elephant/backend/tauri/src/embeddings.rs'))).toBe(false)\n    const lib = read('Elephant/backend/tauri/src/lib_min.rs')\n    expect(lib).not.toContain('pub mod embeddings;')\n    expect(lib).not.toContain('embeddings::tauri_embeddings_')\n  })\n\n  it('does not expose the old global semantic rebuild command', () => {\n    const lib = read('Elephant/backend/tauri/src/lib_min.rs')\n    const commands = read('Elephant/backend/tauri/src/tauri_extra_commands.rs')\n    expect(lib).not.toContain('tauri_extra_commands::tauri_search_rebuild')\n    expect(commands).not.toContain('pub fn tauri_search_rebuild')\n    expect(commands).toContain('pub fn tauri_search_inspect')\n    expect(lib).toContain('vault::commands::tauri_search_query')\n  })\n\n  it('keeps semantic indexing owned by the physical Search package', () => {\n    const source = read('addons/official/ai-search/main.js')\n    expect(source).toContain("engine: 'package-owned-bm25'")\n    expect(source).toContain('api.storage.set(INDEX_KEY, this.index)')\n    expect(source).toContain('api.resources.provide(PROVIDER_RESOURCE')\n  })\n})\n''')
          PY

          git rm Elephant/backend/tauri/src/embeddings.rs

      - name: Reject surviving legacy references
        shell: bash
        run: |
          set -euo pipefail
          if grep -R -n -E 'tauri_embeddings_(embed|store|search|count|clear_vault)|crate::embeddings|embeddings::tauri_' \
            Elephant addons tests build \
            --exclude-dir=node_modules --exclude-dir=target --exclude-dir=out; then
            echo 'Legacy semantic backend references remain.' >&2
            exit 1
          fi

      - uses: ./.github/actions/setup

      - name: Validate package ownership contracts
        run: |
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            tests/app/unit/addons/searchPackageOwnership.spec.js \
            tests/app/unit/addons/wikiPackageOwnership.spec.js \
            tests/app/unit/addons/semanticBackendAbsence.spec.js

      - name: Install Linux Tauri dependencies
        shell: bash
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Compile the reduced Rust core
        run: cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --lib

      - name: Commit validated extraction
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/remove-legacy-semantic-backend.yml
          git add \
            .github/workflows/addon-platform-validation.yml \
            Elephant/backend/tauri/src/lib_min.rs \
            Elephant/backend/tauri/src/tauri_extra_commands.rs \
            tests/app/unit/addons/semanticBackendAbsence.spec.js
          git commit -m "refactor(search): remove legacy semantic backend from core"
          git pull --rebase origin feature/physical-addon-packages
          git push origin HEAD:feature/physical-addon-packages
