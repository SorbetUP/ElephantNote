name: Repair Knowledge Runtime Freeze Once

on:
  push:
    branches:
      - feature/rust-knowledge-core
    paths:
      - '.github/scripts/repair_knowledge_runtime_freeze.py'
      - '.github/workflows/repair-knowledge-runtime-freeze-once.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repair-knowledge-runtime-freeze-once
  cancel-in-progress: true

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/rust-knowledge-core
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply freeze repairs
        run: python .github/scripts/repair_knowledge_runtime_freeze.py
      - name: Format Rust
        run: cargo fmt --manifest-path Elephant/backend/knowledge-core/Cargo.toml
      - name: Remove one-shot files and commit
        shell: bash
        run: |
          rm -f .github/scripts/repair_knowledge_runtime_freeze.py
          rm -f .github/workflows/repair-knowledge-runtime-freeze-once.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --stat
          git commit -m 'fix(knowledge): stop rebuild loops and startup freezes'
          git push origin HEAD:feature/rust-knowledge-core
