name: Repair Wiki rendering final

on:
  pull_request:
    branches:
      - feature/wiki-knowledge-continuation
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'assistant/wiki-experience-final2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - name: Repair Wiki rendering and graph links
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          core = Path('Elephant/backend/knowledge-core/src/wiki_core.rs')
          text = core.read_text()
          old_related = '''    if !synthesis.related_wikis.is_empty() {
              markdown.push_str("\n## Related wikis\n\n");
              for related in &synthesis.related_wikis {
                  markdown.push_str(&format!("- [[{}]]\n", related.trim()));
              }
          }

          let mut citations = Vec::new();
          if !citation_numbers.is_empty() {
              markdown.push_str("\n## Sources\n\n");
              for (chunk_id, number) in &citation_numbers {
                  let source = source_by_id
                      .get(chunk_id.as_str())
                      .ok_or_else(|| format!("Missing source chunk while rendering: {chunk_id}"))?;
                  let key = format!("source-{number}");
                  let anchor = if source.heading.trim().is_empty() {
                      String::new()
                  } else {
                      format!("#{}", source.heading.trim())
                  };
                  markdown.push_str(&format!(
                      "[^{}]: [[{}{}|{} — {}]] (bytes {}–{})\n",
                      key,
                      source.document_path,
                      anchor,
                      source.document_title,
                      source.heading,
                      source.start_offset,
                      source.end_offset
                  ));
                  citations.push(WikiCitation {
                      key,
                      document_path: source.document_path.clone(),
                      document_title: source.document_title.clone(),
                      chunk_id: source.chunk_id.clone(),
                      heading: source.heading.clone(),
                      start_offset: source.start_offset,
                      end_offset: source.end_offset,
                  });
              }
          }'''
          new_related = '''    if !synthesis.related_wikis.is_empty() {
              markdown.push_str("\n## Related wikis\n\n");
              for related in &synthesis.related_wikis {
                  markdown.push_str(&format!(
                      "- [{}](./{}.md)\n",
                      related.trim(),
                      slugify(related)
                  ));
              }
          }

          let mut citations = Vec::new();
          if !citation_numbers.is_empty() {
              markdown.push_str("\n## Sources\n\n");
              let mut numbered = citation_numbers.iter().collect::<Vec<_>>();
              numbered.sort_by_key(|(_, number)| **number);
              for (chunk_id, number) in numbered {
                  let source = source_by_id
                      .get(chunk_id.as_str())
                      .ok_or_else(|| format!("Missing source chunk while rendering: {chunk_id}"))?;
                  let key = format!("source-{number}");
                  markdown.push_str(&format!(
                      "{}. [{} — {}]({})\n",
                      number,
                      source.document_title,
                      source.heading,
                      markdown_note_target(source)
                  ));
                  citations.push(WikiCitation {
                      key,
                      document_path: source.document_path.clone(),
                      document_title: source.document_title.clone(),
                      chunk_id: source.chunk_id.clone(),
                      heading: source.heading.clone(),
                      start_offset: source.start_offset,
                      end_offset: source.end_offset,
                  });
              }
          }'''
          if old_related not in text:
              raise SystemExit('Old Wiki source renderer not found')
          text = text.replace(old_related, new_related, 1)

          old_claims = '''fn render_claims(
              markdown: &mut String,
              claims: &[WikiClaim],
              citation_numbers: &mut BTreeMap<String, usize>,
              source_by_id: &HashMap<&str, &WikiSourceChunk>,
          ) -> Result<(), String> {
              for claim in claims {
                  let mut references = Vec::new();
                  for chunk_id in &claim.citation_chunk_ids {
                      if !source_by_id.contains_key(chunk_id.as_str()) {
                          return Err(format!("Unknown source chunk while rendering: {chunk_id}"));
                      }
                      let next = citation_numbers.len() + 1;
                      let number = *citation_numbers.entry(chunk_id.clone()).or_insert(next);
                      references.push(format!("[^source-{number}]"));
                  }
                  references.sort();
                  references.dedup();
                  markdown.push_str(claim.text.trim());
                  markdown.push(' ');
                  markdown.push_str(&references.join(""));
                  markdown.push_str("\n\n");
              }
              Ok(())
          }'''
          new_claims = '''fn markdown_link_component(value: &str) -> String {
              let mut output = String::new();
              for character in value.chars() {
                  match character {
                      ' ' => output.push_str("%20"),
                      '(' => output.push_str("%28"),
                      ')' => output.push_str("%29"),
                      '#' => output.push_str("%23"),
                      '%' => output.push_str("%25"),
                      _ => output.push(character),
                  }
              }
              output
          }

          fn markdown_heading_anchor(value: &str) -> String {
              let mut output = String::new();
              let mut pending_dash = false;
              for character in value.trim().to_lowercase().chars() {
                  if character.is_alphanumeric() {
                      if pending_dash && !output.is_empty() {
                          output.push('-');
                      }
                      output.push(character);
                      pending_dash = false;
                  } else if !output.is_empty() {
                      pending_dash = true;
                  }
              }
              output
          }

          fn markdown_note_target(source: &WikiSourceChunk) -> String {
              let path = markdown_link_component(&source.document_path);
              let anchor = markdown_heading_anchor(&source.heading);
              if anchor.is_empty() {
                  format!("../../{path}")
              } else {
                  format!("../../{path}#{anchor}")
              }
          }

          fn render_claims(
              markdown: &mut String,
              claims: &[WikiClaim],
              citation_numbers: &mut BTreeMap<String, usize>,
              source_by_id: &HashMap<&str, &WikiSourceChunk>,
          ) -> Result<(), String> {
              for claim in claims {
                  let mut references = Vec::new();
                  for chunk_id in &claim.citation_chunk_ids {
                      let source = source_by_id
                          .get(chunk_id.as_str())
                          .ok_or_else(|| format!("Unknown source chunk while rendering: {chunk_id}"))?;
                      let next = citation_numbers.len() + 1;
                      let number = *citation_numbers.entry(chunk_id.clone()).or_insert(next);
                      references.push(format!("[{number}]({})", markdown_note_target(source)));
                  }
                  references.sort();
                  references.dedup();
                  markdown.push_str(claim.text.trim());
                  if !references.is_empty() {
                      markdown.push(' ');
                      markdown.push_str(&references.join(" "));
                  }
                  markdown.push_str("\n\n");
              }
              Ok(())
          }'''
          if old_claims not in text:
              raise SystemExit('Old Wiki claim renderer not found')
          core.write_text(text.replace(old_claims, new_claims, 1))

          graph = Path('Elephant/backend/knowledge-core/src/wiki_graph_projection.rs')
          text = graph.read_text()
          old_tail = '''            remainder = &after_start[end + 2..];
              }
          }
          references.sort();'''
          new_tail = '''            remainder = &after_start[end + 2..];
              }
              let mut markdown_remainder = trimmed;
              while let Some(open) = markdown_remainder.find("](") {
                  let after_open = &markdown_remainder[open + 2..];
                  let Some(close) = after_open.find(')') else {
                      break;
                  };
                  let target = after_open[..close]
                      .split('#')
                      .next()
                      .unwrap_or("")
                      .trim()
                      .trim_start_matches("./")
                      .trim_end_matches(".md");
                  if !target.is_empty() {
                      references.push(target.to_string());
                  }
                  markdown_remainder = &after_open[close + 1..];
              }
          }
          references.sort();'''
          if old_tail not in text:
              raise SystemExit('Wiki graph parser tail not found')
          graph.write_text(text.replace(old_tail, new_tail, 1))
          PY
          cargo fmt --manifest-path Elephant/backend/knowledge-core/Cargo.toml
          git config user.name "ElephantNote Bot"
          git config user.email "actions@users.noreply.github.com"
          git add Elephant/backend/knowledge-core/src/wiki_core.rs Elephant/backend/knowledge-core/src/wiki_graph_projection.rs
          git commit -m "Render Wiki citations as navigable Markdown links"
          git push origin HEAD:${{ github.head_ref }}
      - run: pnpm install --frozen-lockfile
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential pkg-config libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev
      - name: Validate focused source
        run: |
          cargo test --manifest-path Elephant/backend/knowledge-core/Cargo.toml --all-targets -- --nocapture
          cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --no-default-features
          Elephant/node_modules/.bin/eslint Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue Elephant/frontend/app/components/views/WikiView.vue Elephant/frontend/app/components/views/ChatView.vue
          pnpm tauri:web:build
