name: Repair Wiki rendering source

on:
  pull_request:
    branches:
      - feature/wiki-knowledge-continuation
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'assistant/wiki-rendering-repair2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - name: Apply rendering repair
        run: |
          git fetch origin feature/wiki-knowledge-continuation
          git show origin/feature/wiki-knowledge-continuation:.github/scripts/repair_wiki_rendering.py > /tmp/repair.py
          python3 /tmp/repair.py
          cargo fmt --manifest-path Elephant/backend/knowledge-core/Cargo.toml
          git config user.name "ElephantNote Bot"
          git config user.email "actions@users.noreply.github.com"
          git add Elephant/backend/knowledge-core/src/wiki_core.rs Elephant/backend/knowledge-core/src/wiki_graph_projection.rs
          git commit -m "Render Wiki citations as navigable Markdown links"
          git push origin HEAD:${{ github.head_ref }}
      - run: pnpm install --frozen-lockfile
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential pkg-config libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev
      - name: Validate focused source
        run: |
          cargo test --manifest-path Elephant/backend/knowledge-core/Cargo.toml --all-targets -- --nocapture
          cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --no-default-features
          Elephant/node_modules/.bin/eslint Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue Elephant/frontend/app/components/views/WikiView.vue Elephant/frontend/app/components/views/ChatView.vue
          pnpm tauri:web:build
