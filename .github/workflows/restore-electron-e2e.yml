name: Restore dev-only Electron E2E harness

on:
  push:
    branches:
      - feature/physical-addon-packages
    paths:
      - .github/workflows/restore-electron-e2e.yml

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/physical-addon-packages
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Add Electron as a test-only dependency
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import json

          path = Path('package.json')
          package = json.loads(path.read_text())
          package.setdefault('devDependencies', {})['electron'] = '43.1.0'
          package['devDependencies'] = dict(sorted(package['devDependencies'].items()))
          path.write_text(json.dumps(package, indent=2, ensure_ascii=False) + '\n')
          PY

      - name: Refresh and verify frozen lockfile
        shell: bash
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
        run: |
          set -euxo pipefail
          npm install -g pnpm@10.33.4
          pnpm install --lockfile-only --ignore-scripts
          pnpm install --frozen-lockfile --ignore-scripts

      - name: Commit verified test dependency and remove workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/restore-electron-e2e.yml
          git add package.json pnpm-lock.yaml
          git commit -m "test(e2e): restore Electron as a dev-only harness"
          git push origin HEAD:feature/physical-addon-packages
