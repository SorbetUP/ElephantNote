name: Restore validated semantic discovery source

on:
  pull_request:
    branches:
      - feature/wiki-knowledge-continuation
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  restore:
    if: github.head_ref == 'assistant/wiki-links-graph-integration'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Restore validated source
        run: |
          git checkout e6c5b0bd635f5025090f829a34c15d217772441f -- Elephant/backend/tauri/src/knowledge_wiki_discovery.rs
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml --all
      - name: Persist source
        run: |
          git config user.name "ElephantNote Bot"
          git config user.email "actions@users.noreply.github.com"
          git add Elephant/backend/tauri/src/knowledge_wiki_discovery.rs
          git commit -m "Restore validated semantic Wiki discovery source"
          git push origin HEAD:${{ github.head_ref }}
