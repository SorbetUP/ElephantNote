name: Run AI Wiki patch PR

on:
  pull_request:
    branches:
      - feature/wiki-knowledge-continuation
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'assistant/run-ai-wiki-patch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - name: Apply focused repair
        shell: bash
        run: |
          if grep -q 'pub async fn chat_with_effort' Elephant/backend/tauri/src/chat_runtime/codex_app_server.rs; then
            echo 'Focused repair is already present on the head branch.'
            exit 0
          fi
          git fetch origin feature/wiki-knowledge-continuation
          git show origin/feature/wiki-knowledge-continuation:.github/scripts/repair_ai_wiki.py > /tmp/repair_ai_wiki.py
          python3 /tmp/repair_ai_wiki.py
          rm -f .github/patch-ai-wiki-error.txt
      - name: Format Rust
        run: cargo fmt --manifest-path Elephant/backend/knowledge-core/Cargo.toml && cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml
      - name: Persist repair source
        shell: bash
        run: |
          git add Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue \
            Elephant/backend/tauri/src/tauri_extra_commands.rs \
            Elephant/backend/tauri/src/chat_runtime.rs \
            Elephant/backend/tauri/src/chat_runtime/codex_app_server.rs \
            Elephant/backend/tauri/src/knowledge_wikis.rs \
            Elephant/backend/knowledge-core/src/wiki_core.rs
          if git diff --cached --quiet; then
            echo 'No source changes to commit.'
            exit 0
          fi
          git config user.name "ElephantNote Bot"
          git config user.email "actions@users.noreply.github.com"
          git commit -m "Fix Codex reasoning, chat routing and Wiki synthesis"
          git push origin HEAD:${{ github.head_ref }}
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev
      - name: Check Tauri
        shell: bash
        run: |
          set +e
          cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --no-default-features > /tmp/tauri-check.log 2>&1
          status=$?
          set -e
          cat /tmp/tauri-check.log
          if [ "$status" -ne 0 ]; then
            cp /tmp/tauri-check.log .github/tauri-ai-wiki-check-error.txt
            git config user.name "ElephantNote Bot"
            git config user.email "actions@users.noreply.github.com"
            git add .github/tauri-ai-wiki-check-error.txt
            git commit -m "Record Tauri AI Wiki compile failure"
            git push origin HEAD:${{ github.head_ref }}
            exit "$status"
          fi
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Test knowledge core
        run: cargo test --manifest-path Elephant/backend/knowledge-core/Cargo.toml --all-targets -- --nocapture
      - name: Run focused frontend lint
        run: pnpm exec eslint Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue
