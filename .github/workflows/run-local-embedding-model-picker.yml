name: Run Local Embedding Model Picker

on:
  push:
    branches:
      - assistant/wiki-organization-continuation
    paths:
      - .github/workflows/run-local-embedding-model-picker.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: assistant/wiki-organization-continuation
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - name: Apply patch script
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import textwrap
          workflow = Path('.github/workflows/fix-local-embedding-model-picker.yml').read_text()
          script = workflow.split("python3 - <<'PY'\n", 1)[1].split('\n          PY', 1)[0]
          exec(compile(textwrap.dedent(script), 'fix-local-embedding-model-picker', 'exec'))
          PY
      - name: Validate model picker
        run: |
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/eslint \
            Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue \
            tests/app/unit/aiEmbeddingModelPicker.spec.js
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            tests/app/unit/aiEmbeddingModelPicker.spec.js
      - name: Commit model picker
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue \
            tests/app/unit/aiEmbeddingModelPicker.spec.js
          git commit --no-verify -m "fix: list downloaded embedding models in AI settings"
          git push origin HEAD:assistant/wiki-organization-continuation
