name: Format Rust Muya Clipboard

on:
  push:
    branches:
      - feature/rust-muya-editor-core
    paths:
      - '.github/workflows/rustfmt-muya-clipboard.yml'

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/rust-muya-editor-core
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format and commit Rust sources
        shell: bash
        run: |
          set -euxo pipefail
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml
          rm .github/workflows/rustfmt-muya-clipboard.yml
          invalid=$(git diff --name-only | grep -Ev '^(Elephant/backend/tauri/.*\.rs|\.github/workflows/rustfmt-muya-clipboard\.yml)$' || true)
          test -z "$invalid"
          git config user.name 'ElephantNote CI'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'style(rust): format activated Muya clipboard modules'
          git push origin HEAD:feature/rust-muya-editor-core
