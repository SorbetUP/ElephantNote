name: Iroh Two-Device Smoke

on:
  push:
    branches:
      - main
      - nsb/tauri
      - 'assistant/**'
      - 'feature/**'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: iroh-two-device-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  two-device-iroh-sync:
    name: Two real Iroh endpoints
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CARGO_TERM_COLOR: always
      DEBIAN_FRONTEND: noninteractive
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri Linux dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            wget

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Elephant/backend/tauri/target
          key: ${{ runner.os }}-cargo-iroh-smoke-${{ hashFiles('Elephant/backend/tauri/Cargo.lock', 'Elephant/backend/tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-iroh-smoke-
            ${{ runner.os }}-cargo-

      - name: Run two-endpoint Iroh vault synchronization
        shell: bash
        run: |
          set -euxo pipefail
          log_file="$(mktemp)"
          cargo test \
            --manifest-path Elephant/backend/tauri/Cargo.toml \
            --lib \
            --no-default-features \
            two_real_iroh_endpoints_exchange_modify_and_delete_vault_content \
            -- --nocapture 2>&1 | tee "$log_file"
          grep -Eq 'test result: ok\. 1 passed; 0 failed' "$log_file"
