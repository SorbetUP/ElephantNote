name: Sync Invite Lockfile

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/sync-invite-lockfile.yml'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lockfile:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install pnpm
        run: npm install -g pnpm@10.33.4
      - name: Regenerate lockfile only
        run: pnpm install --lockfile-only --no-frozen-lockfile --ignore-scripts
      - name: Commit regenerated lockfile
        shell: bash
        run: |
          if git diff --quiet -- pnpm-lock.yaml; then
            echo 'pnpm-lock.yaml is already current.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add pnpm-lock.yaml
          git commit -m 'Update lockfile for sync QR scanner'
          git push origin HEAD:${{ github.head_ref }}
