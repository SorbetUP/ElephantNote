name: Sync lockfile once

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  sync-lockfile:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'feature/physical-addon-packages'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: pnpm

      - name: Synchronize importer and remove one-shot workflow
        shell: bash
        run: |
          pnpm install --lockfile-only --ignore-scripts
          rm -f .github/workflows/sync-lockfile-once.yml
          if git diff --quiet -- pnpm-lock.yaml .github/workflows/sync-lockfile-once.yml; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml .github/workflows/sync-lockfile-once.yml
          git commit -m "chore(lockfile): remove extracted addon dependencies"
          git push origin HEAD:${{ github.head_ref }}
