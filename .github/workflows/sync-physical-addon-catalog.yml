name: Sync physical addon catalog sources

on:
  push:
    branches:
      - feature/physical-addon-packages
    paths:
      - .github/workflows/sync-physical-addon-catalog.yml

permissions:
  contents: write

jobs:
  sync-catalog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout application addon sources
        uses: actions/checkout@v4
        with:
          ref: feature/physical-addon-packages
          path: app

      - name: Checkout catalog branch
        uses: actions/checkout@v4
        with:
          ref: feature/physical-addon-catalog
          path: catalog
          fetch-depth: 0

      - name: Synchronize first-party package sources and metadata
        shell: bash
        run: |
          python3 - <<'PY'
          from datetime import datetime, timezone
          from pathlib import Path
          import json
          import shutil

          app_root = Path('app')
          catalog_root = Path('catalog')
          source_root = app_root / 'addons' / 'official'
          target_root = catalog_root / 'addons'

          official_manifests = {}
          for source in sorted(source_root.iterdir()):
              if not source.is_dir():
                  continue
              manifest_path = source / 'manifest.json'
              entry_path = source / 'main.js'
              if not manifest_path.is_file() or not entry_path.is_file():
                  continue
              manifest = json.loads(manifest_path.read_text())
              slug = source.name
              target = target_root / slug
              if target.exists():
                  shutil.rmtree(target)
              shutil.copytree(source, target)
              official_manifests[manifest['id']] = (slug, manifest)

          catalog_path = catalog_root / 'catalog.json'
          catalog = json.loads(catalog_path.read_text())
          existing = {entry['id']: entry for entry in catalog.get('addons', [])}

          for addon_id, (slug, manifest) in official_manifests.items():
              entry = existing.get(addon_id, {'id': addon_id, 'slug': slug})
              entry.update({
                  'id': addon_id,
                  'slug': slug,
                  'name': manifest['name'],
                  'version': manifest['version'],
                  'description': manifest.get('description', ''),
                  'author': manifest.get('author', 'Elephant'),
                  'official': True,
                  'manifestPath': f'addons/{slug}/manifest.json',
                  'entryPath': f"addons/{slug}/{manifest['runtime']['entry']}"
              })
              entry.pop('packagePath', None)
              entry.pop('packageHash', None)
              entry.pop('packages', None)
              existing[addon_id] = entry

          official_ids = set(official_manifests)
          original_order = [entry['id'] for entry in catalog.get('addons', [])]
          ordered_ids = []
          for addon_id in original_order:
              if addon_id in existing and addon_id not in ordered_ids:
                  ordered_ids.append(addon_id)
          for addon_id in official_ids:
              if addon_id not in ordered_ids:
                  ordered_ids.append(addon_id)

          catalog['version'] = 1
          catalog['branch'] = 'addon-catalog'
          catalog['updatedAt'] = datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace('+00:00', 'Z')
          catalog['addons'] = [existing[addon_id] for addon_id in ordered_ids]
          catalog_path.write_text(json.dumps(catalog, indent=2, ensure_ascii=False) + '\n')
          PY

      - name: Commit synchronized catalog sources
        working-directory: catalog
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add addons catalog.json
          if git diff --cached --quiet; then
            echo 'Catalog sources already synchronized.'
            exit 0
          fi
          git commit -m "chore(catalog): sync first-party physical addon sources"
          git push origin HEAD:feature/physical-addon-catalog
