name: Tauri CI

on:
  push:
    branches: [nsb/tauri]
  pull_request:
    branches: [nsb/tauri]

jobs:
  rust-tauri:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev libayatana-appindicator3-dev libssl-dev build-essential curl wget file
          version: tauri-linux-deps-v1
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - run: cargo check --manifest-path src-tauri/Cargo.toml --lib
      - run: cargo test --manifest-path src-tauri/Cargo.toml --lib
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: bash src-tauri/coverage.sh
