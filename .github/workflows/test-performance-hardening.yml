name: Production hardening

on:
  push:
    branches:
      - develop
      - develop_next-unified-candidate2
      - develop_next-unified-recovery
      - develop_next-mobile-recovery
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  production-contracts:
    name: Rust contracts and production renderer
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: ./.github/actions/setup

      - name: Install exact wasm-bindgen CLI
        shell: bash
        run: |
          VERSION=$(cargo metadata --manifest-path Elephant/crates/muya-wasm/Cargo.toml --format-version 1 \
            | python3 -c "import json,sys; data=json.load(sys.stdin); print(next(p['version'] for p in data['packages'] if p['name']=='wasm-bindgen'))")
          if ! wasm-bindgen --version 2>/dev/null | grep -q "${VERSION}$"; then
            cargo install wasm-bindgen-cli --version "$VERSION" --locked
          fi

      - name: Enforce test trust policy
        run: pnpm test:trust:guard

      - name: Test Rust Markdown core and WASM protocol
        shell: bash
        run: |
          set -o pipefail
          cargo test --manifest-path Elephant/crates/muya-core/Cargo.toml 2>&1 | tee markdown-core-contracts.txt
          cargo test --manifest-path Elephant/crates/muya-wasm/Cargo.toml 2>&1 | tee markdown-wasm-contracts.txt

      - name: Check Tauri Rust backend
        shell: bash
        run: |
          set -o pipefail
          node build/scripts/prepare-tauri-addon-resources.mjs
          cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --all-targets --no-default-features \
            2>&1 | tee tauri-rust-check.txt

      - name: Build production renderer
        shell: bash
        run: |
          set -o pipefail
          pnpm tauri:web:build 2>&1 | tee production-renderer-build.txt

      - name: Upload production diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-hardening
          path: |
            test-results/trust/**
            markdown-core-contracts.txt
            markdown-wasm-contracts.txt
            tauri-rust-check.txt
            production-renderer-build.txt
          if-no-files-found: warn
          retention-days: 14
