name: Test and performance hardening

on:
  push:
    branches:
      - 'assistant/**'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  critical-contracts:
    name: Critical contracts and coverage
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install --global pnpm@10.33.4

      - name: Install exact locked dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Reject fake or disabled test additions
        run: node build/scripts/verify-test-integrity.mjs
        env:
          TEST_INTEGRITY_BASE: ${{ github.event.pull_request.base.sha || 'origin/develop' }}

      - name: Run critical utility contracts with coverage
        run: pnpm exec vitest run --config vitest.critical.config.js --coverage

      - name: Build production renderer
        run: pnpm tauri:web:build

      - name: Upload focused coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: critical-coverage
          path: build/coverage-critical/
          if-no-files-found: error
          retention-days: 14
