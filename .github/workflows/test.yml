name: Test trust policy

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - develop
      - 'agent/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  trust-policy:
    name: Reject fake or inflated tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify test trust policy
        shell: bash
        run: |
          set -o pipefail
          pnpm test:trust:guard 2>&1 | tee test-trust.txt

      - name: Upload test inventory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-trust-inventory
          path: |
            test-trust.txt
            test-results/trust/**
          if-no-files-found: error
          retention-days: 30
