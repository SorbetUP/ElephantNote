name: Direct Wiki embeddings implementation

on:
  pull_request:
    branches:
      - feature/wiki-knowledge-continuation
    paths:
      - .github/workflows/trigger-wiki-embeddings-direct.yml

permissions:
  contents: write

jobs:
  implement:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Extract and apply implementation
        id: apply
        continue-on-error: true
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import traceback
          try:
              source = Path('.github/workflows/implement-wiki-embeddings-once.yml').read_text()
              lines = source.splitlines()
              start = next(index for index, line in enumerate(lines) if "python3 - <<'PY'" in line) + 1
              end = next(
                  index for index in range(start, len(lines) - 1)
                  if lines[index].strip() == 'PY' and 'Format and validate' in lines[index + 1]
              )
              output = []
              in_triple = False
              for line in lines[start:end]:
                  normalized = line if in_triple else (line[10:] if line.startswith('          ') else line)
                  output.append(normalized)
                  if normalized.count("'''") % 2 == 1:
                      in_triple = not in_triple
              script = '\n'.join(output)
              compile(script, 'wiki-embedding-implementation', 'exec')
              exec(script, {'__name__': '__main__'})
          except BaseException:
              Path('.github/wiki-embedding-direct-error.txt').write_text(traceback.format_exc())
              raise
          PY
      - name: Persist implementation error
        if: steps.apply.outcome == 'failure'
        shell: bash
        run: |
          git config user.name "OpenAI"
          git config user.email "openai@users.noreply.github.com"
          git add .github/wiki-embedding-direct-error.txt
          git commit -m "Record direct Wiki embedding implementation failure"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
          exit 1
      - name: Fix imports
        if: steps.apply.outcome == 'success'
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('Elephant/backend/tauri/src/knowledge_embeddings.rs')
          text = path.read_text().replace('use tauri::AppHandle;', 'use tauri::{AppHandle, Emitter};')
          path.write_text(text)
          PY
      - name: Install Linux Tauri dependencies
        if: steps.apply.outcome == 'success'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - uses: pnpm/action-setup@v4
        if: steps.apply.outcome == 'success'
        with:
          version: 10.33.4
      - uses: actions/setup-node@v4
        if: steps.apply.outcome == 'success'
        with:
          node-version: 22
          cache: pnpm
      - if: steps.apply.outcome == 'success'
        run: pnpm install --frozen-lockfile
      - name: Validate implementation
        if: steps.apply.outcome == 'success'
        run: |
          cargo fmt --manifest-path Elephant/backend/knowledge-core/Cargo.toml
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml
          pnpm exec vitest run tests/app/unit/wikiEmbeddingSurface.spec.js tests/app/unit/wikiGraphSurface.spec.js tests/app/unit/chatAgentSurface.spec.js
          pnpm exec eslint Elephant/frontend/app/components/views/AtomicGraphView.vue Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue tests/app/unit/wikiEmbeddingSurface.spec.js
          cargo test --manifest-path Elephant/backend/knowledge-core/Cargo.toml embedding_store -- --nocapture
          cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --no-default-features --message-format short
      - name: Commit implementation
        if: steps.apply.outcome == 'success'
        run: |
          git config user.name "OpenAI"
          git config user.email "openai@users.noreply.github.com"
          git add Elephant/backend/knowledge-core/src/embedding_store.rs Elephant/backend/knowledge-core/src/lib.rs Elephant/backend/knowledge-core/src/wiki_graph_projection.rs Elephant/backend/tauri/src/knowledge_embeddings.rs Elephant/backend/tauri/src/lib_min.rs Elephant/backend/tauri/src/local_llama_runtime.rs Elephant/frontend/app/components/views/AtomicGraphView.vue Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue tests/app/unit/wikiEmbeddingSurface.spec.js
          git commit -m "Add real embedding edges inside Wiki territories"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
