name: Update critical flow guard once

on:
  push:
    branches:
      - assistant/validate-knowledge-graph-wiki

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: assistant/validate-knowledge-graph-wiki
      - name: Update direct RAG guard
        shell: python
        run: |
          from pathlib import Path
          path = Path('build/scripts/verify-critical-flows.mjs')
          text = path.read_text()
          old = """ordered(
            'Elephant/frontend/app/services/elephantnoteClient/domainClients.js',
            [
              'const CHAT_REBUILD_COOLDOWN_MS',
              'const searchVaultInitializedForChat',
              'const shouldRebuildChatSearch',
              'notes: {',
              'read: (relativePath) =>',
              'call(API.NOTES_READ',
              'write: (payload = {}) => call(API.NOTES_WRITE, payload)'
            ],
            'front client note methods and chat search throttling'
          )"""
          new = """ordered(
            'Elephant/frontend/app/services/elephantnoteClient/domainClients.js',
            [
              'const normalizeRagChatPayload',
              'const callRagChat',
              'notes: {',
              'read: (relativePath) =>',
              'call(API.NOTES_READ',
              'write: (payload = {}) => call(API.NOTES_WRITE, payload)',
              'rag: {',
              'chat: (payload, limit = 6) => callRagChat(call, payload, limit)'
            ],
            'front client note methods and explicit chat search lifecycle'
          )
          lacks(
            'Elephant/frontend/app/services/elephantnoteClient/domainClients.js',
            'shouldRebuildChatSearch',
            'implicit chat-triggered search rebuild logic'
          )"""
          if old not in text:
              raise SystemExit('critical-flow chat block not found')
          path.write_text(text.replace(old, new))
          Path('.github/workflows/update-critical-flow-guard-once.yml').unlink()
          Path('.github/critical-flow-guard-trigger.txt').unlink(missing_ok=True)
      - name: Commit
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add build/scripts/verify-critical-flows.mjs .github/workflows/update-critical-flow-guard-once.yml .github/critical-flow-guard-trigger.txt
          git commit -m 'fix(ci): guard explicit chat knowledge lifecycle'
          git push origin HEAD:assistant/validate-knowledge-graph-wiki
