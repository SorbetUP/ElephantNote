name: Validate Licenses

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/validate-licenses.yml'
  push:
    branches:
      - develop
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/validate-licenses.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-licenses:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Validate dependency licenses
        shell: bash
        run: |
          set -o pipefail
          pnpm run validate-licenses 2>&1 | tee license-output.txt
      - name: Upload license diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: license-output
          path: license-output.txt
          if-no-files-found: ignore
          retention-days: 7
