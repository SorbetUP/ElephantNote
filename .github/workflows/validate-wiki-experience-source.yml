name: Validate Wiki experience source

on:
  pull_request:
    branches:
      - feature/wiki-knowledge-continuation
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  validate:
    if: github.head_ref == 'assistant/wiki-experience-validation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential pkg-config libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev
      - name: Run and persist focused validation
        shell: bash
        run: |
          set +e
          cargo test --manifest-path Elephant/backend/knowledge-core/Cargo.toml --all-targets -- --nocapture > /tmp/core.log 2>&1
          core=$?
          cargo check --manifest-path Elephant/backend/tauri/Cargo.toml --no-default-features > /tmp/tauri.log 2>&1
          tauri=$?
          Elephant/node_modules/.bin/eslint Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue Elephant/frontend/app/components/views/WikiView.vue Elephant/frontend/app/components/views/ChatView.vue > /tmp/lint.log 2>&1
          lint=$?
          pnpm tauri:web:build > /tmp/build.log 2>&1
          build=$?
          set -e
          {
            echo "core=$core tauri=$tauri lint=$lint build=$build"
            echo '=== CORE ==='; tail -n 180 /tmp/core.log
            echo '=== TAURI ==='; tail -n 180 /tmp/tauri.log
            echo '=== LINT ==='; cat /tmp/lint.log
            echo '=== BUILD ==='; tail -n 180 /tmp/build.log
          } > .github/wiki-experience-source-validation.txt
          cat .github/wiki-experience-source-validation.txt
          git config user.name "ElephantNote Bot"
          git config user.email "actions@users.noreply.github.com"
          git add .github/wiki-experience-source-validation.txt
          git commit -m "Record Wiki experience source validation"
          git push origin HEAD:${{ github.head_ref }}
          if [ "$core" -ne 0 ] || [ "$tauri" -ne 0 ] || [ "$lint" -ne 0 ] || [ "$build" -ne 0 ]; then
            exit 1
          fi
