name: Validate Wiki Frontend Continuation

on:
  pull_request:
    branches:
      - feature/rust-knowledge-core
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: validate-wiki-frontend-continuation
  cancel-in-progress: true

jobs:
  validate:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'feature/wiki-knowledge-continuation'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/wiki-knowledge-continuation
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Vue frontend
        run: pnpm tauri:web:build

      - name: Lint changed frontend files
        run: |
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/eslint \
            Elephant/frontend/app/components/settings/AiProviderSettingsPanel.vue \
            Elephant/frontend/app/components/views/WikiView.vue \
            Elephant/frontend/src/renderer/src/platform/installKnowledgeRuntimeBridge.js \
            Elephant/frontend/src/renderer/src/platform/knowledgeRuntimeClient.js

      - name: Remove temporary trigger from head branch
        run: |
          rm -f .github/frontend-validation-trigger
          if git diff --quiet; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'chore(ci): remove frontend validation trigger'
          git push origin HEAD:feature/wiki-knowledge-continuation
