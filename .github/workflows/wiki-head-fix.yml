name: Wiki head fix

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-head:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: assistant/wiki-organization-continuation
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Align related-Wiki rendering regression
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('Elephant/backend/knowledge-core/src/wiki_core.rs')
          source = path.read_text()
          old = '''        assert!(rendered
            .markdown
            .contains("[Peer-to-peer networking](./peer-to-peer-networking.md)"));
'''
          replacement = '''        assert!(rendered.markdown.contains("- Peer-to-peer networking"));
        assert!(!rendered.markdown.contains("./peer-to-peer-networking.md"));
'''
          if old in source:
              path.write_text(source.replace(old, replacement, 1))
          elif replacement not in source:
              raise SystemExit('stale related-Wiki rendering assertion not found')
          PY
          cargo fmt --manifest-path Elephant/backend/knowledge-core/Cargo.toml
          cargo test --manifest-path Elephant/backend/knowledge-core/Cargo.toml wiki_core::tests::renders_navigable_markdown_links_from_structured_claims -- --exact

      - name: Commit correction to PR head
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Elephant/backend/knowledge-core/src/wiki_core.rs
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "test(wiki): align related Wiki rendering contract"
          git push origin HEAD:assistant/wiki-organization-continuation

# Second push activates the workflow after registration on the default branch.
