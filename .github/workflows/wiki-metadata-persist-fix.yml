name: Wiki metadata persist fix

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-head:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: assistant/wiki-organization-continuation
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Persist semantic candidate metadata
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('Elephant/backend/tauri/src/knowledge_wiki_discovery.rs')
          source = path.read_text()
          old_sql = '''                "INSERT INTO wiki_saved_candidates(topic, title, reason, preview, suggested_sections_json, source_paths_json, source_titles_json, score, origin, updated_at)
                 VALUES (?1, ?2, ?3, ?4, ?5, ?6, ?7, ?8, 'semantic', unixepoch())
                 ON CONFLICT(topic) DO UPDATE SET
                   title=excluded.title,
                   reason=excluded.reason,
                   preview=excluded.preview,
                   suggested_sections_json=excluded.suggested_sections_json,
                   source_paths_json=excluded.source_paths_json,
                   source_titles_json=excluded.source_titles_json,
                   score=excluded.score,
                   origin='semantic',
                   updated_at=unixepoch()",
'''
          new_sql = '''                "INSERT INTO wiki_saved_candidates(topic, title, reason, preview, suggested_sections_json, source_paths_json, source_titles_json, score, metadata_json, origin, updated_at)
                 VALUES (?1, ?2, ?3, ?4, ?5, ?6, ?7, ?8, ?9, 'semantic', unixepoch())
                 ON CONFLICT(topic) DO UPDATE SET
                   title=excluded.title,
                   reason=excluded.reason,
                   preview=excluded.preview,
                   suggested_sections_json=excluded.suggested_sections_json,
                   source_paths_json=excluded.source_paths_json,
                   source_titles_json=excluded.source_titles_json,
                   score=excluded.score,
                   metadata_json=excluded.metadata_json,
                   origin='semantic',
                   updated_at=unixepoch()",
'''
          if old_sql in source:
              source = source.replace(old_sql, new_sql, 1)
          elif new_sql not in source:
              raise SystemExit('semantic candidate SQL block not found')

          old_params = '''                    serde_json::to_string(&candidate.source_titles).map_err(|error| error.to_string())?,
                    candidate.score as i64,
                ],
'''
          new_params = '''                    serde_json::to_string(&candidate.source_titles).map_err(|error| error.to_string())?,
                    candidate.score as i64,
                    serde_json::to_string(&json!({
                        "coreSourceCount": candidate.core_source_count,
                        "confidence": candidate.confidence,
                        "distinctiveness": candidate.distinctiveness,
                    }))
                    .map_err(|error| error.to_string())?,
                ],
'''
          if old_params in source:
              source = source.replace(old_params, new_params, 1)
          elif new_params not in source:
              raise SystemExit('semantic candidate params block not found')

          marker = '''    #[test]
    fn document_views_cover_opening_middle_and_end() {
'''
          regression = '''    #[test]
    fn persist_candidates_refreshes_semantic_metadata() {
        let connection = Connection::open_in_memory().expect("open in-memory database");
        connection
            .execute_batch(DISCOVERY_SCHEMA)
            .expect("create discovery schema");
        let mut candidate = SemanticWikiCandidate {
            topic: "Rust".into(),
            title: "Rust".into(),
            reason: "Initial community".into(),
            preview: "Rust notes".into(),
            suggested_sections: vec!["Ownership".into()],
            source_paths: vec!["Notes/Rust.md".into()],
            source_titles: vec!["Rust guide".into()],
            score: 3,
            coherence: 0.51,
            core_source_count: 2,
            confidence: 0.42,
            distinctiveness: 0.31,
        };
        persist_candidates(&connection, &[candidate.clone()]).expect("persist candidate");

        candidate.score = 9;
        candidate.core_source_count = 7;
        candidate.confidence = 0.81;
        candidate.distinctiveness = 0.66;
        persist_candidates(&connection, &[candidate]).expect("refresh candidate");

        let (score, metadata_json): (i64, String) = connection
            .query_row(
                "SELECT score, metadata_json FROM wiki_saved_candidates WHERE topic='rust'",
                [],
                |row| Ok((row.get(0)?, row.get(1)?)),
            )
            .expect("read refreshed candidate");
        let metadata: Value = serde_json::from_str(&metadata_json).expect("parse metadata");
        assert_eq!(score, 9);
        assert_eq!(metadata["coreSourceCount"].as_u64(), Some(7));
        assert_eq!(metadata["confidence"].as_f64(), Some(0.81));
        assert_eq!(metadata["distinctiveness"].as_f64(), Some(0.66));
    }

'''
          if 'fn persist_candidates_refreshes_semantic_metadata()' not in source:
              if marker not in source:
                  raise SystemExit('discovery test insertion point not found')
              source = source.replace(marker, regression + marker, 1)
          path.write_text(source)
          PY
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml

      - name: Validate focused regression
        run: cargo test --manifest-path Elephant/backend/tauri/Cargo.toml --no-default-features knowledge_wiki_discovery::tests::persist_candidates_refreshes_semantic_metadata -- --exact

      - name: Commit correction to PR head
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Elephant/backend/tauri/src/knowledge_wiki_discovery.rs
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "fix(wiki): persist semantic proposal quality metadata"
          git push origin HEAD:assistant/wiki-organization-continuation
