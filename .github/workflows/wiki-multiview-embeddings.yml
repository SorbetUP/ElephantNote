name: Wiki Multi-view Embeddings

on:
  pull_request:
    branches:
      - assistant/wiki-links-graph-integration
    paths:
      - .github/workflows/wiki-multiview-embeddings.yml

permissions:
  contents: write

jobs:
  improve:
    if: github.head_ref == 'assistant/wiki-organization-continuation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: assistant/wiki-organization-continuation
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - name: Install Linux Tauri build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Replace intro-only embeddings with multi-view document embeddings
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('Elephant/backend/tauri/src/knowledge_wiki_discovery.rs')
          source = path.read_text()
          start = source.index('#[cfg(not(mobile))]\nfn load_documents(')
          end = source.index('\n#[cfg(not(mobile))]\nfn candidate_overlap', start)
          replacement = r'''#[cfg(not(mobile))]
          fn trim_view(value: &str, limit: usize) -> String {
              value.chars().take(limit).collect::<String>()
          }

          #[cfg(not(mobile))]
          fn document_text_views(title: &str, chunks: &[String]) -> (String, Vec<String>) {
              let clean_chunks = chunks
                  .iter()
                  .map(|chunk| chunk.trim())
                  .filter(|chunk| !chunk.is_empty())
                  .collect::<Vec<_>>();
              if clean_chunks.is_empty() {
                  let title = title.trim();
                  return (
                      title.to_string(),
                      (!title.is_empty())
                          .then(|| vec![format!("Title: {title}")])
                          .unwrap_or_default(),
                  );
              }

              let last = clean_chunks.len().saturating_sub(1);
              let middle = clean_chunks.len() / 2;
              let mut groups = vec![
                  vec![0, 1.min(last)],
                  vec![middle.saturating_sub(1), middle, (middle + 1).min(last)],
                  vec![last.saturating_sub(1), last],
              ];
              for group in &mut groups {
                  group.sort_unstable();
                  group.dedup();
              }
              groups.dedup();

              let mut views = groups
                  .iter()
                  .map(|indices| {
                      let body = indices
                          .iter()
                          .filter_map(|index| clean_chunks.get(*index))
                          .map(|chunk| trim_view(chunk, 1_500))
                          .collect::<Vec<_>>()
                          .join("\n\n");
                      trim_view(&format!("Title: {}\n\n{}", title.trim(), body), 2_200)
                  })
                  .filter(|view| !view.trim().is_empty())
                  .collect::<Vec<_>>();
              views.dedup();

              let mut excerpt_indices = vec![
                  0,
                  1.min(last),
                  clean_chunks.len() / 3,
                  middle,
                  clean_chunks.len().saturating_mul(2) / 3,
                  last.saturating_sub(1),
                  last,
              ];
              excerpt_indices.sort_unstable();
              excerpt_indices.dedup();
              let excerpt = excerpt_indices
                  .iter()
                  .filter_map(|index| clean_chunks.get(*index))
                  .map(|chunk| trim_view(chunk, 700))
                  .collect::<Vec<_>>()
                  .join("\n…\n");
              (trim_view(&excerpt, 3_500), views)
          }

          #[cfg(not(mobile))]
          fn average_vectors(vectors: &[Vec<f32>]) -> Result<Vec<f32>, String> {
              let dimensions = vectors
                  .first()
                  .map(Vec::len)
                  .ok_or_else(|| "Cannot average an empty embedding set.".to_string())?;
              if dimensions == 0 || vectors.iter().any(|vector| vector.len() != dimensions) {
                  return Err("Document embedding views have incompatible dimensions.".into());
              }
              let mut average = vec![0.0; dimensions];
              for vector in vectors {
                  for (target, value) in average.iter_mut().zip(vector) {
                      *target += *value;
                  }
              }
              normalize_vector(average)
          }

          #[cfg(not(mobile))]
          fn load_documents(
              connection: &Connection,
          ) -> Result<Vec<(String, String, String, String, Vec<String>)>, String> {
              let mut chunks_by_path = HashMap::<String, Vec<String>>::new();
              {
                  let mut chunks_statement = connection
                      .prepare(
                          "SELECT document_path, text FROM chunks ORDER BY document_path, ordinal",
                      )
                      .map_err(|error| error.to_string())?;
                  let rows = chunks_statement
                      .query_map([], |row| {
                          Ok((row.get::<_, String>(0)?, row.get::<_, String>(1)?))
                      })
                      .map_err(|error| error.to_string())?;
                  for row in rows {
                      let (path, text) = row.map_err(|error| error.to_string())?;
                      chunks_by_path.entry(path).or_default().push(text);
                  }
              }

              let mut statement = connection
                  .prepare(
                      "SELECT relative_path, title, content_hash FROM documents ORDER BY relative_path",
                  )
                  .map_err(|error| error.to_string())?;
              let rows = statement
                  .query_map([], |row| {
                      Ok((
                          row.get::<_, String>(0)?,
                          row.get::<_, String>(1)?,
                          row.get::<_, String>(2)?,
                      ))
                  })
                  .map_err(|error| error.to_string())?;
              let mut documents = Vec::new();
              for row in rows {
                  let (path, title, content_hash) = row.map_err(|error| error.to_string())?;
                  let chunks = chunks_by_path.remove(&path).unwrap_or_default();
                  let (excerpt, views) = document_text_views(&title, &chunks);
                  documents.push((path, title, content_hash, excerpt, views));
              }
              Ok(documents)
          }

          #[cfg(not(mobile))]
          async fn document_vectors(
              app: &AppHandle,
              root: &Path,
              route: &EmbeddingRoute,
          ) -> Result<Vec<DocumentVector>, String> {
              let model_key = format!(
                  "wiki-multiview-v2|{}|{}|{}",
                  route.source, route.endpoint, route.model
              );
              let (mut output, missing) = {
                  let connection = open_connection(root)?;
                  let documents = load_documents(&connection)?;
                  let mut output = Vec::<Option<DocumentVector>>::with_capacity(documents.len());
                  let mut missing =
                      Vec::<(usize, String, String, String, String, Vec<String>)>::new();
                  for (path, title, content_hash, excerpt, views) in documents {
                      if title.trim().is_empty() && excerpt.trim().is_empty() {
                          continue;
                      }
                      let cached = connection
                          .query_row(
                              "SELECT vector_json FROM wiki_embedding_cache WHERE document_path=?1 AND model_key=?2 AND content_hash=?3",
                              params![path, model_key, content_hash],
                              |row| row.get::<_, String>(0),
                          )
                          .optional()
                          .map_err(|error| error.to_string())?;
                      let index = output.len();
                      if let Some(raw) = cached {
                          if let Ok(values) = serde_json::from_str::<Vec<f32>>(&raw) {
                              if let Ok(vector) = normalize_vector(values) {
                                  output.push(Some(DocumentVector {
                                      path,
                                      title,
                                      excerpt,
                                      vector,
                                  }));
                                  continue;
                              }
                          }
                      }
                      output.push(None);
                      missing.push((index, path, title, content_hash, excerpt, views));
                  }
                  (output, missing)
              };

              for batch in missing.chunks(16) {
                  let inputs = batch
                      .iter()
                      .flat_map(|(_, _, _, _, _, views)| views.iter().cloned())
                      .collect::<Vec<_>>();
                  let vectors = embed_batch(app, route, &inputs).await?;
                  let mut vector_offset = 0usize;
                  let connection = open_connection(root)?;
                  for (index, path, title, content_hash, excerpt, views) in batch {
                      let view_count = views.len();
                      if view_count == 0 || vector_offset + view_count > vectors.len() {
                          return Err(format!(
                              "Missing embedding views for document {path}."
                          ));
                      }
                      let vector = average_vectors(
                          &vectors[vector_offset..vector_offset + view_count],
                      )?;
                      vector_offset += view_count;
                      connection
                          .execute(
                              "INSERT INTO wiki_embedding_cache(document_path, model_key, content_hash, vector_json, updated_at)
                               VALUES (?1, ?2, ?3, ?4, unixepoch())
                               ON CONFLICT(document_path, model_key) DO UPDATE SET
                                 content_hash=excluded.content_hash,
                                 vector_json=excluded.vector_json,
                                 updated_at=unixepoch()",
                              params![path, model_key, content_hash, serde_json::to_string(&vector).map_err(|error| error.to_string())?],
                          )
                          .map_err(|error| error.to_string())?;
                      output[*index] = Some(DocumentVector {
                          path: path.clone(),
                          title: title.clone(),
                          excerpt: excerpt.clone(),
                          vector,
                      });
                  }
                  if vector_offset != vectors.len() {
                      return Err("Embedding provider returned unassigned document views.".into());
                  }
              }
              Ok(output.into_iter().flatten().collect())
          }
          '''
          source = source[:start] + replacement + source[end:]

          test_marker = '''    #[test]
              fn topic_source_floor_scales_with_the_vault()'''
          tests = r'''    #[test]
              fn document_views_cover_opening_middle_and_end() {
                  let chunks = (0..9)
                      .map(|index| format!("chunk-{index}"))
                      .collect::<Vec<_>>();
                  let (excerpt, views) = document_text_views("Long note", &chunks);
                  assert_eq!(views.len(), 3);
                  assert!(views[0].contains("chunk-0"));
                  assert!(views[1].contains("chunk-4"));
                  assert!(views[2].contains("chunk-8"));
                  assert!(excerpt.contains("chunk-0"));
                  assert!(excerpt.contains("chunk-8"));
              }

              #[test]
              fn averaged_views_are_normalized() {
                  let averaged = average_vectors(&[
                      normalize_vector(vec![1.0, 0.0]).unwrap(),
                      normalize_vector(vec![0.0, 1.0]).unwrap(),
                  ])
                  .unwrap();
                  let norm = averaged.iter().map(|value| value * value).sum::<f32>().sqrt();
                  assert!((norm - 1.0).abs() < 1e-5);
              }

          '''
          if 'document_views_cover_opening_middle_and_end' not in source:
              if test_marker not in source:
                  raise SystemExit('test marker not found')
              source = source.replace(test_marker, tests + test_marker, 1)
          path.write_text(source)

          contract = Path('tests/app/unit/wikiDiscoveryQualityRegression.spec.js')
          test = contract.read_text()
          if "uses multi-view" not in test:
              marker = "  it('builds deterministic graph communities and assigns notes competitively', () => {"
              block = """  it('uses multi-view embeddings instead of only the first chunks', () => {
              expect(discovery).toContain('document_text_views')
              expect(discovery).toContain('average_vectors')
              expect(discovery).toContain('wiki-multiview-v2')
              expect(discovery).toContain('chunks ORDER BY document_path, ordinal')
              expect(discovery).not.toContain('ORDER BY ordinal LIMIT 4')
            })

          """
              if marker not in test:
                  raise SystemExit('contract marker not found')
              test = test.replace(marker, block + marker, 1)
          contract.write_text(test)
          PY
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml --all
      - name: Validate multi-view Wiki discovery
        run: |
          cargo test --manifest-path Elephant/backend/tauri/Cargo.toml knowledge_wiki_discovery --lib
          NODE_PATH=Elephant/node_modules Elephant/node_modules/.bin/vitest run \
            tests/app/unit/wikiDiscoveryQualityRegression.spec.js
      - name: Commit multi-view embeddings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            Elephant/backend/tauri/src/knowledge_wiki_discovery.rs \
            tests/app/unit/wikiDiscoveryQualityRegression.spec.js
          git commit --no-verify -m "refactor: represent whole notes in Wiki discovery"
          git push origin HEAD:assistant/wiki-organization-continuation
