name: Wiki organization fix

on:
  pull_request:
    types:
      - reopened

permissions:
  contents: write

jobs:
  fix-and-validate:
    if: github.event.pull_request.head.ref == 'assistant/wiki-organization-continuation'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: assistant/wiki-organization-continuation
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Align migration regression with non-clickable related Wiki contract
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('Elephant/backend/tauri/src/knowledge_wiki_library.rs')
          source = path.read_text()
          old = '        assert!(migrated.contains("- [Peer networking](./peer-networking.md)"));\n'
          replacement = (
              '        assert!(migrated.contains("- Peer networking"));\n'
              '        assert!(!migrated.contains("./peer-networking.md"));\n'
          )
          if old in source:
              path.write_text(source.replace(old, replacement, 1))
          elif replacement not in source:
              raise SystemExit('expected Wiki migration regression assertion not found')
          PY

      - name: Format Rust sources
        run: |
          cargo fmt --manifest-path Elephant/backend/knowledge-core/Cargo.toml
          cargo fmt --manifest-path Elephant/backend/tauri/Cargo.toml

      - name: Commit correction
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Elephant/backend/knowledge-core/src/wiki_core.rs Elephant/backend/tauri/src/knowledge_wiki_library.rs
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "fix(wiki): align migration contract and Rust formatting"
          git push origin HEAD:assistant/wiki-organization-continuation

      - name: Validate knowledge-core regression
        run: cargo test --manifest-path Elephant/backend/knowledge-core/Cargo.toml web_citation_labels_are_human_readable
