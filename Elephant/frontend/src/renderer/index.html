<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>ElephantNote</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' blob:;
    worker-src 'self' blob:;
    child-src 'self' blob:;
    style-src 'self' 'unsafe-inline';
    img-src 'self' data: blob: asset: http://asset.localhost https:;
    font-src 'self' data:;
    connect-src 'self'
      http://localhost:*
      http://127.0.0.1:*
      https://huggingface.co
      https://*.huggingface.co
      https://cdn-lfs.huggingface.co
      https://*.hf.co
      https://*.xethub.hf.co
      https://cas-bridge.xethub.hf.co
      https://transfer.xethub.hf.co
      https://cdn.jsdelivr.net
      blob:
      ipc:
      http://ipc.localhost;
      "
    />
    <link rel="stylesheet" href="/src/mobile-android.css" />
    <link rel="stylesheet" href="/src/mobile-native-ux.css" />
    <link rel="stylesheet" href="/src/mobile-library-chrome.css" />
  </head>

  <body>
    <div id="app"></div>
    <script>
      window.global = window.global || window
      window.process = window.process || {
        env: {},
        platform: 'browser',
        versions: {},
        cwd: function () {
          return '/'
        }
      }
      window.Buffer = window.Buffer || {
        from: function (value) {
          if (value instanceof ArrayBuffer) return new Uint8Array(value)
          return new TextEncoder().encode(String(value || ''))
        },
        byteLength: function (value) {
          return new TextEncoder().encode(String(value || '')).byteLength
        }
      }
    </script>
    <script type="module" src="/src/platform/mobileVaultBridge.js"></script>
    <script type="module" src="/src/main.js"></script>
    <script type="module" src="/src/platform/mobileInteractionRuntime.js"></script>
    <script type="module" src="/src/platform/mobileEditorRuntime.js"></script>
    <script type="module" src="/src/platform/mobileLibraryChromeRuntime.js"></script>
  </body>
</html>
